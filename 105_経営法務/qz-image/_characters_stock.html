<!doctype html><html lang="ja"><head><meta charset="utf-8">
<title>キャラ＆アイコン・ストック（手描きSVG）</title></head>
<body style="font-family:'Hiragino Maru Gothic ProN','M PLUS Rounded 1c',system-ui,sans-serif;background:#fffdf9;color:#4a3b2f;padding:20px;">
<h1 style="font-size:1.1rem;">キャラ＆アイコン・ストック（手描きSVG）</h1>
<p style="font-size:.8rem;color:#7a6149;">このファイルからSVGを丸ごとコピーしてノートに貼る。暖色トーン（stroke #7a6149系・パステル塗り・小さめドット目・ωの口・ほっぺピンク）で統一。合うものが無ければ同トーンで新規作成し、ここへ追記してストックする。</p>

<h2 style="font-size:.95rem;border-bottom:2px solid #efd5a3;">キャラクター</h2>
<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end;background:#fff;border:1px solid #eee;border-radius:12px;padding:18px;">

  <!-- くま：生徒（ふつう／疑問顔） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 100 105" width="74" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="30" r="13" fill="#efd5a3" stroke="#7a6149" stroke-width="3"/>
    <circle cx="76" cy="30" r="13" fill="#efd5a3" stroke="#7a6149" stroke-width="3"/>
    <circle cx="24" cy="30" r="6" fill="#f6c9c0"/>
    <circle cx="76" cy="30" r="6" fill="#f6c9c0"/>
    <ellipse cx="50" cy="58" rx="35" ry="33" fill="#f3ddb0" stroke="#7a6149" stroke-width="3"/>
    <circle cx="31" cy="67" r="6" fill="#f7b8b0" opacity=".8"/>
    <circle cx="69" cy="67" r="6" fill="#f7b8b0" opacity=".8"/>
    <ellipse cx="50" cy="70" rx="13" ry="10" fill="#fbeed0"/>
    <circle cx="39" cy="56" r="4.2" fill="#4a3b2f"/>
    <circle cx="61" cy="56" r="4.2" fill="#4a3b2f"/>
    <circle cx="40.4" cy="54.6" r="1.3" fill="#fff"/>
    <circle cx="62.4" cy="54.6" r="1.3" fill="#fff"/>
    <ellipse cx="50" cy="66" rx="3" ry="2.3" fill="#7a6149"/>
    <path d="M50 68 q-6 7 -11 2" fill="none" stroke="#7a6149" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M50 68 q6 7 11 2" fill="none" stroke="#7a6149" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
  <figcaption style="font-size:.72rem;">くま・生徒（疑問）</figcaption></figure>

  <!-- うさぎ：先生（リボン） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 100 110" width="74" xmlns="http://www.w3.org/2000/svg"><ellipse cx="40" cy="20" rx="7.5" ry="19" fill="#fffdf8" stroke="#c9a59c" stroke-width="2.6"/><ellipse cx="60" cy="20" rx="7.5" ry="19" fill="#fffdf8" stroke="#c9a59c" stroke-width="2.6"/><ellipse cx="40" cy="20" rx="3" ry="12" fill="#f6c9c0"/><ellipse cx="60" cy="20" rx="3" ry="12" fill="#f6c9c0"/><ellipse cx="50" cy="60" rx="30" ry="28" fill="#fffdf8" stroke="#c9a59c" stroke-width="2.6"/><circle cx="34" cy="64" r="6" fill="#f7b8c2" opacity=".8"/><circle cx="66" cy="64" r="6" fill="#f7b8c2" opacity=".8"/><circle cx="42" cy="58" r="2.6" fill="#5b4a45"/><circle cx="58" cy="58" r="2.6" fill="#5b4a45"/><path d="M46 65 q2 2.6 4 0 q2 2.6 4 0" fill="none" stroke="#5b4a45" stroke-width="1.8" stroke-linecap="round"/><path d="M50 86 l-10 -5 v10 z" fill="#d94f7d"/><path d="M50 86 l10 -5 v10 z" fill="#d94f7d"/><circle cx="50" cy="86" r="2.8" fill="#b83e66"/></svg>
  <figcaption style="font-size:.72rem;">うさぎ・先生（リボン）</figcaption></figure>

    <path d="M78 20 L62 36 L82 40 Z" fill="#f6e3c4" stroke="#c79a5b" stroke-width="2.6" stroke-linejoin="round"/>
    <path d="M27 24 L36 33 L25 35 Z" fill="#f4b8b0"/>
    <path d="M73 24 L64 33 L75 35 Z" fill="#f4b8b0"/>

    <circle cx="32" cy="66" r="6" fill="#f7b8b0" opacity=".8"/>
    <circle cx="68" cy="66" r="6" fill="#f7b8b0" opacity=".8"/>
    <circle cx="39" cy="57" r="4" fill="#4a3b2f"/>
    <circle cx="61" cy="57" r="4" fill="#4a3b2f"/>

  </svg>

  <!-- いぬ：先生バリエ（ネクタイ） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 100 112" width="74" xmlns="http://www.w3.org/2000/svg">
    <path d="M22 34 q-12 -2 -12 16 q0 14 14 12 z" fill="#d9a06a" stroke="#a9743c" stroke-width="2.6" stroke-linejoin="round"/>
    <path d="M78 34 q12 -2 12 16 q0 14 -14 12 z" fill="#d9a06a" stroke="#a9743c" stroke-width="2.6" stroke-linejoin="round"/>
    <ellipse cx="50" cy="56" rx="33" ry="30" fill="#fff7ee" stroke="#a9743c" stroke-width="2.6"/>
    <circle cx="31" cy="62" r="5.5" fill="#f7b8b0" opacity=".75"/>
    <circle cx="69" cy="62" r="5.5" fill="#f7b8b0" opacity=".75"/>
    <circle cx="40" cy="53" r="4" fill="#4a3b2f"/>
    <circle cx="60" cy="53" r="4" fill="#4a3b2f"/>
    <circle cx="41.2" cy="51.7" r="1.2" fill="#fff"/>
    <circle cx="61.2" cy="51.7" r="1.2" fill="#fff"/>
    <ellipse cx="50" cy="62" rx="4" ry="3" fill="#5a4636"/>
    <path d="M50 65 q-5 5 -9 1 M50 65 q5 5 9 1" fill="none" stroke="#7a6149" stroke-width="2" stroke-linecap="round"/>

  <!-- ぱんだ -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 100 105" width="74" xmlns="http://www.w3.org/2000/svg">
    <circle cx="24" cy="28" r="12" fill="#5b4a45"/>
    <circle cx="76" cy="28" r="12" fill="#5b4a45"/>
    <ellipse cx="50" cy="58" rx="35" ry="32" fill="#ffffff" stroke="#bcae9c" stroke-width="2.6"/>
    <ellipse cx="37" cy="56" rx="8" ry="10" fill="#5b4a45" transform="rotate(-12 37 56)"/>
    <ellipse cx="63" cy="56" rx="8" ry="10" fill="#5b4a45" transform="rotate(12 63 56)"/>
    <circle cx="38" cy="57" r="3.4" fill="#fff"/>
    <circle cx="62" cy="57" r="3.4" fill="#fff"/>
    <circle cx="38" cy="57.6" r="1.6" fill="#2b211d"/>
    <circle cx="62" cy="57.6" r="1.6" fill="#2b211d"/>

  </svg>
  <figcaption style="font-size:.72rem;">ぱんだ</figcaption></figure>

  <!-- ひよこ -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 100 105" width="64" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="60" rx="33" ry="31" fill="#ffe27a" stroke="#e8b54a" stroke-width="2.6"/>
    <circle cx="30" cy="66" r="5.5" fill="#f7a8a0" opacity=".7"/>
    <circle cx="70" cy="66" r="5.5" fill="#f7a8a0" opacity=".7"/>
    <circle cx="40" cy="55" r="4" fill="#4a3b2f"/>
    <circle cx="60" cy="55" r="4" fill="#4a3b2f"/>
    <circle cx="41.2" cy="53.7" r="1.2" fill="#fff"/>
    <circle cx="61.2" cy="53.7" r="1.2" fill="#fff"/>
    <path d="M44 62 L56 62 L50 70 Z" fill="#f6a02a" stroke="#d98314" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M30 30 q4 -8 9 -2 M70 30 q-4 -8 -9 -2" fill="none" stroke="#e8b54a" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
  <figcaption style="font-size:.72rem;">ひよこ</figcaption></figure>

</div>

<h2 style="font-size:.95rem;border-bottom:2px solid #efd5a3;margin-top:22px;">小物・アイコン</h2>
<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end;background:#fff;border:1px solid #eee;border-radius:12px;padding:18px;">

  <!-- 親会社ビル（青） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 48 52" width="50" xmlns="http://www.w3.org/2000/svg"><rect x="13" y="8" width="22" height="38" rx="2.5" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2.4"/><rect x="17" y="13" width="6" height="5" rx="1" fill="#93c5fd"/><rect x="25" y="13" width="6" height="5" rx="1" fill="#93c5fd"/><rect x="17" y="21" width="6" height="5" rx="1" fill="#93c5fd"/><rect x="25" y="21" width="6" height="5" rx="1" fill="#93c5fd"/><rect x="17" y="29" width="6" height="5" rx="1" fill="#93c5fd"/><rect x="25" y="29" width="6" height="5" rx="1" fill="#93c5fd"/><rect x="20" y="38" width="8" height="8" rx="1" fill="#60a5fa"/></svg>
  <figcaption style="font-size:.72rem;">親会社ビル</figcaption></figure>

  <!-- 持株会社（神殿・紫＋星） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 58 52" width="54" xmlns="http://www.w3.org/2000/svg"><path d="M29 6 L48 17 H10 Z" fill="#fae8ff" stroke="#c026d3" stroke-width="2.2" stroke-linejoin="round"/><rect x="12" y="17" width="34" height="4" fill="#c026d3"/><rect x="15" y="23" width="4" height="17" fill="#f5d0fe" stroke="#c026d3" stroke-width="1.5"/><rect x="23" y="23" width="4" height="17" fill="#f5d0fe" stroke="#c026d3" stroke-width="1.5"/><rect x="31" y="23" width="4" height="17" fill="#f5d0fe" stroke="#c026d3" stroke-width="1.5"/><rect x="39" y="23" width="4" height="17" fill="#f5d0fe" stroke="#c026d3" stroke-width="1.5"/><rect x="10" y="40" width="38" height="5" rx="1.5" fill="#c026d3"/><path d="M52 5 l1.3 3 l3 1.3 l-3 1.3 l-1.3 3 l-1.3 -3 l-3 -1.3 l3 -1.3 z" fill="#ffcf45"/></svg>
  <figcaption style="font-size:.72rem;">持株会社（新設）</figcaption></figure>

  <!-- 子会社の店（水色・ひさし） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 50 46" width="50" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="16" width="32" height="28" rx="2.5" fill="#cffafe" stroke="#0891b2" stroke-width="2.4"/><rect x="7" y="11" width="36" height="6" rx="2" fill="#0891b2"/><rect x="14" y="22" width="8" height="7" rx="1.2" fill="#a5f3fc"/><rect x="28" y="22" width="8" height="7" rx="1.2" fill="#a5f3fc"/><rect x="20" y="33" width="10" height="11" rx="1.2" fill="#67e8f9"/></svg>
  <figcaption style="font-size:.72rem;">子会社の店</figcaption></figure>

  <!-- 鍵（金） -->
  <figure style="text-align:center;margin:0;background:#7e22ce;border-radius:8px;padding:10px;">
  <svg viewBox="0 0 40 24" width="40" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="12" r="6.5" fill="none" stroke="#ffd54a" stroke-width="2.6"/><circle cx="9" cy="12" r="2.2" fill="#ffd54a"/><path d="M15 12 H35" stroke="#ffd54a" stroke-width="2.6" stroke-linecap="round"/><path d="M30 12 V18 M35 12 V17" stroke="#ffd54a" stroke-width="2.6" stroke-linecap="round"/></svg>
  <figcaption style="font-size:.72rem;color:#fff;">鍵</figcaption></figure>

  <!-- 買い物カート（緑） -->

  <svg viewBox="0 0 40 34" width="40" xmlns="http://www.w3.org/2000/svg"><path d="M4 5 H9 L13 23 H31" fill="none" stroke="#15803d" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 9 H34 L31 19 H13 Z" fill="#bbf7d0" stroke="#15803d" stroke-width="2.2" stroke-linejoin="round"/><circle cx="16" cy="29" r="2.6" fill="#15803d"/><circle cx="29" cy="29" r="2.6" fill="#15803d"/></svg>
  <figcaption style="font-size:.72rem;">買い物カート</figcaption></figure>

  <!-- 工事コーン（注意） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 36 34" width="34" xmlns="http://www.w3.org/2000/svg"><path d="M18 5 L27 29 H9 Z" fill="#fcd34d" stroke="#b45309" stroke-width="2.2" stroke-linejoin="round"/><path d="M13 19 H23" stroke="#fff" stroke-width="3"/><path d="M15 13 H21" stroke="#fff" stroke-width="2.6"/><rect x="6" y="29" width="24" height="4" rx="1.5" fill="#b45309"/></svg>
  <figcaption style="font-size:.72rem;">工事コーン</figcaption></figure>

  <!-- 株主（人） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 32 40" width="30" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="11" r="7" fill="#efd5a3" stroke="#7a6149" stroke-width="2.2"/><path d="M4 39 q0-13 12-13 q12 0 12 13 z" fill="#f3ddb0" stroke="#7a6149" stroke-width="2.2" stroke-linejoin="round"/></svg>
  <figcaption style="font-size:.72rem;">株主（人）</figcaption></figure>

  <!-- 株券（証券） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 42 30" width="44" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="34" height="22" rx="2.5" fill="#fff7e6" stroke="#c79a5b" stroke-width="2"/><path d="M9 11 H33 M9 16 H33 M9 21 H26" stroke="#d9b878" stroke-width="1.6" stroke-linecap="round"/><circle cx="30" cy="20" r="4.5" fill="#f6c9c0" stroke="#c79a5b" stroke-width="1.4"/></svg>

  <!-- ケーキ（事業の一部） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 40 36" width="38" xmlns="http://www.w3.org/2000/svg"><path d="M6 32 L20 9 L34 32 Z" fill="#fde7c0" stroke="#c79a5b" stroke-width="2" stroke-linejoin="round"/><path d="M9 24 q11 6 22 0" fill="none" stroke="#e89ab0" stroke-width="2.6" stroke-linecap="round"/><circle cx="20" cy="13" r="3.2" fill="#e2584e" stroke="#b83e3a" stroke-width="1"/></svg>
  <figcaption style="font-size:.72rem;">ケーキ</figcaption></figure>

  <!-- パン（残す事業） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 42 30" width="40" xmlns="http://www.w3.org/2000/svg"><path d="M6 26 q-3-16 15-16 q18 0 15 16 z" fill="#f0c98a" stroke="#b07d3c" stroke-width="2" stroke-linejoin="round"/><path d="M14 14 q2 6 0 10 M21 13 v11 M28 14 q-2 6 0 10" fill="none" stroke="#b07d3c" stroke-width="1.4" stroke-linecap="round"/></svg>
  <figcaption style="font-size:.72rem;">パン</figcaption></figure>

  <!-- ギフト（おみやげ／対価） -->
  <figure style="text-align:center;margin:0;">
  <svg viewBox="0 0 34 32" width="34" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="13" width="26" height="16" rx="2" fill="#f6c9c0" stroke="#b06a5e" stroke-width="2"/><rect x="2" y="9" width="30" height="6" rx="1.5" fill="#e89ab0" stroke="#b06a5e" stroke-width="1.6"/><path d="M17 9 V29" stroke="#b06a5e" stroke-width="2"/><path d="M17 10 q-7-9-9-2 q5 4 9 1 q4 3 9-1 q-2-8-9 2" fill="#f7b8c2" stroke="#b06a5e" stroke-width="1.4" stroke-linejoin="round"/></svg>

  <!-- ハサミ（端数・切り出し） -->

  <svg viewBox="0 0 30 24" width="30" xmlns="http://www.w3.org/2000/svg"><circle cx="7" cy="6" r="4" fill="none" stroke="#7a6149" stroke-width="2"/><circle cx="7" cy="18" r="4" fill="none" stroke="#7a6149" stroke-width="2"/><path d="M10 8 L26 16 M10 16 L26 8" stroke="#7a6149" stroke-width="2" stroke-linecap="round"/></svg>
