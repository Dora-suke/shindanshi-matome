<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIノート編集 — パターンB サンプル（Gemini無料版）</title>
<style>
 :root{--bd:#e2e8f0;--ink:#1f2937;--accent:#4f46e5;}
 *{box-sizing:border-box;}
 html,body{margin:0;height:100%;}
 body{font-family:-apple-system,'Hiragino Kaku Gothic ProN',sans-serif;color:var(--ink);display:flex;flex-direction:column;}
 header{display:flex;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--bd);background:#f8fafc;flex-wrap:wrap;}
 header .ttl{font-weight:800;color:var(--accent);font-size:14px;white-space:nowrap;}
 header input{flex:1;min-width:240px;padding:6px 9px;border:1px solid var(--bd);border-radius:7px;font-size:12.5px;font-family:inherit;}
 header button{padding:6px 14px;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
 .btn-load{background:#e0e7ff;color:#3730a3;}
 .btn-save{background:#16a34a;color:#fff;}
 #status{font-size:12px;color:#64748b;white-space:nowrap;}
 main{flex:1;display:flex;min-height:0;}
 #left{flex:1.4;border-right:1px solid var(--bd);min-width:0;display:flex;flex-direction:column;}
 #left .bar{font-size:11px;color:#94a3b8;padding:3px 10px;background:#fbfbfd;border-bottom:1px solid var(--bd);}
 #frame{flex:1;width:100%;border:none;background:#fff;}
 #right{flex:1;display:flex;flex-direction:column;min-width:320px;background:#fafafa;}
 #log{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
 .msg{max-width:90%;padding:9px 12px;border-radius:13px;font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
 .me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:3px;}
 .ai{align-self:flex-start;background:#eef2ff;color:#1e1b4b;border-bottom-left-radius:3px;}
 .sys{align-self:center;background:#fef9c3;color:#854d0e;font-size:12px;border-radius:8px;text-align:center;}
 .inbar{display:flex;gap:8px;padding:10px;border-top:1px solid var(--bd);background:#fff;}
 .inbar textarea{flex:1;resize:none;height:56px;padding:8px 10px;border:1px solid var(--bd);border-radius:9px;font-size:13.5px;font-family:inherit;line-height:1.5;}
 .inbar button{padding:0 18px;border:none;border-radius:9px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-family:inherit;}
 .inbar button:disabled{opacity:.5;cursor:default;}
 .hint{font-size:11px;color:#94a3b8;padding:0 10px 8px;}
 .modelbar{display:flex;align-items:center;gap:6px;padding:8px 10px 2px;font-size:12px;color:#64748b;}
 .modelbar select{padding:4px 8px;border:1px solid var(--bd);border-radius:7px;font-size:12.5px;font-family:inherit;background:#fff;}
</style>
</head>
<body>
<header>
  <span class="ttl">🤖 AIノート編集</span>
  <input id="path" value="/Users/nori3/Desktop/まとめ/AIノート編集ツール_パターンB/sample_note.html">
  <button class="btn-load" onclick="loadNote()">読込</button>
  <button class="btn-save" onclick="saveNote()">💾 保存</button>
  <span id="status">未読込</span>
</header>
<main>
  <div id="left">
    <div class="bar">📄 プレビュー（左）— ここが指示で書き換わります</div>
    <iframe id="frame"></iframe>
  </div>
  <div id="right">
    <div id="log">
      <div class="msg sys">① 上のパスのノートを「読込」→ ② 下の欄に「この表を簡潔に」等と指示 → ③ 左が修正されます → ④「💾保存」で実ファイルに書き戻し（.bakバックアップ付き）</div>
    </div>
    <div class="modelbar">
      <span>🧠 モデル：</span>
      <select id="model"></select>
    </div>
    <div class="inbar">
      <textarea id="inp" placeholder="例：この表を中学生にもわかるように簡潔化して（⌘+Enterで送信）"></textarea>
      <button id="send" onclick="sendMsg()">送信</button>
    </div>
    <div class="hint">修正は左にすぐ反映されますが、ファイルには「保存」を押すまで書き込まれません。</div>
  </div>
</main>
<script>
let currentHTML = "";
const $ = id => document.getElementById(id);
function setStatus(t){ $("status").textContent = t; }
function render(){ $("frame").srcdoc = currentHTML; }
function addMsg(cls, text){
  const d = document.createElement("div");
  d.className = "msg " + cls; d.textContent = text;
  $("log").appendChild(d); $("log").scrollTop = $("log").scrollHeight;
  return d;
}
async function loadNote(){
  const path = $("path").value.trim();
  setStatus("読込中…");
  try{
    const r = await fetch("/api/note?path=" + encodeURIComponent(path));
    const j = await r.json();
    if(!j.ok) throw new Error(j.error);
    currentHTML = j.html; render();
    setStatus("読込完了: " + j.path.split("/").pop());
    addMsg("sys", "ノートを読み込みました（" + j.html.length.toLocaleString() + "文字）");
  }catch(e){ setStatus("読込失敗"); addMsg("sys","⚠️ " + e.message); }
}
async function sendMsg(){
  const inst = $("inp").value.trim();
  if(!inst) return;
  if(!currentHTML){ addMsg("sys","⚠️ 先にノートを読み込んでください"); return; }
  addMsg("me", inst); $("inp").value = "";
  $("send").disabled = true; setStatus("AIが修正中…");
  const wait = addMsg("ai","考え中… ⏳");
  try{
    const r = await fetch("/api/chat", {method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({html: currentHTML, instruction: inst, model: $("model").value})});
    const j = await r.json();
    if(!j.ok) throw new Error(j.error);
    currentHTML = j.html; render();
    wait.textContent = j.reply + (j.model ? "\n（モデル: " + j.model + "）" : "");
    setStatus("修正完了（未保存）");
  }catch(e){ wait.textContent = "⚠️ " + e.message; setStatus("エラー"); }
  $("send").disabled = false;
}
async function saveNote(){
  if(!currentHTML){ addMsg("sys","⚠️ 保存する内容がありません"); return; }
  setStatus("保存中…");
  try{
    const r = await fetch("/api/save", {method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({path: $("path").value.trim(), html: currentHTML})});
    const j = await r.json();
    if(!j.ok) throw new Error(j.error);
    setStatus("✅ 保存しました（.bak作成）");
    addMsg("sys","💾 保存完了: " + j.path.split("/").pop());
  }catch(e){ setStatus("保存失敗"); addMsg("sys","⚠️ " + e.message); }
}
async function loadModels(){
  try{
    const r = await fetch("/api/models");
    const j = await r.json();
    if(!j.ok) return;
    const saved = localStorage.getItem("aieditor_model");
    const sel = $("model");
    sel.innerHTML = "";
    j.models.forEach(m=>{
      const o = document.createElement("option");
      o.value = m; o.textContent = m + (m===j.default ? "（既定）" : "");
      sel.appendChild(o);
    });
    sel.value = (saved && j.models.includes(saved)) ? saved : j.default;
    sel.addEventListener("change", ()=> localStorage.setItem("aieditor_model", sel.value));
  }catch(e){ /* 取得失敗時はそのまま */ }
}
$("inp").addEventListener("keydown", e=>{ if(e.key==="Enter" && (e.metaKey||e.ctrlKey)) sendMsg(); });
window.addEventListener("load", ()=>{ loadModels(); loadNote(); });   // 起動時にモデル一覧＋ノート読込
</script>
</body>
</html>
