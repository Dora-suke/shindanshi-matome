<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:#1e293b;border-radius:18px;max-width:860px;width:100%;padding:36px 40px;box-shadow:0 8px 40px rgba(0,0,0,.5);border:3px solid #ffffff;}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.topic{font-size:.95em;color:#fcd34d;font-weight:800;letter-spacing:.05em;}
.prog{font-size:.95em;color:#94a3b8;}
.bar{height:7px;background:#334155;border-radius:4px;margin:14px 0 28px;overflow:hidden;}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#38bdf8,#818cf8);width:0;transition:width .3s;}
.q{font-size:1.55em;line-height:1.8;margin-bottom:32px;min-height:3em;font-weight:600;}
.qnum{color:#fbbf24;font-weight:800;margin-right:8px;}
.btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.btns button{padding:22px 10px;font-size:1.3em;font-weight:800;border:none;border-radius:14px;cursor:pointer;font-family:inherit;transition:transform .1s;}
.btns button:active{transform:scale(.96);}
.b-o{background:#16a34a;color:#fff;}
.b-x{background:#dc2626;color:#fff;}
.b-d{background:#64748b;color:#fff;}
.btns button:disabled{opacity:.4;cursor:default;}
.result{margin-top:28px;padding:22px;border-radius:14px;display:none;}
.result.show{display:block;animation:fade .3s;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.result.correct{background:#064e3b;border-left:4px solid #10b981;}
.result.wrong{background:#4c1d1d;border-left:4px solid #ef4444;}
.result .verdict{font-weight:800;font-size:1.3em;margin-bottom:10px;}
.result .ans{font-size:1.05em;color:#cbd5e1;margin-bottom:12px;}
.result .exp{font-size:1.12em;line-height:1.75;color:#e2e8f0;}
.nav{display:flex;gap:12px;margin-top:24px;}
.back{padding:18px 22px;font-size:1.05em;font-weight:800;background:#334155;color:#cbd5e1;border:none;border-radius:14px;cursor:pointer;font-family:inherit;}
.back:disabled{opacity:.3;cursor:default;}
.next{flex:1;padding:18px;font-size:1.25em;font-weight:800;background:#38bdf8;color:#0f172a;border:none;border-radius:14px;cursor:pointer;font-family:inherit;display:none;}
.next.show{display:block;}
.btns button.sel{outline:4px solid #fbbf24;outline-offset:2px;}
.restart{margin-top:18px;padding:14px 24px;font-size:1.05em;font-weight:800;background:#334155;color:#e2e8f0;border:none;border-radius:12px;cursor:pointer;font-family:inherit;}
.summary{text-align:center;}
.summary h2{font-size:1.4em;margin-bottom:12px;}
.score{font-size:2.6em;font-weight:800;color:#38bdf8;margin:10px 0;}
.miss{text-align:left;background:#0f172a;border-radius:10px;padding:14px;margin:14px 0;font-size:.88em;line-height:1.7;}
.code{background:#0f172a;border:1px dashed #475569;border-radius:8px;padding:12px;font-family:monospace;font-size:.9em;color:#fbbf24;margin:10px 0;word-break:break-all;}
.copy{padding:12px 20px;background:#818cf8;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.hint{font-size:.78em;color:#94a3b8;margin-top:10px;}
.batch-nav{display:flex;gap:8px;margin-bottom:10px;}
.batch-nav button{flex:1;padding:8px 4px;font-size:.78em;font-weight:800;border:2px solid #475569;border-radius:8px;background:#0f172a;color:#94a3b8;cursor:pointer;font-family:inherit;}
.batch-nav button.active{border-color:#fcd34d;color:#fcd34d;background:#1e293b;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="batch-nav" id="batchnav">
    <button onclick="jumpBatch(0)" id="bn0">① 商標法</button>
    <button onclick="jumpBatch(1)" id="bn1">② 機関設計</button>
    <button onclick="jumpBatch(2)" id="bn2">③ 民法</button>
  </div>
  <div class="head">
    <span class="topic" id="topic"></span>
    <span class="prog" id="prog"></span>
  </div>
  <div class="bar"><i id="barfill"></i></div>
  <div id="quiz">
    <div class="q" id="q"></div>
    <div class="btns">
      <button class="b-o" onclick="answer('正')">正しい</button>
      <button class="b-x" onclick="answer('誤')">誤り</button>
      <button class="b-d" onclick="answer('△')">△あいまい</button>
    </div>
    <div class="result" id="result">
      <div class="verdict" id="verdict"></div>
      <div class="ans" id="ans"></div>
      <div class="exp" id="exp"></div>
    </div>
    <div class="nav">
      <button class="back" id="backbtn" onclick="prev()">← 前へ</button>
      <button class="next" id="nextbtn" onclick="next()">次の問題へ →</button>
    </div>
  </div>
</div>

<script>
const SUBJECT = "105";

const Q_TM = [
  {q:"商標法における商標とは文字・図形・記号・立体的形状・色彩またはこれらの結合・音その他政令で定めるものをいい、業務上の信用の維持を図ることも同法の目的である。", a:"正", e:"2条1項・1条。商標法の目的は①業者の業務上の信用維持②産業の発展③需要者の利益保護の3つ。定義は広く「音」等新タイプも含む。"},
  {q:"立体的形状のみからなる商標は識別力を欠くため、いかなる場合も商標登録を受けることができない。", a:"誤", e:"3条2項。使用の結果、需要者の間に広く認識された立体商標は登録可（例：コカコーラボトル形状）。「いかなる場合も不可」は誤り。"},
  {q:"専用使用権者は、設定行為で定めた範囲内において、指定商品または指定役務について登録商標の使用をする権利を専有する。", a:"正", e:"30条1項。専用使用権は物権的・排他的。設定範囲内では商標権者自身も原則使用不可になる（通常使用権との大きな違い）。"},
  {q:"地域団体商標として登録できる商標は、地域の名称と商品・役務の名称等を組み合わせた文字商標であって、使用の結果として需要者の間に広く認識されているものに限られる。", a:"正", e:"7条の2第1項。「松阪牛」「夕張メロン」等の地域ブランドを保護。図形との組合せは不可（文字のみ）。広く認識という周知性要件あり。"},
  {q:"商標権の存続期間は設定登録の日から10年であり、更新登録の申請によって更新できるのは1回のみである。", a:"誤", e:"19条1項・2項。更新は「何回でも」可能（回数制限なし）。特許（出願日から20年）・著作権（死後70年）と対比。永続的ブランド維持が可能。"},
  {q:"継続して3年以上、日本国内において商標権者・専用使用権者・通常使用権者のいずれもが指定商品等に登録商標を使用していない場合、利害関係人に限り不使用取消審判を請求できる。", a:"誤", e:"50条1項。「何人も」請求可（利害関係人限定ではない）。無効審判（利害関係人限定）との対比が頻出。3年以上の不使用が要件。"},
  {q:"商標登録出願前から不正競争の目的なく継続して使用しており、かつその商標が需要者の間に広く認識されている者は、先使用による商標の使用をする権利を有する。", a:"正", e:"32条1項。先使用権の要件：①出願前から使用②不正競争目的なし③商標が広く認識（周知性）の3つ全て必要。使用のみでは不足。"},
  {q:"他人の氏名・名称・著名な雅号等を含む商標は、その他人の承諾を得ているか否かにかかわらず、商標登録を受けることができない。", a:"誤", e:"4条1項8号。「その他人の承諾を得た場合」は登録可。承諾なく含む場合が不登録。存命・没後を問わず適用。"},
  {q:"識別力のない商標（普通名称・記述的商標等）であっても、使用の結果として需要者の間に広く認識されたものは、例外的に商標登録を受けることができる場合がある。", a:"正", e:"3条2項（使用による識別力の取得＝セカンダリーミーニング）。長年の使用で識別力が生じたもの。不登録事由の例外として重要。"},
  {q:"平成27年の商標法改正により、音のみからなる商標や色彩のみからなる商標も商標登録の対象となった。", a:"正", e:"H27改正で追加された新タイプ：①動き②ホログラム③色彩のみ④音⑤位置 の5種類。世界的な商標保護拡大の潮流に対応。"},
  {q:"通常使用権は、設定の登録をしなければその後に商標権を譲り受けた者等の第三者に対抗することができない。", a:"誤", e:"31条の2（H23改正・当然対抗制度）。通常使用権は登録なしで第三者に対抗可。特許法の通常実施権と同様の扱い。"},
  {q:"地域団体商標の登録を受けることができる主体には、事業協同組合のほか、農業協同組合・商工会・商工会議所・特定非営利活動法人（NPO法人）も含まれる。", a:"正", e:"7条の2第1項（改正で順次拡大）。多様な地域団体が地域ブランドを守れるよう対象を拡充。NPO法人は定款目的に当該業務が含まれることが条件。"},
  {q:"商標権の更新登録申請は存続期間満了前6か月以内から行うことができ、満了後6か月以内であれば割増納付金を支払うことで申請することもできる。", a:"正", e:"20条2項・3項。通常は満了前6か月から満了日まで。その後6か月（遅延救済）は割増料金で申請可。計12か月のウィンドウ。"},
  {q:"不使用取消審判において、登録商標が使用されていることの立証責任は、取消しを請求した側（請求人）が負う。", a:"誤", e:"50条2項（立証責任の転換）。使用の事実は「商標権者側」が立証しなければならない。請求人が不使用を証明する必要はない。"},
  {q:"他人の著名な商標と混同を生ずるおそれがある商標は、指定商品または指定役務が非類似であっても商標登録を受けることができない場合がある。", a:"正", e:"4条1項15号。周知商標との混同防止。商品非類似でも出所混同のおそれがあれば不登録。いわゆる希釈化防止規定。"},
  {q:"商標の類否は、外観・称呼・観念のうち称呼（読み）の類似を最も重視して判断しなければならない。", a:"誤", e:"類否判断は外観・称呼・観念を「総合的に」観察して行う。どれか一つのみで判断するのではなく、取引の実情等も考慮。称呼のみに限定はしない。"},
  {q:"商品の普通名称や産地・品質・原材料等を普通に用いられる方法で表示する標章のみからなる商標は、商標登録を受けることができない。", a:"正", e:"3条1項1号・3号。識別力なし（記述的商標）。ただし3条2項の使用による識別力取得で例外的に登録可。"},
  {q:"色彩のみからなる商標は、平成27年の商標法改正以前から商標登録の対象とされていた。", a:"誤", e:"色彩のみの商標はH27改正で追加された新タイプの一つ。改正前は色彩を図形等と組み合わせた商標のみ保護対象だった。"},
  {q:"商標権者が専用使用権を設定した場合、その専用使用権の範囲内において商標権者自身は原則として登録商標を使用することができなくなる。", a:"正", e:"30条2項。専用使用権は物権的・排他的。商標権者も同範囲では使用不可。通常使用権は非排他的（商標権者も使用可）との違い。"},
  {q:"地域団体商標の登録を受けるためには、当該商標が全国的に広く知れ渡っていることが必要である。", a:"誤", e:"7条の2の「需要者の間に広く認識」は全国的認知を要しない。主要な取引圏（産地・消費地等）での周知性があれば足りると解されている。"},
  {q:"商標権は、一つの商標登録について指定商品または指定役務が複数ある場合でも、指定商品・役務ごとに分割して移転することができる。", a:"正", e:"24条の2第1項。商標権の分割移転は可能。商品区分をまたがる分割も認められる。"},
  {q:"不使用取消審判において商標権者が立証すべき使用の事実は、審判請求の登録前3年以内に日本国内でされた使用に限られる。", a:"正", e:"50条2項。立証対象期間は「審判の請求の登録前3年以内」。これより古い使用を証明しても取消しを免れない。"},
  {q:"先使用権は、商標登録出願前から継続して商標を使用していれば、その商標の知名度にかかわらず当然に発生する権利である。", a:"誤", e:"32条1項。先使用権の発生には「周知性」（需要者間での広い認識）が必要。単に使用しているだけでは不十分。"},
  {q:"商標は出所表示機能・品質保証機能・広告宣伝機能の3つの機能を持ち、商標法はこれらを保護することで需要者の利益も守っている。", a:"正", e:"商標の3機能：①出所表示（誰の商品か識別）→②品質保証（一定品質の担保）→③広告宣伝（ブランドイメージ蓄積）。1条の「需要者の利益保護」に直結。"},
  {q:"役務（サービス）に使用する商標（サービスマーク）は、現行商標法において保護の対象に含まれる。", a:"正", e:"2条1項・H8改正。平成8年の改正で役務商標（サービスマーク）が保護対象に追加。改正前は商品商標のみで役務は対象外だった。"},
  {q:"立体的形状のみからなる商標であっても、使用の結果として需要者の間に広く認識されたものは、商標登録を受けることができる。", a:"正", e:"3条2項。使用によるセカンダリーミーニング取得。識別力の欠ける商標でも長年の使用で識別力を獲得すれば登録可。コカコーラボトル形状等が典型例。"},
  {q:"通常使用権者は、商標権者の承諾なく通常使用権を第三者に移転（譲渡）することができる。", a:"誤", e:"31条4項。通常使用権の移転・再使用権（サブライセンス）には商標権者の承諾が必要。専用使用権も同様。"},
  {q:"他人の著名な商標と同一または類似の商標は、不正の目的がある場合、指定商品・役務が全く異なるものであっても商標登録を受けることができない場合がある。", a:"正", e:"4条1項19号。著名商標の希釈化防止。「不正の目的」が要件（単に類似するだけでは不足）。15号（混同防止・目的不問）との違いに注意。"}
];

const Q_GOV = [
  {q:"公開会社（株式の全部または一部について譲渡制限を設けていない会社）は、取締役会を必ず設置しなければならない。", a:"正", e:"327条1項1号。公開会社は取締役会必置。非公開会社は任意。取締役会設置が強制されるのは①公開会社②大会社（委員会型でないもの）③委員会型設置会社。"},
  {q:"取締役会設置会社では、取締役は3人以上でなければならない。", a:"正", e:"331条5項。取締役会は最低3人で構成。監査役会（3人以上・半数以上社外）と人数は同じだが、社外要件の有無が異なる。"},
  {q:"公開会社における株主総会の招集通知は、原則として会日の2週間前までに発しなければならない。", a:"正", e:"299条1項。公開会社は2週間前、非公開会社は1週間前。書面・電磁的方法を使う場合でも公開会社は2週間前。"},
  {q:"監査役の任期は原則4年で、非公開会社では定款によって最長10年まで伸長することができる。", a:"正", e:"336条。監査役4年・非公開最長10年。取締役は2年（非公開最長10年）。数字の混同注意：監査役＝4年、取締役＝2年。"},
  {q:"取締役の任期は原則2年で、非公開会社では定款によって最長10年まで伸長することができる。", a:"正", e:"332条。取締役2年・非公開最長10年。監査役の4年と区別して覚える。公開会社は2年超の伸長不可。"},
  {q:"株主は原則として1株につき1個の議決権を有するが、単元株式数を定めた場合は1単元につき1個の議決権となる。", a:"正", e:"308条1項。1株1議決権が原則（one share one vote）。単元株制度採用時は1単元1議決権。自己株式・相互保有株式は議決権なし。"},
  {q:"大会社（資本金5億円以上または負債総額200億円以上の株式会社）は会計監査人を必ず置かなければならない。", a:"正", e:"328条。大会社は会計監査人必置（規模が大きいため外部監査が強制）。公開大会社（委員会型でない）は監査役会も必置。"},
  {q:"監査役は、その会社の子会社の取締役・使用人を兼任することができる。", a:"誤", e:"335条2項。監査役は①当該会社の②子会社の取締役・会計参与・執行役・使用人との兼任禁止。独立した立場での監査を確保するため。"},
  {q:"取締役会の決議は、議決に加わることができる取締役の過半数が出席し、その出席取締役の過半数をもって行う。", a:"正", e:"369条1項。取締役会決議要件：過半数出席・出席の過半数賛成（定款で加重可）。特別利害関係取締役は議決に加われない。"},
  {q:"株主総会の特別決議は、議決権の過半数を有する株主が出席し、出席した株主の議決権の過半数の賛成で成立する。", a:"誤", e:"309条2項。特別決議は過半数出席・出席の2/3以上賛成。設問は普通決議（309条1項）の要件。取締役解任は普通決議、監査役解任・解散は特別決議。"},
  {q:"監査役会は3人以上の監査役で構成し、そのうち半数以上は社外監査役でなければならない。", a:"正", e:"335条3項。監査役会は3人以上・「半数以上」社外（過半数ではなく半数以上）。常勤監査役も1人以上必要（390条3項）。"},
  {q:"株主総会の特別決議は、原則として議決権の過半数を有する株主が出席し、出席した株主の議決権の3分の2以上の賛成で成立する。", a:"正", e:"309条2項。特別決議＝過半数出席＋2/3以上賛成。定款で①定足数を1/3まで引下げ②賛成割合を加重可。定款変更・減資・解散等に適用。"},
  {q:"取締役会設置会社では、代表取締役の選定および解職は株主総会の決議によって行う。", a:"誤", e:"362条2項3号。代表取締役の選定・解職は取締役会の専決事項。株主総会ではなく取締役会が決める。株主総会は取締役「個人」の選解任を行う。"},
  {q:"監査役会設置会社では、監査役の中から常勤の監査役を1人以上選定しなければならない。", a:"正", e:"390条3項。常勤監査役は1人以上（複数でも可）。常勤の要件は監査の実効性確保のため。社外監査役（兼任可）と常勤（他業務不可）の違いに注意。"},
  {q:"株主総会の決議事項について、株主全員が書面または電磁的記録により提案に同意したときは、その決議があったものとみなすことができる。", a:"正", e:"319条。みなし決議（書面決議）。「株主全員」の同意が要件（一部でも不可）。決議省略により総会開催コスト削減。取締役会書面決議（370条）も重要。"},
  {q:"非公開会社（発行する全株式に譲渡制限のある会社）は取締役会を設置しないこともできる。", a:"正", e:"327条1項の裏。公開会社は取締役会必置だが、非公開会社は任意。取締役会なしなら取締役が各自代表・各自業務執行が原則。"},
  {q:"指名委員会等設置会社には指名・監査・報酬の3委員会が置かれ、各委員会の委員の過半数は社外取締役でなければならない。", a:"正", e:"400条1項・3項。3委員会各3人以上・過半数社外取締役。執行役が業務執行担当（取締役会はモニタリングに特化）。監査等委員会設置会社とは別の機関設計。"},

const BATCHES = [
  {logic:"TRADEMARK", topic:"商標法（立体商標・使用権・地域団体商標・不使用取消）", q:Q_TM},
  {logic:"GOVERNANCE", topic:"会社法・機関設計（株主総会・取締役会・監査役）", q:Q_GOV},
  {logic:"CIVIL", topic:"民法（相続以外：保証・契約・債権・物権・時効）", q:Q_CIV}
];

let batchIdx = 0;
let LOGIC = BATCHES[0].logic;
let TOPIC = BATCHES[0].topic;
let Q = BATCHES[0].q;
let i = 0;
const results = [];
const QUIZ_HTML = document.getElementById('quiz').innerHTML;

function updateBatchNav(){
  for(var k=0;k<3;k++){
    document.getElementById('bn'+k).className = (k===batchIdx)?'active':'';
  }
}

function loadBatch(idx){
  batchIdx = idx;
  LOGIC = BATCHES[idx].logic;
  TOPIC = BATCHES[idx].topic;
  Q = BATCHES[idx].q;
  document.getElementById('topic').textContent = '105 経営法務 ｜ '+(batchIdx+1)+'/3 '+TOPIC;
  i = 0;
  results.length = 0;
  document.getElementById('quiz').innerHTML = QUIZ_HTML;
  updateBatchNav();
  render();
}

function jumpBatch(idx){
  if(confirm((idx+1)+'番目の論点「'+BATCHES[idx].topic.slice(0,10)+'…」に移動しますか？（現在の進捗は失われます）')){
    loadBatch(idx);
  }
}

function btnFor(item, mark){
  if(mark==='△') return '△';
  return (mark==='○') ? item.a : (item.a==='正'?'誤':'正');
}

function render(){
  const item = Q[i];
  document.getElementById('q').innerHTML = '<span class="qnum">'+(i+1)+'.</span>'+item.q;
  document.getElementById('prog').textContent = (i+1)+' / '+Q.length;
  document.getElementById('backbtn').disabled = (i===0);
  const r = document.getElementById('result');
  const buttons = document.querySelectorAll('.btns button');
  buttons.forEach(b=>{ b.disabled=false; b.classList.remove('sel'); });
  const mark = results[i];
  if(mark){
    const correct = (mark==='○');
    r.className = 'result show ' + (correct?'correct':'wrong');
    document.getElementById('verdict').textContent = correct?'✅ 正解（絞れた）':(mark==='△'?'△ あいまい → 要再訪':'❌ 不正解');
    document.getElementById('ans').textContent = '正解：'+item.a;
    document.getElementById('exp').textContent = '急所：'+item.e;
    const nb = document.getElementById('nextbtn');
    nb.className = 'next show';
    nb.textContent = (i+1<Q.length) ? '次の問題へ →' : '結果を見る →';
    const chosen = btnFor(item, mark);
    buttons.forEach(b=>{
      if((chosen==='正'&&b.classList.contains('b-o')) ||
         (chosen==='誤'&&b.classList.contains('b-x')) ||
         (chosen==='△'&&b.classList.contains('b-d'))) b.classList.add('sel');
    });
    document.getElementById('barfill').style.width = ((i+1)/Q.length*100)+'%';
  } else {
    r.className = 'result';
    document.getElementById('nextbtn').className = 'next';
    document.getElementById('barfill').style.width = (i/Q.length*100)+'%';
  }
}

function answer(choice){
  const item = Q[i];
  if(choice==='△'){ results[i]='△'; }
  else if(choice===item.a){ results[i]='○'; }
  else { results[i]='×'; }
  render();
}

function prev(){
  if(i>0){ i--; render(); }
}

function next(){
  if(results[i]===undefined) return;
  i++;
  if(i < Q.length){ render(); }
  else { summary(); }
}

function restart(){
  i = 0;
  results.length = 0;
  document.getElementById('quiz').innerHTML = QUIZ_HTML;
  render();
}

function summary(){
  const o = results.filter(x=>x==='○').length;
  const d = results.filter(x=>x==='△').length;
  const x = results.filter(x=>x==='×').length;
  const missList = [];
  results.forEach((m,idx)=>{ if(m!=='○') missList.push((idx+1)+'('+m+')'); });
  const seq = results.join('');
  const code = LOGIC+" ["+seq+"] ○"+o+" △"+d+" ×"+x + (missList.length? " / 要再訪:"+missList.join(',') : " / 全問クリア");
  const verdict = (x===0 && d<=1) ? "✅ クリア" : "🔁 要再訪";
  const items = Q.map((it,idx)=>({q:it.q, a:it.a, mark:results[idx]}));
  const hasNext = batchIdx < BATCHES.length - 1;
  const nextLabel = hasNext ? BATCHES[batchIdx+1].topic.slice(0,12)+'…' : '';
  const base =
    '<div class="summary">'+
    '<h2>'+TOPIC+'</h2>'+
    '<div class="score">○'+o+' △'+d+' ×'+x+'</div>'+
    '<div style="font-size:1.1em;font-weight:700;margin-bottom:8px;">判定：'+verdict+'</div>'+
    (missList.length?'<div class="miss"><b>復習ポイント：</b><br>'+missList.map(m=>'設問'+m).join('<br>')+'</div>':'<div class="miss">全問○。選択肢で戦えるレベル到達。</div>');
  document.getElementById('quiz').innerHTML = base
    + '<p id="savemsg" style="font-size:1em;color:#94a3b8;margin-top:14px;">記録中…</p>'
    + '<button class="restart" onclick="restart()">🔄 最初からやり直す</button>'
    + (hasNext ? '<button class="next show" style="margin-top:12px;display:block;width:100%;" onclick="loadBatch('+(batchIdx+1)+')">▶ 次の論点へ → '+nextLabel+'</button>' : '')
    + '</div>';
  document.getElementById('prog').textContent = '完了';
  document.getElementById('barfill').style.width = '100%';

  fetch('/save', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({subject:SUBJECT, logic:LOGIC, topic:TOPIC, items:items})})
    .then(r=>{ if(!r.ok) throw 0; return r.json(); })
    .then(()=>{ document.getElementById('savemsg').innerHTML =
        '<span style="color:#34d399;font-weight:800;">✅ 自動記録しました</span><br>'+
        '<span style="font-size:.85em;">チャットで「次へ」と伝えれば次の論点に進みます。</span>'; })
    .catch(()=>{ document.getElementById('savemsg').outerHTML =
        '<p style="font-size:.85em;color:#fbbf24;margin:12px 0 6px;">⚠ サーバ未起動。下の1行をチャットに貼ってください</p>'+
        '<div class="code" id="codebox">'+code+'</div>'+
        '<button class="copy" onclick="copyCode()">📋 結果コードをコピー</button>'; });
}

function copyCode(){
  const t = document.getElementById('codebox').textContent;
  navigator.clipboard.writeText(t).then(()=>{
    document.querySelector('.copy').textContent='✓ コピーしました';
  });
}

// 初期化（URL ?b=0,1,2 で起動論点を指定）
(function(){
  var idx = parseInt(new URLSearchParams(location.search).get('b')||'0');
  if(idx>0 && idx<BATCHES.length){ batchIdx=idx; LOGIC=BATCHES[idx].logic; TOPIC=BATCHES[idx].topic; Q=BATCHES[idx].q; }
})();
document.getElementById('topic').textContent = '105 経営法務 ｜ '+(batchIdx+1)+'/3 '+TOPIC;
updateBatchNav();
render();
</script>
</body>
</html>
