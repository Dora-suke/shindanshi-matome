<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:#1e293b;border-radius:18px;max-width:860px;width:100%;padding:36px 40px;box-shadow:0 8px 40px rgba(0,0,0,.5);border:3px solid #ffffff;}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.topic{font-size:.95em;color:#fcd34d;font-weight:800;letter-spacing:.05em;}
.prog{font-size:.95em;color:#94a3b8;}
.bar{height:7px;background:#334155;border-radius:4px;margin:14px 0 28px;overflow:hidden;}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#38bdf8,#818cf8);width:0;transition:width .3s;}
.q{font-size:1.45em;line-height:1.85;margin-bottom:32px;min-height:3em;font-weight:600;}
.qnum{color:#fbbf24;font-weight:800;margin-right:8px;}
.btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.btns button{padding:22px 10px;font-size:1.3em;font-weight:800;border:none;border-radius:14px;cursor:pointer;font-family:inherit;transition:transform .1s;}
.btns button:active{transform:scale(.96);}
.b-o{background:#16a34a;color:#fff;}
.b-x{background:#dc2626;color:#fff;}
.b-d{background:#64748b;color:#fff;}
.btns button:disabled{opacity:.4;cursor:default;}
.result{margin-top:28px;padding:22px;border-radius:14px;display:none;}
.result.show{display:block;animation:fade .3s;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.result.correct{background:#064e3b;border-left:4px solid #10b981;}
.result.wrong{background:#4c1d1d;border-left:4px solid #ef4444;}
.result .verdict{font-weight:800;font-size:1.3em;margin-bottom:10px;}
.result .ans{font-size:1.05em;color:#cbd5e1;margin-bottom:12px;}
.result .exp{font-size:1.12em;line-height:1.75;color:#e2e8f0;}
.nav{display:flex;gap:12px;margin-top:24px;}
.back{padding:18px 22px;font-size:1.05em;font-weight:800;background:#334155;color:#cbd5e1;border:none;border-radius:14px;cursor:pointer;font-family:inherit;}
.back:disabled{opacity:.3;cursor:default;}
.next{flex:1;padding:18px;font-size:1.25em;font-weight:800;background:#38bdf8;color:#0f172a;border:none;border-radius:14px;cursor:pointer;font-family:inherit;display:none;}
.next.show{display:block;}
.btns button.sel{outline:4px solid #fbbf24;outline-offset:2px;}
.restart{margin-top:18px;padding:14px 24px;font-size:1.05em;font-weight:800;background:#334155;color:#e2e8f0;border:none;border-radius:12px;cursor:pointer;font-family:inherit;}
.summary{text-align:center;}
.summary h2{font-size:1.4em;margin-bottom:12px;}
.score{font-size:2.6em;font-weight:800;color:#38bdf8;margin:10px 0;}
.miss{text-align:left;background:#0f172a;border-radius:10px;padding:14px;margin:14px 0;font-size:.88em;line-height:1.7;}
.code{background:#0f172a;border:1px dashed #475569;border-radius:8px;padding:12px;font-family:monospace;font-size:.9em;color:#fbbf24;margin:10px 0;word-break:break-all;}
.copy{padding:12px 20px;background:#818cf8;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.hint{font-size:.78em;color:#94a3b8;margin-top:10px;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="head">
    <span class="topic" id="topic">106 経営情報システム ｜ Sティア⑥ クラウド・仮想化</span>
    <span class="prog" id="prog"></span>
  </div>
  <div class="bar"><i id="barfill"></i></div>
  <div id="quiz">
    <div class="q" id="q"></div>
    <div class="btns">
      <button class="b-o" onclick="answer('正')">正しい</button>
      <button class="b-x" onclick="answer('誤')">誤り</button>
      <button class="b-d" onclick="answer('△')">△あいまい</button>
    </div>
    <div class="result" id="result">
      <div class="verdict" id="verdict"></div>
      <div class="ans" id="ans"></div>
      <div class="exp" id="exp"></div>
    </div>
    <div class="nav">
      <button class="back" id="backbtn" onclick="prev()">← 前へ</button>
      <button class="next" id="nextbtn" onclick="next()">次の問題へ →</button>
    </div>
  </div>
</div>

<script>
// 論点ID（結果コード用）
const SUBJECT = "106";
const LOGIC = "CLOUD";
const TOPIC = "クラウド・仮想化（IaaS/PaaS/SaaS・仮想化・コンテナ・スケーリング・クラウド種別）";
// 識別ポイント：q=設問, a=正解(正/誤), e=急所解説。暗記科目=28問・小カテゴリをインターリーブ。
// 小カテゴリ A=サービスモデル(IaaS/PaaS/SaaS) B=仮想化・ハイパーバイザー C=コンテナ(Docker/K8s) D=クラウド種別(パブリック/プライベート/ハイブリッド) E=クラウド特性(スケーリング・従量等) F=その他(CDN/サーバレス/SDN)
const Q = [
  {q:"IaaSは、サーバ・ストレージ・ネットワークなどのインフラをインターネット経由で提供するクラウドサービスモデルである。", a:"正", e:"IaaS＝Infrastructure as a Service。利用者がOSやミドルウェアを自分で管理する。"},
  {q:"ハイパーバイザー型の仮想化では、1台の物理サーバ上で複数のOSを同時に動作させることができる。", a:"正", e:"ハイパーバイザーがハードウェアを抽象化し、複数の仮想マシン(VM)を管理する。"},
  {q:"コンテナは仮想マシンと同様に独立したOSカーネルを持ち、起動に数分かかるのが一般的である。", a:"誤", e:"コンテナはホストOSのカーネルを共有する。VMより軽量・高速（秒単位で起動）。"},
  {q:"パブリッククラウドは、クラウド事業者が設備を構築・運用し、不特定多数の利用者がインターネット経由で共有利用するモデルである。", a:"正", e:"AWS/Azure/GCPが代表例。初期投資不要・スケーラブル。"},
  {q:"クラウドの従量課金モデルでは、使用量にかかわらず一定の費用が発生する。", a:"誤", e:"従量課金＝使った分だけ支払う。使わなければ費用は発生しない（≠固定費）。"},
  {q:"PaaSは、アプリケーション開発・実行に必要なプラットフォーム（OS・ミドルウェア・開発環境）を提供し、利用者はアプリの開発に集中できる。", a:"正", e:"PaaS＝Platform as a Service。OSやDBの管理を事業者が担う。"},
  {q:"Dockerはコンテナ技術を実装したソフトウェアであり、アプリとその実行環境をイメージとしてパッケージ化できる。", a:"正", e:"「開発環境と本番環境を同じイメージで動かせる」がDockerの強み。"},
  {q:"プライベートクラウドは、特定の企業や組織が専用に構築・利用するクラウド環境であり、パブリッククラウドより柔軟なカスタマイズができる。", a:"正", e:"専用環境なのでセキュリティポリシーや法規制への対応がしやすい。初期コストは高い。"},
  {q:"スケールアウトとは、既存のサーバのCPU・メモリを増強することで処理能力を高める方式である。", a:"誤", e:"スケールアウト＝サーバ台数を増やす（横方向）。CPU・メモリ増強はスケールアップ（縦方向）。"},
  {q:"SaaSは、メールやグループウェアなどのアプリケーション自体をクラウド経由で提供するサービスモデルである。", a:"正", e:"SaaS＝Software as a Service。利用者はインフラもアプリも管理しない（使うだけ）。"},
  {q:"コンテナ型の仮想化は、ホストOSのカーネルを共有するため、ゲストOSのカーネルを個別に持つ仮想マシン型より一般に軽量である。", a:"正", e:"カーネル共有＝オーバーヘッドが小さい。ただし隔離性はVMより低い。"},
  {q:"ハイブリッドクラウドは、パブリッククラウドとプライベートクラウドを組み合わせて利用する形態である。", a:"正", e:"機密データはプライベート・繁忙期の負荷をパブリックで吸収するなど使い分けが可能。"},
  {q:"IaaSを利用する場合、利用者はOSのパッチ適用やミドルウェアの管理を自分で行う必要はない。", a:"誤", e:"IaaSではOS・ミドルウェアの管理は利用者の責任。事業者が管理するのはハードウェア層。"},
  {q:"Kubernetesは、複数のコンテナのデプロイ・スケーリング・管理を自動化するコンテナオーケストレーションツールである。", a:"正", e:"K8sとも呼ばれる。大量のコンテナを自動管理（自己修復・ロードバランシング等）。"},
  {q:"オンデマンドセルフサービスとは、利用者が管理者に申請・承認を得ることなく、必要なときに自分でクラウドリソースをプロビジョニングできる特性である。", a:"正", e:"NISTが定義するクラウドの5特性の1つ。他に広域ネットワークアクセス・リソース共有・迅速な弾力性・測定されたサービス。"},
  {q:"SaaSでは、利用者がOSのバージョン管理やセキュリティパッチの適用を自分で行う必要がある。", a:"誤", e:"SaaSはすべて事業者が管理。利用者はアプリを使うだけ。管理責任はIaaS>PaaS>SaaSの順で利用者が重い。"},
  {q:"サーバレスアーキテクチャ（FaaS）では、利用者がサーバの存在を意識せずに関数単位でコードを実行でき、実行時間に応じた課金が行われる。", a:"正", e:"AWS Lambda等。アイドル時は課金されない。サーバ管理ゼロが特徴。"},
  {q:"CDN（コンテンツデリバリネットワーク）は、利用者に地理的に近いエッジサーバからコンテンツを配信することで、通信の遅延を低減する仕組みである。", a:"正", e:"静的コンテンツ（画像・動画・CSS等）を世界中に分散配置したキャッシュサーバから配信。"},
  {q:"スケールアップは処理能力の上限に達したとき追加サーバを用意するより容易なため、クラウドの大規模システムでは一般にスケールアップが推奨される。", a:"誤", e:"クラウドではスケールアウト（台数を増やす）が推奨される。スケールアップには上限があり、無停止で行いにくい。"},
  {q:"ホスト型ハイパーバイザー（Type2）は、ホストOSの上で動作するのに対し、ベアメタル型（Type1）はハードウェアに直接インストールされる。", a:"正", e:"Type1の例：VMware ESXi。Type2の例：VirtualBox。Type1はオーバーヘッドが小さく本番向き。"},
  {q:"マルチクラウドとは、単一のクラウド事業者が複数のデータセンターを持つ構成のことである。", a:"誤", e:"マルチクラウド＝複数の異なるクラウド事業者（例：AWSとAzure）を組み合わせて利用すること。"},
  {q:"コンテナイメージは、アプリ本体・ライブラリ・設定ファイルを含むため、異なる環境間での「動作の差異」をなくすポータビリティが高い。", a:"正", e:"「開発機では動くのに本番で動かない」問題を解消。Dockerの主要なメリット。"},
  {q:"クラウドの「迅速な弾力性」とは、需要に応じてリソースを即座に増減できる特性であり、需要の急増時にも自動的にスケールできる。", a:"正", e:"NISTの5特性の1つ。オートスケーリングがその実装例。"},
  {q:"PaaSでは、利用者がOSやミドルウェアを管理する必要があり、IaaSより管理の手間がかかる。", a:"誤", e:"PaaSはOS・ミドルウェアを事業者が管理するためIaaSより管理が楽。手間：IaaS＞PaaS＞SaaS。"},
  {q:"SDN（Software Defined Networking）は、ネットワークの制御をソフトウェアで集中管理し、プログラムから動的に設定変更できる技術である。", a:"正", e:"制御プレーン（経路決定）とデータプレーン（転送）を分離。OpenFlowが代表プロトコル。"},
  {q:"コミュニティクラウドは、共通の目的や規制を持つ複数の組織が共同で構築・利用するクラウド形態であり、完全なパブリックより高いセキュリティ統制が可能である。", a:"正", e:"官公庁・医療機関など同一業界の組織グループが専用環境を共有するモデル。"},
  {q:"クラウドの「リソース共有」（Resource Pooling）とは、事業者が複数の利用者で物理リソースを共用し、需要に応じて動的に割り当てる特性である。", a:"正", e:"利用者は物理サーバの場所を意識しない。マルチテナントモデルとも呼ばれる。"},
  {q:"IaaS・PaaS・SaaSのうち、利用者の管理責任範囲が最も広い（最も多くを自分で管理する）のはSaaSである。", a:"誤", e:"管理責任が最も広いのはIaaS（OS・MW・アプリを自分で管理）。SaaSは最も狭い（使うだけ）。"}
];

let i = 0;
const results = []; // '○' '×' '△'
const QUIZ_HTML = document.getElementById('quiz').innerHTML; // 「最初からやり直す」用に初期状態を保持

// 記録マーク(○/△/×)から、実際に押された選択肢(正/誤/△)を逆算（強調表示用）
function btnFor(item, mark){
  if(mark==='△') return '△';
  return (mark==='○') ? item.a : (item.a==='正'?'誤':'正');
}

function render(){
  const item = Q[i];
  document.getElementById('q').innerHTML = '<span class="qnum">'+(i+1)+'.</span>'+item.q;
  document.getElementById('prog').textContent = (i+1)+' / '+Q.length;
  document.getElementById('backbtn').disabled = (i===0);
  const r = document.getElementById('result');
  const buttons = document.querySelectorAll('.btns button');
  buttons.forEach(b=>{ b.disabled=false; b.classList.remove('sel'); });

  const mark = results[i];
  if(mark){
    // 既に回答済み（＝戻ってきた／回答直後）：正解・急所を表示し、選び直しも可能
    const correct = (mark==='○');
    r.className = 'result show ' + (correct?'correct':'wrong');
    document.getElementById('verdict').textContent = correct?'✅ 正解（絞れた）':(mark==='△'?'△ あいまい → 要再訪':'❌ 不正解');
    document.getElementById('ans').textContent = '正解：'+item.a;
    document.getElementById('exp').textContent = '急所：'+item.e;
    const nb = document.getElementById('nextbtn');
    nb.className = 'next show';
    nb.textContent = (i+1<Q.length) ? '次の問題へ →' : '結果を見る →';
    const chosen = btnFor(item, mark);
    buttons.forEach(b=>{
      if((chosen==='正'&&b.classList.contains('b-o')) ||
         (chosen==='誤'&&b.classList.contains('b-x')) ||
         (chosen==='△'&&b.classList.contains('b-d'))) b.classList.add('sel');
    });
    document.getElementById('barfill').style.width = ((i+1)/Q.length*100)+'%';
  } else {
    // 未回答
    r.className = 'result';
    document.getElementById('nextbtn').className = 'next';
    document.getElementById('barfill').style.width = (i/Q.length*100)+'%';
  }
}

function answer(choice){
  const item = Q[i];
  if(choice==='△'){ results[i]='△'; }
  else if(choice===item.a){ results[i]='○'; }
  else { results[i]='×'; }
  render(); // 結果表示・選択肢の強調・次へボタンを一括反映（選び直しも同じ経路）
}

function prev(){
  if(i>0){ i--; render(); }
}

function next(){
  if(results[i]===undefined) return; // 未回答では進めない（nextは回答後のみ表示）
  i++;
  if(i < Q.length){ render(); }
  else { summary(); }
}

function restart(){
  i = 0;
  results.length = 0;
  document.getElementById('quiz').innerHTML = QUIZ_HTML; // 初期状態に復元（inline onclick はグローバル関数を参照するため維持される）
  render();
}

function summary(){
  const o = results.filter(x=>x==='○').length;
  const d = results.filter(x=>x==='△').length;
  const x = results.filter(x=>x==='×').length;
  const missList = [];
  results.forEach((m,idx)=>{ if(m!=='○') missList.push((idx+1)+'('+m+')'); });
  const seq = results.join('');
  const code = LOGIC+" ["+seq+"] ○"+o+" △"+d+" ×"+x + (missList.length? " / 要再訪:"+missList.join(',') : " / 全問クリア");
  const verdict = (x===0 && d<=1) ? "✅ クリア" : "🔁 要再訪";
  const items = Q.map((it,idx)=>({q:it.q, a:it.a, mark:results[idx]}));
  const base =
    '<div class="summary">'+
    '<h2>'+TOPIC+'</h2>'+
    '<div class="score">○'+o+' △'+d+' ×'+x+'</div>'+
    '<div style="font-size:1.1em;font-weight:700;margin-bottom:8px;">判定：'+verdict+'</div>'+
    (missList.length?'<div class="miss"><b>復習ポイント：</b><br>'+missList.map(m=>'設問'+m).join('<br>')+'</div>':'<div class="miss">全問○。選択肢で戦えるレベル到達。</div>');
  document.getElementById('quiz').innerHTML = base
    + '<p id="savemsg" style="font-size:1em;color:#94a3b8;margin-top:14px;">記録中…</p>'
    + '<button class="restart" onclick="restart()">🔄 最初からやり直す</button>'
    + '</div>';
  document.getElementById('prog').textContent = '完了';
  document.getElementById('barfill').style.width = '100%';

  // サーバへ自動保存（http経由のとき）。失敗時はコピーコードにフォールバック
  fetch('/save', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({subject:SUBJECT, logic:LOGIC, topic:TOPIC, items:items})})
    .then(r=>{ if(!r.ok) throw 0; return r.json(); })
    .then(()=>{ document.getElementById('savemsg').innerHTML =
        '<span style="color:#34d399;font-weight:800;">✅ 自動記録しました</span><br>'+
        '<span style="font-size:.85em;">チャットで「次へ」と伝えれば次の論点に進みます。</span>'; })
    .catch(()=>{ document.getElementById('savemsg').outerHTML =
        '<p style="font-size:.85em;color:#fbbf24;margin:12px 0 6px;">⚠ サーバ未起動。下の1行をチャットに貼ってください</p>'+
        '<div class="code" id="codebox">'+code+'</div>'+
        '<button class="copy" onclick="copyCode()">📋 結果コードをコピー</button>'; });
}

function copyCode(){
  const t = document.getElementById('codebox').textContent;
  navigator.clipboard.writeText(t).then(()=>{
    document.querySelector('.copy').textContent='✓ コピーしました';
  });
}

render();
</script>
</body>
</html>
