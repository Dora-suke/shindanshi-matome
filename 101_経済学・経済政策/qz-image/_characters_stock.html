<!doctype html><html lang="ja"><head><meta charset="utf-8">
<title>101 経済学 キャラ・小物ストック</title>
<style>
body{font-family:'Hiragino Maru Gothic ProN','M PLUS Rounded 1c',system-ui,sans-serif;background:#f7f5f2;padding:24px;color:#4b3b2f}
h2{border-left:6px solid #16a34a;padding-left:10px}
.tone{background:#fff;border:1px solid #e7e0d8;border-radius:10px;padding:10px 14px;font-size:.85rem;color:#6b5544;margin-bottom:18px}
.grid{display:flex;flex-wrap:wrap;gap:18px}
figure{background:#fff;border:1px solid #e7e0d8;border-radius:14px;padding:14px;margin:0;text-align:center;width:170px}
figcaption{margin-top:8px;font-size:.8rem;color:#6b5544}
</style></head><body>
<h2>キャラ・小物ストック（101 経済学）</h2>
<div class="tone">トーン：フラットな参考書イラスト調の人物。輪郭 stroke #6b5544（細1.6〜2.2）/ 肌パステル / 小ドット目 / ほっぺ淡ピンク。生徒＝茶髪の女性（質問役）、先生＝紺スーツの男性（解説役）。小物は同トーンで追加していく。</div>

<h2 style="border-color:#0ea5e9">キャラ</h2>
<div class="grid">

<figure>
<!-- CHAR_STUDENT -->
<svg viewBox="0 0 130 150" width="120" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#6b5544" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- hair back -->
    <path d="M30 64 C26 30 50 16 65 16 C80 16 104 30 100 64 C101 84 96 96 92 102 L38 102 C34 96 29 84 30 64 Z" fill="#8a5a3c"/>
    <!-- neck -->
    <path d="M57 96 h16 v14 h-16 Z" fill="#ffd9bd"/>
    <!-- face -->
    <ellipse cx="65" cy="62" rx="29" ry="32" fill="#ffe2c6"/>
    <!-- bangs -->
    <path d="M37 56 C40 34 52 24 65 24 C78 24 90 34 93 56 C84 44 78 48 71 49 C70 40 60 40 59 49 C52 48 46 44 37 56 Z" fill="#8a5a3c" stroke="none"/>
    <!-- side hair strands -->
    <path d="M37 56 C33 72 35 86 39 96" fill="none"/>
    <path d="M93 56 C97 72 95 86 91 96" fill="none"/>
    <!-- cheeks -->
    <circle cx="49" cy="72" r="5" fill="#ffc2c2" stroke="none"/>
    <circle cx="81" cy="72" r="5" fill="#ffc2c2" stroke="none"/>
    <!-- eyes -->
    <circle cx="55" cy="64" r="2.6" fill="#4b3b2f" stroke="none"/>
    <circle cx="75" cy="64" r="2.6" fill="#4b3b2f" stroke="none"/>
    <!-- brows -->
    <path d="M50 57 q5 -3 10 0" fill="none" stroke-width="1.6"/>
    <path d="M70 57 q5 -3 10 0" fill="none" stroke-width="1.6"/>
    <!-- mouth -->
    <path d="M61 78 q4 4 8 0" fill="none" stroke-width="1.6"/>
    <!-- jacket (beige) -->
    <path d="M44 110 C36 114 26 122 24 144 L106 144 C104 122 94 114 86 110 L73 110 L65 120 L57 110 Z" fill="#cdab7e"/>
    <!-- inner top -->
    <path d="M57 110 L65 120 L73 110 L65 112 Z" fill="#fff7ea"/>
    <!-- question mark -->
    <text x="103" y="34" font-size="20" fill="#0ea5e9" stroke="none" font-family="sans-serif" font-weight="700">?</text>
  </g>
</svg>
<figcaption>生徒（女性・質問役）</figcaption>
</figure>

<figure>
<!-- CHAR_TEACHER -->
<svg viewBox="0 0 130 150" width="120" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#6b5544" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- raised arm (behind body) -->
    <path d="M92 116 C104 108 108 92 108 80" fill="none" stroke-width="9" stroke="#33415c"/>
    <!-- hand -->
    <circle cx="108" cy="76" r="6.5" fill="#ffd9b8"/>
    <!-- index finger up -->
    <path d="M108 70 v-9" fill="none" stroke-width="3.4" stroke="#ffd9b8"/>
    <!-- neck -->
    <path d="M57 96 h16 v13 h-16 Z" fill="#ffcfa6"/>
    <!-- face -->
    <ellipse cx="65" cy="60" rx="28" ry="31" fill="#ffd9b8"/>
    <!-- hair -->
    <path d="M37 56 C36 30 50 22 65 22 C80 22 95 30 93 56 C88 46 80 44 72 45 C70 40 60 40 58 45 C50 44 42 46 37 56 Z" fill="#3a342f" stroke="none"/>
    <path d="M37 56 C36 34 49 26 65 26" fill="none"/>
    <path d="M93 56 C94 34 81 26 65 26" fill="none"/>
    <!-- eyes -->
    <circle cx="55" cy="62" r="2.6" fill="#3a342f" stroke="none"/>
    <circle cx="75" cy="62" r="2.6" fill="#3a342f" stroke="none"/>
    <!-- brows -->
    <path d="M50 55 q5 -2 10 0" fill="none" stroke-width="1.6"/>
    <path d="M70 55 q5 -2 10 0" fill="none" stroke-width="1.6"/>
    <!-- smile -->
    <path d="M58 76 q7 6 14 0" fill="none" stroke-width="1.8"/>
    <!-- suit jacket navy -->
    <path d="M44 108 C34 112 24 122 22 144 L108 144 C106 122 98 114 90 110 L73 108 L65 124 L57 108 Z" fill="#33415c"/>
    <!-- white shirt V -->
    <path d="M57 108 L65 124 L73 108 L65 110 Z" fill="#ffffff"/>
    <!-- tie -->
    <path d="M65 110 l-4 5 l4 14 l4 -14 Z" fill="#c0563e" stroke="none"/>
  </g>
</svg>
<figcaption>先生（男性・解説役）</figcaption>
</figure>

</div>
</body></html>
