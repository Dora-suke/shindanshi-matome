<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>経済学・経済政策 ｜中小企業診断士 學習詞藻集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0f172a;          /* 墨 */
  --paper:#faf7f1;        /* 生成り */
  --paper-dim:#f3ede1;
  --indigo:#1e2a55;       /* 藍 */
  --indigo-deep:#121a3a;
  --gold:#b08a3e;         /* 金 */
  --gold-soft:#d4b872;
  --line:#d8cfbb;
  --muted:#6b6558;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.9;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1200px 600px at 50% -200px, rgba(30,42,85,.08), transparent 60%),
    radial-gradient(800px 400px at 100% 100%, rgba(176,138,62,.06), transparent 60%);
}

/* ===== Header (minimal) ===== */
.site-header{
  position:relative;
  background:var(--indigo-deep);
  color:#f5eedb;
  text-align:center;
  padding:14px 20px;
  border-bottom:1px solid rgba(212,184,114,.4);
}
.site-header h1{
  font-size:1rem;
  letter-spacing:.28em;
  font-weight:600;
  text-indent:.28em;
  display:inline-block;
}
.site-header h1::before,.site-header h1::after{
  content:"◆";color:var(--gold-soft);font-size:.55rem;
  vertical-align:middle;margin:0 14px;opacity:.8;
}
.site-header .seal,.site-header .sub,.ornament{display:none}

/* ===== Layout ===== */
main{max-width:980px;margin:12px auto 0;padding:0 12px 40px;position:relative;z-index:2}
.scroll{
  background:#fffdf8;
  border:1px solid var(--line);
  border-radius:2px;
  padding:12px clamp(12px,2vw,20px);
  box-shadow:0 2px 8px rgba(18,26,58,.04);
}

.crumb{font-size:.82rem;color:var(--muted);margin-bottom:20px;letter-spacing:.08em}
.crumb a{color:var(--indigo);text-decoration:none;border-bottom:1px dotted var(--indigo);padding-bottom:1px}
.crumb a:hover{color:var(--gold);border-bottom-color:var(--gold)}

.section-title{display:none}

/* ===== Subject grid (top page) ===== */
.subjects{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}
.subject-card{
  display:block;
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:2px;
  padding:22px 22px 20px;
  text-decoration:none;color:var(--ink);
  position:relative;
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.subject-card::before{
  content:"";position:absolute;top:0;left:0;width:4px;height:100%;
  background:linear-gradient(180deg,var(--indigo),var(--gold));
  opacity:.7;
}
.subject-card:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 28px rgba(18,26,58,.12);
  border-color:var(--gold-soft);
}
.subject-card .num{
  font-family:"Cormorant Garamond","Noto Serif JP",serif;
  font-size:.78rem;letter-spacing:.3em;color:var(--gold);font-weight:600;
  text-indent:.3em;
}
.subject-card .name{
  font-size:1.15rem;font-weight:700;margin-top:6px;letter-spacing:.08em;
  color:var(--indigo-deep);
}
.subject-card .count{
  font-size:.78rem;color:var(--muted);margin-top:10px;
  border-top:1px dotted var(--line);padding-top:10px;letter-spacing:.1em;
}

/* ===== File list (folder page) ===== */
.files{
  list-style:none;
  border-top:1px solid var(--line);
}
.files li{border-bottom:1px solid var(--line)}
.files a{
  display:flex;align-items:center;gap:12px;
  padding:7px 8px;text-decoration:none;color:var(--ink);
  transition:background .15s ease, padding .2s ease;
  font-size:.9rem;
}
.files a:hover{
  background:linear-gradient(90deg,rgba(176,138,62,.05),transparent);
  padding-left:16px;
}
.files .idx{
  flex:0 0 auto;
  font-family:"Cormorant Garamond","Noto Serif JP",serif;
  color:var(--gold);font-weight:600;
  min-width:2.6em;text-align:right;letter-spacing:.1em;
}
.files .fname{flex:1;word-break:break-word;font-size:.98rem;letter-spacing:.02em}
.files .arrow{color:var(--gold-soft);font-size:.9rem;opacity:0;transition:opacity .2s}
.files a:hover .arrow{opacity:1}

/* ===== Quick nav (top page, compact chips) ===== */
.quick-nav{
  display:flex;flex-wrap:wrap;gap:4px;justify-content:center;
  margin:0 0 10px;
}
.quick-nav a{
  display:inline-flex;align-items:baseline;gap:5px;
  padding:3px 9px;text-decoration:none;
  color:var(--c-deep,var(--indigo-deep));
  background:var(--c-soft,#fff);
  border:1px solid var(--c-deep,var(--line));
  border-radius:999px;
  transition:all .15s ease;font-size:.72rem;letter-spacing:.03em;
  font-weight:600;
}
.quick-nav a:hover{
  background:var(--c-deep,var(--indigo));color:#fff;
  transform:translateY(-1px);
}
.quick-nav a:hover .n-num{color:#fff;opacity:.85}
.quick-nav .n-num{
  font-family:"Cormorant Garamond","Noto Serif JP",serif;
  color:var(--c-deep,var(--gold));font-weight:700;font-size:.74rem;letter-spacing:.1em;
}

/* ===== Subject section (compact) ===== */
.subject-section{
  margin:8px 0 0;padding:0;
  scroll-margin-top:12px;
}
.subject-section:first-of-type{margin-top:2px}
.sec-head{
  display:flex;align-items:center;gap:8px;
  padding:4px 8px;
  background:var(--c-soft,#f3ede1);
  border-left:3px solid var(--c-deep,var(--indigo));
  border-radius:2px;
}
.sec-num{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:30px;height:18px;padding:0 6px;
  background:var(--c-deep,var(--indigo));color:#fff;
  font-family:"Cormorant Garamond","Noto Serif JP",serif;
  font-weight:700;letter-spacing:.08em;font-size:.7rem;
  border-radius:2px;flex-shrink:0;
}
.sec-title{
  font-size:.88rem;font-weight:700;
  color:var(--c-text,var(--indigo-deep));
  letter-spacing:.05em;margin:0;flex:1;line-height:1.3;
}
.sec-count{
  font-size:.68rem;color:var(--c-text,var(--muted));
  letter-spacing:.05em;flex-shrink:0;opacity:.75;
}
.sec-more{
  font-size:.66rem;
  color:var(--c-deep,var(--indigo));text-decoration:none;
  padding:1px 8px;border-radius:999px;
  border:1px solid var(--c-deep,var(--line));
  letter-spacing:.03em;transition:all .12s;flex-shrink:0;font-weight:600;
}
.sec-more:hover{background:var(--c-deep,var(--indigo));color:#fff}
.files-inline{border-top:none;margin:0}
.files-inline li{border-bottom:1px dotted var(--line)}
.files-inline li:last-child{border-bottom:none}
.files-inline a{
  padding:3px 8px 3px 10px;
  border-left:2px solid transparent;
  transition:all .12s ease;
  font-size:.82rem;
  line-height:1.45;
  gap:8px;
}
.files-inline .idx{min-width:2.2em;font-size:.72rem;letter-spacing:.05em}
.files-inline .fname{font-size:.85rem;letter-spacing:.01em}
.files-inline .arrow{font-size:.72rem}
.subject-section .files-inline a:hover{
  background:var(--c-soft,#fffdf6);
  border-left-color:var(--c-deep,var(--gold));
}
.subject-section .files-inline .idx{color:var(--c-deep,var(--gold))}
.subject-section .files-inline .arrow{color:var(--c-deep,var(--gold-soft))}
.files-inline .empty{padding:6px;text-align:center;color:var(--muted);font-size:.74rem}

footer{
  text-align:center;padding:40px 20px 24px;color:var(--muted);
  font-size:.78rem;letter-spacing:.25em;text-indent:.25em;
}
footer .mark{color:var(--gold);margin:0 8px}
</style>
</head>
