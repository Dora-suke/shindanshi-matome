<style>

  .cat-tab[data-cat="財務分析"] { border-color:#e67e22;color:#b05e10; }

  .q-btn.hidden { display: none; }
  .q-btn.current { background: #1a3a5c; color: #fff; border-color: #1a3a5c; }
  .q-btn[data-cat="会計理論"] { border-left: 3px solid #3a9bd5; }
  .q-btn[data-cat="原価計算"] { border-left: 3px solid #27ae60; }
  .q-btn[data-cat="財務分析"] { border-left: 3px solid #e67e22; }

  main { max-width: 800px; margin: 20px auto; padding: 0 16px 60px; }

  .cat-badge.原価計算 { background:#27ae60; }
  .cat-badge.財務分析 { background:#e67e22; }

  .q-body { padding: 20px 24px; }

  .choices { list-style:none; }

  .nav-btn.next { background:#1a3a5c; color:#fff; }
  .nav-btn.next:hover { background:#122a45; }

  .q-count { font-size:13px; color:#888; }
</style>

<!-- ===== 進捗ダッシュボード ===== -->
<div id="progressDash" style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin:0 0 12px 0;box-shadow:0 1px 6px rgba(0,0,0,.06)">

  <!-- サマリ行 -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
    <div style="font-size:13px;font-weight:bold;color:#1a3a5c;flex:1;min-width:120px">📋 進捗管理</div>
    <div style="display:flex;gap:8px">
      <div id="dashKk" style="background:#eff6ff;border:1px solid #93c5fd;border-radius:20px;padding:4px 10px;font-size:11px;color:#1d4ed8;font-weight:bold">確認済 0/25</div>
      <div id="dashDone" style="background:#f0fdf4;border:1px solid #86efac;border-radius:20px;padding:4px 10px;font-size:11px;color:#15803d;font-weight:bold">完了 0/25</div>
    </div>
  </div>
  <!-- 評価バッジ行 -->
  <div style="display:flex;align-items:center;gap:5px;margin-bottom:10px;flex-wrap:wrap">
    <div id="dashMust" style="background:#fef2f2;border:1px solid #fecaca;border-radius:20px;padding:3px 9px;font-size:10px;color:#dc2626;font-weight:bold">🔴 必ず確認 0/25</div>
    <div id="dashCheck2" style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;padding:3px 9px;font-size:10px;color:#2563eb;font-weight:bold">🔵 確認 0/25</div>
    <div id="dashEasy" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:20px;padding:3px 9px;font-size:10px;color:#15803d;font-weight:bold">🟢 できれば 0/25</div>
    <button onclick="document.getElementById('dashGrid').classList.toggle('dash-open')" style="background:none;border:1px solid #cbd5e1;border-radius:6px;padding:3px 9px;font-size:11px;color:#64748b;cursor:pointer;margin-left:auto">一覧 ▾</button>
  </div>

  <!-- 進捗バー2本 -->
  <div style="margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-bottom:2px"><span>確認</span><span id="kkPct">0%</span></div>
    <div style="background:#e2e8f0;border-radius:3px;height:6px;overflow:hidden"><div id="kkBar" style="background:#3b82f6;height:100%;width:0%;transition:width .3s;border-radius:3px"></div></div>
  </div>
  <div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-bottom:2px"><span>完了</span><span id="donePct">0%</span></div>
    <div style="background:#e2e8f0;border-radius:3px;height:6px;overflow:hidden"><div id="doneBar" style="background:#22c55e;height:100%;width:0%;transition:width .3s;border-radius:3px"></div></div>
  </div>

  <!-- 問題グリッド（折りたたみ） -->
  <div id="dashGrid" style="display:none;margin-top:12px;padding-top:10px;border-top:1px solid #f1f5f9">
    <div style="font-size:10px;color:#94a3b8;margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap">
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#e2e8f0"></span>未</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#93c5fd"></span>確認済</span>
      <span style="display:inline-flex;align-items:center;gap:3px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#4ade80"></span>完了</span>

<!-- ===== /進捗ダッシュボード ===== -->
<div class="q-list" id="qList"></div>

<main>
  <div class="q-card">
    <div class="q-header" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="q-num" id="qNum" style="flex:1">第1問</div>
      <div class="cat-badge" id="catBadge"></div>
      <button id="kkBtn" onclick="toggleStatus('kk')" style="border:none;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s">☐ 確認</button>
      <button id="doneBtn" onclick="toggleStatus('done')" style="border:none;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s">☐ 完了</button>
      <div style="width:100%;display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:4px">
        <span style="font-size:10px;color:#94a3b8;min-width:36px">評価：</span>
        <button id="evalMust" onclick="setEval('must')" style="border:1px solid #fecaca;border-radius:14px;padding:3px 9px;font-size:10px;cursor:pointer;font-weight:bold;transition:all .2s;background:#fef2f2;color:#94a3b8">必ず確認</button>
        <button id="evalCheck" onclick="setEval('check')" style="border:1px solid #dbeafe;border-radius:14px;padding:3px 9px;font-size:10px;cursor:pointer;font-weight:bold;transition:all .2s;background:#f8fafc;color:#94a3b8">確認</button>
        <button id="evalEasy" onclick="setEval('easy')" style="border:1px solid #bbf7d0;border-radius:14px;padding:3px 9px;font-size:10px;cursor:pointer;font-weight:bold;transition:all .2s;background:#f0fdf4;color:#94a3b8">できれば</button>
      </div>
    </div>
    <div class="q-body">
      <div class="q-text" id="qText"></div>
      <div class="shiryou" id="qShiryou" style="display:none"></div>
      <ul class="choices" id="qChoices"></ul>
      <div class="answer-section">
        <button class="btn-answer" onclick="toggleAnswer()">解答・解説を確認する ▼</button>
        <div class="answer-box" id="answerBox"></div>
      </div>
    </div>
  </div>
  <div class="nav-btns">
    <button class="nav-btn prev" id="btnPrev" onclick="move(-1)">← 前の問題</button>
    <span class="q-count" id="qCount"></span>
    <button class="nav-btn next" id="btnNext" onclick="move(1)">次の問題 →</button>
  </div>

  
</main>

<script>
const CAT_COLORS = { "会計理論":"#3a9bd5","原価計算":"#27ae60","財務分析":"#e67e22","管理会計":"#8e44ad","企業財務":"#c0392b" };

const QUESTIONS = [
  { num:1, cat:"会計理論",
    text:"税効果会計に関する記述として、最も適切なものはどれか。",
    choices:["受取配当金のうち益金に算入されない金額は、繰延税金負債を増加させる。","税法の損金算入限度額を超える貸倒引当金繰入額は、繰延税金資産を増加させる。","寄付金のうち損金に算入されない金額は、繰延税金資産を増加させる。","税法の損金算入限度額を超える減価償却費は、繰延税金資産を減少させる。"],
    answer:"イ",
    kaisetsu:{
      cr:[
        {ok:false,r:"益金不算入は永久差異→将来も差異が解消しない→繰延税金負債は生じない"},
        {ok:true, r:"損金算入超過の繰入額は将来減算一時差異→将来損金算入が見込まれる→繰延税金資産が増加"},
        {ok:false,r:"損金不算入の寄付金は永久差異（永遠に解消しない）→繰延税金資産は生じない"},
        {ok:false,r:"損金算入超過の減価償却費も将来減算一時差異→繰延税金資産が増加（減少ではない）"}
      ],
      detail:"税効果会計は「一時差異」（将来解消する差異）にのみ繰延税金を計上する。貸倒引当金の損金算入限度超過額は将来に損金として認められる将来減算一時差異。一方、受取配当の益金不算入・寄付金の損金不算入は「永久差異」で将来も解消しないため繰延税金は計上しない。",
      point:"一時差異（将来解消）→繰延税金あり ／ 永久差異（永遠解消しない）→繰延税金なし",
      trap:"「差異があるから繰延税金が必ず発生する」と思い込むケース。益金不算入・損金不算入は永久差異なので、将来も解消しない→繰延税金ゼロ。「将来解消するかどうか」が判断軸。",
      talk:{s:"受取配当金が益金不算入なら、いつか益金になるから繰延税金負債じゃないの？",t:"実は永遠に益金にならないんだよ。だから「永久差異」→繰延税金は計上しない。将来ズレが解消するのが一時差異、永遠解消しないのが永久差異！"},
      nextStep:"一時差異の種類（将来減算／将来加算）／繰延税金資産の回収可能性の判定"
    }
  },
  { num:2, cat:"会計理論",
    text:"収益認識基準に関する記述として、最も適切なものはどれか。",
    choices:["引渡基準とは、商品が取引先に到着した時点で収益として認識する考え方である。","引渡基準よりも収益認識のタイミングが遅いのは、出荷基準である。","検収基準は、契約の解消や返品リスクがない場合に採用される。","出荷基準とは、取引先が納品された商品の内容を確認し、問題ないことを書面などで通知した時点で収益として認識する考え方である。"],
    answer:"ア",
    kaisetsu:{
      cr:[
        {ok:true, r:"引渡基準=商品が取引先に到着した時点で収益認識→正しい定義"},
        {ok:false,r:"引渡基準より遅いのは検収基準（出荷→引渡→検収の順）。出荷基準は最も早い"},
        {ok:false,r:"検収基準は返品・解消リスクがある場合に採用される（リスクがない場合は不要）"},
        {ok:false,r:"これは検収基準の説明。出荷基準は「出荷した時点」で認識"}
      ],
      detail:"収益認識のタイミング早い順：①出荷基準（出荷した瞬間）→②引渡基準（商品が到着した時点）→③検収基準（取引先が書面等で確認した時点）。選択肢イ・エが混同しやすい典型的ひっかけ。",
      point:"出荷→引渡（到着）→検収 の順に収益認識が遅くなる",
      trap:"選択肢イ（出荷基準が遅い）とエ（出荷基準の定義として検収基準の説明を書いている）が典型的なひっかけ。各基準の「定義」と「時系列の順序」を両方押さえること。",
      talk:{s:"出荷基準って、検収より早いですよね？",t:"そう！出荷→引渡（商品到着）→検収（書面確認）の順。一番早いのが出荷基準、一番遅いのが検収基準だよ。選択肢の表現に惑わされないで。"},
      nextStep:"工事進行基準（長期請負工事）／割賦販売の収益認識"
    }
  },
  { num:3, cat:"原価計算",
    text:"以下の資料は、工場の直接費と間接費のデータである。\nこのとき、製造指図書#1 の製造原価として、最も適切なものを下記の解答群から選べ。",
    shiryou:`<h4>（1）直接費</h4><table><tr><th>製造指図書</th><th>材料消費量</th><th>材料単価</th><th>直接作業時間</th><th>賃率</th></tr><tr><td>#1</td><td>50kg</td><td>@4,000円/kg</td><td>200時間</td><td>1,200円/時</td></tr><tr><td>#2</td><td>60kg</td><td>@5,000円/kg</td><td>220時間</td><td>1,200円/時</td></tr><tr><td>#3</td><td>60kg</td><td>@3,000円/kg</td><td>180時間</td><td>1,200円/時</td></tr></table><br><h4>（2）間接費</h4><p>製造間接費実際発生額：300,000円</p><p>製造間接費は直接作業時間を配賦基準として各製品に配賦する。</p>`,
    choices:["400,000円","440,000円","540,000円","600,000円"],
    answer:"ウ",
    kaisetsu:{
      cr:[
        {ok:false,r:"直接材料費のみの計算（間接費配賦を忘れている）"},
        {ok:false,r:"直接費合計は440,000円だが間接費配賦100,000円を加算していない"},
        {ok:true, r:"直接費440,000円＋間接費配賦100,000円＝540,000円"},
        {ok:false,r:"間接費全額300,000円を#1に配賦した誤り"}
      ],
      detail:"製造原価＝直接費（材料費＋労務費）＋間接費配賦額。間接費は作業時間比で按分する。",
      calc:["直接材料費：50kg × @4,000円 ＝ 200,000円","直接労務費：200時間 × 1,200円 ＝ 240,000円","直接費合計：440,000円","─","総作業時間：200＋220＋180 ＝ 600時間","#1への間接費配賦：300,000 × (200÷600) ＝ 100,000円","─","製造原価：440,000 ＋ 100,000 ＝ 540,000円 →ウ"],
      point:"間接費配賦額＝間接費総額×(#1の作業時間÷全体の作業時間)",

olor:#94a3b8">→</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">流動負債へ振替</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>ワンイヤールール</b>：決算日から1年以内に満期が到来する負債は流動負債に振り替える。社債は通常固定負債だが、残存期間が1年以内になったら「1年内償還予定社債」として流動負債に表示。</div></div></div></div>',

5: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ のれん・無形固定資産（Q5直結）</div><div class="chk30-q"><div class="chk30-qt">Q. のれんに認められる償却方法は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">定額法のみ（20年以内）</button><button class="chk30-opt" data-c="0">定額法または定率法</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #4ade80;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">定額法 ✓</div><div style="color:#14532d;margin-top:2px;line-height:1.4">20年以内で均等償却</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">定率法 ✗</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">のれんへの適用不可</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">のれんは<b>定額法のみ・20年以内</b>という二重の制約がある。定率法は認められていない。また自己創設のれん（自社で育てたブランド価値）は計上禁止。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 自己創設のれん（自社ブランド）は計上できる？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">計上できる</button><button class="chk30-opt" data-c="1">計上できない（禁止）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">M&amp;A取得 ✓</div><div style="color:#14532d;margin-top:2px;line-height:1.4">有償取得・客観的評価可<br>→ 計上OK</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">自己創設 ✗</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">主観的評価・金額不確か<br>→ 計上禁止</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>自己創設のれん</b>（自社ブランド等）は計上禁止。理由は金額の主観性で検証不能なため。M&Aで代金を払って取得したのれんは客観的な金額が存在するため計上可。</div></div></div></div>',

6: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 連結・関連会社（Q6直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 「重要な影響を与えられる会社」は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">子会社（連結）</button><button class="chk30-opt" data-c="1">関連会社（持分法）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">子会社</div><div style="color:#1e40af;margin-top:2px;line-height:1.4">議決権 &gt;50%が目安<br>→ <b>連結</b>（支配）</div></div><div style="background:#f5f3ff;border:2px solid #c4b5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#7c3aed">関連会社</div><div style="color:#6d28d9;margin-top:2px;line-height:1.4">20〜50%・重要な影響<br>→ <b>持分法</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>子会社</b>は「支配」できる会社→連結。<b>関連会社</b>は支配はできないが「重要な影響」を与えられる会社→持分法適用。「重要な影響」がキーワード。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 非支配株主持分はB/Sのどの区分？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">負債の部</button><button class="chk30-opt" data-c="1">純資産の部</button></div><div class="chk30-ans"><div style="border:1px solid #e2e8f0;border-radius:6px;overflow:hidden;margin-top:4px;font-size:10px"><div style="background:#334155;color:#fff;padding:4px 8px;font-weight:bold;text-align:center">連結B/S 純資産の部</div><div style="display:grid;grid-template-columns:1fr 1fr"><div style="background:#eff6ff;padding:5px;text-align:center;border-right:1px solid #e2e8f0"><div style="color:#1d4ed8;font-weight:bold">親会社株主帰属</div></div><div style="background:#fdf4ff;padding:5px;text-align:center"><div style="color:#7c3aed;font-weight:bold">非支配株主持分</div></div></div></div><div style="font-size:10px;color:#14532d;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f0fdf4;border-radius:5px;border-left:3px solid #22c55e"><b>非支配株主持分</b>は子会社のうち親会社が持っていない部分（少数株主の持分）。負債ではなく<b>純資産の部</b>に計上される。連結純資産は「親会社帰属分」と「非支配株主持分」の2つで構成。</div></div></div></div>',

7: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 会計帳簿の保存（Q7直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 会計帳簿の保存期間は何年？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">5年</button><button class="chk30-opt" data-c="1">10年</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">会計帳簿</div><div style="font-size:22px;font-weight:bold;color:#dc2626">10年</div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">計算書類</div><div style="font-size:22px;font-weight:bold;color:#1d4ed8">5年</div><div style="color:#1e40af;font-size:9px">B/S・P/L等</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>会計帳簿（仕訳帳・総勘定元帳など）は10年間</b>保存義務。<b>計算書類（B/S・P/Lなど）は5年間</b>。帳簿の方が長い理由：後から調査・証明できるよう詳細な取引記録を長期保持するため。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 株主が会計帳簿を閲覧請求するときの要件は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">理由の明示＋持株比率3%以上</button><button class="chk30-opt" data-c="0">理由は不要・株主なら誰でも</button></div><div class="chk30-ans"><div style="display:flex;gap:5px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px 8px;text-align:center;flex:1"><div style="font-weight:bold;color:#15803d">① 理由の明示</div><div style="color:#14532d;margin-top:2px;font-size:9px">何のために閲覧するかを書く</div></div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px 8px;text-align:center;flex:1"><div style="font-weight:bold;color:#15803d">② 持株比率3%以上</div><div style="color:#14532d;margin-top:2px;font-size:9px">少数株主には認められない</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">会計帳簿の閲覧請求には<b>①理由の明示 ②持株3%以上</b>の2要件が必要。計算書類は株主なら誰でも理由なしで閲覧できるが、帳簿はより詳細な取引記録のため要件が厳しい。</div></div></div></div>',

8: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ CF計算書の区分（Q8直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 固定資産の売却収入はどのCF区分か？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">投資活動CF</button><button class="chk30-opt" data-c="0">営業活動CF</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#15803d">営業CF</div><div style="color:#14532d;margin-top:2px;font-size:9px">商品売買・本業</div></div><div style="background:#eff6ff;border:2px solid #3b82f6;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">投資CF ←正解</div><div style="color:#1e40af;margin-top:2px;font-size:9px">固定資産売買<br>有価証券売買</div></div><div style="background:#fdf4ff;border:1px solid #c084fc;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#7e22ce">財務CF</div><div style="color:#6b21a8;margin-top:2px;font-size:9px">借入・返済</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>固定資産の売却収入</b>は設備投資に関するCF → <b>投資活動CF</b>。売却益（P/L）と売却収入（CF）を混同しやすいが、キャッシュとして入った全額が投資CFに入る。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 受取利息の分類は「必ず営業CF」か？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">必ず営業CF</button><button class="chk30-opt" data-c="1">営業または投資CF（選択制）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#15803d">選択① 営業CF</div><div style="color:#14532d;font-size:9px;margin-top:2px">経営成果を営業で一括</div></div><div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">選択② 投資CF</div><div style="color:#1e40af;font-size:9px;margin-top:2px">資金運用の成果として</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">受取利息・受取配当金・支払利息は<b>選択制</b>（営業CFまたは投資CF/財務CF）。「必ず営業CF」と断定するのは誤り。会社が一貫した方針で選択し継続適用することが求められる。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">「必ず営業CF」→ 誤り。選択制が試験頻出ポイント。</div></div></div></div>',

9: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 定額法・月割計算（Q9直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 7月取得の固定資産のX1年度の償却月数は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">12ヶ月</button><button class="chk30-opt" data-c="1">9ヶ月（7月〜3月）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:2px;margin-top:4px;font-size:10px"><div style="background:#e2e8f0;color:#475569;border-radius:4px;padding:3px 5px;font-size:9px">4月</div><div style="flex:1;height:3px;background:#e2e8f0;border-radius:2px"></div><div style="background:#ef4444;color:#fff;border-radius:4px;padding:3px 6px;font-weight:bold">7月取得</div><div style="flex:2;height:6px;background:#3b82f6;border-radius:2px"></div><div style="background:#1d4ed8;color:#fff;border-radius:4px;padding:3px 6px;font-weight:bold">3月末</div></div><div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:5px;padding:4px 8px;font-size:10px;color:#1d4ed8;font-weight:bold;text-align:center;margin-top:4px">← 9ヶ月（7月〜3月）→</div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">7月取得の場合、X1年度（4月〜翌3月）の償却月数は<b>9ヶ月</b>（4・5・6月は保有なし）。月割計算：年間償却額 × 9/12。X2年度以降は12ヶ月フル償却。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 定額法の年間償却額の計算式は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">取得原価÷耐用年数</button><button class="chk30-opt" data-c="0">期首帳簿価額×償却率</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #4ade80;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">定額法</div><div style="color:#14532d;margin-top:3px;font-size:11px;font-weight:bold">取得原価÷耐用年数</div><div style="color:#14532d;font-size:9px;margin-top:2px">毎年同額・固定</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">定率法</div><div style="color:#7f1d1d;margin-top:3px;font-size:11px;font-weight:bold">期首帳簿価額×率</div><div style="color:#7f1d1d;font-size:9px;margin-top:2px">初年度が多く年々減少</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>定額法</b>：取得原価÷耐用年数 = 毎年同額。シンプルで予測しやすい。<b>定率法</b>：期首帳簿価額×償却率 = 最初が多く年々減少。どちらを選ぶかは資産の特性と税務上の有利不利で判断。</div></div></div></div>',

10: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 付加価値率（Q10直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 付加価値率の計算式で分母に使うのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">売上高</button><button class="chk30-opt" data-c="0">総資産</button></div><div class="chk30-ans"><div style="display:flex;flex-direction:column;gap:4px;margin-top:4px;font-size:10px"><div style="display:flex;align-items:center;gap:5px"><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:3px 8px;font-weight:bold;min-width:70px;text-align:center">付加価値率</div><div style="color:#64748b">=</div><div style="background:#e2e8f0;border-radius:5px;padding:3px 8px;color:#475569">付加価値 ÷ <b style="color:#dc2626">売上高</b></div></div><div style="display:flex;align-items:center;gap:5px"><div style="background:#22c55e;color:#fff;border-radius:5px;padding:3px 8px;font-weight:bold;min-width:70px;text-align:center">ROA</div><div style="color:#64748b">=</div><div style="background:#e2e8f0;border-radius:5px;padding:3px 8px;color:#475569">利益 ÷ <b style="color:#1d4ed8">総資産</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>付加価値率</b>の分母は「売上高」（総資産ではない！）。付加価値＝売上高から外部購入費用を引いたもの。ROAの分母は総資産。分母を正確に覚えることが重要。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 付加価値＝24,000万・売上高＝96,000万のとき付加価値率は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">25%</button><button class="chk30-opt" data-c="0">40%</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px">24,000万円</div><div style="color:#64748b">÷</div><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px">96,000万円</div><div style="color:#64748b">=</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 10px;font-weight:bold;font-size:12px">25%</div></div><div style="font-size:10px;color:#14532d;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f0fdf4;border-radius:5px;border-left:3px solid #22c55e">24,000 ÷ 96,000 = 0.25 = <b>25%</b>。問題文に総資産128,000・人件費15,600などが並んでいるが、付加価値率には使わない。付加価値24,000と売上高96,000だけで計算できる。余分な数値に惑わされないことが重要。</div></div></div></div>',

11: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 差異分析（Q11直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 価格差異の計算で数量に使うのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">実際数量</button><button class="chk30-opt" data-c="0">予算数量</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">価格差異</div><div style="color:#7f1d1d;margin-top:3px;line-height:1.5">(実際単価−予算単価)<br>× <b>実際数量</b></div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">数量差異</div><div style="color:#1e40af;margin-top:3px;line-height:1.5">(実際数量−予算数量)<br>× <b>予算単価</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>価格差異</b>は「単価のブレ」を実際に使った量で評価→<b>実際数量</b>を掛ける。<b>数量差異</b>は「使った量のブレ」を標準価格で評価→<b>予算単価</b>を掛ける。逆に覚えると符号まで変わる。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">覚え方：「価格差異×実際」「数量差異×予算」のセットで覚える。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 実際単価98,000・予算単価100,000・実際数量3,200個のとき価格差異は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">−6,400,000円（不利差異）</button><button class="chk30-opt" data-c="0">−6,000,000円</button></div><div class="chk30-ans"><div style="display:flex;flex-direction:column;gap:3px;margin-top:4px;font-size:10px"><div style="display:flex;align-items:center;gap:4px"><div style="background:#e2e8f0;border-radius:4px;padding:3px 6px;color:#475569">(98,000−100,000)</div><div style="color:#64748b">×</div><div style="background:#3b82f6;color:#fff;border-radius:4px;padding:3px 6px;font-weight:bold">3,200個（実際）</div></div><div style="display:flex;align-items:center;gap:4px"><div style="color:#64748b">=</div><div style="background:#ef4444;color:#fff;border-radius:4px;padding:3px 8px;font-weight:bold">−6,400,000円（不利差異）</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">(98,000−100,000)×3,200 = −2,000×3,200 = <b>−6,400,000円</b>。実際単価が予算単価を下回るため不利差異。ここで予算数量3,000個を使うと−6,000,000円になる誤りに注意。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">❌ 予算数量3,000×−2,000=−6,000,000円 → 実際数量3,200が正解。</div></div></div></div>',

12: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 損益分岐点（Q12直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 損益分岐点比率が低いほど安全余裕は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">大きい（安全）</button><button class="chk30-opt" data-c="0">小さい（危険）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">低い（例71%）</div><div style="color:#14532d;margin-top:2px;line-height:1.4">BEP売上高まで余裕大<br>→ <b>安全</b></div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">高い（例95%）</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">BEP売上高まで余裕小<br>→ <b>危険</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>BEP比率＝BEP売上高÷実際売上高</b>。低いほど実際売上高が損益分岐点から遠い＝売上が落ちても赤字になりにくい安全余裕が大きい。Q12ではA社75%・B社71%なのでB社の方が安全。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 限界利益率30%・固定費1,800万のときBEP売上高は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">2,400万円</button><button class="chk30-opt" data-c="1">6,000万円</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px">固定費1,800万</div><div style="color:#64748b">÷</div><div style="background:#8b5cf6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">限界利益率0.30</div><div style="color:#64748b">=</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 10px;font-weight:bold;font-size:12px">6,000万円</div></div><div style="font-size:10px;color:#14532d;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f0fdf4;border-radius:5px;border-left:3px solid #22c55e"><b>BEP売上高 = 固定費÷限界利益率</b>。固定費1,800万円÷0.30 = 6,000万円。変動費率70%なら限界利益率=1−0.70=30%。「この売上高まで来て初めて固定費を全額回収できる」ボーダーライン。</div></div></div></div>',

13: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 安全性指標（Q13直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 固定比率の分母に入るのはどれ？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">自己資本＋固定負債</button><button class="chk30-opt" data-c="1">自己資本のみ</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">固定比率</div><div style="color:#7f1d1d;margin-top:3px;line-height:1.5">固定資産<br>÷ <b>自己資本のみ</b></div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">固定長期適合率</div><div style="color:#1e40af;margin-top:3px;line-height:1.5">固定資産÷<br><b>（自己資本＋固定負債）</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>固定比率</b>の分母は「自己資本のみ」。<b>固定長期適合率</b>の分母は「自己資本＋固定負債」でより緩い基準。Q13の混同問題では「固定比率の分母は自己資本のみ」を押さえることが重要。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 当座比率が流動比率より厳格な理由は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">分子から棚卸資産を除くから</button><button class="chk30-opt" data-c="0">分母が固定負債だから</button></div><div class="chk30-ans"><div style="display:flex;flex-direction:column;gap:4px;margin-top:4px;font-size:10px"><div style="display:flex;align-items:center;gap:4px"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:3px 8px;min-width:65px;text-align:center">流動比率</div><div style="color:#64748b">=</div><div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:5px;padding:3px 7px;color:#1d4ed8">流動資産÷流動負債</div></div><div style="display:flex;align-items:center;gap:4px"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:3px 8px;min-width:65px;text-align:center">当座比率</div><div style="color:#64748b">=</div><div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:5px;padding:3px 7px;color:#dc2626">(流動資産<b>−棚卸資産</b>)÷流動負債</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>当座比率</b>は流動資産から棚卸資産を除いた「当座資産」で計算。棚卸資産は売れるまで現金にならないため除外→より厳格な短期支払能力の指標。当座比率100%以上が理想。</div></div></div></div>',

14: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 税引後CVP（Q14直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 税引後目標利益3,500,000円・税率30%のとき税引前目標利益は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">5,000,000円（÷0.7）</button><button class="chk30-opt" data-c="0">3,500,000円（そのまま）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold;text-align:center">3,500,000円<br><span style="font-size:9px">税引後</span></div><div style="color:#64748b">÷0.70</div><div style="color:#64748b;font-size:14px">→</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold;text-align:center">5,000,000円<br><span style="font-size:9px">税引前</span></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">CVP計算では目標利益を<b>税引前</b>で扱う必要がある。税引後3,500,000円を÷(1−0.30)=÷0.70で税引前に変換すると5,000,000円。この変換ステップを忘れると販売数量が少なく計算されてしまう。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">❌ そのまま3,500,000円を使うと: 13,500,000÷400=33,750個（誤答）</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 必要販売数量＝(固定費＋税引前利益)÷?に入るのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">単位貢献利益（単価−変動費）</button><button class="chk30-opt" data-c="0">単位変動費</button></div><div class="chk30-ans"><div style="display:flex;flex-direction:column;gap:3px;margin-top:4px;font-size:10px"><div style="display:flex;align-items:center;gap:3px"><div style="background:#7c3aed;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;flex-shrink:0">1</div><div>固定費8,000,000＋税引前5,000,000 = 13,000,000</div></div><div style="display:flex;align-items:center;gap:3px"><div style="background:#7c3aed;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;flex-shrink:0">2</div><div>13,000,000÷<b style="color:#7c3aed">400円（単位貢献利益）</b>= 32,500個</div></div></div><div style="font-size:10px;color:#14532d;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f0fdf4;border-radius:5px;border-left:3px solid #22c55e"><b>必要販売数量＝(固定費＋目標利益)÷単位貢献利益</b>。単位貢献利益＝単価1,200円−変動費800円＝400円。「固定費を回収してさらに目標利益分も稼ぐには何個売ればよいか」という考え方。</div></div></div></div>',

15: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ サステナブル成長率（Q15直結）</div><div class="chk30-q"><div class="chk30-qt">Q. サステナブル成長率の計算式は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">ROE×内部留保率</button><button class="chk30-opt" data-c="0">ROA×配当性向</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold;text-align:center">ROE<br><span style="font-size:9px">20%</span></div><div style="color:#64748b;font-size:14px">×</div><div style="background:#8b5cf6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold;text-align:center">内部留保率<br><span style="font-size:9px">60%</span></div><div style="color:#64748b;font-size:14px">=</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 10px;font-weight:bold;font-size:12px">12%</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>サステナブル成長率＝ROE×内部留保率</b>。「外部資金に頼らず内部の利益再投資だけで達成できる最大成長率」のこと。ROE=400÷2,000=20%、内部留保率=1−0.40=60%なので20%×60%=12%。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 配当性向40%のとき内部留保率は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">40%</button><button class="chk30-opt" data-c="1">60%（1−0.40）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px">利益100%</div><div style="color:#64748b">=</div><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">配当40%</div><div style="color:#64748b">+</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">留保60%</div></div><div style="font-size:10px;color:#14532d;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f0fdf4;border-radius:5px;border-left:3px solid #22c55e"><b>内部留保率＝1−配当性向</b>。1−0.40=0.60。配当に回さなかった利益（社内に留めた利益）の割合。内部留保率が高いほど成長のための資金が多く積み上がる。</div></div></div></div>',

16: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 最低必要CF（Q16直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 投資額8,000千円・年金現価係数4.452のとき毎年の最低必要CFは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">1,600千円（÷5年）</button><button class="chk30-opt" data-c="1">約1,797千円（÷4.452）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px">8,000千円</div><div style="color:#64748b">÷</div><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">4.452（係数）</div><div style="color:#64748b">=</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">≈1,797千円/年</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">年金現価係数は「毎年同額のCFを割引いた合計値」の係数。投資額÷係数＝毎年の最低必要CF。「÷5年＝1,600千円」は割引計算を完全無視した誤り。係数4.452＜5.0なので毎年必要なCFは単純÷5より多くなる。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">❌ 8,000÷5年=1,600千円 → 時間価値を無視した誤答。係数で割るのが正解。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 年金現価係数を使うのはどんなCFのとき？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">毎年同額の均等CF</button><button class="chk30-opt" data-c="0">1回限りのCF（1時点）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">年金現価係数</div><div style="color:#14532d;margin-top:2px;line-height:1.4">毎年<b>同額</b>のCF<br>（複数年の合計）</div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">複利現価係数</div><div style="color:#1e40af;margin-top:2px;line-height:1.4"><b>1時点</b>のみの<br>単発CF</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>年金現価係数</b>：毎年同額のCFが複数年続く場合の現在価値を一括計算。<b>複利現価係数</b>：特定の1時点だけのCF（例：第3期末の売却収入）の現在価値を計算する係数。使い分けを間違えると大きな誤答につながる。</div></div></div></div>',

17: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ NPV計算（Q17直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 「第3期末の売却収入300万円」はNPV計算でどう扱う？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">第3期のCFに加算して割引する</button><button class="chk30-opt" data-c="0">初期投資額から控除する</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:3px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:3px 6px;font-size:9px;text-align:center">第0期<br>−投資額</div><div style="color:#94a3b8">→</div><div style="background:#eff6ff;color:#1d4ed8;border-radius:5px;padding:3px 6px;font-size:9px;text-align:center">第1期<br>CF×係数</div><div style="color:#94a3b8">→</div><div style="background:#eff6ff;color:#1d4ed8;border-radius:5px;padding:3px 6px;font-size:9px;text-align:center">第2期<br>CF×係数</div><div style="color:#94a3b8">→</div><div style="background:#f0fdf4;border:2px solid #4ade80;color:#15803d;border-radius:5px;padding:3px 6px;font-size:9px;text-align:center"><b>第3期</b><br>(CF+売却収入)<br>×係数 ←加算！</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">NPV計算で<b>残存価値・売却収入は最終期のCFに加算</b>してから割引係数を掛ける。「第3期のCF＋売却収入300万円」を1つのCFとして処理する。「初期投資から控除」は誤り。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">忘れると NPV が低めに算出される。売却収入は必ず最終期CFに加える。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 初期投資（第0期）に割引係数を掛けるか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">掛ける</button><button class="chk30-opt" data-c="1">掛けない（現在価値そのまま）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">第0期（今）</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">初期投資<br>割引係数<b>不要</b><br>現在価値そのまま</div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">第1〜3期</div><div style="color:#1e40af;margin-top:2px;line-height:1.4">将来CF<br>割引係数<b>必要</b><br>×係数で現在価値化</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>初期投資は今支払う現在価値そのもの</b>なので割引係数を掛けない（掛けると過小評価になる）。第1期以降は将来のお金なので現在価値に割り戻す必要がある。</div></div></div></div>',

18: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 投資評価法の特徴（Q18直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 回収期間法で選ぶのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">回収期間が最短の案</button><button class="chk30-opt" data-c="0">CF総額が最大の案</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">回収期間法の基準</div><div style="color:#14532d;margin-top:2px;line-height:1.4"><b>回収期間が最短</b><br>の案を選ぶ</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">考慮しないもの</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">CF総額<br>収益性<br>時間価値</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>回収期間法</b>：投資回収が最も速い案を選ぶ。CF総額・収益性・時間価値はすべて無視する。「CF総額が最大の案を選ぶ」というのがよくある誤解で、これは回収期間法ではなくNPV法の発想。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. NPV法とIRR法は時間価値を考慮するか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">どちらも考慮する</button><button class="chk30-opt" data-c="0">IRR法は考慮しない</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px;font-size:9px"><div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#dc2626">回収期間法</div><div style="color:#7f1d1d;margin-top:2px">時間価値<br>✗ 無視</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#15803d">NPV法</div><div style="color:#14532d;margin-top:2px">時間価値<br>✓ 考慮</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#15803d">IRR法</div><div style="color:#14532d;margin-top:2px">時間価値<br>✓ 考慮</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>NPV法</b>：将来CFを現在価値に割引いて合計→正ならGO。<b>IRR法</b>：NPV=0となる割引率を求め、資本コストと比較。いずれも時間価値を考慮。回収期間法のみ時間価値を無視するシンプルな手法（計算は楽だが精度が低い）。</div></div></div></div>',

19: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ MM理論・トレードオフ（Q19直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 法人税がある場合、負債を増やし続けると企業価値は常に上昇するか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">常に上昇する</button><button class="chk30-opt" data-c="1">一定点を超えると低下する</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 7px;text-align:center;font-size:9px">節税効果↑<br>→ 価値↑</div><div style="color:#64748b">vs</div><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 7px;text-align:center;font-size:9px">財務困難<br>コスト↑<br>→ 価値↓</div><div style="color:#64748b;font-size:14px">→</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 7px;text-align:center;font-size:9px">均衡点が<br>最適資本構成</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>トレードオフ理論</b>：負債を増やすと①節税効果（価値↑）②財務困難コスト増加（価値↓）が同時に働く。最適負債比率を超えると財務困難コストが節税効果を上回り企業価値は低下する。「常に上昇し続ける」は誤り。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">MM理論（完全市場）では負債無限増加が最適。トレードオフ理論では最適点が存在する。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 節税効果と財務的困難コストが均衡する点を何という？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">最適資本構成（最適負債比率）</button><button class="chk30-opt" data-c="0">レバレッジ効果</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;border-radius:5px;padding:4px 8px;color:#475569">節税効果</div><div style="color:#64748b">=</div><div style="background:#e2e8f0;border-radius:5px;padding:4px 8px;color:#475569">財務困難コスト</div><div style="color:#64748b;font-size:14px">→</div><div style="background:#1e40af;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold;font-size:9px">企業価値最大<br>= 最適資本構成</div></div><div style="font-size:10px;color:#14532d;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f0fdf4;border-radius:5px;border-left:3px solid #22c55e"><b>最適資本構成</b>：節税効果と財務困難コストが均衡する点で企業価値が最大になる。レバレッジ効果（自己資本利益率を高める効果）とは別概念。Q19の正解はトレードオフ理論で最適値が決まる選択肢。</div></div></div></div>',

20: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 効率的フロンティア（Q20直結）</div><div class="chk30-q"><div class="chk30-qt">Q. ρ=−1のとき分散効果は最大か最小か？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">最大（完全逆相関で打ち消し合う）</button><button class="chk30-opt" data-c="0">最小（効果ゼロ）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#16a34a">ρ = −1</div><div style="font-size:16px;margin:4px 0">↗ ↘</div><div style="color:#14532d">逆方向で打ち消し<br>分散効果<b>最大</b></div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">ρ = +1</div><div style="font-size:16px;margin:4px 0">↗ ↗</div><div style="color:#7f1d1d">同方向に動く<br>分散効果ゼロ</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">相関係数ρ=−1は<b>完全な負の相関</b>。一方が上がると必ず他方が下がる→リスクを完全に打ち消せる（分散効果最大）。ρ=+1は完全な正の相関→同方向に動くため分散しても意味がない（効果ゼロ）。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 効率的フロンティア上のポートフォリオとは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">同一リスクで最高収益・同一収益で最小リスク</button><button class="chk30-opt" data-c="0">リスクゼロで最高収益のポートフォリオ</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:5px;padding:5px;text-align:center"><div style="color:#1d4ed8;font-weight:bold">同一リスクなら</div><div style="color:#1e40af;margin-top:2px">収益が最も高い<br>ポートフォリオ</div></div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px;text-align:center"><div style="color:#15803d;font-weight:bold">同一収益なら</div><div style="color:#14532d;margin-top:2px">リスクが最も小さい<br>ポートフォリオ</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>効率的フロンティア</b>：同じリスクなら最も高いリターン、同じリターンなら最も低いリスクを実現するポートフォリオの集合。「リスクゼロで最高収益」は無リスク資産の話で効率的フロンティアとは別物。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">「リスクゼロで最高収益」は無リスク資産（国債等）の話。効率的フロンティアはリスク資産の組合せ。</div></div></div></div>',

21: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ WACC計算（Q21直結）</div><div class="chk30-q"><div class="chk30-qt">Q. Rf=1%・β=1.2・リスクプレミアム5%のときKeは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">7%（1%+1.2×5%）</button><button class="chk30-opt" data-c="0">6%（1%+5%）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;border-radius:4px;padding:3px 6px;color:#475569">Ke = 1%</div><div style="color:#64748b">+</div><div style="background:#ef4444;color:#fff;border-radius:4px;padding:3px 6px;font-weight:bold">β1.2</div><div style="color:#64748b">×</div><div style="background:#e2e8f0;border-radius:4px;padding:3px 6px;color:#475569">5%</div><div style="color:#64748b">=</div><div style="background:#16a34a;color:#fff;border-radius:4px;padding:3px 8px;font-weight:bold">7%</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>CAPM：Ke = Rf + β×(Rm−Rf)</b>。β=市場全体の変動に対する感応度。リスクプレミアム(Rm−Rf)=5%に必ずβを掛ける。βを忘れて1%+5%=6%にしてしまうのが典型的ミス。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">❌ β忘れ：1%+5%=6% → 必ずβ×リスクプレミアムを計算する。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. WACCで負債コストに(1−税率)を掛ける理由は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">支払利息が損金算入で節税効果があるため</button><button class="chk30-opt" data-c="0">負債は税引後で返済するから</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 7px;font-size:9px">支払利息</div><div style="color:#64748b;font-size:14px">→</div><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 7px;font-size:9px">損金算入</div><div style="color:#64748b;font-size:14px">→</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 7px;font-size:9px">税金↓（節税）</div></div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:4px;margin-top:5px;font-size:10px;color:#14532d;font-weight:bold;text-align:center">実質コスト = Kd × (1−税率)</div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>タックスシールド（節税効果）</b>：負債の支払利息は税務上の損金になるため税金が減る。例：利息10万円・税率30%なら税金3万円減→実質コストは7万円。WACCでKd×(1−t)と書く理由がここにある。</div></div></div></div>',

22: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 分離定理（Q22直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 分離定理で「全投資家が同じ」なのはどれ？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">無リスク資産との配分比率</button><button class="chk30-opt" data-c="1">危険資産内の構成比（市場PF）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">全員共通</div><div style="color:#14532d;margin-top:2px;line-height:1.4">危険資産の構成比<br>= 市場ポートフォリオ</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">個人差あり</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">無リスク資産との配分<br>= リスク選好次第</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>Tobinの分離定理</b>：危険資産の最適な組合せ（比率）はリスク選好に関係なく全員同じ（市場ポートフォリオ）。ただし「どれだけリスクをとるか」=無リスク資産との配分比率は個人差がある。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 無リスク資産が存在する場合、最適な危険資産の組合せは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">市場ポートフォリオ（全員共通）</button><button class="chk30-opt" data-c="0">個人のリスク選好で異なる組合せ</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#8b5cf6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">危険資産の構成</div><div style="color:#64748b">→</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">全員：市場PF</div></div><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px">無リスク資産比率</div><div style="color:#64748b">→</div><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px">個人差あり</div></div><div style="font-size:10px;color:#14532d;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f0fdf4;border-radius:5px;border-left:3px solid #22c55e"><b>市場ポートフォリオ</b>：市場に存在するすべての危険資産を時価総額比率で保有したポートフォリオ。理論上すべての投資家の危険資産ポートフォリオはこれに一致する。個人の違いは「市場PFと無リスク資産をどう配分するか」だけ。</div></div></div></div>',

23: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ リスクの2分類（Q23直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 銘柄数を増やしても分散できないリスクはどれ？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">システマティックリスク（市場リスク）</button><button class="chk30-opt" data-c="0">非システマティックリスク（個別リスク）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">システマティック</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">景気・金利・戦争<br>市場全体に影響<br>→ <b>分散不可</b>（βで測定）</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#16a34a">非システマティック</div><div style="color:#14532d;margin-top:2px;line-height:1.4">個別企業の問題<br>不祥事・倒産<br>→ <b>分散で低減可</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>システマティックリスク</b>：景気後退・金利変動など市場全体に影響するリスク。銘柄を何十にも分散しても消えない。βで測定し、CAPMではこのリスクに対してのみリスクプレミアムが付く。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. CAPMにおいてβ=0の資産の期待収益率は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">Rf（無リスク金利のみ）</button><button class="chk30-opt" data-c="0">市場平均のリターン</button></div><div class="chk30-ans"><div style="display:flex;flex-direction:column;gap:3px;margin-top:4px;font-size:10px"><div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;padding:3px 6px;color:#1e40af">Ke = Rf + <b>0</b> × (Rm−Rf) = Rf（無リスク金利）</div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:4px;padding:3px 6px;color:#15803d">β=1 → Ke = Rm（市場平均）</div><div style="background:#fdf4ff;border:1px solid #c084fc;border-radius:4px;padding:3px 6px;color:#7c3aed">β&gt;1 → Ke &gt; Rm（高リスク・高リターン）</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>CAPM：Ke = Rf + β×(Rm−Rf)</b>。β=0なら市場リスクをゼロしか持たない→リスクプレミアムの部分がゼロ→期待収益率は無リスク金利Rfのみ。β=1は市場と同じ動き、β&gt;1は市場より大きく変動する。</div></div></div></div>',

24: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 為替予約（Q24直結）</div><div class="chk30-q"><div class="chk30-qt">Q. ドル買い予約を締結すると、円高になっても差益は得られるか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">得られる</button><button class="chk30-opt" data-c="1">得られない（レートを固定したため）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 7px;font-size:9px;text-align:center">今日<br>予約締結</div><div style="color:#94a3b8">────</div><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 7px;font-size:9px;text-align:center"><b>予約レート</b><br>に固定済み</div><div style="color:#94a3b8">────</div><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 7px;font-size:9px;text-align:center">3ヶ月後<br>予約レートで決済</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>為替予約</b>：将来の為替レートを今日の時点で固定する取引。円高になっても円安になっても決済時は予約時点のレートが適用される。差益は得られないが差損も防げる。ヘッジ=変動リスクを回避すること。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">差益は得られないが、それが目的外。ヘッジ≠投機（差益狙い）。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 為替予約の主な目的は何か？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">為替変動リスクを回避（ヘッジ）するため</button><button class="chk30-opt" data-c="0">為替差益を最大化するため</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">ヘッジ目的 ✅</div><div style="color:#14532d;margin-top:2px;line-height:1.4">レート確定<br>→ 予算管理が確実</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">投機目的 ✗</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">差益を狙う行為<br>→ 為替予約とは別</div></div></div><div style="font-size:10px;color:#14532d;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f0fdf4;border-radius:5px;border-left:3px solid #22c55e"><b>為替予約の主目的はヘッジ（リスク回避）</b>。3ヶ月後に100万ドル支払う輸入企業が今日のレートで予約締結→円安になっても支払額は変わらない→財務計画が確実になる。</div></div></div></div>',

25: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ PER・PBR計算（Q25直結）</div><div class="chk30-q"><div class="chk30-qt">Q. PBR=2.0倍・ROE=20%のときPERは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">10倍（PBR÷ROE）</button><button class="chk30-opt" data-c="0">40倍（PBR×ROE）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px;font-weight:bold">PBR 2.0倍</div><div style="color:#64748b">÷</div><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">ROE 0.20</div><div style="color:#64748b">=</div><div style="background:#16a34a;color:#fff;border-radius:5px;padding:4px 10px;font-weight:bold;font-size:12px">PER 10倍</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>PBR＝PER×ROE</b> の関係式から逆算。PER＝PBR÷ROE＝2.0÷0.20＝10倍。問題に含まれる自己資本比率30%・配当性向20%等の数値は使わない。Q25の正解はイ。</div><div style="font-size:9px;color:#854d0e;line-height:1.5;margin-top:5px;padding:4px 7px;background:#fefce8;border:1px solid #fde047;border-radius:5px">❌ PBR×ROE=0.40 → 次元がおかしい。必ず÷で求める。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. PBR・PER・ROEの関係式は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">PBR = PER × ROE</button><button class="chk30-opt" data-c="0">PER = PBR × ROE</button></div><div class="chk30-ans"><div style="display:flex;flex-direction:column;gap:4px;margin-top:4px;font-size:10px;align-items:center"><div style="background:#1e40af;color:#fff;border-radius:8px;padding:6px 16px;font-weight:bold;font-size:12px">PBR = PER × ROE</div><div style="display:flex;gap:8px;margin-top:2px"><div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:5px;padding:4px 7px;text-align:center;color:#1d4ed8">PER＝PBR÷ROE</div><div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:5px;padding:4px 7px;text-align:center;color:#7c3aed">ROE＝PBR÷PER</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>PBR=PER×ROE</b>：PBRは「市場が純資産の何倍で評価しているか」、PERは「利益の何年分で評価しているか」、ROEは「自己資本でどれだけ稼いでいるか」。3指標の関係式を1つ覚えておけば3通りの変形が自在にできる。</div></div></div></div>',

17:`<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:8px">▌ NPV タイムライン（売却収入を忘れない！）</div><div style="display:flex;gap:3px;align-items:flex-start;font-size:10px"><div style="text-align:center;flex:0 0 44px"><div style="background:#ef4444;color:#fff;border-radius:4px;padding:3px;font-weight:bold">第0期</div><div style="color:#dc2626;font-weight:bold;margin-top:4px">−投資額</div><div style="font-size:9px;color:#94a3b8">割引なし</div></div><div style="display:flex;align-items:center;padding-top:5px;color:#94a3b8;font-size:14px">→</div><div style="text-align:center;flex:1"><div style="background:#3b82f6;color:#fff;border-radius:4px;padding:3px;font-weight:bold">第1期</div><div style="color:#1e40af;margin-top:4px;font-weight:bold">CF₁</div><div style="font-size:9px;color:#94a3b8">×係数₁</div></div><div style="display:flex;align-items:center;padding-top:5px;color:#94a3b8;font-size:14px">→</div><div style="text-align:center;flex:1"><div style="background:#3b82f6;color:#fff;border-radius:4px;padding:3px;font-weight:bold">第2期</div><div style="color:#1e40af;margin-top:4px;font-weight:bold">CF₂</div><div style="font-size:9px;color:#94a3b8">×係数₂</div></div><div style="display:flex;align-items:center;padding-top:5px;color:#94a3b8;font-size:14px">→</div><div style="text-align:center;flex:1"><div style="background:#059669;color:#fff;border-radius:4px;padding:3px;font-weight:bold">第3期</div><div style="color:#047857;margin-top:4px;font-weight:bold">CF₃</div><div style="background:#fef3c7;border-radius:3px;font-size:9px;color:#92400e;padding:1px 3px;margin-top:2px">＋売却収入！</div><div style="font-size:9px;color:#94a3b8">×係数₃</div></div></div><div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:5px 8px;margin-top:7px;font-size:10px;color:#1e40af;font-weight:bold;text-align:center">NPV = Σ(各期CF×割引係数) − 投資額</div>`,

18:`<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 投資評価4手法の特徴</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#fef2f2;border:2px solid #ef4444;border-radius:7px;padding:8px"><div style="font-weight:bold;color:#dc2626;margin-bottom:3px">🕐 回収期間法</div><div style="color:#7f1d1d;line-height:1.7">最短回収期間を選択<br>CF総額→<b>無視</b><br>時間価値→無視</div></div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:7px;padding:8px"><div style="font-weight:bold;color:#15803d;margin-bottom:3px">📈 NPV法</div><div style="color:#14532d;line-height:1.7">NPV最大を選択<br>時間価値→考慮<br>理論上の最優手</div></div><div style="background:#f0f9ff;border:1px solid #7dd3fc;border-radius:7px;padding:8px"><div style="font-weight:bold;color:#0369a1;margin-bottom:3px">📊 IRR法</div><div style="color:#075985;line-height:1.7">NPV=0の割引率<br>時間価値→考慮<br>複数解の問題あり</div></div><div style="background:#fdf4ff;border:1px solid #e879f9;border-radius:7px;padding:8px"><div style="font-weight:bold;color:#86198f;margin-bottom:3px">💹 収益性指数法</div><div style="color:#701a75;line-height:1.7">PV÷投資額<br>資金制約時に有効<br>規模差を調整</div></div></div>`,

19:`<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ トレードオフ理論：最適負債比率</div><div style="display:flex;gap:8px;margin-bottom:8px"><div style="background:#22c55e;color:#fff;border-radius:7px;padding:9px;flex:1;text-align:center;font-size:11px"><div style="font-size:18px">📉</div><div style="font-weight:bold">節税効果</div><div style="font-size:10px;opacity:.9;margin-top:3px">利子×税率が減税<br>負債↑ → 価値↑</div></div><div style="display:flex;align-items:center;font-size:18px;color:#64748b">vs</div><div style="background:#ef4444;color:#fff;border-radius:7px;padding:9px;flex:1;text-align:center;font-size:11px"><div style="font-size:18px">📈</div><div style="font-weight:bold">財務困難コスト</div><div style="font-size:10px;opacity:.9;margin-top:3px">倒産・高利率リスク<br>負債↑ → 価値↓</div></div></div><div style="background:#1e40af;color:#fff;border-radius:7px;padding:9px;text-align:center;font-size:11px;font-weight:bold">節税効果 = 財務困難コスト の点 → 最適負債比率</div><div style="background:#fef2f2;border-radius:5px;padding:5px 8px;margin-top:6px;font-size:10px;color:#dc2626">✗「常に負債を増やせば価値が上がる」は誤り</div>`,

20:`<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 相関係数と分散効果</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:#fef2f2;border:2px solid #ef4444;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:bold;color:#dc2626">ρ = +1</div><div style="font-size:10px;color:#7f1d1d;margin:4px 0">完全な正の相関</div><div style="font-size:16px">↗↗<br>↗↗</div><div style="font-size:10px;color:#dc2626;font-weight:bold;margin-top:4px">分散効果ゼロ</div></div><div style="background:#f0fdf4;border:2px solid #22c55e;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:bold;color:#16a34a">ρ = −1</div><div style="font-size:10px;color:#14532d;margin:4px 0">完全な負の相関</div><div style="font-size:16px">↗↗<br>↘↘</div><div style="font-size:10px;color:#16a34a;font-weight:bold;margin-top:4px">分散効果 最大！</div></div></div><div style="background:#f8fafc;border-radius:5px;padding:5px 8px;margin-top:6px;font-size:10px;color:#475569">分散でなくせる：非システマ（個別固有）のみ / システマは残る</div>`,

21:`<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ WACC 計算の2ステップ</div><div style="display:flex;flex-direction:column;gap:5px"><div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:8px;padding:9px"><div style="font-size:10px;font-weight:bold;color:#1e40af;margin-bottom:4px">Step1：CAPM で株主資本コスト (Ke) を算出</div><div style="font-size:13px;font-weight:bold;color:#1d4ed8;text-align:center">Ke = Rf ＋ β × (Rm − Rf)</div></div><div style="text-align:center;font-size:13px;color:#94a3b8">↓</div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:9px"><div style="font-size:10px;font-weight:bold;color:#15803d;margin-bottom:4px">Step2：加重平均（負債コストは税引後）</div><div style="font-size:12px;font-weight:bold;color:#14532d;text-align:center">WACC = Ke×(E/V) ＋ Kd×<span style="color:#ef4444">(1−t)</span>×(D/V)</div></div></div><div style="background:#fef3c7;border-radius:5px;padding:5px 8px;margin-top:6px;font-size:10px;color:#92400e">⚠ 負債コストに (1−税率) を掛けること（節税効果）を忘れずに</div>`,

22:`<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ Tobin の分離定理</div><div style="display:flex;flex-direction:column;gap:6px"><div style="background:#dcfce7;border:2px solid #22c55e;border-radius:8px;padding:9px"><div style="display:flex;gap:8px;align-items:center"><div style="font-size:22px">👥</div><div><div style="font-size:10px;font-weight:bold;color:#15803d">全投資家 共通</div><div style="font-size:11px;color:#14532d">危険資産の中の構成比 ＝ 市場ポートフォリオ</div></div></div></div><div style="background:#fef3c7;border:2px solid #f59e0b;border-radius:8px;padding:9px"><div style="display:flex;gap:8px;align-items:center"><div style="font-size:22px">👤</div><div><div style="font-size:10px;font-weight:bold;color:#92400e">個人で異なる</div><div style="font-size:11px;color:#78350f">危険資産 vs 無リスク資産の配分比率（リスク選好次第）</div></div></div></div></div>`,

23:`<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 2種類のリスクを区別する</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:#eff6ff;border:2px solid #3b82f6;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px">🌊</div><div style="font-weight:bold;font-size:11px;color:#1e40af;margin:3px 0">システマティック</div><div style="font-size:10px;color:#1d4ed8;line-height:1.6">市場全体のリスク<br>景気・金利・戦争</div><div style="background:#ef4444;color:#fff;border-radius:4px;font-size:10px;padding:2px 5px;margin-top:5px">分散しても消えない</div></div><div style="background:#f0fdf4;border:2px solid #22c55e;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px">🏢</div><div style="font-weight:bold;font-size:11px;color:#15803d;margin:3px 0">非システマティック</div><div style="font-size:10px;color:#14532d;line-height:1.6">個別企業のリスク<br>業績・不祥事・特許</div><div style="background:#22c55e;color:#fff;border-radius:4px;font-size:10px;padding:2px 5px;margin-top:5px">分散でゼロに近づく</div></div></div><div style="background:#f8fafc;border-radius:5px;padding:5px 8px;margin-top:6px;font-size:10px;color:#475569;text-align:center">β = システマティックリスクの大きさを示す指標</div>`,

24:`<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 為替予約のしくみ（ドル買い予約）</div><div style="display:flex;flex-direction:column;gap:5px"><div style="display:flex;align-items:center;gap:5px"><div style="background:#3b82f6;color:#fff;border-radius:6px;padding:7px 10px;font-size:11px;font-weight:bold;text-align:center;min-width:70px">今日<br>予約締結</div><div style="flex:1;height:5px;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:2px"></div><div style="background:#22c55e;color:#fff;border-radius:6px;padding:7px 10px;font-size:11px;font-weight:bold;text-align:center;min-width:70px">3ヶ月後<br>決済</div></div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:7px;padding:8px;font-size:11px;color:#14532d;text-align:center">レートを<b>今日</b>の時点で固定<br>→ 3ヶ月後どのレートでも<b>同じ円建て支払額</b></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="color:#15803d">円安になっても</div><div style="font-weight:bold;color:#14532d">損しない ✓</div></div><div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="color:#dc2626">円高になっても</div><div style="font-weight:bold;color:#7f1d1d">差益も出ない ✗</div></div></div></div>`,
