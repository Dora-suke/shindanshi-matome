function makeKaisetsuHtml(q) {
  const labels = ["ア","イ","ウ","エ"];
  const catColor = CAT_COLORS[q.cat] || "#1a3a5c";
  const k = q.kaisetsu;

  const titleHtml = `<div style="background:${catColor};padding:11px 16px;display:flex;align-items:center;gap:10px;border-radius:10px 10px 0 0;">
    <div style="background:#fff;color:${catColor};font-size:14px;font-weight:bold;padding:4px 18px;border-radius:20px;">✓ 正解：${q.answer}</div>
    <div style="color:rgba(255,255,255,.9);font-size:11px;font-weight:bold;">│ ${q.cat}  第${q.num}問</div>
  </div>`;

  const viz = (typeof VIZ_DATA!=='undefined' && VIZ_DATA[q.num]) || '';
  const vizHtml = viz ? `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:10px;">${viz}</div>` : '';

  const choiceRows = k.cr.map((ch,i)=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:6px 10px;border-bottom:1px solid #f0f0f0;background:${ch.ok?'#f0fdf4':'#fff'};"><span style="font-size:14px;font-weight:bold;min-width:20px;color:${ch.ok?'#16a34a':'#e74c3c'};">${ch.ok?'○':'✗'}</span><span style="font-weight:bold;min-width:20px;font-size:11px;color:#555;">${labels[i]}</span><span style="font-size:11px;line-height:1.6;color:${ch.ok?'#14532d':'#666'};${ch.ok?'font-weight:600;':''}">${ch.r}</span></div>`).join('');

  let calcHtml='';
  if(k.calc){
    const rows=k.calc.map(line=>line==='─'?`<div style="border-top:1px dashed #93c5fd;margin:5px 0;"></div>`:`<div style="padding:2px 0;color:${line.startsWith('【')?'#92400e':line.includes('→')?'#1e40af':'#334155'};font-weight:${line.startsWith('【')||line.includes('→')?'bold':'normal'};font-size:${line.startsWith('【')?'10px':'12px'};">${line}</div>`).join('');
    calcHtml=`<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:11px 14px;margin:8px 0;font-family:'Courier New',monospace;font-size:12px;line-height:1.85;"><div style="font-family:'Hiragino Sans',sans-serif;font-weight:bold;font-size:10px;color:#1e40af;margin-bottom:5px;">🧮 計算過程</div>${rows}</div>`;
  }

  const sec4=k.trap?`<div style="background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 6px 6px 0;padding:7px 11px;margin:8px 0;font-size:11px;line-height:1.65;color:#78350f;"><b style="color:#92400e;">🚧 つまずき：</b>${k.trap}</div>`:'';
  const sec7=`<div style="background:#f5f3ff;border:2px solid #a78bfa;border-radius:8px;padding:10px 14px;font-size:12px;color:#4c1d95;font-weight:700;line-height:1.7;margin-top:8px;">🔑 ${k.point}</div>`;
  const sec8=k.nextStep?`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:7px 11px;margin-top:6px;font-size:10px;color:#64748b;"><b style="color:#475569;font-size:10px;">⑧ 次の論点：</b>${k.nextStep}</div>`:'';

    const chkHtml = (typeof CHK_DATA!=='undefined' && CHK_DATA[q.num]) ? '<div style="margin-top:14px;padding-top:12px;border-top:1px solid #e2e8f0;">'+CHK_DATA[q.num]+'</div>' : '';
  const _links = (typeof LINK_DATA!=='undefined' && LINK_DATA[q.num]) || [];
  const linkHtml = _links.length ? `<div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:8px 12px;margin-top:10px;"><span style="font-size:10px;font-weight:bold;color:#0369a1;">📚 参考ノート：</span>${_links.map(l=>`<a href="${l.href}" target="_blank" style="display:inline-block;background:#0ea5e9;color:#fff;font-size:10px;font-weight:bold;padding:3px 9px;border-radius:12px;text-decoration:none;margin:2px 4px 2px 0;">${l.label}</a>`).join('')}</div>` : '';
  return `<div style="border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;margin-top:4px;box-shadow:0 2px 8px rgba(0,0,0,.07);">${titleHtml}<div style="padding:12px 14px 16px;background:#fff;">${vizHtml}<div style="background:#f8fafb;border-radius:6px;overflow:hidden;margin-bottom:8px;"><div style="font-size:10px;font-weight:bold;color:#888;padding:5px 10px 2px;">📋 選択肢チェック</div>${choiceRows}</div>${calcHtml}${sec4}${sec7}${sec8}${linkHtml}${chkHtml}</div></div>`;
}

let currentCat = "all";
let filteredQs = [...QUESTIONS];
let currentIdx = 0;


/* ===== 進捗管理 ===== */
const STATUS_KEY = 'exam_status_财務2026_';

function getStatus(num) {
  try { return JSON.parse(localStorage.getItem(STATUS_KEY + num)) || {}; } catch(e) { return {}; }
}
function saveStatus(num, st) {
  localStorage.setItem(STATUS_KEY + num, JSON.stringify(st));
}

function toggleStatus(field) {
  const q = filteredQs[currentIdx];
  if (!q) return;
  const st = getStatus(q.num);
  st[field] = !st[field];
  saveStatus(q.num, st);
  updateStatusUI(q.num);
  updateBtnDots(q.num);
  refreshDashboard();
}

function setEval(level) {
  const q = filteredQs[currentIdx];
  if (!q) return;
  const st = getStatus(q.num);
  st.eval = (st.eval === level) ? null : level;
  saveStatus(q.num, st);
  updateStatusUI(q.num);
  updateBtnDots(q.num);
  refreshDashboard();
}

function updateStatusUI(num) {
  const st = getStatus(num);
  const kk = document.getElementById('kkBtn');
  const dn = document.getElementById('doneBtn');
  if (!kk || !dn) return;
  if (st.kk) {
    kk.textContent = '☑ 確認済';
    kk.style.cssText = 'border:none;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#3b82f6;color:#fff';
  } else {
    kk.textContent = '☐ 確認';
    kk.style.cssText = 'border:1px solid #cbd5e1;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#f8fafc;color:#64748b';
  }
  if (st.done) {
    dn.textContent = '☑ 完了';
    dn.style.cssText = 'border:none;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#22c55e;color:#fff';
  } else {
    dn.textContent = '☐ 完了';
    dn.style.cssText = 'border:1px solid #cbd5e1;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#f8fafc;color:#64748b';
  }
  const BASE_EVAL = 'border-radius:14px;padding:3px 9px;font-size:10px;cursor:pointer;font-weight:bold;transition:all .2s;';
  const EVAL_CFG = {
    must:  { id:'evalMust',  on:'background:#ef4444;color:#fff;border:none',          off:'background:#fef2f2;color:#94a3b8;border:1px solid #fecaca' },
    check: { id:'evalCheck', on:'background:#3b82f6;color:#fff;border:none',          off:'background:#f8fafc;color:#94a3b8;border:1px solid #dbeafe' },
    easy:  { id:'evalEasy',  on:'background:#22c55e;color:#fff;border:none',          off:'background:#f0fdf4;color:#94a3b8;border:1px solid #bbf7d0' }
  };
  Object.entries(EVAL_CFG).forEach(([level, cfg]) => {
    const btn = document.getElementById(cfg.id);
    if (btn) btn.style.cssText = BASE_EVAL + (st.eval === level ? cfg.on : cfg.off);
  });
}

function updateBtnDots(num) {
  const dots = document.getElementById('dots_' + num);
  if (!dots) return;
  const st = getStatus(num);
  const EVAL_COLORS = { must:'#ef4444', check:'#3b82f6', easy:'#22c55e' };
  dots.innerHTML = '';
  const d1 = document.createElement('div');
  d1.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.kk ? '#3b82f6' : '#e2e8f0');
  const d2 = document.createElement('div');
  d2.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.done ? '#22c55e' : '#e2e8f0');
  const d3 = document.createElement('div');
  d3.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.eval ? EVAL_COLORS[st.eval] : '#e2e8f0');
  dots.appendChild(d1);
  dots.appendChild(d2);
  dots.appendChild(d3);
}

function refreshDashboard() {
  // カテゴリが選択中なら対象はfilteredQs、全表示ならQUESTIONS全体
  const targetQs = (typeof currentCat !== 'undefined' && currentCat !== 'all') ? filteredQs : QUESTIONS;
  const isFiltered = targetQs.length < QUESTIONS.length;

  let kkCount = 0, doneCount = 0, mustCount = 0, chkCount = 0, easyCount = 0;
  const cells = document.getElementById('dashCells');
  if (cells) cells.innerHTML = '';

  const EVAL_BORDER = { must:'#ef4444', check:'#3b82f6', easy:'#22c55e' };
  // グリッド：カテゴリ内は対象問のみ表示、全体は25問全部（カテゴリ外はフェード）
  const gridQs = isFiltered ? targetQs : QUESTIONS;
  gridQs.forEach(q => {
    const st = getStatus(q.num);
    const inScope = !isFiltered || targetQs.indexOf(q) >= 0;
    if (inScope && st.kk) kkCount++;
    if (inScope && st.done) doneCount++;
    if (inScope && st.eval === 'must') mustCount++;
    if (inScope && st.eval === 'check') chkCount++;
    if (inScope && st.eval === 'easy') easyCount++;
    if (cells) {
      const cell = document.createElement('div');
      const color = st.done ? '#4ade80' : st.kk ? '#93c5fd' : '#e2e8f0';
      const textColor = st.done ? '#14532d' : st.kk ? '#1e40af' : '#64748b';
      const evalBorder = st.eval ? '3px solid ' + EVAL_BORDER[st.eval] : '3px solid transparent';
      cell.style.cssText = 'background:' + color + ';color:' + textColor + ';border-radius:6px;padding:4px 2px;text-align:center;font-size:11px;font-weight:bold;cursor:pointer;transition:all .2s;border-bottom:' + evalBorder;
      cell.textContent = q.num;
      const evalLabel = st.eval === 'must' ? ' [必ず確認]' : st.eval === 'check' ? ' [確認]' : st.eval === 'easy' ? ' [できれば]' : '';
      cell.title = 'Q' + q.num + ' ' + q.cat + (st.kk ? ' 確認済' : '') + (st.done ? ' 完了' : '') + evalLabel;
      cell.onclick = () => {
        const fi = filteredQs.indexOf(q);
        if (fi >= 0) { currentIdx = fi; render(); }
        else {
          currentCat = 'all';
          document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === 'all'));
          filteredQs = [...QUESTIONS];
          buildQList();
          currentIdx = QUESTIONS.indexOf(q);
          render();
        }
        document.getElementById('dashGrid').classList.remove('dash-open');
        window.scrollTo({top:0,behavior:'smooth'});
      };
      cells.appendChild(cell);
    }
  });

  const total = targetQs.length;
  const kkPct = total ? Math.round(kkCount/total*100) : 0;
  const donePct = total ? Math.round(doneCount/total*100) : 0;
  const el = id => document.getElementById(id);

  // ラベル：カテゴリ選択中は「カテゴリ名内」を表示
  const scopeLabel = isFiltered ? (currentCat + ' ') : '';
  if (el('dashKk')) el('dashKk').textContent = scopeLabel + '確認済 ' + kkCount + '/' + total;
  if (el('dashDone')) el('dashDone').textContent = scopeLabel + '完了 ' + doneCount + '/' + total;
  if (el('dashMust')) el('dashMust').textContent = '🔴 必ず確認 ' + mustCount + '/' + total;
  if (el('dashCheck2')) el('dashCheck2').textContent = '🔵 確認 ' + chkCount + '/' + total;
  if (el('dashEasy')) el('dashEasy').textContent = '🟢 できれば ' + easyCount + '/' + total;
  if (el('kkBar')) el('kkBar').style.width = kkPct + '%';
  if (el('doneBar')) el('doneBar').style.width = donePct + '%';
  if (el('kkPct')) el('kkPct').textContent = kkPct + '%';
  if (el('donePct')) el('donePct').textContent = donePct + '%';

  // ダッシュボードタイトルにスコープを反映
  const titleEl = document.querySelector('#progressDash [style*="font-size:13px"]');
  if (titleEl) titleEl.textContent = isFiltered ? ('📋 ' + currentCat + ' の進捗') : '📋 進捗管理';
}
/* ===== /進捗管理 ===== */

function buildQList() {
  const el = document.getElementById("qList");
  el.innerHTML = "";
  QUESTIONS.forEach((q, i) => {
    const btn = document.createElement("button");
    btn.className = "q-btn";
    btn.id = "qbtn_" + q.num;
    btn.textContent = q.num;
    btn.dataset.cat = q.cat;
    btn.dataset.idx = i;
    if (currentCat !== "all" && q.cat !== currentCat) btn.classList.add("hidden");
    btn.onclick = () => {
      const fi = filteredQs.indexOf(q);
      if (fi < 0) return;
      currentIdx = fi;
      render();
    };
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:2px";
    const dots = document.createElement("div");
    dots.id = "dots_" + q.num;
    dots.style.cssText = "display:flex;gap:2px;height:5px";
    wrap.appendChild(btn);
    wrap.appendChild(dots);
    el.appendChild(wrap);
    updateBtnDots(q.num);
  });
  refreshDashboard();
}

function render() {
  const q = filteredQs[currentIdx];
  if (!q) return;
  document.getElementById("qNum").textContent = "第" + q.num + "問";
  const badge = document.getElementById("catBadge");
  badge.textContent = q.cat;
  badge.className = "cat-badge " + q.cat;
  document.getElementById("qText").innerHTML = q.text.replace(/\n/g, "<br>");
  const se = document.getElementById("qShiryou");
  if (q.shiryou) { se.style.display=""; se.innerHTML=q.shiryou; } else { se.style.display="none"; }
  const ul = document.getElementById("qChoices");
  const labs = ["ア","イ","ウ","エ"];
  ul.innerHTML = q.choices.map((c,i) => `<li><span class="cho-label">${labs[i]}</span>${c}</li>`).join("");
  document.getElementById("answerBox").style.display = "none";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("btnPrev").disabled = currentIdx === 0;
  document.getElementById("btnNext").disabled = currentIdx === filteredQs.length - 1;
  document.getElementById("qCount").textContent = (currentIdx+1) + " / " + filteredQs.length + "問";
  document.getElementById("progressBar").style.width = ((currentIdx+1)/filteredQs.length*100) + "%";
  document.querySelectorAll(".q-btn").forEach(btn => {
    btn.classList.toggle("current", parseInt(btn.dataset.idx) === QUESTIONS.indexOf(q));
  });
  updateStatusUI(q.num);
  refreshDashboard();
  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleAnswer() {
  const box = document.getElementById("answerBox");
  if (box.style.display === "none") {
    box.innerHTML = makeKaisetsuHtml(filteredQs[currentIdx]);
    box.style.display = "block";
    if (typeof __szChk30Init === 'function') __szChk30Init();
    // 各チェック問題の解答にも参考ノートリンクを注入
    if (typeof LINK_DATA !== 'undefined') {
      const _qn = filteredQs[currentIdx].num;
      const _ls = LINK_DATA[_qn] || [];
      if (_ls.length) {
        const _lc = _ls.map(l=>`<a href="${l.href}" target="_blank" style="display:inline-block;background:#0ea5e9;color:#fff;font-size:10px;font-weight:bold;padding:3px 9px;border-radius:12px;text-decoration:none;margin:2px 4px 2px 0;">${l.label}</a>`).join('');
        box.querySelectorAll('.chk30-q').forEach(chkQ => {
          const ld = document.createElement('div');
          ld.style.cssText = 'background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;padding:6px 10px;margin-top:8px;';
          ld.innerHTML = '<span style="font-size:10px;font-weight:bold;color:#0369a1;">📚 参考ノート：</span>' + _lc;
          chkQ.appendChild(ld);
        });
      }
    }
  } else {
    box.style.display = "none";
  }
}

function move(dir) {
  currentIdx = Math.max(0, Math.min(filteredQs.length-1, currentIdx+dir));
  render();
}

document.querySelectorAll(".cat-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    currentCat = tab.dataset.cat;
    document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    filteredQs = currentCat==="all" ? [...QUESTIONS] : QUESTIONS.filter(q => q.cat===currentCat);
    currentIdx = 0;
    buildQList();
    render();
  });
});

buildQList();
render();
refreshDashboard();
</script>

#sz-btn-search{bottom:100px}
#sz-btn-filter{bottom:144px}

/* ---- 検索ドロワー（タブ横断） ---- */
#sz-search{position:fixed;top:0;right:0;width:340px;max-width:92vw;height:100%;background:#fff;box-shadow:-3px 0 20px rgba(0,0,0,.2);z-index:10050;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s}

.sz-s-item:hover{background:#eff6ff;border-color:#93c5fd}
.sz-s-item .sz-s-tab{font-size:.7rem;font-weight:700;color:#1d4ed8;margin-bottom:3px}
.sz-s-item .sz-s-snip{font-size:.8rem;color:#334155;line-height:1.55;word-break:break-all}
.sz-s-item .sz-s-snip b{background:#fde047;color:#1e293b;border-radius:2px;padding:0 1px}
mark.sz-search-hit{background:#facc15;color:#1e293b;border-radius:2px}
@keyframes szPulse{0%,45%{box-shadow:0 0 0 4px rgba(250,204,21,.75)}100%{box-shadow:0 0 0 0 rgba(250,204,21,0)}}
mark.sz-search-hit.pulse{animation:szPulse 1.7s ease-out}
/* ---- 色フィルタパネル ---- */
#sz-filter{position:fixed;right:58px;bottom:130px;background:#1e293b;border-radius:11px;padding:11px 13px;z-index:10040;box-shadow:0 6px 22px rgba(0,0,0,.34);display:none;width:188px}
#sz-filter.on{display:block}
#sz-filter .sz-f-title{color:#e2e8f0;font-size:.76rem;font-weight:700;margin-bottom:8px}
#sz-filter label{display:flex;align-items:center;gap:8px;color:#e2e8f0;font-size:.8rem;padding:4px 2px;cursor:pointer}
#sz-filter label:hover{color:#fff}
#sz-filter .sz-f-chip{width:18px;height:18px;border-radius:4px;flex-shrink:0;border:1px solid rgba(255,255,255,.3)}
#sz-filter input[type=checkbox]{accent-color:#3b82f6;width:15px;height:15px;cursor:pointer;flex-shrink:0}
/* ---- 付箋（スティッキーメモ） ---- */
.sz-note{position:absolute;width:204px;background:#fef9c3;border:1px solid rgba(0,0,0,.18);border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.22);z-index:40}
.sz-note .sz-n-head{height:20px;background:rgba(0,0,0,.08);cursor:move;display:flex;align-items:center;gap:2px;padding:0 5px;border-radius:8px 8px 0 0;touch-action:none}
.sz-note .sz-n-color{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,.25);cursor:pointer;margin-right:auto}
.sz-note .sz-n-head button{background:none;border:none;cursor:pointer;font-size:.78rem;color:#78350f;padding:0 4px;line-height:1}
.sz-note .sz-n-head button:hover{color:#000}
.sz-note .sz-n-body{display:block;width:100%;border:none;background:none;padding:7px 9px;font-size:.82rem;font-family:inherit;line-height:1.55;outline:none;color:#422006;min-height:60px;word-break:break-word;white-space:pre-wrap;box-sizing:border-box;cursor:text}
.sz-note .sz-n-body:focus{outline:none}
.sz-note .sz-n-body[placeholder]:empty::before{content:attr(placeholder);opacity:.45;pointer-events:none;display:block}
.sz-note.sz-n-min{width:auto;min-width:150px}
.sz-note.sz-n-min .sz-n-body{display:none}
.sz-note.sz-n-min .sz-n-head{border-radius:8px}
.sz-note .sz-n-preview{display:none;font-size:.76rem;color:#78350f;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:6px}
.sz-note.sz-n-min .sz-n-preview{display:block}
body.sz-annot-off .sz-note{display:none !important}
/* 付箋：右端リサイズハンドル */
.sz-n-resize{position:absolute;top:0;right:0;width:7px;height:100%;cursor:ew-resize;z-index:2;border-radius:0 8px 8px 0;-webkit-tap-highlight-color:transparent}
.sz-n-resize:hover,.sz-n-resize:active{background:rgba(0,0,0,.1)}
.sz-note.sz-n-min .sz-n-resize{display:none}
/* ---- 図形テキスト枠（選択箇所に置く横長長方形） ---- */
.sz-shape{position:absolute;z-index:8;box-sizing:border-box;min-width:28px;min-height:24px;display:flex;flex-direction:column;background:rgba(255,255,255,.9);border:2px solid #2563eb;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.18);overflow:hidden;cursor:move}
.sz-shape .sz-sh-body{flex:1 1 auto;overflow:auto;padding:6px 10px;outline:none;min-height:24px;font-size:16px;line-height:1.45;color:#0f172a;word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap;cursor:move}
.sz-shape .sz-sh-body:focus{cursor:text}
.sz-shape .sz-sh-body[placeholder]:empty::before{content:attr(placeholder);opacity:.4;pointer-events:none}
.sz-shape .sz-rz{position:absolute;z-index:3;-webkit-tap-highlight-color:transparent}
.sz-shape .sz-rz.e{top:0;bottom:0;right:0;width:8px;cursor:ew-resize}
.sz-shape .sz-rz.w{top:0;bottom:0;left:0;width:8px;cursor:ew-resize}
.sz-shape .sz-rz.n{left:0;right:0;top:0;height:8px;cursor:ns-resize}
.sz-shape .sz-rz.s{left:0;right:0;bottom:0;height:8px;cursor:ns-resize}
.sz-shape .sz-rz.ne,.sz-shape .sz-rz.nw,.sz-shape .sz-rz.se,.sz-shape .sz-rz.sw{width:14px;height:14px;z-index:4}
.sz-shape .sz-rz.ne{top:0;right:0;cursor:nesw-resize}
.sz-shape .sz-rz.nw{top:0;left:0;cursor:nwse-resize}
.sz-shape .sz-rz.se{bottom:0;right:0;cursor:nwse-resize}
.sz-shape .sz-rz.sw{bottom:0;left:0;cursor:nesw-resize}
.sz-shape:hover .sz-rz.e,.sz-shape:hover .sz-rz.w,.sz-shape:hover .sz-rz.n,.sz-shape:hover .sz-rz.s{background:rgba(37,99,235,.16)}
.sz-shape:hover .sz-rz.ne,.sz-shape:hover .sz-rz.nw,.sz-shape:hover .sz-rz.se,.sz-shape:hover .sz-rz.sw{background:#fff;border:1.5px solid #2563eb;border-radius:3px}
body.sz-annot-off .sz-shape{display:none !important}
/* ---- 🖼 画像（フローティング：移動・四隅で縦横比維持リサイズ） ---- */
.sz-img{position:absolute;z-index:8;box-sizing:border-box;background:#fff;border:1px solid rgba(0,0,0,.35);border-radius:3px;box-shadow:0 1px 5px rgba(0,0,0,.14);overflow:visible;cursor:move;line-height:0}
.sz-img img{display:block;width:100%;height:100%;object-fit:fill;pointer-events:none;user-select:none;-webkit-user-drag:none;border-radius:2px}
.sz-img .sz-img-del{position:absolute;top:3px;right:3px;width:21px;height:21px;border:none;border-radius:50%;background:rgba(15,23,42,.62);color:#fff;font-size:.72rem;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:4;padding:0;line-height:1}
.sz-img:hover .sz-img-del{display:flex}
.sz-img .sz-img-rz{position:absolute;width:12px;height:12px;background:#fff;border:1.5px solid rgba(0,0,0,.55);border-radius:2px;z-index:3;display:none;touch-action:none}
.sz-img:hover .sz-img-rz{display:block}
.sz-img .sz-img-rz.nw{left:-6px;top:-6px;cursor:nwse-resize}
.sz-img .sz-img-rz.ne{right:-6px;top:-6px;cursor:nesw-resize}
.sz-img .sz-img-rz.sw{left:-6px;bottom:-6px;cursor:nesw-resize}
.sz-img .sz-img-rz.se{right:-6px;bottom:-6px;cursor:nwse-resize}
/* ---- 囲み枠（選択範囲を四角で囲む＋非表示ボタン） ---- */
.sz-frame{position:absolute;z-index:9;box-sizing:border-box;border:2px solid #ef4444;border-radius:5px;background:transparent;pointer-events:none}
.sz-frame.sz-frame-masked{background:#e2e8f0;border-color:#94a3b8}
.sz-frame .sz-fr-btn{position:absolute;top:-11px;right:-11px;width:21px;height:21px;border-radius:50%;border:none;background:#ef4444;color:#fff;font-size:.66rem;line-height:1;cursor:pointer;pointer-events:auto;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;padding:0}
.sz-frame.sz-frame-masked .sz-fr-btn{background:#64748b}
.sz-frame .sz-fr-move{position:absolute;top:-11px;left:-11px;width:21px;height:21px;border-radius:50%;border:none;background:#ef4444;color:#fff;font-size:.7rem;line-height:1;cursor:move;pointer-events:auto;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;padding:0;touch-action:none}
.sz-frame.sz-frame-masked .sz-fr-move{background:#64748b}
body.sz-annot-off .sz-frame{display:none !important}
/* 選択バー：図形内テキスト選択時だけ A−/A+/🗑 を出し、図形に無関係なボタンを隠す */
#sz-bar .sz-bar-shape{display:none}

#sz-bar.sz-shape-mode .sz-bar-shape{display:inline-block}
</style>

</div>

<script>
(function(){
  'use strict';
  // 二重注入ガード：qz-memo が同一ファイルに2回挿入されても注釈システムは1回だけ初期化する。
  // 無いと mouseup リスナーが二重に付いてクリックでトグルが2回発火し「押しても表示されない」、
  // restoreAll も2回走って同一注釈を再ラップして入れ子になる。
  if(window.__SZ_MEMO_INIT__) return;
  window.__SZ_MEMO_INIT__=1;
  function szFileKey(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}var h=5381;for(var i=0;i<p.length;i++){h=((h*33)^p.charCodeAt(i))>>>0;}return h.toString(36);}
  /* 動的ページ用：window.__SZ_QKEY__() があれば保存キーに問題ごとの接尾辞を付ける（静的ページでは無害＝接尾辞なし） */
  function szQSuffix(){try{return (typeof window.__SZ_QKEY__==='function')?('_'+window.__SZ_QKEY__()):'';}catch(e){return '';}}
  function szCurKEY(){return 'szA_'+szFileKey()+szQSuffix();}
  var db=[];
  try{db=JSON.parse(localStorage.getItem(szCurKEY())||'[]');}catch(e){}
  function save(){try{localStorage.setItem(szCurKEY(),JSON.stringify(db));}catch(e){}}

  var bar=document.getElementById('sz-bar');
  var cmtPop=document.getElementById('sz-cmt-pop');
  var cmtTxt=document.getElementById('sz-cmt-txt');
  var cmtHead=document.getElementById('sz-cmt-head');
  var delPop=document.getElementById('sz-del-pop');
  var delEditBtn=document.getElementById('sz-del-edit-btn');
  var tip=document.getElementById('sz-cmt-tip');
  var tipBody=document.getElementById('sz-tip-body');
  var tipEditBtn=document.getElementById('sz-tip-edit-btn');
  var hlPicker=document.getElementById('sz-hl-picker');
  var savedRange=null, cmtCtx=null, tipTimer=null, tipTargetAid=null, delTarget=null, fbBarTarget=null, szShapeBarTarget=null;
  var fbBtn=document.getElementById('sz-bar-fb-btn');
  var alignBtn=document.getElementById('sz-bar-align-btn');
  /* モバイル：バーのボタンタップで選択が消えないよう mousedown をキャンセル */
  bar.addEventListener('mousedown',function(e){e.preventDefault();});

  /* ---- 既存の.fill-blank「空欄解除」状態の保存・復元 ---- */
  var FBKEY='szFB_'+szFileKey();
  var fbUn={}; try{fbUn=JSON.parse(localStorage.getItem(FBKEY)||'{}');}catch(e){}
  function fbSave(){try{localStorage.setItem(FBKEY,JSON.stringify(fbUn));}catch(e){}}
  function fbInit(){
    [].slice.call(document.querySelectorAll('.fill-blank,.blank')).filter(function(el){return !(el.closest&&el.closest('[id^="pre_"]'));}).forEach(function(el,i){
      el.setAttribute('data-fbidx',i);
      if(fbUn[i]) el.classList.add('sz-unblanked');
    });
  }
  // 既存の.fill-blankのクリック（答え表示トグル）を、長押し直後／空欄解除中は抑止する（元ノートのリスナーを編集せずキャプチャ段で割り込む）
  document.addEventListener('click',function(e){
    var fb=e.target.closest?e.target.closest('.fill-blank,.blank'):null;
    if(!fb) return;
    if(window.szSuppressFbClick){window.szSuppressFbClick=false;e.stopImmediatePropagation();e.preventDefault();return;}
    if(fb.classList.contains('sz-unblanked')){e.stopImmediatePropagation();e.preventDefault();}
  },true);
  // 長押し時のブラウザ標準コンテキストメニューを抑制（del-popを前面に出すため）
  document.addEventListener('contextmenu',function(e){
    if(e.target.closest&&e.target.closest('.fill-blank,.blank,mark.sz-blank,mark.sz-erase,mark.sz-ul,mark.sz-hl,mark.sz-cm')) e.preventDefault();
  });

  function uid(){return 'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

  function panelOf(el){
    /* 動的ページ用：window.__SZ_PANELS__（セレクタ）があれば、その要素もパネル扱いにして
       注釈をコンテナ単位にスコープする（例: 模試の #qText,#answerBox）。静的ページでは無害。 */
    var sel='.tab-panel,.tab-content';
    try{ if(window.__SZ_PANELS__) sel+=','+window.__SZ_PANELS__; }catch(e){}
    var p=el.closest?el.closest(sel):null;
    return p&&p.id?p.id:'body';
  }

  /* ---- 出現位置（occurrence index）で復元先を一意化 ----
     同一フレーズが複数あると「文脈付き検索」でも別の箇所に復元され得る。
     root配下のテキストを文書順に連結（marks内の文字も含め、sz-cm-icon と pre_ 配下は除外）
     し「root内で何番目の出現か」を保存・復元する。marks の有無で連結文字列は変わらないため
     復元順に依存せず安定する。 */
  function szTextStream(root){
    var nodes=[],full='';
    var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode:function(n){
        if(n.parentElement&&n.parentElement.closest('.sz-cm-icon')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('[id^="pre_"]')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('.row-hide-btn,.sec-hide-btn-row,.row-hidden-ph,.sec-hidden-ph,.tr-hidden-ph,.card-hide-all-btn,.sz-drag-handle,.sz-drag-line,.fz-h,.fz-ph,.fzm-ctrl,.fzm-ind')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var n; while((n=w.nextNode())){ nodes.push({node:n,start:full.length}); full+=n.nodeValue; }
    return {nodes:nodes,full:full};
  }
  function szLocate(stream,gpos,bias){
    /* 境界（gpos がノード末尾＝次ノード先頭に一致）で寄せ方を変える：
       start＝後ろのノードの offset0／end＝前のノードの offset len。
       これを誤ると <b>語</b> 等“語＝1テキストノード”の選択で a.node≠b.node になり復元が別の同一語へ流れる。 */
    var i,s,len;
    for(i=0;i<stream.nodes.length;i++){
      s=stream.nodes[i];len=s.node.nodeValue.length;
      if(bias==='end'){ if(gpos>s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
      else if(bias==='start'){ if(gpos>=s.start&&gpos<s.start+len) return {node:s.node,offset:gpos-s.start}; }
      else { if(gpos>=s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
    }
    for(i=0;i<stream.nodes.length;i++){ s=stream.nodes[i];len=s.node.nodeValue.length; if(gpos>=s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
    return null;
  }
  function szOccOf(root,node,offset,selText){
    if(!selText) return 0;
    var stream=szTextStream(root),gstart=-1;
    for(var i=0;i<stream.nodes.length;i++){ if(stream.nodes[i].node===node){ gstart=stream.nodes[i].start+offset; break; } }
    if(gstart<0) return 0;
    var occ=0,from=0,idx;
    while((idx=stream.full.indexOf(selText,from))!==-1){
      if(idx===gstart) break;
      if(idx<gstart) occ++;
      from=idx+selText.length;
    }
    return occ;
  }
  /* ---- 文脈を cross-node の stream.full から採取 ----
     旧実装は ctxBefore/ctxAfter を選択の開始/終了テキストノード“1個の中だけ”で 30字 slice していた。
     そのため <b>需要</b> のように語＝1ノードだと、開始は offset0／終了はノード末尾になり
     ctxBefore も ctxAfter も“空文字”になりやすい。空文脈だと szRankLocs が weak 判定で
     occ 近接だけに頼り、ページ内容が増減して occ がズレた次セッションで「同じ語の別の箇所」に
     誤着地する（＝コメント等が別の場所に飛ぶ）。復元側 szRankLocs は stream.full 上で前後を
     見るので、保存もノードをまたいだ stream.full から採れば対称になり、occ がズレても文脈で救える。 */
  function szCtxOf(root,range,selText){
    var s=szTextStream(root),gs=-1,ge=-1,i;
    for(i=0;i<s.nodes.length;i++){ if(s.nodes[i].node===range.startContainer){ gs=s.nodes[i].start+range.startOffset; break; } }
    for(i=0;i<s.nodes.length;i++){ if(s.nodes[i].node===range.endContainer){ ge=s.nodes[i].start+range.endOffset; break; } }
    if(gs<0||ge<0){ // stream に乗らない（SVG等）→ 旧来の単一ノード採取にフォールバック
      var cb=range.startContainer.nodeType===3?range.startContainer.nodeValue.slice(Math.max(0,range.startOffset-30),range.startOffset):'';
      var ca=range.endContainer.nodeType===3?range.endContainer.nodeValue.slice(range.endOffset,range.endOffset+30):'';
      return {cb:cb,ca:ca};
    }
    return {cb:s.full.slice(Math.max(0,gs-30),gs), ca:s.full.slice(ge,ge+30)};
  }
  function szFindByOcc(root,selText,occ){
    if(!selText) return null;
    var stream=szTextStream(root),seen=0,from=0,idx;
    while((idx=stream.full.indexOf(selText,from))!==-1){
      if(seen===occ){
        var a=szLocate(stream,idx,'start'),b=szLocate(stream,idx+selText.length,'end');
        if(a&&b&&a.node===b.node) return {node:a.node,offset:a.offset,end:b.offset};
        return null;
      }
      seen++; from=idx+selText.length;
    }
    return null;
  }
  function szFindByContext(root,ann,scoped){
    var walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode:function(n){
        if(n.parentElement&&n.parentElement.closest('.sz-cm-icon')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('[id^="pre_"]')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('.row-hide-btn,.sec-hide-btn-row,.row-hidden-ph,.sec-hidden-ph,.tr-hidden-ph,.card-hide-all-btn,.sz-drag-handle,.sz-drag-line,.fz-h,.fz-ph,.fzm-ctrl,.fzm-ind')) return NodeFilter.FILTER_REJECT;
        if(!scoped&&n.parentElement&&n.parentElement.closest('mark[data-aid]')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var node;
    while((node=walker.nextNode())){
      var txt=node.nodeValue,idx=-1;
      if(ann.ctxBefore||ann.ctxAfter){ var fi=txt.indexOf(ann.ctxBefore+ann.selText+ann.ctxAfter); if(fi!==-1) idx=fi+ann.ctxBefore.length; }
      if(idx===-1) idx=txt.indexOf(ann.selText);
      if(idx===-1) continue;
      return {node:node,offset:idx,end:idx+ann.selText.length};
    }
    return null;
  }
  /* ---- 文脈優先＋occ着地の統合解決 ----
     occ は「上に同じ語があると間違った同一語にヒットしても必ず何かを返す」ため、
     occ 単独だと誤った箇所へ復元され得る。そこで stream.full（root内テキストを文書順連結）上で
     selText の全出現を列挙し、各出現の前後を保存済み ctxBefore/ctxAfter と突き合わせて
     「文脈が最も合う出現」を選ぶ。stream.full はノードをまたいで連結されているので、
     <b> や境界をまたぐ文脈もそのまま照合できる。
     ・文脈が弱い（前後合計4字未満／旧データで空）→ 検証せず保存 occ をそのまま信用。
     ・文脈が全く合う場所が無い（本文が作り直された等）→ 注釈を消さず保存 occ で着地。
     ・同点 → 保存 occ 番号に近い出現を採用。
     occ の意味は従来どおり「stream内の全出現中の何番目か」のまま（番号の付け替えはしない）。
     さらに候補を順位付けして返し、restore 側で「既に別注釈の mark 内に入る候補」を飛ばす
     ＝同一語の別エントリが同じ出現へ衝突して入れ子（二重穴埋め・押しても表示されない）に
     なるのを防ぐ。文脈で一意に決まる場合は最良候補が必ず選ばれるので挙動は変わらない。 */
  function szCtxSuffix(stored,actual){ var i=0; while(i<stored.length&&i<actual.length&&stored.charAt(stored.length-1-i)===actual.charAt(actual.length-1-i)) i++; return i; }
  function szCtxPrefix(stored,actual){ var i=0; while(i<stored.length&&i<actual.length&&stored.charAt(i)===actual.charAt(i)) i++; return i; }
  /* root内の selText 全出現を「文脈スコア降順→保存occに近い順」でランクした候補配列を返す */
  function szRankLocs(root,ann){
    var sel=ann.selText; if(!sel) return [];
    var stream=szTextStream(root),full=stream.full,L=sel.length;
    var cb=ann.ctxBefore||'',ca=ann.ctxAfter||'',weak=(cb.length+ca.length<4);
    var occs=[],from=0,idx;
    while((idx=full.indexOf(sel,from))!==-1){ occs.push(idx); from=idx+L; }
    if(!occs.length) return [];
    var storedOcc=(typeof ann.occ==='number')?ann.occ:0;
    var scored=occs.map(function(gi,k){
      var score=weak?0:szCtxSuffix(cb,full.slice(Math.max(0,gi-cb.length),gi))+szCtxPrefix(ca,full.slice(gi+L,gi+L+ca.length));
      return {gi:gi,k:k,score:score};
    });
    scored.sort(function(a,b){ return (b.score-a.score)||(Math.abs(a.k-storedOcc)-Math.abs(b.k-storedOcc))||(a.k-b.k); });
    var out=[];
    scored.forEach(function(c){
      var a=szLocate(stream,c.gi,'start'),b=szLocate(stream,c.gi+L,'end');
      if(a&&b&&a.node===b.node) out.push({node:a.node,offset:a.offset,end:b.offset});
    });
    return out;
  }
  /* 既存の別注釈 mark 内に入る候補をスキップして、空いている最良位置を返す */
  function szResolveLoc(root,ann,scoped){
    var cands=szRankLocs(root,ann);
    for(var i=0;i<cands.length;i++){
      var c=cands[i];
      if(!scoped){
        var cover=c.node.parentElement&&c.node.parentElement.closest?c.node.parentElement.closest('mark[data-aid]'):null;
        if(cover&&cover.dataset&&cover.dataset.aid!==ann.uid) continue; // 別注釈に占有済み→次候補へ
      }
      return c;
    }
    return null;
  }

  /* ---- ツールバー位置 ---- */
  var _isMobile=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  function clampBarToViewport(){
    var r=bar.getBoundingClientRect(), W=window.innerWidth, H=window.innerHeight, MARGIN=4;
    // 横クランプ（transform:translateX(-50%)なのでstyle.leftはバー中心のpx値）
    var sl=parseFloat(bar.style.left)||0;
    if(r.right>W-MARGIN) sl-=(r.right-(W-MARGIN));
    if(r.left+(sl-(parseFloat(bar.style.left)||0))<MARGIN) sl=MARGIN+r.width/2;
    bar.style.left=sl+'px';
    // 縦クランプ（bottom固定の場合はスキップ）
    if(!bar.style.bottom){
      var st=parseFloat(bar.style.top)||0;
      if(r.bottom>H-MARGIN) st-=(r.bottom-(H-MARGIN));
      if(st<MARGIN) st=MARGIN;
      bar.style.top=st+'px';
    }
  }
  function szInSVG(range){
    try{var n=range.commonAncestorContainer;while(n){if(n.nodeName==='svg'||n.nodeName==='SVG')return true;n=n.parentNode;}return false;}catch(e){return false;}
  }
  function showBar(rect,forFb){
    /* SVG内テキストは既存ツールバーで注釈（applyAnnotで分岐） */
    if(!forFb){fbBarTarget=null;if(fbBtn)fbBtn.style.display='none';}
    // 図形（コメント枠）内のテキスト選択か判定 → 専用ボタン（A−/A+/🗑）に切替
    szShapeBarTarget=null;
    if(!forFb&&savedRange){
      var _cac=savedRange.commonAncestorContainer;
      var _ce=_cac&&_cac.nodeType===1?_cac:(_cac?_cac.parentElement:null);
      szShapeBarTarget=_ce&&_ce.closest?_ce.closest('.sz-shape'):null;
    }
    bar.classList.toggle('sz-shape-mode',!!szShapeBarTarget);
    if(szShapeBarTarget) szSyncAlignBtn(szShapeBarTarget);
    var cx=(rect.left+rect.right)/2;
    bar.style.left=cx+'px';
    bar.style.bottom='';
    if(_isMobile){
      // ネイティブPopupは選択範囲の上下どちらにも現れうる（~55px）→ 常に十分離す
      var BAR_H=44, BROW_H=55, GAP=8;
      var top=rect.bottom+BROW_H+GAP;
      if(top+BAR_H>window.innerHeight){
        top=Math.max(4,rect.top-BROW_H-BAR_H-GAP);
      }
      bar.style.top=top+'px';
    } else {
      bar.style.top=Math.max(4,rect.top-52)+'px';
    }
    bar.classList.add('on');
    // 選択範囲への影響を避けるため rAF で非同期クランプ
    requestAnimationFrame(function(){ clampBarToViewport(); });
  }
  window.szHideBar=function(){bar.classList.remove('on');bar.classList.remove('sz-shape-mode');bar.style.bottom='';fbBarTarget=null;szShapeBarTarget=null;if(fbBtn)fbBtn.style.display='none';};
  function szShowBarForFb(fb){
    if(document.body.classList.contains('sz-annot-off')) return;
    fbBarTarget=fb;
    if(fbBtn){fbBtn.textContent=fb.classList.contains('sz-unblanked')?'空欄に戻す':'空欄やめる';fbBtn.style.display='';}
    // 答えを覆わないよう画面下端に固定（pixelで指定してclampが効くように）
    bar.style.top='';
    bar.style.bottom='8px';
    bar.style.left=(window.innerWidth/2)+'px';
    bar.classList.add('on');
    clampBarToViewport();
  }
  window.szToggleFbFromBar=function(){
    if(!fbBarTarget) return;
    var fb=fbBarTarget;
    var idx=fb.getAttribute('data-fbidx');
    if(fb.classList.contains('sz-unblanked')){
      fb.classList.remove('sz-unblanked');
      if(idx!=null) delete fbUn[idx];
    } else {
      fb.classList.add('sz-unblanked');
      fb.classList.remove('show');
      if(idx!=null) fbUn[idx]=1;
    }
    fbSave();
    szHideBar();
  };

  /* ---- コメントポップ ---- */
  function showCmtPop(rect){
    var left=Math.max(4,Math.min(rect.left,window.innerWidth-244));
    cmtPop.style.left=left+'px';
    cmtPop.style.top=Math.min(rect.bottom+8, window.innerHeight-200)+'px';
    cmtPop.classList.add('on');
    setTimeout(function(){cmtTxt.focus();},60);
  }
  window.szHideCmt=function(){cmtPop.classList.remove('on');cmtCtx=null;};

  /* ---- 削除ポップ ---- */
  function showDelPop(target,e){
    delTarget=target;
    var delBtn=delPop.querySelector('.sz-d-del');
    if(target.classList.contains('fill-blank')||target.classList.contains('blank')){
      // 既存の空欄：解除/復活トグル
      delPop.dataset.aid='';
      delEditBtn.style.display='none';
      if(delBtn) delBtn.textContent=target.classList.contains('sz-unblanked')?'↩ 空欄に戻す':'🚫 空欄をやめる';
    } else {
      delPop.dataset.aid=target.dataset.aid||'';
      delEditBtn.style.display=target.classList.contains('sz-cm')?'':'none';
      if(delBtn) delBtn.textContent='↩ 元に戻す';
    }
    var isSize=target.classList.contains('sz-size');
    delPop.classList.toggle('sz-has-size',isSize);
    if(isSize){
      var cur=target.dataset.lv||'sm';
      Array.prototype.forEach.call(delPop.querySelectorAll('.sz-d-size button'),function(b){
        b.classList.toggle('on',b.dataset.lv===cur);
      });
    }
    delPop.style.left=Math.max(4,e.clientX-18)+'px';
    delPop.style.top=Math.max(4,e.clientY-48)+'px';
    delPop.classList.add('on');
  }
  window.szHideDel=function(){delPop.classList.remove('on');};
  function szHideHlPicker(){hlPicker.classList.remove('on');}

  /* ---- 蛍光カラーピッカー ---- */
  window.szShowHlPicker=function(btn){
    if(hlPicker.classList.contains('on')){szHideHlPicker();return;}
    var rect=btn.getBoundingClientRect();
    hlPicker.style.left=rect.left+'px';
    hlPicker.style.top=(rect.bottom+6)+'px';
    hlPicker.classList.add('on');
  };
  window.szApplyHl=function(color){
    szHideHlPicker();szHideBar();
    if(!savedRange) return;
    applyAnnot(savedRange,'hl','',uid(),color);
    window.getSelection().removeAllRanges();
  };

  /* ---- コメントツールチップ（ホバー表示） ---- */
  var TIPBOXK='szTipBox_'+location.pathname;
  function tipBoxAll(){try{return JSON.parse(localStorage.getItem(TIPBOXK)||'{}');}catch(e){return {};}}
  function tipBoxGet(aid){var a=tipBoxAll();return a[aid]||null;}
  function tipBoxSet(aid,o){var a=tipBoxAll();a[aid]=o;try{localStorage.setItem(TIPBOXK,JSON.stringify(a));}catch(e){}}

  function applyAnnot(range,type,comment,id,color,level){

    var _ctx=szCtxOf(occRoot,range,selText);

    mark.className='sz-'+type;
    mark.dataset.aid=id;
    if(comment) mark.dataset.comment=comment;
    if(color){ mark.style.background=color; mark.dataset.hlc=color; }
    if(type==='size') mark.dataset.lv=level||'sm';

    var ok=false;
    try{range.surroundContents(mark);ok=true;}
    catch(e1){
      // クロスバウンダリ（太字・タイトル内ボタン等）: テキストノードごとに個別ラップ
      var tni=szTextNodesInRange(range);
      if(tni.length>0){
        tni.forEach(function(ni,idx){
          var m=(idx===0)?mark:document.createElement('mark');
          if(idx>0){m.className='sz-'+type;m.dataset.aid=id;if(comment)m.dataset.comment=comment;if(color){m.style.background=color;m.dataset.hlc=color;}if(type==='size')m.dataset.lv=level||'sm';}

      }
    }
    if(!ok) return;

    if(type==='cm'&&comment) addCmtIcon(mark,comment);
    if(mark.closest&&mark.closest('.sz-note,.sz-shape')){if(window.szSaveNoteOf)window.szSaveNoteOf(mark);return;}
    /* 行間挿入ブロック内の注釈は szA_ ではなくブロックのHTMLとして保存（単一の保存先）。

    if(mark.closest&&mark.closest('.szins-ed')){if(window.szInsPersist)window.szInsPersist();return;}
    db.push({uid:id,panelId:panelId,parentAid:parentAid,selText:selText,ctxBefore:ctxBefore,ctxAfter:ctxAfter,occ:occ,type:type,comment:comment,color:color||'',level:(type==='size'?(level||'sm'):'')});

  /* ---- クロスバウンダリ対応: range 内の選択テキストノードを列挙 ---- */
  function szTextNodesInRange(range){
    var sn=range.startContainer,en=range.endContainer,so=range.startOffset,eo=range.endOffset;
    if(sn===en&&sn.nodeType===3) return [{n:sn,s:so,e:eo}];

    while((node=w.nextNode())){
      if(node===sn){started=true;list.push({n:node,s:so,e:node.nodeValue.length});}
      else if(node===en){list.push({n:node,s:0,e:eo});break;}
      else if(started){list.push({n:node,s:0,e:node.nodeValue.length});}
    }
    return list.filter(function(x){return x.e>x.s;});
