</div><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:5px;padding:4px 8px;color:#475569;font-weight:bold">非公開＋会計参与設置</div><div style="color:#64748b">→ 監査役不要</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">例外は「<b>公開会社でない</b>会計参与設置会社」のみ。公開会社であれば例外なし。</div></div></div></div>',

3: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 役員の任期・解任（Q3直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 監査役を解任するのに必要な株主総会決議は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">普通決議</button><button class="chk30-opt" data-c="1">特別決議</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">取締役の解任</div><div style="color:#14532d;margin-top:2px;line-height:1.4">普通決議<br>（過半数）</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">監査役の解任</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">特別決議<br>（2/3以上）← より厳格</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">監査役の独立性を守るため、解任は<b>特別決議</b>（2/3以上）が必要。取締役は普通決議（過半数）。監査役の方が解任要件が厳しい。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 非公開会社で監査役の任期を10年に伸長できるか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">できる（定款で最大10年）</button><button class="chk30-opt" data-c="0">できない（4年固定・短縮も不可）</button></div><div class="chk30-ans"><div style="display:flex;flex-direction:column;gap:3px;margin-top:4px;font-size:10px"><div style="display:flex;align-items:center;gap:4px"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:3px 8px;font-weight:bold">監査役の任期</div><div style="color:#64748b">= 原則 4年</div></div><div style="display:flex;align-items:center;gap:4px"><div style="background:#fbbf24;color:#fff;border-radius:5px;padding:3px 8px;font-weight:bold">短縮</div><div style="color:#ef4444">→ 定款でも不可</div></div><div style="display:flex;align-items:center;gap:4px"><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:3px 8px;font-weight:bold">伸長</div><div style="color:#15803d">→ 非公開会社なら最大10年まで可</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">短縮は不可・伸長は非公開会社で最大10年まで可。取締役も同様に非公開会社では10年まで伸長可。</div></div></div></div>',

4: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 監査等委員会設置会社（Q4直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 監査等委員会設置会社に「監査役」を置けるか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">置ける</button><button class="chk30-opt" data-c="1">置けない（禁止）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px;font-size:10px"><div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">監査役会<br>設置会社</div><div style="color:#1e40af;margin-top:2px;font-size:9px">監査役あり</div></div><div style="background:#fdf4ff;border:2px solid #c084fc;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#7e22ce">監査等委員会<br>設置会社</div><div style="color:#6b21a8;margin-top:2px;font-size:9px">監査役 <b>置けない</b></div></div><div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#dc2626">指名委員会等<br>設置会社</div><div style="color:#7f1d1d;margin-top:2px;font-size:9px">監査役 <b>置けない</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">監査等委員会設置会社・指名委員会等設置会社は監査役を<b>置くことができない</b>（会社法327条4項）。監査等委員会が監査役機能を担うため両立不可。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 監査等委員である取締役の任期と短縮可否は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">2年・短縮不可</button><button class="chk30-opt" data-c="0">1年・短縮可</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fdf4ff;border:2px solid #c084fc;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#7e22ce">監査等委員<br>取締役</div><div style="color:#6b21a8;margin-top:2px;line-height:1.4">任期 <b>2年</b><br>定款でも短縮不可</div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">それ以外の<br>取締役</div><div style="color:#1e40af;margin-top:2px;line-height:1.4">任期 <b>1年</b><br>（短縮も可）</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">監査等委員は独立性確保のため任期2年・定款でも短縮不可。一般取締役の1年（短縮可）と対比して覚える。</div></div></div></div>',

5: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 株主提案権（Q5直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 株主提案権の行使に必要な持株要件は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">5%以上または500個以上</button><button class="chk30-opt" data-c="1">3%以上または300個以上</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#3a9bd5;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">3%以上</div><div style="color:#64748b">または</div><div style="background:#3a9bd5;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">300個以上</div><div style="color:#64748b">を</div><div style="background:#1a3a5c;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">6か月間</div><div style="color:#64748b">継続保有</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">「5%」は少数株主権でよく使われる数字だが株主提案権は「<b>3%</b>または300個」（6か月継続）。紛らわしい数字なので正確に覚える。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 一人の株主が提案できる議案の最大数は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">5個</button><button class="chk30-opt" data-c="1">10個（令和元年改正）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">旧：上限なし</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">令和元年改正：上限10個</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">令和元年改正で<b>一人あたり最大10個</b>の議案数上限が導入された。乱用防止のための改正。「5個」は誤りで10個が正解。</div></div></div></div>',

6: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 自己株式（Q6直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 自己株式の議決権・配当の扱いは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">議決権なし・配当あり</button><button class="chk30-opt" data-c="1">議決権も配当もなし</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">議決権</div><div style="font-size:16px;color:#dc2626;font-weight:bold">✗</div><div style="color:#7f1d1d;font-size:9px">なし</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">配当</div><div style="font-size:16px;color:#dc2626;font-weight:bold">✗</div><div style="color:#7f1d1d;font-size:9px">なし</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">自己株式は議決権も配当もどちらもなし（会社法308条2項・453条）。「議決権なし・配当あり」という半端な選択肢は完全な誤り。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 取締役会決議による自己株式取得の期間上限は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">6か月</button><button class="chk30-opt" data-c="1">1年</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">✗ 6か月</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">○ 1年</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">取締役会決議の自己株式取得期間の上限は<b>1年</b>（会社法157条2項）。「6か月」と混同しやすいため正確に覚える。</div></div></div></div>',

7: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 事業譲渡と吸収合併（Q7直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 吸収合併の効力はいつ発生する？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">合併の登記をした日</button><button class="chk30-opt" data-c="1">合併契約で定めた効力発生日</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#fbbf24;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">合併契約</div><div style="color:#64748b">→ 定めた</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">効力発生日</div><div style="color:#64748b">に効力発生</div></div><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">✗ 登記日</div><div style="color:#94a3b8">← これは誤り</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">吸収合併の効力は「合併契約で定めた効力発生日」に生じる（会社法749条）。登記は効力発生後に行う手続き。「登記日に効力発生」は頻出の誤り選択肢。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 消滅会社（吸収合併される側）の債権者保護手続は必要か？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">不要（存続会社のみ）</button><button class="chk30-opt" data-c="1">必要（存続・消滅双方で必要）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">存続会社</div><div style="color:#14532d;margin-top:2px">債権者保護<br>手続 必要</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">消滅会社</div><div style="color:#14532d;margin-top:2px">債権者保護<br>手続 <b>必要</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">消滅会社も<b>必要</b>（会社法789条）。合併後に消える会社の債権者も保護される必要があるため、存続・消滅双方で手続きを行う。</div></div></div></div>',

8: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 特許権の実施権（Q8直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 通常実施権を許諾した後、特許権者は実施できる？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">できない（権利者も制限される）</button><button class="chk30-opt" data-c="1">できる（非独占なので制限なし）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">通常実施権</div><div style="color:#14532d;margin-top:2px;line-height:1.4">非独占<br>→ 権利者も<b>実施可</b><br>複数人に許諾可</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">専用実施権</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">独占<br>→ 権利者も<b>実施不可</b><br>（範囲内は）</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6"><b>通常実施権</b>は非独占的許諾。特許権者自身は引き続き実施可能。<b>専用実施権</b>は独占的なので権利者も実施できなくなる。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 特許権の「移転」に「登録」は何の要件？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">対抗要件（第三者への対抗）</button><button class="chk30-opt" data-c="1">効力発生要件（登録しないと無効）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">特許権の移転</div><div style="color:#14532d;margin-top:2px;line-height:1.4">登録 = <b>効力発生</b>要件<br>登録なし→移転無効</div></div><div style="background:#e2e8f0;border:2px solid #94a3b8;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#475569">一般の動産・債権</div><div style="color:#334155;margin-top:2px;line-height:1.4">登録 = 対抗要件<br>合意で効力発生</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">特許権の移転は「登録しなければ効力を生じない」（特許法98条）。一般的な財産は合意で効力発生・登録は対抗要件にすぎないが、特許権は登録が<b>効力発生要件</b>。</div></div></div></div>',

9: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 特許権vs実用新案権（Q9直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 実用新案権で「方法」は保護されるか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">される（物品も方法も両方）</button><button class="chk30-opt" data-c="1">されない（物品のみ）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">特許権</div><div style="color:#14532d;margin-top:2px;line-height:1.4"><b>物品</b>の発明<br><b>方法</b>の発明<br>両方OK</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">実用新案権</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">物品の<b>形状・構造</b><br>・組み合わせのみ<br>方法 <b>✗</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">実用新案は「物品の形状・構造・組み合わせ」に関する考案のみ保護。製造方法等の「方法」は対象外。特許は物品も方法も両方保護される。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 実用新案権の存続期間の起算点と年数は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">登録日から10年</button><button class="chk30-opt" data-c="1">出願日から10年</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">実用新案権</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4"><b>出願日</b>から<br><b>10年</b></div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">特許権</div><div style="color:#14532d;margin-top:2px;line-height:1.4"><b>出願日</b>から<br><b>20年</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">起算点は両方とも「<b>出願日</b>」（登録日ではない）。存続期間：実用新案=10年、特許=20年。「技術評価書の交付日から」は誤り。</div></div></div></div>',

10: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 商標の先使用権（Q10直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 先使用権の基準時は「出願時」と「登録時」のどちら？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">登録時（登録されてから判断）</button><button class="chk30-opt" data-c="1">出願時（出願の時点が基準）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px;font-weight:bold">出願</div><div style="color:#94a3b8">→ ← ここが基準</div><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px;font-weight:bold">審査期間</div><div style="color:#94a3b8">→</div><div style="background:#e2e8f0;color:#475569;border-radius:5px;padding:4px 8px;font-weight:bold">登録</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">先使用権の基準時は「他人の商標<b>出願</b>時点」（商標法32条）。出願から登録まで時間がかかるため、登録時ではなく出願時を基準とすることで使用者の利益を保護する。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 先使用権で必要な認知度は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">何人かの業者の間に知られている</button><button class="chk30-opt" data-c="1">需要者の間に広く認識されている</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">✗ 業界内</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">何人かの業者<br>→ 低い認知度<br>→ 不十分</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">○ 需要者</div><div style="color:#14532d;margin-top:2px;line-height:1.4">需要者の間に<br><b>広く認識</b><br>→ 高いハードル</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">「需要者の間に<b>広く認識</b>されている」という高いハードルが必要。業界内の少数の業者が知っているだけでは不十分。</div></div></div></div>',

11: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 不使用取消審判（Q11直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 不使用取消審判の「継続不使用」の期間は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">5年以上</button><button class="chk30-opt" data-c="1">3年以上</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">✗ 5年</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">○ 3年</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">継続して<b>3年以上</b>日本国内で使用していない場合、誰でも不使用取消審判を請求できる（商標法50条）。「5年」と混同しやすいので注意。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 外国での使用は日本の不使用取消を防げる？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">防げる（外国での使用でもOK）</button><button class="chk30-opt" data-c="1">防げない（日本国内限定）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">外国での使用</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">日本の不使用<br>取消を<b>防げない</b></div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">日本国内での使用</div><div style="color:#14532d;margin-top:2px;line-height:1.4">3年以内なら<br>取消を<b>防げる</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">不使用取消の判断は「<b>日本国内</b>での使用」のみ。海外でいくら使っていても日本での不使用取消を防ぐことはできない。</div></div></div></div>',

12: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 産業財産権4種の制度比較（Q12直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 産業財産権で「更新」制度があるのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">商標権と実用新案権</button><button class="chk30-opt" data-c="1">商標権のみ</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#15803d;font-size:9px">商標権</div><div style="color:#15803d;font-size:14px">✓</div><div style="color:#14532d;font-size:9px">更新あり</div></div><div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#dc2626;font-size:9px">特許権</div><div style="color:#dc2626;font-size:14px">✗</div><div style="color:#7f1d1d;font-size:9px">なし</div></div><div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#dc2626;font-size:9px">実用新案</div><div style="color:#dc2626;font-size:14px">✗</div><div style="color:#7f1d1d;font-size:9px">なし</div></div><div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#dc2626;font-size:9px">意匠権</div><div style="color:#dc2626;font-size:14px">✗</div><div style="color:#7f1d1d;font-size:9px">なし</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">更新制度があるのは<b>商標権のみ</b>（10年ごとに更新可能）。実用新案権は出願日から10年の固定期間で更新なし。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 産業財産権で「出願公開」制度があるのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">特許権と実用新案権</button><button class="chk30-opt" data-c="1">特許権のみ</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef9c3;border:2px solid #fbbf24;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#92400e">出願公開</div><div style="color:#78350f;margin-top:2px;line-height:1.4">出願から<br>18か月後に自動公開<br>→ <b>特許のみ</b></div></div><div style="background:#e2e8f0;border:1px solid #94a3b8;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#475569">その他の権利</div><div style="color:#334155;margin-top:2px;line-height:1.4">登録後に公報発行<br>（出願公開ではない）</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">「出願公開」制度（出願から18か月後の自動公開）は<b>特許のみ</b>。他の権利も公報は発行されるが、それは登録後の公報であり特許の「出願公開」とは異なる。</div></div></div></div>',

13: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 国際条約（Q13直結）</div><div class="chk30-q"><div class="chk30-qt">Q. パリ条約の「意匠・商標」の優先期間は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">12か月</button><button class="chk30-opt" data-c="1">6か月</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">特許・実用新案</div><div style="font-size:20px;font-weight:bold;color:#1d4ed8">12か月</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">意匠・商標</div><div style="font-size:20px;font-weight:bold;color:#15803d">6か月</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">パリ条約優先期間：特許・実用新案＝<b>12か月</b>、意匠・商標＝<b>6か月</b>。「特実12・意商6」と語呂で覚える。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. マドリッドプロトコル（商標）の出願経路は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">WIPO（国際事務局）に直接出願</button><button class="chk30-opt" data-c="1">自国特許庁（日本ならJPO）を経由</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">マドリッド<br>（商標）</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">自国官庁経由<br><b>必須</b></div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">ハーグ<br>（意匠）</div><div style="color:#14532d;margin-top:2px;line-height:1.4">WIPO直接<br><b>可能</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">マドリッド（商標）は自国官庁経由<b>必須</b>。ハーグ（意匠）はWIPO直接出願も可能。逆に覚えがちなので注意。</div></div></div></div>',

14: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 不正競争防止法・営業秘密（Q14直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 営業秘密の3要件の正しい組み合わせは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">秘密管理性・有用性・独自性</button><button class="chk30-opt" data-c="1">秘密管理性・有用性・非公知性</button></div><div class="chk30-ans"><div style="display:flex;gap:5px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px 8px;text-align:center;flex:1"><div style="font-weight:bold;color:#15803d">① 秘密管理性</div><div style="color:#14532d;margin-top:2px;font-size:9px">管理されている</div></div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px 8px;text-align:center;flex:1"><div style="font-weight:bold;color:#15803d">② 有用性</div><div style="color:#14532d;margin-top:2px;font-size:9px">役に立つ情報</div></div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px 8px;text-align:center;flex:1"><div style="font-weight:bold;color:#15803d">③ 非公知性</div><div style="color:#14532d;margin-top:2px;font-size:9px">一般に知られていない</div></div></div><div style="font-size:10px;color:#854d0e;line-height:1.6;margin-top:6px;padding:6px 8px;background:#fefce8;border:1px solid #fde047;border-radius:5px">✗「独自性」は誤り！正解は「<b>非公知性</b>」（一般に知られていないこと）。これが最頻出の引っかけ選択肢。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 商品形態の模倣に対する保護期間（最初の販売日から）は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">5年</button><button class="chk30-opt" data-c="1">3年</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">✗ 5年</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">○ 3年</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">商品形態の模倣防止保護期間は「最初の販売日から<b>3年</b>」（不競法2条1項3号）。「5年」との混同に注意。</div></div></div></div>',

15: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 著作権（Q15直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 法人著作（職務著作）の保護期間は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">著作者の死後70年</button><button class="chk30-opt" data-c="1">公表後70年</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">法人著作</div><div style="color:#14532d;margin-top:2px;line-height:1.4"><b>公表後70年</b><br>（公表しなければ<br>創作後70年）</div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">個人著作</div><div style="color:#1e40af;margin-top:2px;line-height:1.4"><b>死後70年</b><br>（著作者の<br>死後から）</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">法人著作の保護期間は<b>公表後70年</b>。「死後70年」は個人著作。法人は死なないので「公表後」が起算点になる。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 著作権はいつ発生する？登録は必要？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">公表した時点で発生・登録が必要</button><button class="chk30-opt" data-c="1">創作と同時に自動発生・登録不要</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">創作</div><div style="color:#94a3b8;font-size:16px">→</div><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">即・自動発生</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">著作権は「<b>創作と同時に自動発生</b>」（無方式主義）。登録不要・公表も不要。未公表の著作物も保護される。産業財産権（登録が権利発生要件）と異なる。</div></div></div></div>',

16: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 意匠法（令和元年改正）（Q16直結）</div><div class="chk30-q"><div class="chk30-qt">Q. ゲーム画像など「記録媒体の画像」は意匠法で保護される？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">保護されない（従来通り）</button><button class="chk30-opt" data-c="1">保護される（令和元年改正で追加）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">改正前：保護✗</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">令和元年改正：保護○</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">令和元年改正で「画像意匠」が追加。記録媒体に固定されたゲーム画像・UIデザインなども<b>保護対象</b>に。また建築物・内装の意匠も同改正で追加された。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 意匠権の存続期間は？（令和元年改正後）</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">登録日から20年</button><button class="chk30-opt" data-c="1">出願日から25年</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">改正前（旧）</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">登録日から<br>20年</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">改正後（現行）</div><div style="color:#14532d;margin-top:2px;line-height:1.4"><b>出願日</b>から<br><b>25年</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">令和元年改正で「登録日から20年」→「<b>出願日から25年</b>」に変更。起算点も年数も変わった。特許・実用新案と同様に出願日が起算点になった。</div></div></div></div>',

17: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 民法上の相殺（Q17直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 相殺で弁済期の到来が必要なのは「自働」と「受働」のどちら？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">両方とも弁済期到来が必要</button><button class="chk30-opt" data-c="1">自働のみ（受働は未到来でも可）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">自働債権</div><div style="color:#14532d;margin-top:2px;line-height:1.4">相殺する側の債権<br>→ 弁済期<b>到来</b>必要</div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">受働債権</div><div style="color:#1e40af;margin-top:2px;line-height:1.4">される側の債権<br>→ 未到来でも<b>可</b><br>（期限の利益放棄）</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">受働債権（相手の債権）が未到来でも相殺できる理由：相手の期限の利益を放棄させる形で相殺が認められるため（民法505条1項ただし書）。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 不法行為による損害賠償請求権を「受働」債権として相殺できるか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">できる</button><button class="chk30-opt" data-c="1">できない（受働にのみ禁止）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">受働債権 ✗</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">不法行為債権を<br>受働=禁止<br>（民法509条）</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">自働債権 ○</div><div style="color:#14532d;margin-top:2px;line-height:1.4">不法行為債権を<br>自働として相殺<br>=制限なし</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">不法行為債権を「受働」とする相殺は禁止（被害者が現金で賠償を受ける利益を保護）。「自働」として使うことは禁止されていない。</div></div></div></div>',

18: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 消滅時効（Q18直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 消滅時効は期間が経過すれば自動的に効力が生じる？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">自動的に効力が生じる</button><button class="chk30-opt" data-c="1">援用が必要（自動消滅しない）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#fbbf24;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">時効期間経過</div><div style="color:#94a3b8;font-size:16px">+</div><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">援用（意思表示）</div><div style="color:#94a3b8;font-size:16px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">時効完成</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">時効は「<b>援用</b>」（時効の利益を受けるという意思表示）がなければ効力が生じない（民法145条）。期間が経過しただけでは時効の効果は確定しない。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 「債務の承認」は時効にどんな効果をもたらす？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">完成猶予（進行を一時止める）</button><button class="chk30-opt" data-c="1">更新（ゼロリセットして再スタート）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">債務の承認</div><div style="color:#94a3b8;font-size:16px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">更新</div><div style="color:#64748b">= ゼロリセット</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">「更新」はゼロリセット（その時点から新たに時効が進行）。「完成猶予」は一時停止（猶予期間後に再開）。債務の承認は<b>更新事由</b>（民法152条）。</div></div></div></div>',

19: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 債権譲渡（Q19直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 譲渡禁止特約がある債権を譲渡したら有効・無効？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">無効（特約が優先）</button><button class="chk30-opt" data-c="1">有効（令和2年改正）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">旧法：無効</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">令和2年改正：有効</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">令和2年改正民法466条：譲渡禁止特約があっても債権の譲渡は<b>有効</b>。ただし悪意・重過失の譲受人には特約を対抗できる。旧法との違いが頻出。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 債権譲渡において「債務者の承諾」は何の要件？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">効力発生要件（承諾なしでは無効）</button><button class="chk30-opt" data-c="1">対抗要件（承諾なしでも譲渡は有効）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">譲渡の効力</div><div style="color:#14532d;margin-top:2px;line-height:1.4">譲渡人と<br>譲受人の<b>合意</b>で<br>発生</div></div><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">債務者承諾</div><div style="color:#1e40af;margin-top:2px;line-height:1.4">または通知<br>= <b>対抗要件</b><br>（第三者へ対抗）</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">債権譲渡は当事者間の合意で成立。債務者への通知または承諾は<b>対抗要件</b>。「承諾なしでは無効」は誤り。</div></div></div></div>',

20: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 相続（Q20直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 遺言による遺産分割禁止の最長期間は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">10年以内</button><button class="chk30-opt" data-c="1">5年以内</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">✗ 10年</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">○ 5年</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">遺言による遺産分割禁止は「相続開始時から<b>5年を超えない期間</b>」（民法908条1項）。「10年」と誤りやすい超頻出の引っかけ。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 相続放棄をした者の子は「代襲相続」できるか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">できる（子の権利を保護）</button><button class="chk30-opt" data-c="1">できない（放棄は代襲原因でない）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#15803d;font-size:9px">死亡</div><div style="color:#14532d;font-size:14px">✓</div><div style="color:#14532d;font-size:9px">代襲あり</div></div><div style="background:#f0fdf4;border:1px solid #86efac;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#15803d;font-size:9px">廃除・欠格</div><div style="color:#15803d;font-size:14px">✓</div><div style="color:#14532d;font-size:9px">代襲あり</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:5px;padding:5px;text-align:center"><div style="font-weight:bold;color:#dc2626;font-size:9px">相続放棄</div><div style="color:#dc2626;font-size:14px">✗</div><div style="color:#7f1d1d;font-size:9px">代襲なし</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">相続放棄をした者は「初めから相続人でなかった」とみなされる（民法939条）。代襲相続は死亡・廃除・欠格の場合のみで、放棄は代襲原因にならない。</div></div></div></div>',

21: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 会社更生・民事再生（Q21直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 民事再生計画案の可決要件は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">議決権総額の2/3以上</button><button class="chk30-opt" data-c="1">議決権総額の1/2超かつ出席の過半数</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">会社更生</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">厳格<br>更生債権者: 2/3<br>更生担保権者: 3/4<br>株主: 2/3</div></div><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">民事再生</div><div style="color:#14532d;margin-top:2px;line-height:1.4">緩やか<br>総額の<b>1/2超</b><br>かつ<br>出席の<b>過半数</b></div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">民事再生：①議決権総額の1/2超 かつ ②出席した議決権者の過半数（民事再生法172条の3）。会社更生より要件が緩い。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 民事再生手続で「別除権（抵当権等）」は手続きで制限される？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">制限される（手続き内で処理）</button><button class="chk30-opt" data-c="1">制限されない（手続き外で行使可）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">民事再生</div><div style="color:#14532d;margin-top:2px;line-height:1.4">別除権<br>= 手続き<b>外</b>で<br>自由に行使可</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">会社更生</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">更生担保権<br>= 手続き<b>内</b>で<br>処理（制限あり）</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">民事再生では別除権（抵当権等）は手続き外で自由に行使可能。会社更生では「更生担保権」として手続き内で制限される。逆に覚えがちなので注意。</div></div></div></div>',

22: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 独占禁止法（Q22直結）</div><div class="chk30-q"><div class="chk30-qt">Q. カルテル・入札談合は独禁法上の何という類型？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">不公正な取引方法</button><button class="chk30-opt" data-c="1">不当な取引制限</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">不当な取引制限</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">カルテル<br>入札談合</div></div><div style="background:#f5f3ff;border:2px solid #a78bfa;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#7c3aed">不公正な取引方法</div><div style="color:#6d28d9;margin-top:2px;line-height:1.4">優越的地位の濫用<br>再販価格拘束<br>不当廉売</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">カルテル・談合は「<b>不当な取引制限</b>」（独禁法2条6項）。「不公正な取引方法」は別の類型（優越的地位の濫用等）。この2つの混同が頻出の誤り。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. リニエンシー（課徴金減免）制度は優越的地位の濫用にも適用される？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">される（全ての違反行為が対象）</button><button class="chk30-opt" data-c="1">されない（不当な取引制限のみ対象）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">対象</div><div style="color:#64748b">：カルテル・談合（不当な取引制限）</div></div><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">対象外</div><div style="color:#64748b">：優越的地位の濫用（不公正な取引方法）</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">リニエンシーは<b>不当な取引制限（カルテル・談合）のみ</b>が対象。優越的地位の濫用等の不公正な取引方法は対象外。</div></div></div></div>',

23: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 景品表示法・消費者契約法（Q23直結）</div><div class="chk30-q"><div class="chk30-qt">Q. ステルスマーケティング（ステマ）は景品表示法の規制対象か？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">対象外（規制されていない）</button><button class="chk30-opt" data-c="1">対象（令和5年から規制）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">令和5年以前：規制外</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">令和5年10月：規制対象に追加</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">令和5年10月施行の景品表示法改正により<b>ステマ（自己の広告である旨を隠した表示）が規制対象</b>に追加された。最新改正の知識として重要。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 消費者契約法で「不実告知」による契約はどうなる？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">当然に無効</button><button class="chk30-opt" data-c="1">消費者が取消できる</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#f59e0b;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">不実告知等<br>不当勧誘</div><div style="color:#94a3b8;font-size:16px">→</div><div style="background:#3b82f6;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">消費者が「取消」可能</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">消費者契約法4条：不当勧誘による契約は「<b>取消</b>」できる（自動的に「無効」になるのではない）。取消は追認も可能、遡及効あり。</div></div></div></div>',

24: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ フリーランス保護法（取適法）（Q24直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 正当な理由があれば委託代金を減額できるか？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">できる（正当理由があれば許可）</button><button class="chk30-opt" data-c="1">できない（理由問わず禁止）</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10px;flex-wrap:wrap"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">正当な理由あり</div><div style="color:#94a3b8;font-size:16px">→</div><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">それでも禁止</div></div><div style="font-size:10px;color:#854d0e;line-height:1.6;margin-top:6px;padding:6px 8px;background:#fefce8;border:1px solid #fde047;border-radius:5px">✗「正当な理由があれば減額可」は誤り。委託代金の一方的減額は理由の如何を問わず<b>禁止</b>（取適法5条1項3号）。下請法と同様の考え方。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. 特定業務委託事業者の支払期日の上限は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">受領日から30日以内</button><button class="chk30-opt" data-c="1">受領日から60日以内</button></div><div class="chk30-ans"><div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:10px"><div style="background:#ef4444;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">✗ 30日</div><div style="color:#94a3b8;font-size:14px">→</div><div style="background:#22c55e;color:#fff;border-radius:5px;padding:4px 8px;font-weight:bold">○ 60日以内</div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">物品受領日・役務提供日から<b>60日以内</b>に支払期日を設定する義務（法5条2項）。「30日」は下請法で使われる数字（支払条件通知）と混同しやすい。</div></div></div></div>',

25: '<div class="chk30"><div class="chk30-title">&#9889; チェック ─ 英文契約条項（Q25直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 英文契約の"AS IS"はどういう意味？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">品質について一切の保証を行う</button><button class="chk30-opt" data-c="1">現状有姿・無保証（保証なし）</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#f0fdf4;border:2px solid #86efac;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#15803d">AS IS の意味</div><div style="color:#14532d;margin-top:2px;line-height:1.4">現状有姿・<b>無保証</b><br>= 「あるがままで<br>保証しません」</div></div><div style="background:#fef2f2;border:2px solid #fca5a5;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#dc2626">間違いやすい解釈</div><div style="color:#7f1d1d;margin-top:2px;line-height:1.4">「一切の保証を<br>行う」<br>→ 真逆の意味</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">"AS IS" = 「現状のまま・保証なし」。売主が商品の品質等について<b>一切の保証を放棄</b>する文言。「保証する」の逆なので注意。</div></div></div><div class="chk30-q"><div class="chk30-qt">Q. Indemnification（補償）条項の目的は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="0">当事者間の損害賠償を定める</button><button class="chk30-opt" data-c="1">第三者クレームに対する費用補償を定める</button></div><div class="chk30-ans"><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px;font-size:10px"><div style="background:#eff6ff;border:2px solid #93c5fd;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#1d4ed8">Indemnification</div><div style="color:#1e40af;margin-top:2px;line-height:1.4"><b>第三者</b>からの<br>クレームに対し<br>相手方が補償</div></div><div style="background:#e2e8f0;border:1px solid #94a3b8;border-radius:6px;padding:6px;text-align:center"><div style="font-weight:bold;color:#475569">Damages</div><div style="color:#334155;margin-top:2px;line-height:1.4">当事者<b>間</b>の<br>損害賠償</div></div></div><div style="font-size:10px;color:#334155;line-height:1.6;margin-top:6px;padding:6px 8px;background:#f8fafc;border-radius:5px;border-left:3px solid #3b82f6">Indemnification：一方当事者が<b>第三者から</b>クレームを受けた場合、相手方が費用・損害を補償。当事者間の損害賠償（Damages）とは異なる。</div></div></div></div>'

  const k = q.kaisetsu;

  const titleHtml = `<div style="background:${catColor};padding:11px 16px;display:flex;align-items:center;gap:10px;border-radius:10px 10px 0 0;">

  const sec4=k.trap?`<div style="background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 6px 6px 0;padding:7px 11px;margin:8px 0;font-size:11px;line-height:1.65;color:#78350f;"><b style="color:#92400e;">🚧 つまずき：</b>${k.trap}</div>`:'';
  const sec7=`<div style="background:#f5f3ff;border:2px solid #a78bfa;border-radius:8px;padding:10px 14px;font-size:12px;color:#4c1d95;font-weight:700;line-height:1.7;margin-top:8px;">🔑 ${k.point}</div>`;

let currentCat = "all";
let filteredQs = [...QUESTIONS];
let currentIdx = 0;

/* ===== 進捗管理 ===== */
const STATUS_KEY = 'exam_status_法務2026_';

function getStatus(num) {
  try { return JSON.parse(localStorage.getItem(STATUS_KEY + num)) || {}; } catch(e) { return {}; }
}
function saveStatus(num, st) {
  localStorage.setItem(STATUS_KEY + num, JSON.stringify(st));
}

function toggleStatus(field) {
  const q = filteredQs[currentIdx];
  if (!q) return;
  const st = getStatus(q.num);
  st[field] = !st[field];
  saveStatus(q.num, st);
  updateStatusUI(q.num);
  updateBtnDots(q.num);
  refreshDashboard();
}

function setEval(level) {
  const q = filteredQs[currentIdx];
  if (!q) return;
  const st = getStatus(q.num);
  st.eval = (st.eval === level) ? null : level;
  saveStatus(q.num, st);
  updateStatusUI(q.num);
  updateBtnDots(q.num);
  refreshDashboard();
}

function updateStatusUI(num) {
  const st = getStatus(num);
  const kk = document.getElementById('kkBtn');
  const dn = document.getElementById('doneBtn');
  if (!kk || !dn) return;
  if (st.kk) {
    kk.textContent = '☑ 確認済';
    kk.style.cssText = 'border:none;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#3b82f6;color:#fff';
  } else {
    kk.textContent = '☐ 確認';
    kk.style.cssText = 'border:1px solid #cbd5e1;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#f8fafc;color:#64748b';
  }
  if (st.done) {
    dn.textContent = '☑ 完了';
    dn.style.cssText = 'border:none;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#22c55e;color:#fff';
  } else {
    dn.textContent = '☐ 完了';
    dn.style.cssText = 'border:1px solid #cbd5e1;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#f8fafc;color:#64748b';
  }
  const BASE_EVAL = 'border-radius:14px;padding:3px 9px;font-size:10px;cursor:pointer;font-weight:bold;transition:all .2s;';
  const EVAL_CFG = {
    must:  { id:'evalMust',  on:'background:#ef4444;color:#fff;border:none',          off:'background:#fef2f2;color:#94a3b8;border:1px solid #fecaca' },
    check: { id:'evalCheck', on:'background:#3b82f6;color:#fff;border:none',          off:'background:#f8fafc;color:#94a3b8;border:1px solid #dbeafe' },
    easy:  { id:'evalEasy',  on:'background:#22c55e;color:#fff;border:none',          off:'background:#f0fdf4;color:#94a3b8;border:1px solid #bbf7d0' }
  };
  Object.entries(EVAL_CFG).forEach(([level, cfg]) => {
    const btn = document.getElementById(cfg.id);
    if (btn) btn.style.cssText = BASE_EVAL + (st.eval === level ? cfg.on : cfg.off);
  });
}

function updateBtnDots(num) {
  const dots = document.getElementById('dots_' + num);
  if (!dots) return;
  const st = getStatus(num);
  const EVAL_COLORS = { must:'#ef4444', check:'#3b82f6', easy:'#22c55e' };
  dots.innerHTML = '';
  const d1 = document.createElement('div');
  d1.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.kk ? '#3b82f6' : '#e2e8f0');
  const d2 = document.createElement('div');
  d2.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.done ? '#22c55e' : '#e2e8f0');
  const d3 = document.createElement('div');
  d3.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.eval ? EVAL_COLORS[st.eval] : '#e2e8f0');
  dots.appendChild(d1);
  dots.appendChild(d2);
  dots.appendChild(d3);
}

function refreshDashboard() {
  const targetQs = (typeof currentCat !== 'undefined' && currentCat !== 'all') ? filteredQs : QUESTIONS;
  const isFiltered = targetQs.length < QUESTIONS.length;
  let kkCount = 0, doneCount = 0, mustCount = 0, chkCount = 0, easyCount = 0;
  const cells = document.getElementById('dashCells');
  if (cells) cells.innerHTML = '';
  const EVAL_BORDER = { must:'#ef4444', check:'#3b82f6', easy:'#22c55e' };
  const gridQs = isFiltered ? targetQs : QUESTIONS;
  gridQs.forEach(q => {
    const st = getStatus(q.num);
    const inScope = !isFiltered || targetQs.indexOf(q) >= 0;
    if (inScope && st.kk) kkCount++;
    if (inScope && st.done) doneCount++;
    if (inScope && st.eval === 'must') mustCount++;
    if (inScope && st.eval === 'check') chkCount++;
    if (inScope && st.eval === 'easy') easyCount++;
    if (cells) {
      const cell = document.createElement('div');
      const color = st.done ? '#4ade80' : st.kk ? '#93c5fd' : '#e2e8f0';
      const textColor = st.done ? '#14532d' : st.kk ? '#1e40af' : '#64748b';
      const evalBorder = st.eval ? '3px solid ' + EVAL_BORDER[st.eval] : '3px solid transparent';
      cell.style.cssText = 'background:' + color + ';color:' + textColor + ';border-radius:6px;padding:4px 2px;text-align:center;font-size:10px;font-weight:bold;cursor:pointer;transition:all .2s;border-bottom:' + evalBorder;
      cell.textContent = q.btnLabel || q.num;
      const evalLabel = st.eval === 'must' ? ' [必ず確認]' : st.eval === 'check' ? ' [確認]' : st.eval === 'easy' ? ' [できれば]' : '';
      cell.title = (q.numDisplay || 'Q'+q.num) + ' ' + q.cat + (st.kk ? ' 確認済' : '') + (st.done ? ' 完了' : '') + evalLabel;
      cell.onclick = () => {
        const fi = filteredQs.indexOf(q);
        if (fi >= 0) { currentIdx = fi; render(); }
        else {
          currentCat = 'all';
          document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === 'all'));
          filteredQs = [...QUESTIONS];
          buildQList();
          currentIdx = QUESTIONS.indexOf(q);
          render();
        }
        document.getElementById('dashGrid').classList.remove('dash-open');
        window.scrollTo({top:0,behavior:'smooth'});
      };
      cells.appendChild(cell);
    }
  });

  const total = targetQs.length;
  const kkPct = total ? Math.round(kkCount/total*100) : 0;
  const donePct = total ? Math.round(doneCount/total*100) : 0;
  const el = id => document.getElementById(id);
  const scopeLabel = isFiltered ? (currentCat + ' ') : '';
  if (el('dashKk')) el('dashKk').textContent = scopeLabel + '確認済 ' + kkCount + '/' + total;
  if (el('dashDone')) el('dashDone').textContent = scopeLabel + '完了 ' + doneCount + '/' + total;
  if (el('dashMust')) el('dashMust').textContent = '🔴 必ず確認 ' + mustCount + '/' + total;
  if (el('dashCheck2')) el('dashCheck2').textContent = '🔵 確認 ' + chkCount + '/' + total;
  if (el('dashEasy')) el('dashEasy').textContent = '🟢 できれば ' + easyCount + '/' + total;
  if (el('kkBar')) el('kkBar').style.width = kkPct + '%';
  if (el('doneBar')) el('doneBar').style.width = donePct + '%';
  if (el('kkPct')) el('kkPct').textContent = kkPct + '%';
  if (el('donePct')) el('donePct').textContent = donePct + '%';
  const titleEl = document.querySelector('#progressDash [style*="font-size:13px"]');
  if (titleEl) titleEl.textContent = isFiltered ? ('📋 ' + currentCat + ' の進捗') : '📋 進捗管理';
}

function buildQList() {
  const el = document.getElementById("qList");
  el.innerHTML = "";
  QUESTIONS.forEach((q, i) => {
    const btn = document.createElement("button");
    btn.className = "q-btn";
    btn.id = "qbtn_" + q.num;
    btn.textContent = q.btnLabel || q.num;
    btn.dataset.cat = q.cat;
    btn.dataset.idx = i;
    if (currentCat !== "all" && q.cat !== currentCat) btn.classList.add("hidden");
    btn.onclick = () => {
      const fi = filteredQs.indexOf(q);
      if (fi < 0) return;
      currentIdx = fi;
      render();
    };
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:2px";
    const dots = document.createElement("div");
    dots.id = "dots_" + q.num;
    dots.style.cssText = "display:flex;gap:2px;height:5px";
    wrap.appendChild(btn);
    wrap.appendChild(dots);
    el.appendChild(wrap);
    updateBtnDots(q.num);
  });
  refreshDashboard();
}

function render() {
  const q = filteredQs[currentIdx];
  if (!q) return;
  document.getElementById("qNum").textContent = q.numDisplay || ("第" + q.num + "問");
  const badge = document.getElementById("catBadge");
  badge.textContent = q.cat;
  badge.className = "cat-badge " + q.cat;
  document.getElementById("qText").innerHTML = q.text.replace(/\n/g, "<br>");
  const se = document.getElementById("qShiryou");
  if (q.shiryou) { se.style.display=""; se.innerHTML=q.shiryou; } else { se.style.display="none"; }
  const ul = document.getElementById("qChoices");
  const labs = ["ア","イ","ウ","エ"];
  ul.innerHTML = q.choices.map((c,i) => `<li><span class="cho-label">${labs[i]}</span>${c}</li>`).join("");
  document.getElementById("answerBox").style.display = "none";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("btnPrev").disabled = currentIdx === 0;
  document.getElementById("btnNext").disabled = currentIdx === filteredQs.length - 1;
  document.getElementById("qCount").textContent = (currentIdx+1) + " / " + filteredQs.length + "問";
  document.getElementById("progressBar").style.width = ((currentIdx+1)/filteredQs.length*100) + "%";
  document.querySelectorAll(".q-btn").forEach(btn => {
    btn.classList.toggle("current", parseInt(btn.dataset.idx) === QUESTIONS.indexOf(q));
  });
  updateStatusUI(q.num);
  refreshDashboard();
  window.scrollTo({top:0, behavior:'smooth'});
}

function injectChkLinks(qNum) {
  var ld = (typeof CHK_LINKS_DATA !== 'undefined') ? CHK_LINKS_DATA[qNum] : null;
  if (!ld) return;
  var qs = document.querySelectorAll('#answerBox .chk30-q');
  qs.forEach(function(el, i) {
    if (!ld[i] || !ld[i].length) return;
    var linkHtml = ld[i].map(function(lk){
      return '<a href="' + BASE105 + lk.f + '" target="_blank" style="color:#0284c7;font-weight:bold;text-decoration:none;background:#e0f2fe;padding:2px 9px;border-radius:10px;margin-right:4px;display:inline-block;">' + lk.l + '</a>';
    }).join('');

    /* ① 回答前から常時表示する参照リンク（.chk30-opts の直後に挿入） */
    var refDiv = document.createElement('div');
    refDiv.style.cssText = 'margin-top:7px;padding:4px 8px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;font-size:10px;';
    refDiv.innerHTML = '<span style="color:#0369a1;font-weight:bold;margin-right:4px;">📖 参照：</span>' + linkHtml;
    var opts = el.querySelector('.chk30-opts');
    if (opts && opts.nextSibling) {
      el.insertBefore(refDiv, opts.nextSibling);
    } else if (opts) {
      el.appendChild(refDiv);
    }

    /* ② 解答表示エリア内にも再掲（答えた後に確認しやすいよう） */
    var ansDiv = document.createElement('div');
    ansDiv.style.cssText = 'margin-top:6px;padding:4px 8px;background:#f0f9ff;border-radius:6px;font-size:10px;';
    ansDiv.innerHTML = '<span style="color:#0369a1;font-weight:bold;margin-right:4px;">📖 </span>' + linkHtml;
    var ans = el.querySelector('.chk30-ans');
    if (ans) ans.appendChild(ansDiv);
  });
}

function toggleAnswer() {
  const box = document.getElementById("answerBox");
  if (box.style.display === "none") {
    box.innerHTML = makeKaisetsuHtml(filteredQs[currentIdx]);
    box.style.display = "block";
    if (window.__szChk30Init) window.__szChk30Init();
    injectChkLinks(filteredQs[currentIdx].num);
  } else {
    box.style.display = "none";
  }
}

function move(dir) {
  currentIdx = Math.max(0, Math.min(filteredQs.length-1, currentIdx+dir));
  render();
}

document.querySelectorAll(".cat-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    currentCat = tab.dataset.cat;
    document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    filteredQs = currentCat==="all" ? [...QUESTIONS] : QUESTIONS.filter(q => q.cat===currentCat);
    currentIdx = 0;
    buildQList();
    render();
  });
});

buildQList();
render();
refreshDashboard();
</script>

<script>
(function(){
  'use strict';
  // 二重注入ガード：qz-memo が同一ファイルに2回挿入されても注釈システムは1回だけ初期化する。
  // 無いと mouseup リスナーが二重に付いてクリックでトグルが2回発火し「押しても表示されない」、
  // restoreAll も2回走って同一注釈を再ラップして入れ子になる。
  if(window.__SZ_MEMO_INIT__) return;
  window.__SZ_MEMO_INIT__=1;
  function szFileKey(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}var h=5381;for(var i=0;i<p.length;i++){h=((h*33)^p.charCodeAt(i))>>>0;}return h.toString(36);}
  /* 動的ページ用：window.__SZ_QKEY__() があれば保存キーに問題ごとの接尾辞を付ける（静的ページでは無害＝接尾辞なし） */
  function szQSuffix(){try{return (typeof window.__SZ_QKEY__==='function')?('_'+window.__SZ_QKEY__()):'';}catch(e){return '';}}
  function szCurKEY(){return 'szA_'+szFileKey()+szQSuffix();}
  var db=[];
  try{db=JSON.parse(localStorage.getItem(szCurKEY())||'[]');}catch(e){}
  function save(){try{localStorage.setItem(szCurKEY(),JSON.stringify(db));}catch(e){}}

  var bar=document.getElementById('sz-bar');
  var cmtPop=document.getElementById('sz-cmt-pop');
  var cmtTxt=document.getElementById('sz-cmt-txt');
  var cmtHead=document.getElementById('sz-cmt-head');
  var delPop=document.getElementById('sz-del-pop');
  var delEditBtn=document.getElementById('sz-del-edit-btn');
  var tip=document.getElementById('sz-cmt-tip');
  var tipBody=document.getElementById('sz-tip-body');
  var tipEditBtn=document.getElementById('sz-tip-edit-btn');
  var hlPicker=document.getElementById('sz-hl-picker');
  var savedRange=null, cmtCtx=null, tipTimer=null, tipTargetAid=null, delTarget=null, fbBarTarget=null, szShapeBarTarget=null;
  var fbBtn=document.getElementById('sz-bar-fb-btn');
  var alignBtn=document.getElementById('sz-bar-align-btn');
  /* モバイル：バーのボタンタップで選択が消えないよう mousedown をキャンセル */
  bar.addEventListener('mousedown',function(e){e.preventDefault();});

  /* ---- 既存の.fill-blank「空欄解除」状態の保存・復元 ---- */
  var FBKEY='szFB_'+szFileKey();
  var fbUn={}; try{fbUn=JSON.parse(localStorage.getItem(FBKEY)||'{}');}catch(e){}
  function fbSave(){try{localStorage.setItem(FBKEY,JSON.stringify(fbUn));}catch(e){}}
  function fbInit(){
    [].slice.call(document.querySelectorAll('.fill-blank,.blank')).filter(function(el){return !(el.closest&&el.closest('[id^="pre_"]'));}).forEach(function(el,i){
      el.setAttribute('data-fbidx',i);
      if(fbUn[i]) el.classList.add('sz-unblanked');
    });
  }
  // 既存の.fill-blankのクリック（答え表示トグル）を、長押し直後／空欄解除中は抑止する（元ノートのリスナーを編集せずキャプチャ段で割り込む）
  document.addEventListener('click',function(e){
    var fb=e.target.closest?e.target.closest('.fill-blank,.blank'):null;
    if(!fb) return;
    if(window.szSuppressFbClick){window.szSuppressFbClick=false;e.stopImmediatePropagation();e.preventDefault();return;}
    if(fb.classList.contains('sz-unblanked')){e.stopImmediatePropagation();e.preventDefault();}
  },true);
  // 長押し時のブラウザ標準コンテキストメニューを抑制（del-popを前面に出すため）
  document.addEventListener('contextmenu',function(e){
    if(e.target.closest&&e.target.closest('.fill-blank,.blank,mark.sz-blank,mark.sz-erase,mark.sz-ul,mark.sz-hl,mark.sz-cm')) e.preventDefault();
  });

  function uid(){return 'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

  function panelOf(el){
    /* 動的ページ用：window.__SZ_PANELS__（セレクタ）があれば、その要素もパネル扱いにして
       注釈をコンテナ単位にスコープする（例: 模試の #qText,#answerBox）。静的ページでは無害。 */
    var sel='.tab-panel,.tab-content';
    try{ if(window.__SZ_PANELS__) sel+=','+window.__SZ_PANELS__; }catch(e){}
    var p=el.closest?el.closest(sel):null;
    return p&&p.id?p.id:'body';
  }

  /* ---- 出現位置（occurrence index）で復元先を一意化 ----
     同一フレーズが複数あると「文脈付き検索」でも別の箇所に復元され得る。
     root配下のテキストを文書順に連結（marks内の文字も含め、sz-cm-icon と pre_ 配下は除外）
     し「root内で何番目の出現か」を保存・復元する。marks の有無で連結文字列は変わらないため
     復元順に依存せず安定する。 */
  function szTextStream(root){
    var nodes=[],full='';
    var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode:function(n){
        if(n.parentElement&&n.parentElement.closest('.sz-cm-icon')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('[id^="pre_"]')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('.row-hide-btn,.sec-hide-btn-row,.row-hidden-ph,.sec-hidden-ph,.tr-hidden-ph,.card-hide-all-btn,.sz-drag-handle,.sz-drag-line,.fz-h,.fz-ph,.fzm-ctrl,.fzm-ind')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var n; while((n=w.nextNode())){ nodes.push({node:n,start:full.length}); full+=n.nodeValue; }
    return {nodes:nodes,full:full};
  }
  function szLocate(stream,gpos,bias){
    /* 境界（gpos がノード末尾＝次ノード先頭に一致）で寄せ方を変える：
       start＝後ろのノードの offset0／end＝前のノードの offset len。
       これを誤ると <b>語</b> 等“語＝1テキストノード”の選択で a.node≠b.node になり復元が別の同一語へ流れる。 */
    var i,s,len;
    for(i=0;i<stream.nodes.length;i++){
      s=stream.nodes[i];len=s.node.nodeValue.length;
      if(bias==='end'){ if(gpos>s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
      else if(bias==='start'){ if(gpos>=s.start&&gpos<s.start+len) return {node:s.node,offset:gpos-s.start}; }
      else { if(gpos>=s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
    }
    for(i=0;i<stream.nodes.length;i++){ s=stream.nodes[i];len=s.node.nodeValue.length; if(gpos>=s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
    return null;
  }
  function szOccOf(root,node,offset,selText){
    if(!selText) return 0;
    var stream=szTextStream(root),gstart=-1;
    for(var i=0;i<stream.nodes.length;i++){ if(stream.nodes[i].node===node){ gstart=stream.nodes[i].start+offset; break; } }
    if(gstart<0) return 0;
    var occ=0,from=0,idx;
    while((idx=stream.full.indexOf(selText,from))!==-1){
      if(idx===gstart) break;
      if(idx<gstart) occ++;
      from=idx+selText.length;
    }
    return occ;
  }
  /* ---- 文脈を cross-node の stream.full から採取 ----
     旧実装は ctxBefore/ctxAfter を選択の開始/終了テキストノード“1個の中だけ”で 30字 slice していた。
     そのため <b>需要</b> のように語＝1ノードだと、開始は offset0／終了はノード末尾になり
     ctxBefore も ctxAfter も“空文字”になりやすい。空文脈だと szRankLocs が weak 判定で
     occ 近接だけに頼り、ページ内容が増減して occ がズレた次セッションで「同じ語の別の箇所」に
     誤着地する（＝コメント等が別の場所に飛ぶ）。復元側 szRankLocs は stream.full 上で前後を
     見るので、保存もノードをまたいだ stream.full から採れば対称になり、occ がズレても文脈で救える。 */
  function szCtxOf(root,range,selText){
    var s=szTextStream(root),gs=-1,ge=-1,i;
    for(i=0;i<s.nodes.length;i++){ if(s.nodes[i].node===range.startContainer){ gs=s.nodes[i].start+range.startOffset; break; } }
    for(i=0;i<s.nodes.length;i++){ if(s.nodes[i].node===range.endContainer){ ge=s.nodes[i].start+range.endOffset; break; } }
    if(gs<0||ge<0){ // stream に乗らない（SVG等）→ 旧来の単一ノード採取にフォールバック
      var cb=range.startContainer.nodeType===3?range.startContainer.nodeValue.slice(Math.max(0,range.startOffset-30),range.startOffset):'';
      var ca=range.endContainer.nodeType===3?range.endContainer.nodeValue.slice(range.endOffset,range.endOffset+30):'';
      return {cb:cb,ca:ca};
    }
    return {cb:s.full.slice(Math.max(0,gs-30),gs), ca:s.full.slice(ge,ge+30)};
  }
  function szFindByOcc(root,selText,occ){
    if(!selText) return null;
    var stream=szTextStream(root),seen=0,from=0,idx;
    while((idx=stream.full.indexOf(selText,from))!==-1){
      if(seen===occ){
        var a=szLocate(stream,idx,'start'),b=szLocate(stream,idx+selText.length,'end');
        if(a&&b&&a.node===b.node) return {node:a.node,offset:a.offset,end:b.offset};
        return null;
      }
      seen++; from=idx+selText.length;
    }
    return null;
  }
  function szFindByContext(root,ann,scoped){
    var walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode:function(n){
        if(n.parentElement&&n.parentElement.closest('.sz-cm-icon')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('[id^="pre_"]')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('.row-hide-btn,.sec-hide-btn-row,.row-hidden-ph,.sec-hidden-ph,.tr-hidden-ph,.card-hide-all-btn,.sz-drag-handle,.sz-drag-line,.fz-h,.fz-ph,.fzm-ctrl,.fzm-ind')) return NodeFilter.FILTER_REJECT;
        if(!scoped&&n.parentElement&&n.parentElement.closest('mark[data-aid]')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var node;
    while((node=walker.nextNode())){
      var txt=node.nodeValue,idx=-1;
      if(ann.ctxBefore||ann.ctxAfter){ var fi=txt.indexOf(ann.ctxBefore+ann.selText+ann.ctxAfter); if(fi!==-1) idx=fi+ann.ctxBefore.length; }
      if(idx===-1) idx=txt.indexOf(ann.selText);
      if(idx===-1) continue;
      return {node:node,offset:idx,end:idx+ann.selText.length};
    }
    return null;
  }
  /* ---- 文脈優先＋occ着地の統合解決 ----
     occ は「上に同じ語があると間違った同一語にヒットしても必ず何かを返す」ため、
     occ 単独だと誤った箇所へ復元され得る。そこで stream.full（root内テキストを文書順連結）上で
     selText の全出現を列挙し、各出現の前後を保存済み ctxBefore/ctxAfter と突き合わせて
     「文脈が最も合う出現」を選ぶ。stream.full はノードをまたいで連結されているので、
     <b> や境界をまたぐ文脈もそのまま照合できる。
     ・文脈が弱い（前後合計4字未満／旧データで空）→ 検証せず保存 occ をそのまま信用。
     ・文脈が全く合う場所が無い（本文が作り直された等）→ 注釈を消さず保存 occ で着地。
     ・同点 → 保存 occ 番号に近い出現を採用。
     occ の意味は従来どおり「stream内の全出現中の何番目か」のまま（番号の付け替えはしない）。
     さらに候補を順位付けして返し、restore 側で「既に別注釈の mark 内に入る候補」を飛ばす
     ＝同一語の別エントリが同じ出現へ衝突して入れ子（二重穴埋め・押しても表示されない）に
     なるのを防ぐ。文脈で一意に決まる場合は最良候補が必ず選ばれるので挙動は変わらない。 */
  function szCtxSuffix(stored,actual){ var i=0; while(i<stored.length&&i<actual.length&&stored.charAt(stored.length-1-i)===actual.charAt(actual.length-1-i)) i++; return i; }
  function szCtxPrefix(stored,actual){ var i=0; while(i<stored.length&&i<actual.length&&stored.charAt(i)===actual.charAt(i)) i++; return i; }
  /* root内の selText 全出現を「文脈スコア降順→保存occに近い順」でランクした候補配列を返す */
  function szRankLocs(root,ann){
    var sel=ann.selText; if(!sel) return [];
    var stream=szTextStream(root),full=stream.full,L=sel.length;
    var cb=ann.ctxBefore||'',ca=ann.ctxAfter||'',weak=(cb.length+ca.length<4);
    var occs=[],from=0,idx;
    while((idx=full.indexOf(sel,from))!==-1){ occs.push(idx); from=idx+L; }
    if(!occs.length) return [];
    var storedOcc=(typeof ann.occ==='number')?ann.occ:0;
    var scored=occs.map(function(gi,k){
      var score=weak?0:szCtxSuffix(cb,full.slice(Math.max(0,gi-cb.length),gi))+szCtxPrefix(ca,full.slice(gi+L,gi+L+ca.length));
      return {gi:gi,k:k,score:score};
    });
    scored.sort(function(a,b){ return (b.score-a.score)||(Math.abs(a.k-storedOcc)-Math.abs(b.k-storedOcc))||(a.k-b.k); });
    var out=[];
    scored.forEach(function(c){
      var a=szLocate(stream,c.gi,'start'),b=szLocate(stream,c.gi+L,'end');
