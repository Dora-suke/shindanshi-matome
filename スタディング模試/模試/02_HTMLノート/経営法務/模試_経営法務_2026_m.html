.group-ph{display:inline-block;font-size:.68rem;color:#6366f1;border:1px dashed #c7d2fe;border-radius:5px;padding:1px 8px;margin:2px;cursor:pointer;background:#eef2ff;}
</style>
<script>
/* qz-hide-buttons-v4 : 多重適用ガード（このブロックが既に走っていたら全パスを中止） */
if(window.__QZ_HIDE_V4__){/* already applied */}else{window.__QZ_HIDE_V4__=1;
var _qzPS=(document.querySelectorAll('.tab-panel').length?'.tab-panel':'.tab-content');
/* === qz-lock: card-reveal button auto-injection === */
(function(){
  function injectCardReveal(){
    document.querySelectorAll('.fill-card').forEach(function(card){
      var header=card.querySelector('.fill-header');
      if(!header) return;
      if(header.querySelector('.ls-card-reveal')) return;
      if(card.querySelectorAll('.fill-blank').length===0) return;
      var btn=document.createElement('button');
      btn.className='ls-card-reveal fill-reveal-btn';
      btn.textContent='👁 ここだけ表示';
      btn.style.cssText='font-size:.7rem;padding:.2rem .6rem;margin:0 0 0 auto;background:rgba(255,255,255,.25);color:#fff;border:1px solid rgba(255,255,255,.5);';
      btn.addEventListener('click',function(ev){
        ev.stopPropagation();
        var blanks=card.querySelectorAll('.fill-blank');
        var allShown=Array.prototype.every.call(blanks,function(b){return b.classList.contains('show');});
        blanks.forEach(function(b){if(allShown) b.classList.remove('show'); else b.classList.add('show');});
        btn.textContent=allShown?'👁 ここだけ表示':'🙈 隠す';
      });
      header.appendChild(btn);
    });
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',injectCardReveal);
  else injectCardReveal();
  window.addEventListener('load', injectCardReveal);
})();

/* === qz-lock: section-hide v3 (STEP A2 + FINE_SEL, no lowContrast) === */
(function(){
  // STEP A: h2.section-title 区切りで .hide-block 自動ラップ
  document.querySelectorAll(_qzPS).forEach(function(panel){
    var children=Array.from(panel.children);
    var sections=[];
    var start=-1;
    for(var i=0;i<children.length;i++){
      var c=children[i];
      if(c.matches&&c.matches('h2.section-title')){
        if(start!==-1) sections.push([start,i-1]);
        start=i;
      }
    }
    if(start!==-1) sections.push([start,children.length-1]);
    sections.forEach(function(sec){
      var first=children[sec[0]];
      if(!first||first.parentNode!==panel) return;
      var wrap=document.createElement('div');
      wrap.className='hide-block';
      first.parentNode.insertBefore(wrap,first);
      for(var j=sec[0];j<=sec[1];j++){
        if(children[j]&&children[j].parentNode===panel) wrap.appendChild(children[j]);
      }
    });
  });
  // STEP A2: .card-body / .fill-body 内の <h3> 区切りで .hide-subblock 自動ラップ
  document.querySelectorAll('.card-body, .fill-body').forEach(function(body){
    var kids=Array.from(body.children);
    var groups=[];var s=-1;
    for(var i=0;i<kids.length;i++){
      if(kids[i].tagName==='H3'){
        if(s!==-1) groups.push([s,i-1]);
        s=i;
      }
    }
    if(s!==-1) groups.push([s,kids.length-1]);
    groups.forEach(function(g){
      var first=kids[g[0]];
      if(!first||first.parentNode!==body) return;
      var w=document.createElement('div');
      w.className='hide-subblock';
      first.parentNode.insertBefore(w,first);
      for(var j=g[0];j<=g[1];j++){
        if(kids[j]&&kids[j].parentNode===body) w.appendChild(kids[j]);
      }
    });
  });
  // STEP B: ○ボタン付与対象を収集
  var FINE_SEL=['.hide-subblock','.flow-box','.table-wrap','.chart-wrap','.chart-set','.icon-deck','.flash-deck','.factor-grid','.factor-card','.vs-card','.fill-section','.cross-ref','.chart-set-banner','.quiz-q','.flash-card','.chk30','.chk30-q'].join(',');
  var MEDIUM_SEL=['.hide-block','.card','.diagram','.alert-tip','.alert-exam','.alert-danger',
    '.support','.keepit','.goro-row','.bubble-wrap','.mnemonic','.vs-box','.quiz-item','.fill-card','.fill-card-quiet',
    '.hide-subblock','.flow-box','.table-wrap','.chart-wrap','.chart-set','.icon-deck','.flash-deck','.factor-grid','.factor-card','.vs-card','.fill-section','.cross-ref','.chart-set-banner','.quiz-q','.flash-card',
    '.vz-supplement','.goro-chip','.zu','.kotoba','.point-box','.chk30','.chk30-q',
    '.tutor-comment','.alert-box'].join(',');
  var LS_KEY='sec-hide:'+(location.pathname.split('/').pop()||'page')+':v3';
  function loadHidden(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch(e){return{};}}
  function saveHidden(obj){try{localStorage.setItem(LS_KEY,JSON.stringify(obj));}catch(e){}}
  var targets=[];
  var seen=new Set();
  function addTarget(el){if(!seen.has(el)){seen.add(el);targets.push(el);}}
  document.querySelectorAll(_qzPS).forEach(function(panel){
    panel.querySelectorAll(MEDIUM_SEL).forEach(function(el){
      if(el.parentNode&&el.parentNode.classList&&el.parentNode.classList.contains('sec-hide-wrap')) return; // 旧ブロックでラップ済みなら二重化しない
      if(el.closest('.card')&&!el.classList.contains('card')&&!el.matches(FINE_SEL)) return;
      if(el.closest('.fill-card')&&!el.classList.contains('fill-card')&&!el.matches(FINE_SEL)) return;
      if(el.closest('.keepit')&&!el.classList.contains('keepit')) return;
      if(el.closest('.hide-subblock')&&!el.classList.contains('hide-subblock')&&!el.matches(FINE_SEL)) return;
      if(el.closest('.flash-deck')&&!el.classList.contains('flash-deck')&&!el.classList.contains('flash-card')) return;
      if(el.closest('.icon-deck')&&!el.classList.contains('icon-deck')) return;
      if(el.closest('.chart-set')&&!el.classList.contains('chart-set')&&!el.matches('.chart-wrap,.chart-set-banner')) return;
      if(el.closest('.table-wrap')&&!el.classList.contains('table-wrap')) return;
      if(el.closest('.chart-wrap')&&!el.classList.contains('chart-wrap')) return;
      /* 穴埋めカード内の個別カードには細粒度ボタンを付けない（fill-card単位で完結） */
      if((el.classList.contains('vs-card')||el.classList.contains('factor-card'))&&el.closest('.fill-card')) return;
      if(el.classList.contains('hide-subblock')){
        var kids2=Array.from(el.children);
        var nonFineSig=false;
        for(var k=0;k<kids2.length;k++){
          var ch=kids2[k];
          if(ch.tagName==='H3') continue;
          if(ch.matches&&ch.matches(FINE_SEL)) continue;
          var t=(ch.textContent||'').trim();
          if(t.length>0||(ch.querySelector&&ch.querySelector('table,img,svg'))){nonFineSig=true;break;}
        }
        var fineCount=el.querySelectorAll(FINE_SEL).length;
        if(!nonFineSig && fineCount>=1) return;
      }
      addTarget(el);
    });
  });
  document.querySelectorAll('.hide-block').forEach(function(block){
    Array.from(block.children).forEach(function(child){
      var tag=child.tagName;
      if(tag==='H1'||tag==='H2'||tag==='H3'||tag==='H4'||tag==='H5') return;
      if(child.matches&&child.matches(MEDIUM_SEL)) return;
      if(child.closest('.card')&&!child.classList.contains('card')) return;
      if(child.closest('.keepit')&&!child.classList.contains('keepit')) return;
      if(tag==='P'&&(child.textContent||'').trim().length<40) return;
      if(tag!=='DIV'&&tag!=='TABLE'&&tag!=='P'&&tag!=='UL'&&tag!=='OL') return;
      addTarget(child);
    });
  });
  function stableId(el,fallback){
    var h2=el.querySelector('h2.section-title');
    var h3=el.querySelector(':scope > h3');
    if(h3) return (el.classList[0]||'')+':h3:'+(h3.textContent||'').replace(/\s+/g,'').slice(0,40)+':'+fallback;
    var h4=el.querySelector('h4'),dt=el.querySelector('.diagram-title');
    var qNum=el.querySelector('.quiz-num');
    var fh=el.querySelector('.fill-header, .card-header');
    var tag=el.classList[0]||el.tagName.toLowerCase();
    var txt='';
    if(h2&&el.classList.contains('hide-block')) txt=h2.textContent;
    else if(qNum){var qq=el.querySelector('.quiz-question');txt='q'+qNum.textContent+(qq?qq.textContent:'');}
    else if(fh) txt=fh.textContent;
    else if(h4) txt=h4.textContent;
    else if(dt) txt=dt.textContent;
    else txt=el.textContent;
    txt=(txt||'').replace(/\s+/g,'').slice(0,40);
    return tag+':'+txt+':'+fallback;
  }
  var hidden=loadHidden();
  targets.forEach(function(el,idx){
    var id=stableId(el,idx);
    var wrap=document.createElement('div');
    wrap.className='sec-hide-wrap';
    el.parentNode.insertBefore(wrap,el);
    wrap.appendChild(el);
    var btnRow=document.createElement('div');
    btnRow.className='sec-hide-btn-row';
    var btn=document.createElement('button');
    btn.textContent='○';
    btn.title='この項目を非表示にする';
    function getLabel(){
      var qNum=el.querySelector('.quiz-num'),qQ=el.querySelector('.quiz-question');
      var h2=el.querySelector('h2.section-title');
      var h3=el.querySelector(':scope > h3');
      var h4=el.querySelector('h4'),dt=el.querySelector('.diagram-title');
      var fh=el.querySelector('.fill-header, .card-header');
      var fc=el.querySelector(':scope > .fc-num');
      if(h3) return h3.textContent.trim().slice(0,40);
      if(qNum&&qQ) return qNum.textContent.trim()+' '+qQ.textContent.trim().slice(0,30)+'…';
      if(h2&&el.classList.contains('hide-block')) return h2.textContent.trim().slice(0,40);
      if(fh) return fh.textContent.trim().slice(0,30);
      if(h4) return h4.textContent.trim().slice(0,30);
      if(el.classList.contains('factor-card')&&fc) return fc.textContent.trim().slice(0,30);
      if(dt) return dt.textContent.trim().slice(0,30);
      return el.textContent.trim().slice(0,30)+'…';
    }
    function doHide(label){
      el.style.display='none';btnRow.style.display='none';
      var ph=document.createElement('div');
      ph.className='sec-hidden-ph';
      ph.innerHTML='（非表示：<span class="sec-hidden-label"></span>） <button>再表示 ○</button>';
      ph.querySelector('.sec-hidden-label').textContent=label;
      ph.querySelector('button').addEventListener('click',function(){
        el.style.display='';btnRow.style.display='';ph.remove();
        var obj=loadHidden();delete obj[id];saveHidden(obj);
      });
      wrap.appendChild(ph);
    }
    btn.addEventListener('click',function(){
      var label=getLabel();
      doHide(label);
      var obj=loadHidden();obj[id]=1;saveHidden(obj);
    });
    btnRow.appendChild(btn);
    wrap.appendChild(btnRow); /* 常に右下に配置 */
    if(hidden[id]) doHide(getLabel());
  });
})();
// 行単位の非表示（fill-group / tbody tr 内）・localStorage保存
(function(){
  var KEY='mz_row_'+location.pathname;
  var st={}; try{st=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}
  function save(){ localStorage.setItem(KEY,JSON.stringify(st)); }
  function cardHead(el){ var c=el.closest('.fill-card'); if(!c) return ''; var h=c.querySelector('.fill-head,.fill-header'); return h?h.textContent.trim().slice(0,28):''; }
  function isPreview(el){ var c=el.closest('.fill-card'); if(!c) return false; var h=c.querySelector('.fill-head,.fill-header'); return h&&(h.textContent.trim().startsWith('予習｜')||h.textContent.trim().startsWith('🔰')); }
  function mkPh(e2,k2){
    var ph=document.createElement('div'); ph.className='row-hidden-ph';
    ph.innerHTML='— <button>表示</button>';
    ph.querySelector('button').addEventListener('click',function(){ e2.style.display=''; ph.remove(); st[k2]=0; save(); });
    return ph;
  }
  function mkTrPh(r,k){
    var cols=r.querySelectorAll('td,th').length;
    var phR=document.createElement('tr'); phR.className='tr-hidden-ph';
    var phTd=document.createElement('td'); phTd.colSpan=cols;
    phTd.innerHTML='— <button>表示</button>';
    phR.appendChild(phTd);
    phTd.querySelector('button').addEventListener('click',function(){ r.style.display=''; phR.remove(); st[k]=0; save(); });
    return phR;
  }
  // fill-group 行
  document.querySelectorAll('.fill-body .fill-group').forEach(function(el,i){
    if(isPreview(el)) return;
    var key='fg:'+cardHead(el)+'|'+i;
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='非表示'; btn.textContent='○';
    el.insertBefore(btn,el.firstChild);
    btn.addEventListener('click',function(e){ e.stopPropagation(); el.style.display='none'; st[key]=1; save(); el.parentNode.insertBefore(mkPh(el,key),el.nextSibling); });
    if(st[key]){ el.style.display='none'; el.parentNode.insertBefore(mkPh(el,key),el.nextSibling); }
  });
  // tbody tr 行
  document.querySelectorAll('.fill-body table tbody tr').forEach(function(tr,i){
    if(isPreview(tr)) return;
    var key='tr:'+cardHead(tr)+'|'+i;
    var tds=tr.querySelectorAll('td'); if(!tds.length) return;
    var last=tds[tds.length-1]; last.style.position='relative'; last.style.paddingRight='26px';
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.style.cssText='position:absolute;top:50%;right:4px;transform:translateY(-50%);float:none;margin:0;'; btn.title='非表示'; btn.textContent='○';
    last.appendChild(btn);
    btn.addEventListener('click',function(e){ e.stopPropagation(); tr.style.display='none'; st[key]=1; save(); tr.parentNode.insertBefore(mkTrPh(tr,key),tr.nextSibling); });
    if(st[key]){ tr.style.display='none'; tr.parentNode.insertBefore(mkTrPh(tr,key),tr.nextSibling); }
  });
  // keepit li 行単位
  document.querySelectorAll('.keepit li').forEach(function(el,i){
    var key='kl:'+(el.textContent||'').replace(/\s+/g,'').slice(0,30)+'|'+i;
    el.style.position='relative'; el.style.paddingRight='26px';
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.style.cssText='position:absolute;top:50%;right:2px;transform:translateY(-50%);float:none;margin:0;'; btn.title='この項目を非表示'; btn.textContent='○';
    el.appendChild(btn);
    function mkLiPh(e2,k2){
      var ph=document.createElement('li'); ph.className='row-hidden-ph';
      ph.innerHTML='— <button>表示</button>';
      ph.querySelector('button').addEventListener('click',function(){ e2.style.display=''; ph.remove(); st[k2]=0; save(); });
      return ph;
    }
    btn.addEventListener('click',function(e){ e.stopPropagation(); el.style.display='none'; st[key]=1; save(); el.parentNode.insertBefore(mkLiPh(el,key),el.nextSibling); });
    if(st[key]){ el.style.display='none'; el.parentNode.insertBefore(mkLiPh(el,key),el.nextSibling); }
  });
})();
// === 最細粒度 非表示（全タブの表行・リスト項目・試験ポイント）・localStorage保存 ===
(function(){
  var KEY='mz_fine_'+location.pathname;
  var st={}; try{st=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}
  function save(){ try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){} }
  function isPreview(el){ var c=el.closest('.fill-card'); if(!c) return false; var h=c.querySelector('.fill-head,.fill-header'); var t=h?h.textContent.trim():''; return t.indexOf('予習')===0||t.indexOf('🔰')===0; }
  function mkPh(e2,k2,tag){
    var ph=document.createElement(tag); ph.className='row-hidden-ph';
    ph.innerHTML='— <button>表示</button>';
    ph.querySelector('button').addEventListener('click',function(){ e2.style.display=''; ph.remove(); st[k2]=0; save(); });
    return ph;
  }
  function mkTrPh(r,k){
    var cols=r.querySelectorAll('td,th').length||1;
    var phR=document.createElement('tr'); phR.className='tr-hidden-ph';
    var phTd=document.createElement('td'); phTd.colSpan=cols;
    phTd.innerHTML='— <button>表示</button>';
    phR.appendChild(phTd);
    phTd.querySelector('button').addEventListener('click',function(){ r.style.display=''; phR.remove(); st[k]=0; save(); });
    return phR;
  }
  // (1) 全タブの表データ行（fill-body以外も対象・ヘッダ行は除外）
  document.querySelectorAll(_qzPS+' table tbody tr').forEach(function(tr,i){
    if(tr.classList.contains('tr-hidden-ph')) return;
    if(isPreview(tr)) return;
    if(tr.querySelector('.row-hide-btn')) return;            // 既存パスで処理済み
    var tds=tr.querySelectorAll('td'); if(!tds.length) return; // ヘッダ専用行は除外
    var key='ftr:'+i+'|'+(tr.textContent||'').replace(/\s+/g,'').slice(0,28);
    var last=tds[tds.length-1]; last.style.position='relative';
    if(!/padding-right/.test(last.getAttribute('style')||'')) last.style.paddingRight='26px';
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='この行を非表示'; btn.textContent='○';
    btn.style.cssText='position:absolute;top:50%;right:4px;transform:translateY(-50%);float:none;margin:0;';
    last.appendChild(btn);
    btn.addEventListener('click',function(e){ e.stopPropagation(); tr.style.display='none'; st[key]=1; save(); tr.parentNode.insertBefore(mkTrPh(tr,key),tr.nextSibling); });
    if(st[key]){ tr.style.display='none'; tr.parentNode.insertBefore(mkTrPh(tr,key),tr.nextSibling); }
  });
  // (2) 全タブのリスト項目（keepit等の既処理liは除外）
  document.querySelectorAll(_qzPS+' li').forEach(function(li,i){
    if(li.classList.contains('row-hidden-ph')||li.closest('.row-hidden-ph')) return;
    if(li.querySelector(':scope > .row-hide-btn')) return;     // keepit等 既存ボタン有
    if(isPreview(li)) return;
    if((li.textContent||'').trim().length<2) return;
    var key='fli:'+i+'|'+(li.textContent||'').replace(/\s+/g,'').slice(0,28);
    li.style.position='relative'; li.style.paddingRight='26px';
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='この項目を非表示'; btn.textContent='○';
    btn.style.cssText='position:absolute;top:.15rem;right:2px;float:none;margin:0;';
    li.appendChild(btn);
    btn.addEventListener('click',function(e){ e.stopPropagation(); li.style.display='none'; st[key]=1; save(); li.parentNode.insertBefore(mkPh(li,key,'li'),li.nextSibling); });
    if(st[key]){ li.style.display='none'; li.parentNode.insertBefore(mkPh(li,key,'li'),li.nextSibling); }
  });
  // (3) 試験ポイント・引っかけポイント（.exam-pt / .trap-pt 各ブロック）
  document.querySelectorAll(_qzPS+' .exam-pt, '+_qzPS+' .trap-pt').forEach(function(el,i){
    if(el.querySelector(':scope > .row-hide-btn')) return;
    var key='fep:'+i+'|'+(el.textContent||'').replace(/\s+/g,'').slice(0,28);
    el.style.position='relative'; el.style.paddingRight='30px';
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='この試験ポイントを非表示'; btn.textContent='○';
    btn.style.cssText='position:absolute;top:50%;right:6px;transform:translateY(-50%);float:none;margin:0;';
    el.appendChild(btn);
    btn.addEventListener('click',function(e){ e.stopPropagation(); el.style.display='none'; st[key]=1; save(); el.parentNode.insertBefore(mkPh(el,key,'div'),el.nextSibling); });
    if(st[key]){ el.style.display='none'; el.parentNode.insertBefore(mkPh(el,key,'div'),el.nextSibling); }
  });
  // (4) 定義リスト dl の用語（dt＋続く dd）を1語ずつ非表示（ことば欄など）
  document.querySelectorAll(_qzPS+' dl > dt').forEach(function(dt,i){
    if(dt.querySelector(':scope > .row-hide-btn')) return;
    if(dt.closest('.row-hidden-ph')) return;
    var dds=[],n=dt.nextElementSibling;
    while(n&&n.tagName==='DD'){ dds.push(n); n=n.nextElementSibling; }
    var key='dt:'+i+'|'+(dt.textContent||'').replace(/\s+/g,'').slice(0,28);
    var cs=window.getComputedStyle(dt); if(cs.position==='static') dt.style.position='relative';
    dt.style.paddingRight='26px';
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='この用語を非表示'; btn.textContent='○';
    btn.style.cssText='position:absolute;top:.1rem;right:2px;float:none;margin:0;';
    dt.appendChild(btn);
    function hideTerm(){ dt.style.display='none'; dds.forEach(function(d){d.style.display='none';}); }
    function mkDtPh(){ var p=document.createElement('dd'); p.className='row-hidden-ph'; p.innerHTML='— <button>表示</button>'; p.querySelector('button').addEventListener('click',function(){ dt.style.display=''; dds.forEach(function(d){d.style.display='';}); p.remove(); st[key]=0; save(); }); return p; }
    btn.addEventListener('click',function(e){ e.stopPropagation(); hideTerm(); st[key]=1; save(); var last=dds.length?dds[dds.length-1]:dt; last.parentNode.insertBefore(mkDtPh(),last.nextSibling); });
    if(st[key]){ hideTerm(); var last=dds.length?dds[dds.length-1]:dt; last.parentNode.insertBefore(mkDtPh(),last.nextSibling); }
  });
})();
// === 最細粒度プラス v2：個別カード（factor/vs/goro）＋本文段落 単位の非表示 ===
(function(){
  var KEY='mz_fine2_'+location.pathname;
  var st={}; try{st=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}
  function save(){ try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){} }
  function inAnim(el){ return !!el.closest('.sa,.hosho-anim,.goro-scene'); }
  function handled(el){
    if(el.querySelector(':scope > .row-hide-btn')) return true;          // 既にボタン有
    var p=el.parentNode;
    if(p&&p.classList&&p.classList.contains('sec-hide-wrap')) return true; // section-hide ○ 対象
    if(el.closest('.row-hidden-ph')) return true;
    return false;
  }
  function mkPh(el,key,tag){
    var ph=document.createElement(tag||'div'); ph.className='row-hidden-ph';
    ph.innerHTML='— <button>表示</button>';
    ph.querySelector('button').addEventListener('click',function(){ el.style.display=''; ph.remove(); st[key]=0; save(); });

// === 最細粒度プラス v3：クラスレスのインライン視覚ボックス & <br>区切り箇条書きも非表示対象に ===
(function(){
  var KEY='mz_fine3_'+location.pathname;
  var st={}; try{st=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}
  function save(){ try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){} }
  function inAnim(el){ return !!el.closest('.sa,.hosho-anim,.goro-scene'); }
  function inPh(el){ return !!el.closest('.row-hidden-ph,.sec-hidden-ph,.tr-hidden-ph'); }
  function hasBtn(el){ return !!el.querySelector(':scope > .row-hide-btn'); }
  function wrappedBySec(el){ var p=el.parentNode; return !!(p&&p.classList&&p.classList.contains('sec-hide-wrap')); }
  function mkPh(el,key,tag){
    var ph=document.createElement(tag||'div'); ph.className='row-hidden-ph';
    ph.innerHTML='— <button>表示</button>';
    ph.querySelector('button').addEventListener('click',function(){ el.style.display=''; ph.remove(); st[key]=0; save(); });
    return ph;
  }
  function addBtn(el,key,phTag,style){
    var cs=window.getComputedStyle(el);
    if(cs.position==='static') el.style.position='relative';
    var pr=parseInt(cs.paddingRight,10)||0; if(pr<20) el.style.paddingRight=(pr+20)+'px';
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='この項目を非表示'; btn.textContent='○';
    btn.style.cssText=style||'position:absolute;top:4px;right:4px;float:none;margin:0;z-index:3;';
    el.appendChild(btn);
    btn.addEventListener('click',function(e){ e.stopPropagation(); el.style.display='none'; st[key]=1; save(); el.parentNode.insertBefore(mkPh(el,key,phTag),el.nextSibling); });
    if(st[key]){ el.style.display='none'; el.parentNode.insertBefore(mkPh(el,key,phTag),el.nextSibling); }
  }
  // (A) <br>区切りの箇条書きを行ごとに分割し、各行へ非表示ボタンを付与
  //     対象：.hl ハイライト or 「・」箇条書きを含む視覚ボックス
  function splitBrLines(box,baseKey){
    if(box.getAttribute('data-brsplit')) return false;
    var nodes=Array.from(box.childNodes);
    if(!nodes.some(function(n){return n.nodeName==='BR';})) return false;
    var lines=[],cur=[];
    nodes.forEach(function(n){ if(n.nodeName==='BR'){ lines.push(cur); cur=[]; } else cur.push(n); });
    lines.push(cur);
    var meaningful=lines.filter(function(l){ return l.some(function(n){return (n.textContent||'').trim().length>0;}); });
    if(meaningful.length<2) return false;
    box.setAttribute('data-brsplit','1');
    box.textContent='';
    lines.forEach(function(l,idx){
      var hasText=l.some(function(n){return (n.textContent||'').trim().length>0;});
      var line=document.createElement('div'); line.className='hb-line'; line.style.cssText='position:relative;padding-right:22px;';
      l.forEach(function(n){ line.appendChild(n); });
      box.appendChild(line);
      if(!hasText) return;
      var key='brl:'+baseKey+':'+idx+'|'+(line.textContent||'').replace(/\s+/g,'').slice(0,22);
      var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='この行を非表示'; btn.textContent='○';
      btn.style.cssText='position:absolute;top:1px;right:0;float:none;margin:0;';
      line.appendChild(btn);
      btn.addEventListener('click',function(e){ e.stopPropagation(); line.style.display='none'; st[key]=1; save(); line.parentNode.insertBefore(mkPh(line,key,'div'),line.nextSibling); });
      if(st[key]){ line.style.display='none'; line.parentNode.insertBefore(mkPh(line,key,'div'),line.nextSibling); }
    });
    return true;
  }
  // (B) tab-panel 内の div / .hl を走査。視覚ボックス（inline border/background）or .hl を対象化
  var idx=0;
  document.querySelectorAll(_qzPS+' div, '+_qzPS+' .hl').forEach(function(el){
    if(inAnim(el)||inPh(el)||hasBtn(el)||wrappedBySec(el)) return;
    if(el.classList.contains('hb-line')||el.classList.contains('row-hide-btn')||el.classList.contains('sec-hide-btn-row')) return;
    var isHl=el.classList.contains('hl');
    var sty=el.getAttribute('style')||'';
    var isBox=/border|background/.test(sty);
    if(!isHl&&!isBox) return;
    var txt=(el.textContent||'').trim();
    if(txt.length<6) return;
    var key=(isHl?'hlb:':'box:')+(idx++)+'|'+txt.replace(/\s+/g,'').slice(0,26);
    // 箇条書き（・ を含む or .hl）は行分割を試みる
    if((isHl||txt.indexOf('・')>=0)&&splitBrLines(el,key)) return; // 行ごとに付与したので箱全体ボタンは省略
    addBtn(el,key,'div');
  });
})();

// === v4.1 カード単位「まとめて隠す/出す」：カード内の行ボタンを一括操作（最後に実行＝行ボタン生成後） ===
(function(){

(function(){

    for(var i=0;i<kids.length;i++){
      if(kids[i].tagName==='H4'&&kids[i].parentNode===body){ if(s!==-1) groups.push([s,i-1]); s=i; }
    }
    if(s!==-1) groups.push([s,kids.length-1]);

      for(var j=g[0];j<=g[1];j++){

      }
      var btnRow=document.createElement('div'); btnRow.className='sec-hide-btn-row';

        btn.addEventListener('click',function(e){ e.stopPropagation(); doHide(); });

        if(st[k]) doHide();

/* ===== (1) 囲み枠：近接でマーク表示＋8方向の自由リサイズ（位置・サイズはszN_へ保存） ===== */
(function(){
  function noteUpdate(nid,patch){
    for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(!k||k.indexOf('szN_')!==0)continue;
      try{var arr=JSON.parse(localStorage.getItem(k)||'[]'),ch=false;
        arr.forEach(function(n){if(n.id===nid){for(var q in patch)n[q]=patch[q];ch=true;}});

  var DIRS=['n','s','e','w','ne','nw','se','sw'];
  function enhance(fr){

<script>

      var ae=document.activeElement;
      var ed=ae&&ae.closest?ae.closest('.szins-ed'):null;
      if(ed){ /* システム画像で貼れた場合は二重挿入しない。pasteイベントが処理したらskip */
        szPasteHandled=false;
        setTimeout(function(){if(!szPasteHandled){insertImgAtCursor(ed,szImgClip);persist();}},140);
      }
    }
  },false);

  function mkBlock(html, bg, onChange, onDelete, w, h, ml, mt){
    var b=document.createElement('div');
    b.className='szins-block';
    if(bg) b.style.background=bg;
    if(w) b.style.width=w;
    if(h) b.style.height=h;
    if(ml) b.style.marginLeft=ml;
    if(mt) b.style.marginTop=mt;
    var ed=document.createElement('div');
    ed.className='szins-ed'; ed.setAttribute('contenteditable','true');
    ed.innerHTML=html||'';
    b.__ed=ed;
    /* 削除ボタン */
    var del=document.createElement('button');
    del.className='szins-del'; del.textContent='×'; del.title='この挿入を削除';
    del.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();onDelete(b);});
    /* 横↔下 切替ボタン */
    var sideBtn=document.createElement('button');
    sideBtn.className='szins-side'; sideBtn.textContent='⬌'; sideBtn.title='横に並べる';
    function syncSideBtn(){ sideBtn.textContent=b.__side?'⬍':'⬌'; sideBtn.title=b.__side?'下にフル幅へ戻す':'宿主の横に並べる'; }
    sideBtn.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();b.__side=!b.__side;applyLayout(b);syncSideBtn();onChange(b);});
    b.__syncSideBtn=syncSideBtn;
    /* 画像ボタン */
    var imgBtn=document.createElement('button');
    imgBtn.className='szins-img'; imgBtn.textContent='🖼'; imgBtn.title='画像を挿入';
    var fileIn=document.createElement('input'); fileIn.type='file'; fileIn.accept='image/*'; fileIn.style.display='none';
    imgBtn.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();fileIn.click();});
    fileIn.addEventListener('change',function(){
      if(fileIn.files&&fileIn.files[0]){ed.focus();compressImg(fileIn.files[0],function(u){insertImgAtCursor(ed,u);onChange(b);});}
      fileIn.value='';
    });
    b.appendChild(ed); b.appendChild(sideBtn); b.appendChild(imgBtn); b.appendChild(del); b.appendChild(fileIn);
    var t=null;
    ed.addEventListener('input',function(){clearTimeout(t);t=setTimeout(function(){onChange(b);},300);});
    /* 画像のペースト対応 */
    ed.addEventListener('paste',function(e){
      var items=(e.clipboardData||{}).items||[];
      for(var i=0;i<items.length;i++){
        if(items[i].type&&items[i].type.indexOf('image')===0){
          e.preventDefault();szPasteHandled=true;
          var f=items[i].getAsFile();
          if(f) compressImg(f,function(u){insertImgAtCursor(ed,u);onChange(b);});
          return;
        }
      }
    });
    /* 画像のドラッグ&ドロップ対応 */
    ed.addEventListener('dragover',function(e){
      if(e.dataTransfer&&Array.prototype.slice.call(e.dataTransfer.items||[]).some(function(it){return it.type&&it.type.indexOf('image')===0;})){
        e.preventDefault();e.stopPropagation();b.classList.add('szins-drop');
      }
    });
    ed.addEventListener('dragleave',function(e){b.classList.remove('szins-drop');});
    ed.addEventListener('drop',function(e){
      var files=e.dataTransfer&&e.dataTransfer.files;
      if(files&&files.length){
        var imgs=Array.prototype.slice.call(files).filter(function(f){return f.type&&f.type.indexOf('image')===0;});
        if(imgs.length){
          e.preventDefault();e.stopPropagation();b.classList.remove('szins-drop');ed.focus();
          imgs.forEach(function(f){compressImg(f,function(u){insertImgAtCursor(ed,u);onChange(b);});});

      }

    /* qz-memoのツールバーは選択時に出したいので mouseup/keyup は止めない。
       ただし文書のクリック系トグル誤爆を防ぐためクリックの伝播のみ抑える。
       例外：ブロック内に付けた注釈（穴埋め/消去/コメントアイコン等）はクリックで
       表示トグルさせたいので、injectの文書ハンドラまで伝播させる。 */
    ed.addEventListener('click',function(e){
      if(e.target.closest&&e.target.closest('mark.sz-blank,mark.sz-erase,mark[data-aid],.sz-cm-icon,.fill-blank,.blank')) return;
      e.stopPropagation();
    },false);
    /* 枠の自由リサイズ。e=右/w=左/s=下/n=上/se=右下角。
       左(w)は右端を、上(n)は下端を固定したまま幅/高さを変える（margin で位置補正）。離した時に保存。 */
    function addHandle(cls,mode){
      var hd=document.createElement('div'); hd.className='szins-rz '+cls; b.appendChild(hd);
      hd.addEventListener('pointerdown',function(e){
        e.preventDefault(); e.stopPropagation();
        try{hd.setPointerCapture(e.pointerId);}catch(_){}
        var sx=e.clientX, sy=e.clientY, rc=b.getBoundingClientRect(), sw=rc.width, sh=rc.height;
        var cs=getComputedStyle(b);
        var sml=parseFloat(b.style.marginLeft||cs.marginLeft)||0;
        var smt=parseFloat(b.style.marginTop||cs.marginTop)||0;
        var maxW=b.parentElement?b.parentElement.clientWidth:99999;
        function applyGeom(ev){
          var dx=ev.clientX-sx, dy=ev.clientY-sy;
          if(b.__side){
            /* 横モード：margin は使わず幅・高さを直接変える（宿主は flex で連動して縮む・折り返す） */
            if(mode.indexOf('e')>=0) b.style.width=Math.max(80, sw+dx)+'px';
            if(mode.indexOf('w')>=0) b.style.width=Math.max(80, sw-dx)+'px';
            if(mode.indexOf('s')>=0) b.style.height=Math.max(32, sh+dy)+'px';
            if(mode.indexOf('n')>=0) b.style.height=Math.max(32, sh-dy)+'px';
            return;
          }
          /* 下モード。いずれの辺もセル（親）の内側・フロー内に収める＝既存の文字に被らない。
             右=幅拡大（左端固定・親幅まで）/ 下=高さ拡大（上端固定・下を押し下げる） */
          if(mode.indexOf('e')>=0){ b.style.width=Math.max(80,Math.min(maxW-sml,sw+dx))+'px'; }
          if(mode.indexOf('s')>=0){ b.style.height=Math.max(32,sh+dy)+'px'; }
          /* 左=左端をポインタに追従（右端固定）。marginは0以上＝セル左端より外へ出さない */
          if(mode.indexOf('w')>=0){ var rightEdge=sml+sw; var nl=Math.min(rightEdge-80, Math.max(0, sml+dx)); b.style.marginLeft=nl+'px'; b.style.width=(rightEdge-nl)+'px'; }
          /* 上=上端をポインタに追従（下端固定）。marginは0以上＝上の文字に被せない */
          if(mode.indexOf('n')>=0){ var botEdge=smt+sh; var nt=Math.min(botEdge-32, Math.max(0, smt+dy)); b.style.marginTop=nt+'px'; b.style.height=(botEdge-nt)+'px'; }
          /* 幅を変えたら宿主セルも同じ幅・左位置に連動＝元の文字も折り返し直す */

    return b;
  }
  /* 宿主セルをブロックと同じ幅・左位置に連動させる（元の文字も折り返し直る）。
     宿主は再生成され得る/共有され得る(#qText等)ので data-szins-host で印を付け、restore でリセット・再適用する。 */
  function syncHostW(b){
    var host=b.__szhost; if(!host) return;
    var w=b.style.width, ml=b.style.marginLeft;
    if(w){ host.style.boxSizing='border-box'; host.style.width=w; } else { host.style.width=''; }
    host.style.marginLeft=ml||'';
    if(w||ml){ host.setAttribute('data-szins-host','1'); } else { host.removeAttribute('data-szins-host'); }
  }
  function clearHost(host){ if(!host) return; host.style.width=''; host.style.marginLeft=''; host.removeAttribute('data-szins-host'); }
  /* 「横」モード＝宿主と枠を flex 行ラッパーに入れて横並び（宿主は flex:1 で縮み・折り返し）。
     「下」モード＝ラッパーを解いて、宿主の直後にフル幅ブロックとして戻す。 */
  function unwrapRow(b){
    var row=b.parentElement;
    if(!row||!row.classList.contains('szins-row')) return;
    var host=b.__szhost;
    if(host&&host.parentElement===row){ host.style.flex=host.__szPrevFlex||''; host.style.minWidth=host.__szPrevMinW||''; row.parentNode.insertBefore(host,row); }
    row.parentNode.insertBefore(b,row);
    row.remove();
  }
  function applyLayout(b){
    var host=b.__szhost; if(!host) return;
    var inRow=b.parentElement&&b.parentElement.classList.contains('szins-row');
    if(b.__side){
      if(!inRow){
        /* 横モードでは宿主連動の幅指定(syncHostW)は無効化（flexで自動調整） */
        clearHost(host);
        /* flexアイテムに残った margin は隙間/宿主潰れの原因。横モードでは消す */
        b.style.marginLeft=''; b.style.marginTop='';
        var row=document.createElement('div'); row.className='szins-row';
        host.parentNode.insertBefore(row,host);
        host.__szPrevFlex=host.style.flex; host.__szPrevMinW=host.style.minWidth;
        /* 宿主は最小幅を確保して潰れない（枠を広げると宿主が連動して縮む・折り返す） */
        host.style.flex='1 1 0'; host.style.minWidth='96px';
        row.appendChild(host); row.appendChild(b);
        b.style.flex='0 1 auto';  /* 枠は自分の幅を持ちつつ、入り切らない時は縮む（宿主を潰さない） */
      }
    } else {
      if(inRow) unwrapRow(b);
      b.style.flex='';
    }
  }
  /* 挿入元の実効背景色を取得（透明なら親を辿る） */
  function effBg(el){
    var n=el;
    while(n && n!==document.body){
      var c=getComputedStyle(n).backgroundColor;
      if(c && c!=='rgba(0, 0, 0, 0)' && c!=='transparent') return c;
      n=n.parentElement;
    }
    return '#fff';
  }

  /* データ構造: [{host:{i,t}, html:"..."}] / 同一hostに複数挿入可（配列順で連続配置） */
  function persist(){
    /* いま DOM にあるブロックを集める */
    var present=[];
    document.querySelectorAll('.szins-block').forEach(function(b){
      var hostEl=b.__szhost; if(!hostEl) return;
      var html=b.__ed?b.__ed.innerHTML:'';
      present.push({host:b.__hostSig||sig(hostEl), html:html, bg:b.style.background||'', w:b.style.width||'', h:b.style.height||'', ml:b.style.marginLeft||'', mt:b.style.marginTop||'', hostW:hostEl.style.width||'', hostML:hostEl.style.marginLeft||'', side:!!b.__side});
    });
    /* 動的ページ対策：今表示していない host のレコード（＝別問題・折りたたみ中の解説など）は
       DOM に無くても保存から落とさず温存する。host が現在 DOM に見つからないものだけ残してマージ。 */
    var stored=load();
    var kept=stored.filter(function(rec){ return !findHost(rec.host); });
    save(kept.concat(present));
  }

  function insertAfterHost(hostEl, text, bg, w, h, ml, mt, side){
    /* 救済：host の親がブロックフローでない（flex/grid 等＝横並びになる）場合は、
       フロー安全な祖先まで引き上げる。古い保存（span 等の flex アイテム）も下にフル幅で入る。 */
    var safe=hostEl;
    while(safe && safe!==document.body && !parentIsBlockFlow(safe)) safe=safe.parentElement;
    var migrated=(safe && safe!==document.body && safe!==hostEl);
    if(safe && safe!==document.body) hostEl=safe;
    /* 引き上げた＝旧・横並び時代の残骸サイズ/位置は今のレイアウトでは無効。捨ててフレッシュ（下・フル幅）にする。 */
    if(migrated){ w=''; h=''; ml=''; mt=''; }
    var b=mkBlock(text, bg, persist, function(node){
      var hs=node.__szhost, row=node.parentElement;
      if(row&&row.classList.contains('szins-row')&&hs&&hs.parentElement===row){ hs.style.flex=hs.__szPrevFlex||''; hs.style.minWidth=hs.__szPrevMinW||''; row.parentNode.insertBefore(hs,row); }
      node.remove();
      if(row&&row.classList.contains('szins-row')&&!row.querySelector('.szins-block')) row.remove();
      clearHost(hs);persist();
    }, w, h, ml, mt);
    b.__szhost=hostEl;
    b.__migrated=migrated;
    /* 既存の同host挿入塊の末尾の後ろに入れる */
    var ref=hostEl, nx=hostEl.nextElementSibling;
    while(nx && nx.classList.contains('szins-block') && nx.__szhost===hostEl){ref=nx;nx=nx.nextElementSibling;}
    ref.parentNode.insertBefore(b, ref.nextSibling);
    /* host の sig は“ラップ前の自然位置”で確定して保持（横モードで行ラッパーに入れても経路が壊れない） */
    b.__hostSig=sig(hostEl);
    b.__side=!!side && !migrated;  /* 救済された枠は下に戻す */
    if(b.__syncSideBtn) b.__syncSideBtn();
    if(b.__side) applyLayout(b);
    return b;
  }

  function restore(){
    /* べき等＝既存ブロックを一旦すべて外してから現在キーの保存分を貼り直す。
       問題切替（szInsRestore 再呼び出し）でも重複せず、表示中の host を持つレコードだけ復活する。
       host が現在 DOM に無いレコードは貼られないが localStorage には残る（temp で消えない）。 */
    /* 「横」モードの行ラッパーを解いて宿主を元の位置へ戻す（block は中身ごと除去して作り直す） */
    document.querySelectorAll('.szins-row').forEach(function(row){
      Array.prototype.slice.call(row.children).forEach(function(ch){
        if(ch.classList&&ch.classList.contains('szins-block')) return;
        ch.style.flex=ch.__szPrevFlex||''; ch.style.minWidth=ch.__szPrevMinW||'';
        row.parentNode.insertBefore(ch,row);
      });
      row.remove();
    });
    /* 連動で変形させた宿主セルを一旦すべて元に戻す（共有/再生成される #qText 等のため） */
    document.querySelectorAll('[data-szins-host]').forEach(function(el){ clearHost(el); });
    document.querySelectorAll('.szins-block').forEach(function(b){ b.remove(); });
    var arr=load();
    arr.forEach(function(rec){
      var hostEl=findHost(rec.host);
      if(hostEl){
        var b=insertAfterHost(hostEl, rec.html!=null?rec.html:(rec.text||''), rec.bg, rec.w, rec.h, rec.ml, rec.mt, rec.side);
        var realHost=b.__szhost||hostEl;  /* insertAfterHost がフロー安全な親へ引き上げている場合あり */
        /* 引き上げ救済された枠・横モードは、宿主の旧サイズを適用しない（横はflexで自動・救済は残骸） */
        if(!b.__migrated && !b.__side){
          if(rec.hostW){ realHost.style.boxSizing='border-box'; realHost.style.width=rec.hostW; realHost.setAttribute('data-szins-host','1'); }
          if(rec.hostML){ realHost.style.marginLeft=rec.hostML; realHost.setAttribute('data-szins-host','1'); }
        }
      }
    });
  }

  /* ＋ボタン（テキスト選択時に選択箇所の右下へ表示） */
  var addBtn=document.createElement('button');
  addBtn.className='szins-add'; addBtn.textContent='＋';
  addBtn.title='選択した行の下に文章を挿入'; addBtn.style.display='none';
  document.body.appendChild(addBtn);
  var curHost=null;

  /* 選択範囲を含む「挿入先ブロック」を探す。
     重要：host の“親”が通常のブロックフロー（flex/grid/table 行でない）である要素を選ぶ。
     こうすると host の直後に挿入したブロックが必ず自分の行（フル幅）になり、
     選択肢チェックのような display:flex 行の中で“横並びの flex アイテム”にならない。 */
  function parentIsBlockFlow(el){
    var par=el.parentElement; if(!par) return false;
    var pd=getComputedStyle(par).display;
    return pd==='block'||pd==='list-item'||pd==='flow-root';

  function hostFromSelection(){
    var sel=window.getSelection();
    if(!sel || sel.rangeCount===0 || sel.isCollapsed) return null;
    var node=sel.getRangeAt(0).commonAncestorContainer;
    if(node.nodeType===3) node=node.parentNode;
    if(!node || !node.closest) return null;
    if(node.closest('.szins-block')) return null;
    var SKIP='body,html,.card,.tab-panel,.tab-content,.pane';
    /* SEL一致を優先（ただし親がブロックフローのときだけ）。それ以外は祖先を遡る。 */
    var sl=node.closest(SEL);
    if(sl && !sl.matches(SKIP) && parentIsBlockFlow(sl)) return sl;
    var n=node;
    while(n && n!==document.body){
      if(n.nodeType===1 && !n.matches(SKIP) && parentIsBlockFlow(n)) return n;
      n=n.parentElement;
    }
    return null;
  }
  function showBtnAtSelection(){
    if(document.body.classList.contains('sz-annot-off')){addBtn.style.display='none';return;}
    var host=hostFromSelection();
    if(!host){addBtn.style.display='none';curHost=null;return;}
    var sel=window.getSelection();
    var rects=sel.getRangeAt(0).getClientRects();
    var r=rects.length?rects[rects.length-1]:host.getBoundingClientRect();
    curHost=host;
    addBtn.style.left=(window.scrollX+r.right+6)+'px';
    addBtn.style.top=(window.scrollY+r.bottom-8)+'px';
    addBtn.style.display='block';
  }
  /* 選択確定（マウス・キーボード）で表示。少し遅延してselectionを確定させる */
  document.addEventListener('mouseup',function(){setTimeout(showBtnAtSelection,10);});
  document.addEventListener('keyup',function(e){if(e.shiftKey||e.key==='Shift')setTimeout(showBtnAtSelection,10);});

  addBtn.addEventListener('mousedown',function(e){
    /* mousedownで処理：clickだと選択解除が先に走るのを防ぐ */
    e.preventDefault();
    if(!curHost) return;
    var b=insertAfterHost(curHost, '', effBg(curHost));
    addBtn.style.display='none';
    setTimeout(function(){if(b.__ed) b.__ed.focus();},0);
  });
  /* スクロール時は隠す（位置ズレ防止） */
  window.addEventListener('scroll',function(){addBtn.style.display='none';},{passive:true});

  window.szInsRestore=restore;
  window.szInsPersist=persist;  /* ブロック内に注釈(穴埋め等)を付けた時、inject から呼んでHTMLごと保存 */
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',restore);
  else restore();
})();
</script>

<script>

    if(window.szInsRestore) window.szInsRestore();
