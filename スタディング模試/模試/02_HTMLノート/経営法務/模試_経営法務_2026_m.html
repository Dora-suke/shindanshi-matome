    var aid=delPop.dataset.aid;
    if(!aid) return;
    // クロスバウンダリ分割分も含め同じ aid の mark を全て除去
    var allMarks=Array.from(document.querySelectorAll('mark[data-aid="'+aid+'"]'));
    var _inNote=false;
    allMarks.forEach(function(mark){
      if(!mark.parentNode) return;
      if(mark.closest&&mark.closest('.sz-note,.sz-shape')) _inNote=true;
      var parent=mark.parentNode;
      Array.from(mark.childNodes).forEach(function(n){
        if(n.classList&&n.classList.contains('sz-cm-icon')) return;
        parent.insertBefore(n,mark);
      });
      parent.removeChild(mark);
      parent.normalize();
      if(mark.closest&&mark.closest('.sz-note,.sz-shape')&&window.szSaveNoteOf) window.szSaveNoteOf(parent);
    });
    if(_inNote){szHideDel();return;}
    db=db.filter(function(a){return a.uid!==aid;});
    save();szHideDel();
  };

  /* ---- 文字サイズ：小/中/大 切替（同 aid の全 mark と db を更新） ---- */
  window.szSetSize=function(level){
    var aid=delPop.dataset.aid;
    if(!aid) return;
    var marks=Array.prototype.slice.call(document.querySelectorAll('mark.sz-size[data-aid="'+aid+'"]'));
    marks.forEach(function(m){ m.dataset.lv=level; });
    var inNote=false;
    db.forEach(function(a){ if(a.uid===aid&&a.type==='size') a.level=level; });
    marks.forEach(function(m){ if(m.closest&&m.closest('.sz-note,.sz-shape')){inNote=true;if(window.szSaveNoteOf)window.szSaveNoteOf(m);} });
    if(!inNote) save();
    Array.prototype.forEach.call(delPop.querySelectorAll('.sz-d-size button'),function(b){ b.classList.toggle('on',b.dataset.lv===level); });
  };

  /* ---- DOM適用 ---- */
  function applyAnnot(range,type,comment,id,color,level){
    if(window.__szSvgApply&&szInSVG(range)){window.__szSvgApply(range,type,comment,color,level);window.getSelection&&window.getSelection().removeAllRanges();return;}
    var startNode=range.startContainer;
    var encEl=startNode.nodeType===3?startNode.parentElement:startNode;
    var encMark=encEl&&encEl.closest?encEl.closest('mark[data-aid]'):null;
    var parentAid=encMark?encMark.dataset.aid:'';
    var endNode=range.endContainer;
    var selText=range.toString();
    var panelId=panelOf(range.commonAncestorContainer.nodeType===1
      ?range.commonAncestorContainer
      :range.commonAncestorContainer.parentElement);
    // 出現位置インデックス（root内で何番目の selText か）を記録 → 復元先を一意化
    var occRoot=encMark?encMark:(panelId==='body'?document.body:(document.getElementById(panelId)||document.body));
    var occ=szOccOf(occRoot,range.startContainer,range.startOffset,selText);
    // 文脈は cross-node の stream（occRoot基準）から採取。境界で空にならず、occがズレても復元できる。
    var _ctx=szCtxOf(occRoot,range,selText);
    var ctxBefore=_ctx.cb,ctxAfter=_ctx.ca;

    var mark=document.createElement('mark');
    mark.className='sz-'+type;
    mark.dataset.aid=id;
    if(comment) mark.dataset.comment=comment;
    if(color){ mark.style.background=color; mark.dataset.hlc=color; }
    if(type==='size') mark.dataset.lv=level||'sm';

    var ok=false;
    try{range.surroundContents(mark);ok=true;}
    catch(e1){
      // クロスバウンダリ（太字・タイトル内ボタン等）: テキストノードごとに個別ラップ
      var tni=szTextNodesInRange(range);
      if(tni.length>0){
        tni.forEach(function(ni,idx){
          var m=(idx===0)?mark:document.createElement('mark');
          if(idx>0){m.className='sz-'+type;m.dataset.aid=id;if(comment)m.dataset.comment=comment;if(color){m.style.background=color;m.dataset.hlc=color;}if(type==='size')m.dataset.lv=level||'sm';}
          var nr=document.createRange();
          try{nr.setStart(ni.n,ni.s);nr.setEnd(ni.n,ni.e);nr.surroundContents(m);if(type==='cm'&&comment)addCmtIcon(m,comment);}catch(ex){}
        });
        ok=!!document.querySelector('mark[data-aid="'+id+'"]');
      }
      if(!ok){
        try{
          var r2=document.createRange();
          r2.setStart(range.startContainer,range.startOffset);
          var eo=range.startContainer.nodeType===3
            ?range.startContainer.nodeValue.length:range.startOffset;
          r2.setEnd(range.startContainer,eo);
          var trunc=r2.toString();
          var truncOcc=trunc?szOccOf(occRoot,range.startContainer,range.startOffset,trunc):0;
          r2.surroundContents(mark);ok=true;
          selText=trunc;occ=truncOcc;ctxAfter='';
        }catch(e2){showToast('⚠ タグをまたぐ選択には使えません');return;}
      }
    }
    if(!ok) return;

    if(type==='cm'&&comment) addCmtIcon(mark,comment);
    if(mark.closest&&mark.closest('.sz-note,.sz-shape')){if(window.szSaveNoteOf)window.szSaveNoteOf(mark);return;}
    /* 行間挿入ブロック内の注釈は szA_ ではなくブロックのHTMLとして保存（単一の保存先）。
       surroundContents は input を発火しないので明示的に persist を呼ぶ。 */
    if(mark.closest&&mark.closest('.szins-ed')){if(window.szInsPersist)window.szInsPersist();return;}
    db.push({uid:id,panelId:panelId,parentAid:parentAid,selText:selText,ctxBefore:ctxBefore,ctxAfter:ctxAfter,occ:occ,type:type,comment:comment,color:color||'',level:(type==='size'?(level||'sm'):'')});
    save();
  }

  function addCmtIcon(mark,comment){
    var icon=document.createElement('span');
    icon.className='sz-cm-icon';icon.textContent='💬';icon.title=comment;
    mark.appendChild(icon);
  }

  /* ---- クロスバウンダリ対応: range 内の選択テキストノードを列挙 ---- */
  function szTextNodesInRange(range){
    var sn=range.startContainer,en=range.endContainer,so=range.startOffset,eo=range.endOffset;
    if(sn===en&&sn.nodeType===3) return [{n:sn,s:so,e:eo}];
    var list=[],started=false;
    var w=document.createTreeWalker(range.commonAncestorContainer,NodeFilter.SHOW_TEXT,null);
    var node;
    while((node=w.nextNode())){
      if(node===sn){started=true;list.push({n:node,s:so,e:node.nodeValue.length});}
      else if(node===en){list.push({n:node,s:0,e:eo});break;}
      else if(started){list.push({n:node,s:0,e:node.nodeValue.length});}
    }
    return list.filter(function(x){return x.e>x.s;});
  }

  /* ---- 復元 ---- */
  /* root内 selText 全出現の global start を「文脈→occ」でランク（同一ノード制約なし）。
     szRankLocs の多ノード版＝開始/終了が別テキストノードでも候補に残す。 */
  function szRankGlobals(root,ann){
    var sel=ann.selText; if(!sel) return {gis:[],L:0};
    var stream=szTextStream(root),full=stream.full,L=sel.length;
    var cb=ann.ctxBefore||'',ca=ann.ctxAfter||'',weak=(cb.length+ca.length<4);
    var occs=[],from=0,idx;
    while((idx=full.indexOf(sel,from))!==-1){ occs.push(idx); from=idx+L; }
    if(!occs.length) return {gis:[],L:L};
    var storedOcc=(typeof ann.occ==='number')?ann.occ:0;
    var scored=occs.map(function(gi,k){
      var score=weak?0:szCtxSuffix(cb,full.slice(Math.max(0,gi-cb.length),gi))+szCtxPrefix(ca,full.slice(gi+L,gi+L+ca.length));
      return {gi:gi,k:k,score:score};
    });
    scored.sort(function(a,b){ return (b.score-a.score)||(Math.abs(a.k-storedOcc)-Math.abs(b.k-storedOcc))||(a.k-b.k); });
    return {gis:scored.map(function(c){return c.gi;}),L:L};
  }
  /* 境界をまたぐ（複数テキストノードに渡る）注釈を、ノードごとに複数 mark で包んで復元。
     applyAnnot のクロスバウンダリ用フォールバックと対になる復元処理。
     単一ノード復元（szResolveLoc/szFindByContext）が失敗したときだけ呼ぶ。 */
  function szRestoreSpan(root,ann,scoped){
    var R=szRankGlobals(root,ann), L=R.L;
    if(!R.gis.length||!L) return false;
    for(var gi_i=0; gi_i<R.gis.length; gi_i++){
      var gstart=R.gis[gi_i], gend=gstart+L;
      var stream=szTextStream(root), segs=[];
      for(var i=0;i<stream.nodes.length;i++){
        var s=stream.nodes[i], len=s.node.nodeValue.length, ns=s.start, ne=s.start+len;
        if(ne<=gstart||ns>=gend) continue;
        var lo=Math.max(0,gstart-ns), hi=Math.min(len,gend-ns);
        if(hi>lo) segs.push({node:s.node,s:lo,e:hi});
      }
      if(segs.length<2) continue; // 単一ノードは通常経路で済む＝ここは多ノードのみ
      if(!scoped){ // 別注釈に占有された候補はスキップ（入れ子防止）
        var occupied=false;
        for(var j=0;j<segs.length;j++){ var pe=segs[j].node.parentElement, cov=pe&&pe.closest?pe.closest('mark[data-aid]'):null; if(cov&&cov.dataset&&cov.dataset.aid!==ann.uid){occupied=true;break;} }
        if(occupied) continue;
      }
      var made=false, firstMark=null;
      for(var k=segs.length-1;k>=0;k--){ // 後ろの片から包むとノード分割の影響を避けやすい
        var seg=segs[k], m=document.createElement('mark');
        m.className='sz-'+ann.type; m.dataset.aid=ann.uid;
        if(ann.comment) m.dataset.comment=ann.comment;
        if(ann.color){ m.style.background=ann.color; m.dataset.hlc=ann.color; }
        if(ann.type==='size') m.dataset.lv=ann.level||'sm';
        var r=document.createRange();
        try{ r.setStart(seg.node,seg.s); r.setEnd(seg.node,seg.e); r.surroundContents(m); made=true; firstMark=m; }catch(ex){}
      }
      if(made){ if(ann.type==='cm'&&ann.comment&&firstMark) addCmtIcon(firstMark,ann.comment); return true; }
    }
    return false;
  }

  function restoreAll(){
    db.forEach(function(ann){restoreOne(ann);});
  }
  window.szRestoreAll=restoreAll;
  /* 動的ページ用：現在のキー（問題ごと）に db を読み直してから復元。問題切替・解説表示のたびに呼ぶ */
  window.szRekey=function(){ try{db=JSON.parse(localStorage.getItem(szCurKEY())||'[]');}catch(e){db=[];} restoreAll(); };
  function restoreOne(ann){
    // 冪等ガード：この注釈が既にDOM上にあれば再描画しない。
    // qz-memo が二重注入されたファイルで restoreAll が2回走っても、同一uidを再ラップして
    // 自己入れ子（二重穴埋め・押しても表示されない）になるのを防ぐ。
    if(ann.uid&&document.querySelector('mark[data-aid="'+ann.uid+'"]')) return false;
    var root=null,scoped=false;
    if(ann.parentAid){
      var pm=document.querySelector('mark[data-aid="'+ann.parentAid+'"]');
      if(pm){root=pm;scoped=true;}
    }
    if(!root) root=ann.panelId==='body'?document.body:document.getElementById(ann.panelId);
    if(!root) return false;
    if(root.closest&&root.closest('svg')) return false; // SVG内は復元不可
    // 文脈優先＋occ着地で一意化（szResolveLoc）。selText がノード跨ぎで解決不能な時だけ
    // 旧経路（単一ノード内の文脈/語句検索）にフォールバック。
    var loc=szResolveLoc(root,ann,scoped);
    if(!loc) loc=szFindByContext(root,ann,scoped);
    if(loc){
      var range=document.createRange();
      range.setStart(loc.node,loc.offset);
      range.setEnd(loc.node,loc.end);
      var mark=document.createElement('mark');
      mark.className='sz-'+ann.type;
      mark.dataset.aid=ann.uid;
      if(ann.comment) mark.dataset.comment=ann.comment;
      if(ann.color){ mark.style.background=ann.color; mark.dataset.hlc=ann.color; }
      if(ann.type==='size') mark.dataset.lv=ann.level||'sm';
      try{
        range.surroundContents(mark);
        if(ann.type==='cm'&&ann.comment) addCmtIcon(mark,ann.comment);
        return true;
      }catch(e){/* 単一ノードで包めない（境界またぎ）→ 下の多ノード復元へ */}
    }
    // 単一ノード復元が解決/包込みできない場合：境界またぎ注釈をノード単位で復元
    return szRestoreSpan(root,ann,scoped);
  }

  /* ---- 注釈の表示/非表示トグル（テキストはそのまま） ---- */
  var annotShown=true;
  window.szToggleAnnot=function(){
    annotShown=!annotShown;
    document.body.classList.toggle('sz-annot-off',!annotShown);
    var btn=document.getElementById('sz-toggle');
    btn.classList.toggle('active',annotShown);
    btn.title=annotShown?'✏️ メモON（選択でハイライト/コメント可）→ タップでOFF':'✏️ メモOFF（読むだけ・ポップアップなし）→ タップでON';
  };

  /* ---- Escで閉じ / Ctrl+Enterで保存 ---- */
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){szHideBar();szHideCmt();szHideDel();hideTipNow();szHideHlPicker();}
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'&&cmtPop.classList.contains('on')) szSaveCmt();
  });

  /* ---- トースト ---- */
  function showToast(msg){
    var t=document.createElement('div');
    t.className='sz-toast';t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(function(){t.remove();},2400);
  }

  /* ---- タブパネルに安定 id を付与 ----
     .tab-panel / .tab-content に id が無いと panelOf() が 'body' に落ち、注釈がタブに紐づかない。
     その結果、同一語句が複数タブに出るノートでは、復元が別タブの最初の一致へ吸われ
     「作ったタブで空欄が消える」。連番 id を振ってタブ単位に紐づける（既存 id は尊重）。 */
  (function(){
    var ps=document.querySelectorAll('.tab-panel');
    if(!ps.length) ps=document.querySelectorAll('.tab-content');
    [].slice.call(ps).forEach(function(p,i){ if(!p.id) p.id='szpanel'+i; });
  })();

  /* ---- 予習（複製プレビュー）カードを自動で pre_ 扱いに ----
     確認システム苦手復習ノート等は読込時に各タブ先頭へ全 .fill-card を cloneNode で複製し
     「予習｜…」見出しを付ける。id が無いと同一テキストが2か所に出現し、自作穴埋め等が
     リロード時に複製側へ復元されて本物が消えて見える。複製側に pre_ id を付与して
     既存の [id^="pre_"] 除外（fbInit / restore / szUnblankSelection）を効かせる。 */
  (function(){
    var seq=0;
    [].slice.call(document.querySelectorAll('.fill-card')).forEach(function(c){
      var h=c.querySelector('.fill-head,.fill-header');
      if(!h) return;
      if(!/^予習\s*[｜|]/.test((h.textContent||'').trim())) return;
      if(c.closest('[id^="pre_"]')) return;          // 既に pre_ 配下なら不要
      if(c.id && c.id.indexOf('pre_')===0) return;   // 既に pre_ id
      c.id='pre_yoshu_'+(seq++);
    });
  })();

  /* 完全重複エントリ（同panel・同type・同occ・同selText・同文脈）を1件へ統合。
     旧バージョンの誤復元期に同じ穴埋めを作り直して二重登録された分を除去し、
     「2か所が空欄＋押しても表示されない（入れ子）」を根本から防ぐ。記録も掃除。 */
  (function(){
    var seen={},out=[];
    for(var i=0;i<db.length;i++){ var a=db[i];
      var sig=(a.panelId||'')+'|'+(a.type||'')+'|'+(a.occ)+'|'+(a.selText||'')+'|'+(a.ctxBefore||'')+'|'+(a.ctxAfter||'')+'|'+(a.parentAid||'');
      if(seen[sig]) continue; seen[sig]=1; out.push(a);
    }
    if(out.length!==db.length){ db=out; save(); }
  })();

  fbInit();
  restoreAll();
})();
</script>

<!-- ===== 検索（タブ横断）／色フィルタ／付箋メモ ===== -->
<script>
(function(){
  'use strict';
  function szHashStr(s){var h=5381;for(var i=0;i<s.length;i++){h=((h*33)^s.charCodeAt(i))>>>0;}return h.toString(36);}
  /* 保存キーは「ファイル名だけ」から生成 → フォルダ経由やパス表記の違いで保存先がズレない */
  var fileKey=(function(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}return szHashStr((p.split('/').pop()||p));})();
  var fileKeyOld=(function(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}return szHashStr(p);})(); /* 旧：フルパスハッシュ（自動移行用） */
  var panels=Array.prototype.slice.call(document.querySelectorAll('.tab-panel'));
  if(!panels.length) panels=Array.prototype.slice.call(document.querySelectorAll('.tab-content'));
  var tabBtns=Array.prototype.slice.call(document.querySelectorAll('.tab-nav .tab-btn'));
  if(!tabBtns.length) tabBtns=Array.prototype.slice.call(document.querySelectorAll('.tab-btn'));
  var hasTabs=panels.length>0;
  if(!hasTabs) panels=[document.body];
  function tabName(i){var b=tabBtns[i];return b?b.textContent.replace(/\s+/g,' ').trim():('タブ'+(i+1));}
  function currentTab(){for(var i=0;i<panels.length;i++)if(panels[i].classList.contains('active'))return i;return 0;}
  /* タブの安定キー：付箋・画像・枠は従来「数値タブindex(n.tab)」で表示判定していたため、
     タブの追加/削除/並べ替えで“別タブに出る”ことがあった。panel の id（このノートは
     tab-xxx 等の固定id）でひも付ければ並べ替えに強い。id 無しは 't'+index にフォールバック。 */
  function tabKeyOf(i){ var p=panels[i]; return (p&&p.id)?p.id:('t'+i); }
  function curKey(){ return tabKeyOf(currentTab()); }
  /* このメモ/枠/画像が今のタブに表示されるべきか。pk があれば pk（安定）で、無ければ旧 tab で判定。 */
  function noteShownNow(n){ return (n.pk!=null)?(n.pk===curKey()):(n.tab===currentTab()); }
  function uid(){return 'n'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  /* テキストノード走査（UI部品・script/styleは除外） */
  function walkText(root,cb){
    var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode:function(n){
        if(!n.nodeValue||!n.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
        var p=n.parentElement;
        if(!p) return NodeFilter.FILTER_REJECT;
        if(p.closest('#sz-search,#sz-filter,.sz-note,.sz-shape,.sz-img,script,style')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var n; while((n=w.nextNode())) cb(n);
  }

  /* ============ ① タブ切替（タブボタンを実クリック・付箋表示を同期） ============ */
  function gotoTab(i){ if(hasTabs && tabBtns[i]) tabBtns[i].click(); }
  tabBtns.forEach(function(b){ b.addEventListener('click',function(){ setTimeout(syncNotes,0); }); });

  /* ============ ② 検索（タブ横断） ============ */
  var sBox=document.getElementById('sz-search');
  var sInput=document.getElementById('sz-s-input');
  var sCount=document.getElementById('sz-s-count');
  var sResults=document.getElementById('sz-s-results');
  var sBtn=document.getElementById('sz-btn-search');

  function clearHits(){
    document.querySelectorAll('mark.sz-search-hit').forEach(function(m){
      var p=m.parentNode; if(!p) return;
      while(m.firstChild) p.insertBefore(m.firstChild,m);
      p.removeChild(m); p.normalize();
    });
  }
  function buildSnip(txt,idx,len){
    var s=Math.max(0,idx-24), e=Math.min(txt.length,idx+len+30);
    return (s>0?'…':'')+esc(txt.slice(s,idx))+'<b>'+esc(txt.slice(idx,idx+len))+'</b>'+esc(txt.slice(idx+len,e))+(e<txt.length?'…':'');
  }
  function doSearch(q){
    clearHits();
    sResults.innerHTML='';
    q=(q||'').trim();
    if(q.length<1){sCount.textContent='';return;}
    var ql=q.toLowerCase(), total=0, CAP=80;
    var frag=document.createDocumentFragment();
    panels.forEach(function(panel,pi){
      var occ=0;
      walkText(panel,function(node){
        var low=node.nodeValue.toLowerCase(), from=0, idx;
        while((idx=low.indexOf(ql,from))!==-1){
          if(total<CAP){
            var item=document.createElement('div');
            item.className='sz-s-item';
            item.innerHTML='<div class="sz-s-tab">'+esc(tabName(pi))+'</div><div class="sz-s-snip">'+buildSnip(node.nodeValue,idx,q.length)+'</div>';
            (function(p,o){item.addEventListener('click',function(){jumpTo(p,o,q);});})(pi,occ);
            frag.appendChild(item);
          }
          total++; occ++; from=idx+q.length;
        }
      });
    });
    sResults.appendChild(frag);
    sCount.textContent=total?(total+'件'+(total>CAP?'（先頭'+CAP+'件を表示）':'')):'該当なし';
  }
  function jumpTo(pi,occ,q){
    gotoTab(pi);
    setTimeout(function(){
      clearHits();
      var ql=q.toLowerCase(), count=0, done=false;
      walkText(panels[pi],function(node){
        if(done) return;
        var low=node.nodeValue.toLowerCase(), from=0, idx;
        while((idx=low.indexOf(ql,from))!==-1){
          if(count===occ){
            try{
              var r=document.createRange();
              r.setStart(node,idx); r.setEnd(node,idx+q.length);
              var m=document.createElement('mark'); m.className='sz-search-hit pulse';
              r.surroundContents(m);
              m.scrollIntoView({block:'center',behavior:'smooth'});
            }catch(e){}
            done=true; return;
          }
          count++; from=idx+q.length;
        }
      });
    },70);
  }

  function szAddImage(src, pageX, pageY, natW, natH){
    var ratio=(natW&&natH)?(natH/natW):0.66;
    var dispW=Math.min(natW||260, 280); if(dispW<60) dispW=Math.min(260,natW||260);
    var dispH=Math.max(40,Math.round(dispW*ratio));
    var n={id:uid(),tab:currentTab(),pk:curKey(),x:Math.max(0,Math.round(pageX)),y:Math.max(0,Math.round(pageY)),w:dispW,h:dispH,src:src,img:true};
    notes.push(n);
    var ok=true; try{ localStorage.setItem(NKEY,JSON.stringify(notes)); }catch(e){ ok=false; }
    if(!ok){ notes.pop(); shToast('⚠ 保存容量オーバー：画像が多すぎます（古い画像を消すか枚数を減らしてください）'); return; }
    buildImage(n);
  }
  function buildImage(n){
    var el=document.createElement('div');
    el.className='sz-img'; el.dataset.nid=n.id;
    el.style.left=(n.x||120)+'px'; el.style.top=(n.y||120)+'px';
    el.style.width=(n.w||240)+'px'; el.style.height=(n.h||160)+'px';
    var img=document.createElement('img'); img.src=n.src||''; img.alt='';
    var del=document.createElement('button'); del.type='button'; del.className='sz-img-del'; del.textContent='🗑'; del.title='画像を削除';
    el.appendChild(img); el.appendChild(del);
    document.body.appendChild(el); noteEls[n.id]=el;
    if(!noteShownNow(n)) el.style.display='none';
    del.addEventListener('click',function(e){ e.stopPropagation(); el.remove(); delete noteEls[n.id]; notes=notes.filter(function(x){return x.id!==n.id;}); saveNotes(); });
    /* リサイズ：四隅すべて（縦横比維持・つかんだ角の対角を固定） */
    ['nw','ne','sw','se'].forEach(function(corner){
      var rz=document.createElement('div'); rz.className='sz-img-rz '+corner; rz.title='ドラッグでサイズ変更（縦横比維持）';
      el.appendChild(rz);
      var movesLeft=(corner==='nw'||corner==='sw'), movesTop=(corner==='nw'||corner==='ne');
      rz.addEventListener('pointerdown',function(e){
        e.preventDefault(); e.stopPropagation();
        var sx=e.clientX, ox=parseInt(el.style.left)||0, oy=parseInt(el.style.top)||0;
        var sw=el.offsetWidth, sh=el.offsetHeight, r=(sh/sw)||0.66;
        function mv(ev){
          var dw=movesLeft?(sx-ev.clientX):(ev.clientX-sx);
          var w=Math.max(48, sw+dw), h=Math.round(w*r);
          el.style.width=w+'px'; el.style.height=h+'px';
          el.style.left=(movesLeft? ox+sw-w : ox)+'px';
          el.style.top =(movesTop ? oy+sh-h : oy)+'px';
        }
        function up(){ document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); n.w=el.offsetWidth; n.h=el.offsetHeight; n.x=parseInt(el.style.left)||0; n.y=parseInt(el.style.top)||0; saveNotes(); }
        document.addEventListener('pointermove',mv); document.addEventListener('pointerup',up);
      });
    });
    /* 移動（枠全体ドラッグ。閾値3pxで誤クリック移動を防止） */
    el.addEventListener('pointerdown',function(e){
      if(e.target.classList&&(e.target.classList.contains('sz-img-rz')||e.target.classList.contains('sz-img-del'))) return;
      if(e.button!==undefined&&e.button!==0) return;
      var sx=e.clientX, sy=e.clientY, ox=parseInt(el.style.left)||0, oy=parseInt(el.style.top)||0, moved=false;
      function mv(ev){ if(!moved){ if(Math.abs(ev.clientX-sx)<3&&Math.abs(ev.clientY-sy)<3) return; moved=true; document.body.style.userSelect='none'; } ev.preventDefault(); el.style.left=Math.max(0,ox+ev.clientX-sx)+'px'; el.style.top=Math.max(0,oy+ev.clientY-sy)+'px'; }
      function up(){ document.removeEventListener('pointermove',mv); document.removeEventListener('pointerup',up); document.body.style.userSelect=''; if(moved){ n.x=parseInt(el.style.left)||0; n.y=parseInt(el.style.top)||0; saveNotes(); } }
      document.addEventListener('pointermove',mv); document.addEventListener('pointerup',up);
    });
  }
  function szIngestFiles(fileList, pageX, pageY){
    var sx=window.pageXOffset||document.documentElement.scrollLeft||0;
    var sy=window.pageYOffset||document.documentElement.scrollTop||0;
    var imgs=[].slice.call(fileList||[]).filter(function(f){return f&&f.type&&f.type.indexOf('image/')===0;});
    if(!imgs.length){ shToast('画像ファイルが見つかりません'); return; }
    imgs.forEach(function(f,i){
      szCompressImage(f,function(src,nw,nh){
        var px=(pageX!=null?pageX:sx+Math.round(window.innerWidth/2)-130)+(i*18);
        var py=(pageY!=null?pageY:sy+120)+(i*18);
        szAddImage(src,px,py,nw,nh);
      });
    });
  }
  /* ① ファイル選択 */
  (function(){
    var imgInput=document.getElementById('sz-img-input');
    var imgBtn=document.getElementById('sz-btn-img');
    if(imgBtn&&imgInput){
      imgBtn.addEventListener('click',function(){ imgInput.value=''; imgInput.click(); });
      imgInput.addEventListener('change',function(){ if(imgInput.files&&imgInput.files.length){ szIngestFiles(imgInput.files,null,null); } });
    }
  })();
  /* ② ドラッグ&ドロップ */
  document.addEventListener('dragover',function(e){
    if(e.dataTransfer&&[].slice.call(e.dataTransfer.types||[]).indexOf('Files')>=0) e.preventDefault();
  },false);
  document.addEventListener('drop',function(e){
    if(!e.dataTransfer||!e.dataTransfer.files||!e.dataTransfer.files.length) return;
    var imgs=[].slice.call(e.dataTransfer.files).filter(function(f){return f.type&&f.type.indexOf('image/')===0;});
    if(!imgs.length) return;
    e.preventDefault();
    var sx=window.pageXOffset||0, sy=window.pageYOffset||0;
    szIngestFiles(imgs, sx+e.clientX-120, sy+e.clientY-20);
  },false);
  /* ③ ペースト（コピーした画像） */
  document.addEventListener('paste',function(e){
    var cd=e.clipboardData; if(!cd) return;
    var blobs=[];
    (cd.items?[].slice.call(cd.items):[]).forEach(function(it){ if(it.kind==='file'&&it.type&&it.type.indexOf('image/')===0){ var b=it.getAsFile(); if(b) blobs.push(b); } });
    if(!blobs.length) return;
    e.preventDefault();
    var sx=window.pageXOffset||0, sy=window.pageYOffset||0;
    var px=sx+((typeof shLastMouse!=='undefined'&&shLastMouse)?shLastMouse.x:120);
    var py=sy+((typeof shLastMouse!=='undefined'&&shLastMouse)?shLastMouse.y:120);
    blobs.forEach(function(b,k){ szCompressImage(b,function(src,nw,nh){ szAddImage(src,px+k*18,py+k*18,nw,nh); }); });
  },true);

  notes.forEach(function(n){ if(n.frame) buildFrame(n); else if(n.shape) buildShape(n); else if(n.img) buildImage(n); else buildNote(n); });
  syncNotes();
  document.getElementById('sz-btn-note').addEventListener('click',function(){
    var cnt=notes.filter(function(x){return noteShownNow(x);}).length;
    var sx=window.pageXOffset||document.documentElement.scrollLeft||0;
    var sy=window.pageYOffset||document.documentElement.scrollTop||0;
    var n={id:uid(),tab:currentTab(),pk:curKey(),x:sx+90+(cnt%4)*22,y:sy+110+(cnt%4)*22,h:0,text:'',color:'#fef9c3'};
    notes.push(n); saveNotes(); buildNote(n);
    var el=noteEls[n.id]; if(el) el.querySelector('.sz-n-body').focus();
  });
})();
</script>

<script>

  var live=document.createElement('canvas'); live.id='szp-live'; document.body.appendChild(live);
  var pred=document.createElement('canvas'); pred.id='szp-pred'; document.body.appendChild(pred);  // 予測専用（毎フレームclear）
  var lctx=null, pctx=null, liveDrawnIdx=0;
  function liveCtx(){ if(!lctx){ try{lctx=live.getContext('2d',{desynchronized:true});}catch(e){lctx=live.getContext('2d');} } return lctx; }
  function predCtx(){ if(!pctx){ try{pctx=pred.getContext('2d',{desynchronized:true});}catch(e){pctx=pred.getContext('2d');} } return pctx; }
  function sizeOne(cv,ctxfn){
    var dpr=window.devicePixelRatio||1, w=window.innerWidth, h=window.innerHeight;
    cv.style.width=w+'px'; cv.style.height=h+'px';
    cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr); /* width設定でクリアも兼ねる */
    var c=ctxfn(); c.setTransform(dpr,0,0,dpr,0,0); c.lineCap='round'; c.lineJoin='round';
  }
  function sizeLive(){ sizeOne(live,liveCtx); sizeOne(pred,predCtx); liveDrawnIdx=0; }
  function clearLive(){ liveCtx().clearRect(0,0,window.innerWidth,window.innerHeight); predCtx().clearRect(0,0,window.innerWidth,window.innerHeight); liveDrawnIdx=0; }
  window.addEventListener('resize',function(){ if(penOn) sizeLive(); });

  /* ---- 要素相対座標アンカーシステム ---- */
  var ANCHOR_SEL='p,h1,h2,h3,h4,h5,h6,li,td,th,dt,dd';
  function scrollXY(){return [window.pageXOffset||document.documentElement.scrollLeft||0,window.pageYOffset||document.documentElement.scrollTop||0];}
  function getContentEls(tabIdx){
    var panel=(panels&&panels[tabIdx]!=null)?panels[tabIdx]:document.body;
    return [].slice.call(panel.querySelectorAll(ANCHOR_SEL));
  }
  function findAnchor(pt,tabIdx){
    var els=getContentEls(tabIdx),s=scrollXY(),bestIdx=-1,bestDist=Infinity;
    for(var i=0;i<els.length;i++){
      var r=els[i].getBoundingClientRect(),ey=r.top+s[1],eh=Math.max(r.height,1);
      var inY=(pt[1]>=ey-4&&pt[1]<=ey+eh+4);
      var dist=inY?Math.abs(pt[1]-(ey+eh/2)):Math.abs(pt[1]-ey)+10000;
      if(dist<bestDist){bestDist=dist;bestIdx=i;}
    }
    if(bestIdx<0) return null;
    var r=els[bestIdx].getBoundingClientRect(),s2=scrollXY();
    return {idx:bestIdx,ax:r.left+s2[0],ay:r.top+s2[1]};
  }
  function anchorOff(anchor,tabIdx){
    if(!anchor) return {ox:0,oy:0};
    var els=getContentEls(tabIdx!=null?tabIdx:currentTab());
    var el=els[anchor.idx];
    if(!el) return {ox:0,oy:0};
    var r=el.getBoundingClientRect(),s=scrollXY();
    return {ox:r.left+s[0],oy:r.top+s[1]};
  }
  /* 曲線化（段階3）：中点法のquadraticで点群を滑らかに通す。点を増やさないのでノード数は不変 */
  function smoothD(pts,X,Y){
    var n=pts.length;
    if(n===1) return 'M'+X(pts[0])+' '+Y(pts[0])+' L'+(X(pts[0])+0.1)+' '+Y(pts[0]);
    if(n===2) return 'M'+X(pts[0])+' '+Y(pts[0])+' L'+X(pts[1])+' '+Y(pts[1]);
    var d='M'+X(pts[0])+' '+Y(pts[0]);
    for(var i=1;i<n-1;i++){
      var mx=(X(pts[i])+X(pts[i+1]))/2, my=(Y(pts[i])+Y(pts[i+1]))/2;
      d+=' Q'+X(pts[i])+' '+Y(pts[i])+' '+mx+' '+my;   // 制御点=頂点／曲線は中点を通る
    }
    d+=' L'+X(pts[n-1])+' '+Y(pts[n-1]);
    return d;
  }
  function pathD(pts,ox,oy,sx){
    ox=ox||0;oy=oy||0;sx=sx||1;
    if(!pts.length) return '';
    function X(p){return p[0]*sx+ox;} function Y(p){return p[1]+oy;}
    return smoothD(pts,X,Y);
  }
  /* ---- 筆圧→線幅（段階2）。pr<0=非ペン（一定幅）。ペンは pr(0..1) を幅に反映 ---- */
  function widthAt(pr,base){ if(pr<0||pr==null) return base; return Math.max(0.6, base*(0.40+1.25*pr)); }
  function qWidth(w){ return Math.round(w*2)/2; }                 // 0.5px量子化でサブパス数を抑える
  function hasPressure(pts){ return pts.length>0 && pts[0].length>2; }
  /* 間引き（段階3／#5ノード削減）：直前の採用点から minD 未満の点を捨てる。端点は残す */
  function decimate(pts,minD){
    if(pts.length<3) return pts;
    var out=[pts[0]],last=pts[0],md=minD*minD;
    for(var i=1;i<pts.length-1;i++){ var dx=pts[i][0]-last[0],dy=pts[i][1]-last[1]; if(dx*dx+dy*dy>=md){ out.push(pts[i]); last=pts[i]; } }
    out.push(pts[pts.length-1]); return out;
  }
  /* 手ブレ補正（段階3／#2）：3点移動平均で位置だけ均す。筆圧(3要素目)は保持・端点は固定 */
  function smoothPts(pts){
    if(pts.length<3) return pts;
    var out=[pts[0]];
    for(var i=1;i<pts.length-1;i++){
      var x=(pts[i-1][0]+pts[i][0]+pts[i+1][0])/3, y=(pts[i-1][1]+pts[i][1]+pts[i+1][1])/3;
      out.push(pts[i].length>2?[x,y,pts[i][2]]:[x,y]);
    }
    out.push(pts[pts.length-1]); return out;
  }
  function mkPath(color,w){
    var el=document.createElementNS(SVGNS,'path');
    el.setAttribute('fill','none');el.setAttribute('stroke',color);
    el.setAttribute('stroke-width',w);el.setAttribute('stroke-linecap','round');el.setAttribute('stroke-linejoin','round');
    return el;
  }
  /* 筆圧ストロークは「同じ幅の連続区間ごとにサブパス」に分けて1つの<g>へ（保存・再描画で太さ保持） */
  function drawVarStroke(s,ox,oy,sx){
    var pts=s.pts,base=s.w,g=document.createElementNS(SVGNS,'g'),i=1;
    function X(p){return p[0]*sx+ox;} function Y(p){return p[1]+oy;}
    if(pts.length===1){ var e0=mkPath(s.c,qWidth(widthAt(pts[0][2],base))); e0.setAttribute('d',smoothD([pts[0]],X,Y)); g.appendChild(e0); layer.appendChild(g); return g; }
    while(i<pts.length){
      var w0=qWidth(widthAt(pts[i][2],base));
      var j=i+1;
      for(;j<pts.length;j++){ if(qWidth(widthAt(pts[j][2],base))!==w0) break; }
      var band=pts.slice(i-1,j);                          // 同幅の連続区間 [i-1 .. j-1]（隣の帯と端点を共有＝継ぎ目なし）
      var el=mkPath(s.c,w0); el.setAttribute('d',smoothD(band,X,Y)); g.appendChild(el);  // 帯ごとに曲線化
      i=j;
    }
    layer.appendChild(g); return g;
  }
  function drawStroke(s,tabIdx){
    var ox=0,oy=0,sx=1;
    if(s.anchor){var off=anchorOff(s.anchor,tabIdx!=null?tabIdx:currentTab());ox=off.ox;oy=off.oy;}
    else if(s.vw&&s.vw!==window.innerWidth){sx=window.innerWidth/s.vw;}
    if(s['var'] && hasPressure(s.pts)) return drawVarStroke(s,ox,oy,sx);   // ペン＝筆圧可変幅
    var el=mkPath(s.c,s.w); el.setAttribute('d',pathD(s.pts,ox,oy,sx));     // 指/マウス＝従来どおり一定幅（後方互換）
    layer.appendChild(el);return el;
  }
  function render(){
    var ti=currentTab();
    while(layer.firstChild) layer.removeChild(layer.firstChild);
    strokesFor(ti).forEach(function(s){drawStroke(s,ti);});
    sizeLayer();
  }

  /* タブ切替で再描画 */
  tabBtns.forEach(function(b){ b.addEventListener('click',function(){ setTimeout(render,0); }); });

  /* ---- 描画状態 ---- */
  var penOn=false, eraseOn=false, curColor='#ef4444', curWidth=4;
  var drawing=false, curPts=null, curEl=null;
  var penSeen=false, curIsPen=false, activePid=null;   // penSeen=このページでペンが使われた／curIsPen=今のストロークがペン

  function pagePt(e){
    var s=scrollXY();
    var pr=(e.pointerType==='pen')?(e.pressure>0?e.pressure:0.5):-1;   // ペンのみ筆圧。非ペンは-1（一定幅）
    return [Math.round(e.clientX+s[0]),Math.round(e.clientY+s[1]),pr];
  }
  function eraseAt(pt){
    var ti=currentTab(),arr=strokesFor(ti),th=Math.max(12,curWidth*2.2),removed=false;
    for(var i=arr.length-1;i>=0;i--){
      var s=arr[i],ox=0,oy=0,sx=1;
      if(s.anchor){var off=anchorOff(s.anchor,ti);ox=off.ox;oy=off.oy;}
      else if(s.vw&&s.vw!==window.innerWidth){sx=window.innerWidth/s.vw;}
      var pts=s.pts;
      for(var j=0;j<pts.length;j++){
        var rpx=(pt[0]-ox)/sx,rpy=pt[1]-oy;
        var dx=pts[j][0]-rpx,dy=pts[j][1]-rpy;
        if(dx*dx+dy*dy<=th*th){arr.splice(i,1);removed=true;break;}
      }
    }
    if(removed){save();render();}
  }

  /* ライブ描画：curPts=ページ座標(保存用)／liveCli=画面座標(canvas描画用)。
     1ストローク中はスクロール固定(szpPreventScroll)なので画面座標で滑らかに描いてよい。 */
  var liveCli=null, livePred=null, liveRAF=0;
  function segW(p){ return curIsPen?widthAt(p&&p[2]!=null?p[2]:-1,curWidth):curWidth; }
  function flushLive(){
    liveRAF=0;
    if(!liveCli||!liveCli.length) return;
    /* ① 本体(live)は消さず、未描画ぶん（liveDrawnIdx以降）の区間だけ足す＝段階3 部分再描画。
       描画コストは「新しく増えた点ぶん」だけ＝長い一筆でも1フレームが軽い。 */
    var lc=liveCtx(); lc.strokeStyle=curColor; lc.lineCap='round'; lc.lineJoin='round';
    for(var i=Math.max(1,liveDrawnIdx);i<liveCli.length;i++){
      var a=liveCli[i-1],b=liveCli[i];
      lc.lineWidth=segW(b);
      lc.beginPath(); lc.moveTo(a[0],a[1]); lc.lineTo(b[0],b[1]); lc.stroke();
    }
    liveDrawnIdx=liveCli.length;
    /* ② 予測(先読み)は別キャンバス(pred)に毎フレーム描き直し。本体に被らず・本体を消さずに済む。 */
    var pc=predCtx(); pc.clearRect(0,0,window.innerWidth,window.innerHeight);
    if(livePred&&livePred.length){
      pc.strokeStyle=curColor; pc.lineCap='round'; pc.lineJoin='round';
      var tail=[liveCli[liveCli.length-1]].concat(livePred);
      for(var k=1;k<tail.length;k++){
        var a2=tail[k-1],b2=tail[k];
        pc.lineWidth=segW(b2);
        pc.beginPath(); pc.moveTo(a2[0],a2[1]); pc.lineTo(b2[0],b2[1]); pc.stroke();
      }
    }
  }
  function scheduleLive(){ if(!liveRAF) liveRAF=requestAnimationFrame(flushLive); }
  function coalesced(e){ return (e.getCoalescedEvents&&e.getCoalescedEvents().length)?e.getCoalescedEvents():[e]; }

  layer.addEventListener('pointerdown',function(e){
    if(!penOn) return;
    if(e.pointerType==='pen') penSeen=true;
    if(penSeen && e.pointerType==='touch') return;        // パームリジェクション：ペンを使った後は指/手のひらを無視
    if(drawing) return;                                   // 既に別ポインタで描画中なら追加接触は無視
    e.preventDefault();
    layer.setPointerCapture&&layer.setPointerCapture(e.pointerId);
    activePid=e.pointerId; curIsPen=(e.pointerType==='pen');
    if(eraseOn){drawing=true;eraseAt(pagePt(e));return;}
    drawing=true;
    var p0=pagePt(e);
    curPts=[p0];
    liveCli=[[e.clientX,e.clientY,p0[2]]]; livePred=null;
    sizeLive();          // dpr/サイズ合わせ＋クリア（このストローク中はスクロール固定）
    scheduleLive();
  });
  layer.addEventListener('pointermove',function(e){
    if(!penOn||!drawing) return;
    if(penSeen && e.pointerType==='touch') return;        // パームリジェクション（移動も無視）
    if(activePid!=null && e.pointerId!==activePid) return;// 描画中ポインタ以外は無視
    e.preventDefault();
    if(eraseOn){eraseAt(pagePt(e));return;}
    var evs=coalesced(e);                                  // 取りこぼし0で中間点を全部拾う
    for(var i=0;i<evs.length;i++){ var ev=evs[i]; var pp=pagePt(ev); curPts.push(pp); liveCli.push([ev.clientX,ev.clientY,pp[2]]); }
    var pr=(e.getPredictedEvents)?e.getPredictedEvents():null; // 先読み（保存しない・毎フレーム描き直す）
    livePred=(pr&&pr.length)?pr.map(function(ev){ var v=(ev.pointerType==='pen'&&ev.pressure>0)?ev.pressure:(curIsPen?0.5:-1); return [ev.clientX,ev.clientY,v]; }):null;
    scheduleLive();
  });
  function endStroke(e){
    if(e && activePid!=null && e.pointerId!==activePid) return;  // 手のひら等・別ポインタの up はペン描画を終わらせない
    if(!drawing) return;
    drawing=false; activePid=null;
    if(liveRAF){cancelAnimationFrame(liveRAF);liveRAF=0;}
    if(!eraseOn&&curPts&&curPts.length>1){                        // 1点のみ（ただのクリック）はストロークとして保存しない
      var cp=smoothPts(decimate(curPts,1.2));                    // #5 間引き → #2 平滑化（端点・筆圧は保持）
      var ti=currentTab(),anch=findAnchor(cp[0],ti),stroke;
      if(curIsPen){                                               // ペン＝筆圧を保持（pts=[x,y,pr]・var:true）
        if(anch){ var rel=cp.map(function(p){return [p[0]-anch.ax,p[1]-anch.ay,p[2]];}); stroke={c:curColor,w:curWidth,pts:rel,anchor:{idx:anch.idx},'var':true}; }
        else { stroke={c:curColor,w:curWidth,pts:cp,vw:window.innerWidth,'var':true}; }
      } else {                                                    // 指/マウス＝従来形式 pts=[x,y]（後方互換）
        if(anch){ var rel2=cp.map(function(p){return [p[0]-anch.ax,p[1]-anch.ay];}); stroke={c:curColor,w:curWidth,pts:rel2,anchor:{idx:anch.idx}}; }
        else { stroke={c:curColor,w:curWidth,pts:cp.map(function(p){return [p[0],p[1]];}),vw:window.innerWidth}; }
      }
      strokesFor(ti).push(stroke);
      drawStroke(stroke,ti);   // 確定ストロークを SVG(確定層) へ。SVG描画→canvasクリアを同フレームで行い二重表示/ちらつき無し
      save();
    }
    liveCli=null; livePred=null; clearLive();
    curPts=null;curEl=null;
  }
  layer.addEventListener('pointerup',endStroke);
  layer.addEventListener('pointercancel',endStroke);
  layer.addEventListener('pointerleave',endStroke);

  /* ---- パレットUI ---- */
  var pal=document.getElementById('szp-pal');
  var COLORS=['#ef4444','#2563eb','#16a34a','#111827','#f59e0b','#db2777'];
  var WIDTHS=[2,4,7];
  var colWrap=document.getElementById('szp-colors');
  COLORS.forEach(function(c){
    var d=document.createElement('div'); d.className='szp-c'+(c===curColor?' sel':''); d.style.background=c; d.dataset.c=c;
    d.addEventListener('click',function(){curColor=c;eraseOn=false;syncEraser();colWrap.querySelectorAll('.szp-c').forEach(function(x){x.classList.toggle('sel',x.dataset.c===c);});});
    colWrap.appendChild(d);
  });
  var wWrap=document.getElementById('szp-widths');
  WIDTHS.forEach(function(w){
    var d=document.createElement('div'); d.className='szp-w'+(w===curWidth?' sel':''); d.dataset.w=w;
    var bar=document.createElement('span'); bar.style.width='16px'; bar.style.height=w+'px'; d.appendChild(bar);
    d.addEventListener('click',function(){curWidth=w;wWrap.querySelectorAll('.szp-w').forEach(function(x){x.classList.toggle('sel',+x.dataset.w===w);});});
    wWrap.appendChild(d);
  });
  var eraserBtn=document.getElementById('szp-eraser');
  function syncEraser(){ eraserBtn.classList.toggle('on',eraseOn); eraserBtn.textContent=eraseOn?'🧹 消しゴム ON':'🧹 消しゴム'; }
  eraserBtn.addEventListener('click',function(){ eraseOn=!eraseOn; syncEraser(); });
  document.getElementById('szp-undo').addEventListener('click',function(){
    var arr=strokesFor(currentTab()); if(arr.length){ arr.pop(); save(); render(); }
  });
  document.getElementById('szp-clear').addEventListener('click',function(){
    var arr=strokesFor(currentTab()); if(!arr.length) return;
    if(confirm('このタブの落書きを全て消しますか？')){ data[tabKeyOf(currentTab())]=[]; save(); render(); }
  });

  /* ---- 🖊 トグルボタン（⋮ツールバーに同居） ---- */
  /* ペンON中は touchmove を {passive:false} でキャプチャしてスクロールを防止 */
  function szpPreventScroll(e){ if(penOn) e.preventDefault(); }
  function setPen(on){
    penOn=on;
    layer.classList.toggle('szp-on',on);
    live.classList.toggle('szp-on',on);
    pred.classList.toggle('szp-on',on);
    pal.classList.toggle('on',on);
    if(on){ pal.classList.remove('szp-drawing','szp-min'); var mb=document.getElementById('szp-min'); if(mb)mb.textContent='−'; } // ON時は必ずフル表示
    var btn=document.getElementById('szp-btn');
    if(btn) btn.classList.toggle('active',on);
    if(on){
      render();
      sizeLive();
      document.addEventListener('touchmove',szpPreventScroll,{passive:false});
    } else {
      clearLive();
      document.removeEventListener('touchmove',szpPreventScroll,{passive:false});
    }
  }
  function ensureBtn(){
    var btn=document.getElementById('szp-btn');
    if(!btn){
      btn=document.createElement('button');
      btn.id='szp-btn'; btn.type='button'; btn.className='sz-tool-btn'; btn.title='🖊 ペン（自由描画）ON/OFF';
      btn.textContent='🖊';
      btn.addEventListener('click',function(e){ e.stopPropagation(); setPen(!penOn); });
      btn.style.position='fixed'; btn.style.right='12px'; btn.style.bottom='232px'; btn.style.zIndex='201';
      document.body.appendChild(btn);
    }
    // ⋮ツールバーが（後から）生成されたら、その中へ移動して同居させる
    var bar=document.getElementById('sz-toolbar');
    if(bar && btn.parentNode!==bar){
      btn.style.position=''; btn.style.right=''; btn.style.bottom=''; btn.style.zIndex='';
      bar.insertBefore(btn, bar.firstChild);
    }
  }
  function boot(){ sizeLayer(); render(); ensureBtn(); setTimeout(ensureBtn,120); setTimeout(ensureBtn,400); setTimeout(function(){ensureBtn();sizeLayer();},800); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,0);});
  else setTimeout(boot,0);
  /* 「ペンを閉じる」＝パネル内の確実に押せるOFFボタン（ツールバーの小さな🖊に頼らない） */
  var offBtn=document.getElementById('szp-off');
  if(offBtn) offBtn.addEventListener('click',function(e){ e.stopPropagation(); setPen(false); });
  /* 「−／＋」＝パネルを最小化／展開（ペンはONのまま・下の描画エリアが空く） */
  var minBtn=document.getElementById('szp-min');
  if(minBtn) minBtn.addEventListener('click',function(e){
    e.stopPropagation();
    var min=pal.classList.toggle('szp-min');
    minBtn.textContent=min?'＋':'−';
    minBtn.title=min?'展開（ペン設定を開く）':'最小化（ペンは使えるまま）';
  });
  /* ===== ヘッダーを掴んでパネルを自由移動（位置はlocalStorage保存） ===== */
  (function(){
    var head=document.getElementById('szp-head'); if(!head) return;
    var POSKEY='szPalPos_'+fileKey();
    function applyPos(l,t){
      l=Math.max(0,Math.min(window.innerWidth-44,l));
      t=Math.max(0,Math.min(window.innerHeight-30,t));
      pal.style.right='auto'; pal.style.left=l+'px'; pal.style.top=t+'px';
    }
    try{var sp=JSON.parse(localStorage.getItem(POSKEY)||'null'); if(sp&&typeof sp.l==='number') applyPos(sp.l,sp.t);}catch(e){}
    head.style.cursor='grab'; head.style.touchAction='none';
    var drag=false,sx=0,sy=0,sl=0,st=0;
    head.addEventListener('pointerdown',function(e){
      if(e.target.closest('button')) return;          // −／＋ ボタンはタップ優先
      var r=pal.getBoundingClientRect(); sl=r.left; st=r.top; sx=e.clientX; sy=e.clientY; drag=true;
      head.style.cursor='grabbing';
      try{head.setPointerCapture(e.pointerId);}catch(x){}
      e.preventDefault(); e.stopPropagation();
    });
    head.addEventListener('pointermove',function(e){
      if(!drag) return; applyPos(sl+e.clientX-sx, st+e.clientY-sy); e.preventDefault();
    });
    function end(){ if(!drag) return; drag=false; head.style.cursor='grab';
      try{localStorage.setItem(POSKEY,JSON.stringify({l:parseInt(pal.style.left,10)||0,t:parseInt(pal.style.top,10)||0}));}catch(e){}
    }
    head.addEventListener('pointerup',end);
    head.addEventListener('pointercancel',end);
  })();
  /* 描画中はパネルを薄く透過してじゃまにならないように（指を離すと戻る） */
  layer.addEventListener('pointerdown',function(){ if(penOn) pal.classList.add('szp-drawing'); });
  layer.addEventListener('pointerup',    function(){ pal.classList.remove('szp-drawing'); });
  layer.addEventListener('pointercancel',function(){ pal.classList.remove('szp-drawing'); });
  layer.addEventListener('pointerleave', function(){ pal.classList.remove('szp-drawing'); });
  // Gist sync から呼べるペン全消し（キャッシュ対策：空データをlocalStorageに書いてから再描画）
  window.__szpClearPen=function(){data={};save();render();};
  // ダウンロード後用：localStorageから再読み込みして再描画（restoreLS後に呼ぶ）
  window.__szpSync=function(){try{data=JSON.parse(localStorage.getItem(PKEY)||'{}');}catch(e){data={};}render();};
})();
</script>

<!-- ===== ⋮ ツールバー長押しドラッグ移動 ===== -->
<script>
(function(){
  'use strict';
  function szTbKey(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}var h=5381;for(var i=0;i<p.length;i++){h=((h*33)^p.charCodeAt(i))>>>0;}return h.toString(36);}
  var POSKEY='szTPos_'+szTbKey();
  /* 誤って長押しドラッグで右下等へ移動・固定された⋮を、一度だけ右上既定(top:6px;right:8px)へリセット。
     以降はドラッグ移動＋位置保存も通常どおり動く（リセットはファイル×ブラウザごとに1回だけ）。 */
  try{var SZTB_RK='szTReset1_'+szTbKey(); if(!localStorage.getItem(SZTB_RK)){ localStorage.removeItem(POSKEY); localStorage.setItem(SZTB_RK,'1'); }}catch(e){}
  var tb=null, lp=null, drag=false, suppress=false;
  var sx=0,sy=0,sl=0,st=0;

  function restorePos(){
    try{
      var p=JSON.parse(localStorage.getItem(POSKEY)||'null');
      if(p&&typeof p.l==='number'){
        tb.style.right='auto';
        tb.style.left=Math.max(0,Math.min(window.innerWidth-30,p.l))+'px';
        tb.style.top=Math.max(0,Math.min(window.innerHeight-30,p.t))+'px';
      }
    }catch(e){}
  }

  function init(){
    tb=document.getElementById('sz-toolbar');
    if(!tb) return;
    restorePos();

    document.addEventListener('pointerdown',function(e){
      if(!e.target.closest('#sz-hide-tools')) return;
      var tgt=e.target, pid=e.pointerId;
      sx=e.clientX; sy=e.clientY; suppress=false;
      lp=setTimeout(function(){
        lp=null; drag=true;
        var r=tb.getBoundingClientRect();
        sl=r.left; st=r.top;
        tb.style.right='auto';
        tb.style.left=sl+'px';
        tb.style.top=st+'px';
        tb.style.opacity='0.7';
        try{tgt.setPointerCapture(pid);}catch(ex){}
      },450);
    });

    document.addEventListener('pointermove',function(e){
      if(!drag) return;
      var nl=Math.max(0,Math.min(window.innerWidth-96,sl+e.clientX-sx));
      var nt=Math.max(0,Math.min(window.innerHeight-30,st+e.clientY-sy));
      tb.style.left=nl+'px';
      tb.style.top=nt+'px';
      suppress=true;
    });

    document.addEventListener('pointerup',function(){
      if(lp){clearTimeout(lp);lp=null;}
      if(!drag) return;
      drag=false;
      tb.style.opacity='';
      var r=tb.getBoundingClientRect();
      try{localStorage.setItem(POSKEY,JSON.stringify({l:r.left,t:r.top}));}catch(ex){}
    });

    document.addEventListener('pointercancel',function(){
      if(lp){clearTimeout(lp);lp=null;}
      drag=false; tb.style.opacity='';
    });

    // ドラッグ後クリックを抑制（⋮トグルの誤発火防止）
    document.addEventListener('click',function(e){
      if(suppress&&e.target.closest('#sz-hide-tools')){
        suppress=false;
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    },true);

    window.addEventListener('resize',function(){
      if(!tb||tb.style.left==='auto'||!tb.style.left) return;
      tb.style.left=Math.max(0,Math.min(window.innerWidth-96,parseInt(tb.style.left)||0))+'px';
      tb.style.top=Math.max(0,Math.min(window.innerHeight-30,parseInt(tb.style.top)||0))+'px';
    });
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){setTimeout(init,150);});
  else setTimeout(init,150);
})();
</script>

<!-- ===== ☁️ Gist同期 ===== -->
<script>
(function(){
  'use strict';
  var PAT_KEY='szGistPAT', GID_KEY='szGistID';
  function getPAT(){return localStorage.getItem(PAT_KEY)||'';}
  function getGID(){return localStorage.getItem(GID_KEY)||'';}

  function dumpLS(){
    var o={};
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k===PAT_KEY||k===GID_KEY) continue;
      o[k]=localStorage.getItem(k);
    }
    return JSON.stringify(o);
  }
  function restoreLS(json){
    var o; try{o=JSON.parse(json);}catch(e){return;}
    // PAT/GistID以外を全削除してからGistデータで完全上書き
    var toDel=[];
    for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k!==PAT_KEY&&k!==GID_KEY)toDel.push(k);}
    toDel.forEach(function(k){localStorage.removeItem(k);});
    Object.keys(o).forEach(function(k){
      if(k===PAT_KEY||k===GID_KEY) return;
      try{localStorage.setItem(k,o[k]);}catch(e){}
    });
  }
  function toast(msg){
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:6px 15px;border-radius:20px;font-size:.78rem;z-index:99999;pointer-events:none;';
    t.textContent=msg; document.body.appendChild(t);
    setTimeout(function(){t.remove();},2800);
  }
  function upload(){
    var gid=getGID();
    return fetch(gid?'https://api.github.com/gists/'+gid:'https://api.github.com/gists',{
      method:gid?'PATCH':'POST',
      headers:{'Authorization':'token '+getPAT(),'Content-Type':'application/json'},
      body:JSON.stringify({description:'shindanshi-matome notes',public:false,files:{'notes.json':{content:dumpLS()}}})
    }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){if(!gid)localStorage.setItem(GID_KEY,j.id);return j.id;});
  }
  function findGist(){
    return fetch('https://api.github.com/gists',{headers:{'Authorization':'token '+getPAT()}})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(list){
        var found=list.find(function(g){return g.description==='shindanshi-matome notes';});
        if(found){localStorage.setItem(GID_KEY,found.id);return found.id;}
        return null;
      });
  }
  function doFetch(gid){
    return fetch('https://api.github.com/gists/'+gid,{headers:{'Authorization':'token '+getPAT()}})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){
        var c=j.files&&j.files['notes.json']&&j.files['notes.json'].content;
        if(!c) throw new Error('notes.json が見つかりません');
        restoreLS(c);
      });
  }
  function download(){
    var gid=getGID();
    if(gid) return doFetch(gid);
    return findGist().then(function(id){
      if(!id) return Promise.reject(new Error('Gistが見つかりません。先にアップロードしてください'));
      return doFetch(id);
    });
  }
  function showPATModal(onSave){
    var ov=document.createElement('div');
    ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:20000;display:flex;align-items:center;justify-content:center;';
    var box=document.createElement('div');
    box.style.cssText='background:#fff;border-radius:12px;padding:20px;width:320px;max-width:92vw;box-shadow:0 8px 30px rgba(0,0,0,.3);font-size:.85rem;font-family:inherit;color:#1e293b;';
    box.innerHTML='<div style="font-weight:700;margin-bottom:6px">☁️ GitHub Gist 連携設定</div>'
      +'<div style="font-size:.75rem;color:#64748b;margin-bottom:12px;line-height:1.7">GitHub → Settings → Developer settings<br>→ Tokens (classic) → <b>gist</b> スコープだけONで発行</div>'
      +'<input id="szGPinput" type="password" placeholder="ghp_xxxxxxxx" style="width:100%;border:1.5px solid #cbd5e1;border-radius:7px;padding:7px 10px;font-size:.85rem;font-family:inherit;outline:none;box-sizing:border-box;">'
      +'<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">'
      +'<button id="szGPcancel" style="border:1px solid #e2e8f0;background:#f8fafc;color:#475569;border-radius:7px;padding:5px 14px;cursor:pointer;font-family:inherit;">キャンセル</button>'
      +'<button id="szGPsave" style="background:#3b82f6;color:#fff;border:none;border-radius:7px;padding:5px 14px;font-weight:700;cursor:pointer;font-family:inherit;">保存</button>'
      +'</div>';
    ov.appendChild(box); document.body.appendChild(ov);
    var inp=box.querySelector('#szGPinput');
    var ex=getPAT(); if(ex) inp.value=ex;
    setTimeout(function(){inp.focus();},60);
    ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
    box.querySelector('#szGPcancel').onclick=function(){ov.remove();};
    box.querySelector('#szGPsave').onclick=function(){
      var v=inp.value.trim(); if(!v) return;
      localStorage.setItem(PAT_KEY,v); ov.remove();
      if(onSave) onSave();
    };
  }
  function showMenu(btn){
    var old=document.getElementById('szGmenu'); if(old){old.remove();return;}
    var m=document.createElement('div'); m.id='szGmenu';
    m.style.cssText='position:fixed;background:#1e293b;border-radius:10px;padding:6px;z-index:10100;box-shadow:0 4px 18px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:3px;min-width:148px;';
    var r=btn.getBoundingClientRect();
    m.style.top=(r.bottom+6)+'px';
    m.style.right=(window.innerWidth-r.right)+'px';
    function mBtn(lbl,fn){
      var b=document.createElement('button'); b.type='button'; b.textContent=lbl;
      b.style.cssText='background:none;border:none;color:#e2e8f0;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:.82rem;font-family:inherit;text-align:left;white-space:nowrap;';
      b.onmouseenter=function(){b.style.background='rgba(255,255,255,.12)';};
      b.onmouseleave=function(){b.style.background='none';};
      b.onclick=function(){m.remove();fn();}; return b;
    }
    m.appendChild(mBtn('↑ Gistへ保存',function(){
      toast('保存中…');
      upload().then(function(){toast('✅ 保存しました');}).catch(function(e){toast('❌ '+e.message);});
    }));
    m.appendChild(mBtn('↓ Gistから読込',function(){
      if(!confirm('Gistのデータで現在のデータを上書きします。よろしいですか？')) return;
      toast('読込中…');
      download().then(function(){
        // restoredLS後のlocalStorageから再読込して即反映
        if(window.__szpSync) window.__szpSync();
        toast('✅ 読込完了。再読み込みします…');
        setTimeout(function(){location.reload();},1200);
      }).catch(function(e){toast('❌ '+e.message);});
    }));
    m.appendChild(mBtn('🔑 トークン変更',function(){showPATModal();}));
    m.appendChild(mBtn('🔄 消去してGistから再読込',function(){
      if(!confirm('ローカルデータを全消去してGistのデータで上書きします。よろしいですか？')) return;
      // GistIDも含め全クリア → findGist()で再検索してダウンロード
      var toDel=[];
      for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k!==PAT_KEY)toDel.push(k);}
      toDel.forEach(function(k){localStorage.removeItem(k);});
      if(window.__szpClearPen) window.__szpClearPen(); // ↑消去直後は視覚的にも消す
      toast('Gistを検索中…');
      download().then(function(){
        if(window.__szpSync) window.__szpSync(); // ↓復元後はGistの内容で再描画
        toast('✅ 読込完了。再読み込みします…');
        setTimeout(function(){location.reload();},1200);
      }).catch(function(e){toast('❌ '+e.message);});
    }));
    m.appendChild(mBtn('🗑 ローカルデータ全消去',function(){
      if(!confirm('このデバイスの注釈・描画・付箋などを全て削除します。よろしいですか？')) return;
      var toDel=[];
      for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k!==PAT_KEY&&k!==GID_KEY)toDel.push(k);}
      toDel.forEach(function(k){localStorage.removeItem(k);});
      if(window.__szpClearPen) window.__szpClearPen();
      toast('🗑 削除しました。再読み込みします…');
      setTimeout(function(){location.reload();},1000);
    }));
    document.body.appendChild(m);
    setTimeout(function(){
      document.addEventListener('click',function cl(e){
        if(!m.contains(e.target)&&e.target!==btn){m.remove();document.removeEventListener('click',cl);}
      });
    },0);
  }
  function init(){
    // ⋮の直左に常時表示（tools折りたたみ時も表示）
    var sty=document.createElement('style');
    sty.textContent='body.sz-tools-hidden #sz-gist-btn{display:flex!important}';
    document.head.appendChild(sty);
    var btn=document.createElement('button');
    btn.id='sz-gist-btn'; btn.type='button'; btn.textContent='☁️';
    btn.title='Gist同期（↑保存／↓読込）';
    btn.style.cssText='background:#475569;color:#fff;font-size:.75rem;';
    btn.addEventListener('click',function(){
      if(!getPAT()) showPATModal(function(){showMenu(btn);}); else showMenu(btn);
    });
    function dock(){
      var bar=document.getElementById('sz-toolbar');
      var ht=document.getElementById('sz-hide-tools');
      if(bar&&ht&&btn.parentNode!==bar) bar.insertBefore(btn,ht);
    }
    setTimeout(dock,250);setTimeout(dock,600);setTimeout(dock,1200);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){setTimeout(init,170);});
  else setTimeout(init,170);
})();
</script>


<!-- ===== ↕ セクション並べ替え（drag-to-reorder） ===== -->
<style>
.sz-drag-handle{cursor:grab;color:#475569;font-size:.76rem;font-weight:700;line-height:1.2;padding:2px 8px;border:1px solid #cbd5e1;border-radius:7px;background:rgba(255,255,255,.92);opacity:.85;transition:opacity .15s,background .15s,border-color .15s;user-select:none;-webkit-user-select:none;touch-action:none;flex-shrink:0;white-space:nowrap}
.sz-drag-handle:hover{opacity:1;background:#eef2ff;border-color:#6366f1;color:#4338ca}
.sz-drag-handle:active{cursor:grabbing}
.sz-drag-handle-heading{margin-left:auto}
.sz-drag-handle-inline{margin-left:6px;vertical-align:middle}
.sz-drag-handle-corner{position:absolute;top:3px;right:3px;z-index:8}
.sz-drag-block.sz-is-dragging{opacity:.15;pointer-events:none}
/* 挿入位置を示す太線 */
.sz-drag-line{height:0;border-top:4px solid #6366f1;margin:0;border-radius:2px;position:relative;z-index:4999}
.sz-drag-line::before{content:"▶ ここに移動";position:absolute;top:-22px;left:8px;background:#6366f1;color:#fff;font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;pointer-events:none}
</style>
<script>
(function(){
  'use strict';
  function fileKey(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}var h=5381;for(var i=0;i<p.length;i++){h=((h*33)^p.charCodeAt(i))>>>0;}return h.toString(36);}
  var DKEY='szDR_'+fileKey();
  var panels=[].slice.call(document.querySelectorAll('.tab-panel'));
  if(!panels.length) panels=[].slice.call(document.querySelectorAll('.tab-content'));
  var TITLE_SEL='.section-title,.fill-section-title,.fill-card,.card-header';

    function secId(block){
    var st=block.querySelector(TITLE_SEL);
    var raw;
    if(st&&st.closest('.sz-drag-block')===block){
      if(st.classList.contains('fill-card')){var fh=st.querySelector('.fill-head');raw=(fh?fh.textContent:st.textContent)||'';}
      else raw=st.textContent||'';
    } else { raw=block.textContent||''; }
    return raw.replace(/[⠿⠃\s]/g,'').slice(0,48);
  }

  function wrapPanel(panel){
    if(panel.dataset.szDrDone) return;
    panel.dataset.szDrDone='1';
    // .hide-block（qz-hide製）があればそれをそのまま使用
    var hb=[].slice.call(panel.querySelectorAll(':scope>.hide-block'));
    if(hb.length){hb.forEach(function(b){b.classList.add('sz-drag-block');});return;}
    // qz-hide が .sec-hide-wrap でラップ済みなら、それをドラッグ単位にする
    var shw=[].slice.call(panel.querySelectorAll(':scope>.sec-hide-wrap'));
    if(shw.length){shw.forEach(function(b){b.classList.add('sz-drag-block');});return;}
    // .card 直子要素があればそのまま使用（qz-hide 未適用時のフォールバック）
    var cards=[].slice.call(panel.querySelectorAll(':scope>.card'));
    if(cards.length){cards.forEach(function(b){b.classList.add('sz-drag-block');});return;}
    // div.section-title を起点にグループ化してラップ
    var kids=Array.from(panel.children).filter(function(c){
      return !c.classList.contains('sz-drag-block')&&!c.classList.contains('sz-drag-ph');
    });
    var groups=[],s=-1;
    for(var i=0;i<kids.length;i++){
      if(kids[i].matches&&kids[i].matches(TITLE_SEL)){if(s!==-1)groups.push([s,i-1]);s=i;}
    }
    if(s!==-1) groups.push([s,kids.length-1]);
    groups.forEach(function(g){
      var first=kids[g[0]]; if(!first||first.parentNode!==panel) return;
      var w=document.createElement('div'); w.className='sz-drag-block';
      first.parentNode.insertBefore(w,first);
      for(var j=g[0];j<=g[1];j++){if(kids[j]&&kids[j].parentNode===panel)w.appendChild(kids[j]);}
    });
  }

    function mkHandle(extra){var h=document.createElement('span');h.className='sz-drag-handle'+(extra?' '+extra:'');h.textContent='⠿ 移動';h.title='ドラッグで移動';return h;}
  function addHandles(scope){
    (scope||document).querySelectorAll('.sz-drag-block').forEach(function(block){
      if(block.__szH) return;
      // qz-hide の ○（隠す）ボタン行が上部にある場合は、その行の右端に並べて重なりを防ぐ
      var btnRow=block.querySelector(':scope>.sec-hide-btn-row');
      if(btnRow){btnRow.appendChild(mkHandle('sz-drag-handle-inline'));block.__szH=1;return;}
      // それ以外は常に「ブロック全体の右上」に固定表示（掴みやすい見えるボタン）
      if(getComputedStyle(block).position==='static') block.style.position='relative';
      block.appendChild(mkHandle('sz-drag-handle-corner'));
      block.__szH=1;
    });
  }

    function dragContainers(){
    var cs=[];
    document.querySelectorAll('.sz-drag-block').forEach(function(b){
      var p=b.parentNode; if(p&&cs.indexOf(p)<0) cs.push(p);
    });
    return cs;
  }
  function baseKey(cont){
    var pi=panels.indexOf(cont); if(pi>=0) return 'P'+pi;
    var blk=cont.closest?cont.closest('.sz-drag-block'):null;
    if(blk&&blk!==cont) return 'B:'+secId(blk);
    var pn=cont.closest?cont.closest('.tab-panel,.tab-content'):null;
    return 'X'+(pn?panels.indexOf(pn):-1)+':'+((cont.className||'')+'').replace(/\s+/g,'').slice(0,16);
  }
  /* 同一 baseKey の容器（例：複数の div.fig／クラス無しdiv）が衝突するとスナップショットで
     上書きされ1つ分しか保存されず、復元時に取り違えて並びが戻ってしまう。容器自体は並べ替えで
     動かない（中の子ブロックだけが動く）ので、文書順の出現番号(#0,#1…)を付けて一意化する。 */
  function keyMap(){
    var seen={},m=[];
    dragContainers().forEach(function(cont){
      var b=baseKey(cont),i=(b in seen?seen[b]+1:0); seen[b]=i;
      m.push([cont,b+'#'+i]);
    });
    return m;
  }
  function directBlocks(cont){
    return [].slice.call(cont.children).filter(function(c){return c.classList&&c.classList.contains('sz-drag-block');});
  }
  function snapshot(){
    var o={};
    keyMap().forEach(function(p){o[p[1]]=directBlocks(p[0]).map(secId);});
    return o;
  }
  function saveOrder(){try{localStorage.setItem(DKEY,JSON.stringify(snapshot()));}catch(e){}}
  function loadOrder(){try{return JSON.parse(localStorage.getItem(DKEY)||'null');}catch(e){return null;}}
    function applyOrderAll(saved){
    if(!saved) return;
    keyMap().forEach(function(p){
      var cont=p[0],want=saved[p[1]]; if(!want) return;
      var byId={};directBlocks(cont).forEach(function(b){var id=secId(b);if(id&&!(id in byId))byId[id]=b;});
      want.forEach(function(id){var b=byId[id];if(b)cont.appendChild(b);});
    });
  }

  var dragging=null,dragPanel=null,ph=null,initRect=null,initY=0,lastClientY=0,scrollRAF=null;
  var SCROLL_ZONE=80,MAX_SCROLL=20;
  var undoStack=[],pendingUndo=null,MAX_UNDO=20;

    function currentOrder(){return snapshot();}
  function getInsert(panel,cy){
    var bs=[].slice.call(panel.querySelectorAll(':scope>.sz-drag-block')).filter(function(b){return b!==dragging;});
    for(var i=0;i<bs.length;i++){var r=bs[i].getBoundingClientRect();if(cy<r.top+r.height*.5)return bs[i];}
    return null;
  }

  document.addEventListener('pointerdown',function(e){
    if(!e.target.classList.contains('sz-drag-handle')) return;
    var block=e.target.closest('.sz-drag-block'); if(!block) return;
    e.preventDefault();
    dragging=block;dragPanel=block.parentNode;
    initRect=block.getBoundingClientRect();initY=e.clientY;
    ph=document.createElement('div');ph.className='sz-drag-line';
    block.parentNode.insertBefore(ph,block);
    block.classList.add('sz-is-dragging');
    block.style.cssText='position:fixed;left:'+initRect.left+'px;top:'+initRect.top+'px;width:'+initRect.width+'px;z-index:5000;box-shadow:0 8px 28px rgba(0,0,0,.22);pointer-events:none;box-sizing:border-box;';
    lastClientY=e.clientY;
    pendingUndo=currentOrder();
    try{e.target.setPointerCapture(e.pointerId);}catch(ex){}
    document.addEventListener('pointermove',onMove,{passive:false});
    document.addEventListener('pointerup',onUp);
    document.addEventListener('pointercancel',onUp);
    scrollRAF=requestAnimationFrame(autoScroll);
  });

  function onMove(e){
    if(!dragging) return; e.preventDefault();
    lastClientY=e.clientY;
    dragging.style.top=(initRect.top+(e.clientY-initY))+'px';
    var ins=getInsert(dragPanel,e.clientY);
    if(ins) dragPanel.insertBefore(ph,ins); else dragPanel.appendChild(ph);
  }
  function autoScroll(){
    if(!dragging){scrollRAF=null;return;}
    var wh=window.innerHeight,speed=0;
    if(lastClientY<SCROLL_ZONE){

      speed=Math.round(MAX_SCROLL*Math.pow((lastClientY-(wh-SCROLL_ZONE))/SCROLL_ZONE,1.5));
