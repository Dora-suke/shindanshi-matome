    drawing=true;
    var p0=pagePt(e);
    curPts=[p0];
    liveCli=[[e.clientX,e.clientY,p0[2]]]; livePred=null;
    sizeLive();          // dpr/サイズ合わせ＋クリア（このストローク中はスクロール固定）
    scheduleLive();
  });
  layer.addEventListener('pointermove',function(e){
    if(!penOn||!drawing) return;
    if(penSeen && e.pointerType==='touch') return;        // パームリジェクション（移動も無視）
    if(activePid!=null && e.pointerId!==activePid) return;// 描画中ポインタ以外は無視
    e.preventDefault();
    if(eraseOn){eraseAt(pagePt(e));return;}
    var evs=coalesced(e);                                  // 取りこぼし0で中間点を全部拾う
    for(var i=0;i<evs.length;i++){ var ev=evs[i]; var pp=pagePt(ev); curPts.push(pp); liveCli.push([ev.clientX,ev.clientY,pp[2]]); }
    var pr=(e.getPredictedEvents)?e.getPredictedEvents():null; // 先読み（保存しない・毎フレーム描き直す）
    livePred=(pr&&pr.length)?pr.map(function(ev){ var v=(ev.pointerType==='pen'&&ev.pressure>0)?ev.pressure:(curIsPen?0.5:-1); return [ev.clientX,ev.clientY,v]; }):null;
    scheduleLive();
  });
  function endStroke(e){
    if(e && activePid!=null && e.pointerId!==activePid) return;  // 手のひら等・別ポインタの up はペン描画を終わらせない
    if(!drawing) return;
    drawing=false; activePid=null;
    if(liveRAF){cancelAnimationFrame(liveRAF);liveRAF=0;}
    if(!eraseOn&&curPts&&curPts.length>1){                        // 1点のみ（ただのクリック）はストロークとして保存しない
      var cp=smoothPts(decimate(curPts,1.2));                    // #5 間引き → #2 平滑化（端点・筆圧は保持）
      var ti=currentTab(),anch=findAnchor(cp[0],ti),stroke;
      if(curIsPen){                                               // ペン＝筆圧を保持（pts=[x,y,pr]・var:true）
        if(anch){ var rel=cp.map(function(p){return [p[0]-anch.ax,p[1]-anch.ay,p[2]];}); stroke={c:curColor,w:curWidth,pts:rel,anchor:{idx:anch.idx},'var':true}; }
        else { stroke={c:curColor,w:curWidth,pts:cp,vw:window.innerWidth,'var':true}; }
      } else {                                                    // 指/マウス＝従来形式 pts=[x,y]（後方互換）
        if(anch){ var rel2=cp.map(function(p){return [p[0]-anch.ax,p[1]-anch.ay];}); stroke={c:curColor,w:curWidth,pts:rel2,anchor:{idx:anch.idx}}; }
        else { stroke={c:curColor,w:curWidth,pts:cp.map(function(p){return [p[0],p[1]];}),vw:window.innerWidth}; }
      }
      strokesFor(ti).push(stroke);
      drawStroke(stroke,ti);   // 確定ストロークを SVG(確定層) へ。SVG描画→canvasクリアを同フレームで行い二重表示/ちらつき無し
      save();
    }
    liveCli=null; livePred=null; clearLive();
    curPts=null;curEl=null;
  }
  layer.addEventListener('pointerup',endStroke);
  layer.addEventListener('pointercancel',endStroke);
  layer.addEventListener('pointerleave',endStroke);

  /* ---- パレットUI ---- */
  var pal=document.getElementById('szp-pal');
  var COLORS=['#ef4444','#2563eb','#16a34a','#111827','#f59e0b','#db2777'];
  var WIDTHS=[2,4,7];
  var colWrap=document.getElementById('szp-colors');
  COLORS.forEach(function(c){
    var d=document.createElement('div'); d.className='szp-c'+(c===curColor?' sel':''); d.style.background=c; d.dataset.c=c;
    d.addEventListener('click',function(){curColor=c;eraseOn=false;syncEraser();colWrap.querySelectorAll('.szp-c').forEach(function(x){x.classList.toggle('sel',x.dataset.c===c);});});
    colWrap.appendChild(d);
  });
  var wWrap=document.getElementById('szp-widths');
  WIDTHS.forEach(function(w){
    var d=document.createElement('div'); d.className='szp-w'+(w===curWidth?' sel':''); d.dataset.w=w;
    var bar=document.createElement('span'); bar.style.width='16px'; bar.style.height=w+'px'; d.appendChild(bar);
    d.addEventListener('click',function(){curWidth=w;wWrap.querySelectorAll('.szp-w').forEach(function(x){x.classList.toggle('sel',+x.dataset.w===w);});});
    wWrap.appendChild(d);
  });
  var eraserBtn=document.getElementById('szp-eraser');
  function syncEraser(){ eraserBtn.classList.toggle('on',eraseOn); eraserBtn.textContent=eraseOn?'🧹 消しゴム ON':'🧹 消しゴム'; }
  eraserBtn.addEventListener('click',function(){ eraseOn=!eraseOn; syncEraser(); });
  document.getElementById('szp-undo').addEventListener('click',function(){
    var arr=strokesFor(currentTab()); if(arr.length){ arr.pop(); save(); render(); }
  });
  document.getElementById('szp-clear').addEventListener('click',function(){
    var arr=strokesFor(currentTab()); if(!arr.length) return;
    if(confirm('このタブの落書きを全て消しますか？')){ data[tabKeyOf(currentTab())]=[]; save(); render(); }
  });

  /* ---- 🖊 トグルボタン（⋮ツールバーに同居） ---- */
  /* ペンON中は touchmove を {passive:false} でキャプチャしてスクロールを防止 */
  function szpPreventScroll(e){ if(penOn) e.preventDefault(); }
  function setPen(on){
    penOn=on;
    layer.classList.toggle('szp-on',on);
    live.classList.toggle('szp-on',on);
    pred.classList.toggle('szp-on',on);
    pal.classList.toggle('on',on);
    if(on){ pal.classList.remove('szp-drawing','szp-min'); var mb=document.getElementById('szp-min'); if(mb)mb.textContent='−'; } // ON時は必ずフル表示
    var btn=document.getElementById('szp-btn');
    if(btn) btn.classList.toggle('active',on);
    if(on){
      render();
      sizeLive();
      document.addEventListener('touchmove',szpPreventScroll,{passive:false});
    } else {
      clearLive();
      document.removeEventListener('touchmove',szpPreventScroll,{passive:false});
    }
  }
  function ensureBtn(){
    var btn=document.getElementById('szp-btn');
    if(!btn){
      btn=document.createElement('button');
      btn.id='szp-btn'; btn.type='button'; btn.className='sz-tool-btn'; btn.title='🖊 ペン（自由描画）ON/OFF';
      btn.textContent='🖊';
      btn.addEventListener('click',function(e){ e.stopPropagation(); setPen(!penOn); });
      btn.style.position='fixed'; btn.style.right='12px'; btn.style.bottom='232px'; btn.style.zIndex='201';
      document.body.appendChild(btn);
    }
    // ⋮ツールバーが（後から）生成されたら、その中へ移動して同居させる
    var bar=document.getElementById('sz-toolbar');
    if(bar && btn.parentNode!==bar){
      btn.style.position=''; btn.style.right=''; btn.style.bottom=''; btn.style.zIndex='';
      bar.insertBefore(btn, bar.firstChild);
    }
  }
  function boot(){ sizeLayer(); render(); ensureBtn(); setTimeout(ensureBtn,120); setTimeout(ensureBtn,400); setTimeout(function(){ensureBtn();sizeLayer();},800); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){setTimeout(boot,0);});
  else setTimeout(boot,0);
  /* 「ペンを閉じる」＝パネル内の確実に押せるOFFボタン（ツールバーの小さな🖊に頼らない） */
  var offBtn=document.getElementById('szp-off');
  if(offBtn) offBtn.addEventListener('click',function(e){ e.stopPropagation(); setPen(false); });
  /* 「−／＋」＝パネルを最小化／展開（ペンはONのまま・下の描画エリアが空く） */
  var minBtn=document.getElementById('szp-min');
  if(minBtn) minBtn.addEventListener('click',function(e){
    e.stopPropagation();
    var min=pal.classList.toggle('szp-min');
    minBtn.textContent=min?'＋':'−';
    minBtn.title=min?'展開（ペン設定を開く）':'最小化（ペンは使えるまま）';
  });
  /* ===== ヘッダーを掴んでパネルを自由移動（位置はlocalStorage保存） ===== */
  (function(){
    var head=document.getElementById('szp-head'); if(!head) return;
    var POSKEY='szPalPos_'+fileKey();
    function applyPos(l,t){
      l=Math.max(0,Math.min(window.innerWidth-44,l));
      t=Math.max(0,Math.min(window.innerHeight-30,t));
      pal.style.right='auto'; pal.style.left=l+'px'; pal.style.top=t+'px';
    }
    try{var sp=JSON.parse(localStorage.getItem(POSKEY)||'null'); if(sp&&typeof sp.l==='number') applyPos(sp.l,sp.t);}catch(e){}
    head.style.cursor='grab'; head.style.touchAction='none';
    var drag=false,sx=0,sy=0,sl=0,st=0;
    head.addEventListener('pointerdown',function(e){
      if(e.target.closest('button')) return;          // −／＋ ボタンはタップ優先
      var r=pal.getBoundingClientRect(); sl=r.left; st=r.top; sx=e.clientX; sy=e.clientY; drag=true;
      head.style.cursor='grabbing';
      try{head.setPointerCapture(e.pointerId);}catch(x){}
      e.preventDefault(); e.stopPropagation();
    });
    head.addEventListener('pointermove',function(e){
      if(!drag) return; applyPos(sl+e.clientX-sx, st+e.clientY-sy); e.preventDefault();
    });
    function end(){ if(!drag) return; drag=false; head.style.cursor='grab';
      try{localStorage.setItem(POSKEY,JSON.stringify({l:parseInt(pal.style.left,10)||0,t:parseInt(pal.style.top,10)||0}));}catch(e){}
    }
    head.addEventListener('pointerup',end);
    head.addEventListener('pointercancel',end);
  })();
  /* 描画中はパネルを薄く透過してじゃまにならないように（指を離すと戻る） */
  layer.addEventListener('pointerdown',function(){ if(penOn) pal.classList.add('szp-drawing'); });
  layer.addEventListener('pointerup',    function(){ pal.classList.remove('szp-drawing'); });
  layer.addEventListener('pointercancel',function(){ pal.classList.remove('szp-drawing'); });
  layer.addEventListener('pointerleave', function(){ pal.classList.remove('szp-drawing'); });
  // Gist sync から呼べるペン全消し（キャッシュ対策：空データをlocalStorageに書いてから再描画）
  window.__szpClearPen=function(){data={};save();render();};
  // ダウンロード後用：localStorageから再読み込みして再描画（restoreLS後に呼ぶ）
  window.__szpSync=function(){try{data=JSON.parse(localStorage.getItem(PKEY)||'{}');}catch(e){data={};}render();};
})();
</script>

<!-- ===== ⋮ ツールバー長押しドラッグ移動 ===== -->
<script>
(function(){
  'use strict';
  function szTbKey(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}var h=5381;for(var i=0;i<p.length;i++){h=((h*33)^p.charCodeAt(i))>>>0;}return h.toString(36);}
  var POSKEY='szTPos_'+szTbKey();
  /* 誤って長押しドラッグで右下等へ移動・固定された⋮を、一度だけ右上既定(top:6px;right:8px)へリセット。
     以降はドラッグ移動＋位置保存も通常どおり動く（リセットはファイル×ブラウザごとに1回だけ）。 */
  try{var SZTB_RK='szTReset1_'+szTbKey(); if(!localStorage.getItem(SZTB_RK)){ localStorage.removeItem(POSKEY); localStorage.setItem(SZTB_RK,'1'); }}catch(e){}
  var tb=null, lp=null, drag=false, suppress=false;
  var sx=0,sy=0,sl=0,st=0;

  function restorePos(){
    try{
      var p=JSON.parse(localStorage.getItem(POSKEY)||'null');
      if(p&&typeof p.l==='number'){
        tb.style.right='auto';
        tb.style.left=Math.max(0,Math.min(window.innerWidth-30,p.l))+'px';
        tb.style.top=Math.max(0,Math.min(window.innerHeight-30,p.t))+'px';
      }
    }catch(e){}
  }

  function init(){
    tb=document.getElementById('sz-toolbar');
    if(!tb) return;
    restorePos();

    document.addEventListener('pointerdown',function(e){
      if(!e.target.closest('#sz-hide-tools')) return;
      var tgt=e.target, pid=e.pointerId;
      sx=e.clientX; sy=e.clientY; suppress=false;
      lp=setTimeout(function(){
        lp=null; drag=true;
        var r=tb.getBoundingClientRect();
        sl=r.left; st=r.top;
        tb.style.right='auto';
        tb.style.left=sl+'px';
        tb.style.top=st+'px';
        tb.style.opacity='0.7';
        try{tgt.setPointerCapture(pid);}catch(ex){}
      },450);
    });

    document.addEventListener('pointermove',function(e){
      if(!drag) return;
      var nl=Math.max(0,Math.min(window.innerWidth-96,sl+e.clientX-sx));
      var nt=Math.max(0,Math.min(window.innerHeight-30,st+e.clientY-sy));
      tb.style.left=nl+'px';
      tb.style.top=nt+'px';
      suppress=true;
    });

    document.addEventListener('pointerup',function(){
      if(lp){clearTimeout(lp);lp=null;}
      if(!drag) return;
      drag=false;
      tb.style.opacity='';
      var r=tb.getBoundingClientRect();
      try{localStorage.setItem(POSKEY,JSON.stringify({l:r.left,t:r.top}));}catch(ex){}
    });

    document.addEventListener('pointercancel',function(){
      if(lp){clearTimeout(lp);lp=null;}
      drag=false; tb.style.opacity='';
    });

    // ドラッグ後クリックを抑制（⋮トグルの誤発火防止）
    document.addEventListener('click',function(e){
      if(suppress&&e.target.closest('#sz-hide-tools')){
        suppress=false;
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    },true);

    window.addEventListener('resize',function(){
      if(!tb||tb.style.left==='auto'||!tb.style.left) return;
      tb.style.left=Math.max(0,Math.min(window.innerWidth-96,parseInt(tb.style.left)||0))+'px';
      tb.style.top=Math.max(0,Math.min(window.innerHeight-30,parseInt(tb.style.top)||0))+'px';
    });
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){setTimeout(init,150);});
  else setTimeout(init,150);
})();
</script>

<!-- ===== ☁️ Gist同期 ===== -->
<script>
(function(){
  'use strict';
  var PAT_KEY='szGistPAT', GID_KEY='szGistID';
  function getPAT(){return localStorage.getItem(PAT_KEY)||'';}
  function getGID(){return localStorage.getItem(GID_KEY)||'';}

  function dumpLS(){
    var o={};
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k===PAT_KEY||k===GID_KEY) continue;
      o[k]=localStorage.getItem(k);
    }
    return JSON.stringify(o);
  }
  function restoreLS(json){
    var o; try{o=JSON.parse(json);}catch(e){return;}
    // PAT/GistID以外を全削除してからGistデータで完全上書き
    var toDel=[];
    for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k!==PAT_KEY&&k!==GID_KEY)toDel.push(k);}
    toDel.forEach(function(k){localStorage.removeItem(k);});
    Object.keys(o).forEach(function(k){
      if(k===PAT_KEY||k===GID_KEY) return;
      try{localStorage.setItem(k,o[k]);}catch(e){}
    });
  }
  function toast(msg){
    var t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:6px 15px;border-radius:20px;font-size:.78rem;z-index:99999;pointer-events:none;';
    t.textContent=msg; document.body.appendChild(t);
    setTimeout(function(){t.remove();},2800);
  }
  function upload(){
    var gid=getGID();
    return fetch(gid?'https://api.github.com/gists/'+gid:'https://api.github.com/gists',{
      method:gid?'PATCH':'POST',
      headers:{'Authorization':'token '+getPAT(),'Content-Type':'application/json'},
      body:JSON.stringify({description:'shindanshi-matome notes',public:false,files:{'notes.json':{content:dumpLS()}}})
    }).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){if(!gid)localStorage.setItem(GID_KEY,j.id);return j.id;});
  }
  function findGist(){
    return fetch('https://api.github.com/gists',{headers:{'Authorization':'token '+getPAT()}})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(list){
        var found=list.find(function(g){return g.description==='shindanshi-matome notes';});
        if(found){localStorage.setItem(GID_KEY,found.id);return found.id;}
        return null;
      });
  }
  function doFetch(gid){
    return fetch('https://api.github.com/gists/'+gid,{headers:{'Authorization':'token '+getPAT()}})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(j){
        var c=j.files&&j.files['notes.json']&&j.files['notes.json'].content;
        if(!c) throw new Error('notes.json が見つかりません');
        restoreLS(c);
      });
  }
  function download(){
    var gid=getGID();
    if(gid) return doFetch(gid);
    return findGist().then(function(id){
      if(!id) return Promise.reject(new Error('Gistが見つかりません。先にアップロードしてください'));
      return doFetch(id);
    });
  }
  function showPATModal(onSave){
    var ov=document.createElement('div');
    ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:20000;display:flex;align-items:center;justify-content:center;';
    var box=document.createElement('div');
    box.style.cssText='background:#fff;border-radius:12px;padding:20px;width:320px;max-width:92vw;box-shadow:0 8px 30px rgba(0,0,0,.3);font-size:.85rem;font-family:inherit;color:#1e293b;';
    box.innerHTML='<div style="font-weight:700;margin-bottom:6px">☁️ GitHub Gist 連携設定</div>'
      +'<div style="font-size:.75rem;color:#64748b;margin-bottom:12px;line-height:1.7">GitHub → Settings → Developer settings<br>→ Tokens (classic) → <b>gist</b> スコープだけONで発行</div>'
      +'<input id="szGPinput" type="password" placeholder="ghp_xxxxxxxx" style="width:100%;border:1.5px solid #cbd5e1;border-radius:7px;padding:7px 10px;font-size:.85rem;font-family:inherit;outline:none;box-sizing:border-box;">'
      +'<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">'
      +'<button id="szGPcancel" style="border:1px solid #e2e8f0;background:#f8fafc;color:#475569;border-radius:7px;padding:5px 14px;cursor:pointer;font-family:inherit;">キャンセル</button>'
      +'<button id="szGPsave" style="background:#3b82f6;color:#fff;border:none;border-radius:7px;padding:5px 14px;font-weight:700;cursor:pointer;font-family:inherit;">保存</button>'
      +'</div>';
    ov.appendChild(box); document.body.appendChild(ov);
    var inp=box.querySelector('#szGPinput');
    var ex=getPAT(); if(ex) inp.value=ex;
    setTimeout(function(){inp.focus();},60);
    ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
    box.querySelector('#szGPcancel').onclick=function(){ov.remove();};
    box.querySelector('#szGPsave').onclick=function(){
      var v=inp.value.trim(); if(!v) return;
      localStorage.setItem(PAT_KEY,v); ov.remove();
      if(onSave) onSave();
    };
  }
  function showMenu(btn){
    var old=document.getElementById('szGmenu'); if(old){old.remove();return;}
    var m=document.createElement('div'); m.id='szGmenu';
    m.style.cssText='position:fixed;background:#1e293b;border-radius:10px;padding:6px;z-index:10100;box-shadow:0 4px 18px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:3px;min-width:148px;';
    var r=btn.getBoundingClientRect();
    m.style.top=(r.bottom+6)+'px';
    m.style.right=(window.innerWidth-r.right)+'px';
    function mBtn(lbl,fn){
      var b=document.createElement('button'); b.type='button'; b.textContent=lbl;
      b.style.cssText='background:none;border:none;color:#e2e8f0;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:.82rem;font-family:inherit;text-align:left;white-space:nowrap;';
      b.onmouseenter=function(){b.style.background='rgba(255,255,255,.12)';};
      b.onmouseleave=function(){b.style.background='none';};
      b.onclick=function(){m.remove();fn();}; return b;
    }
    m.appendChild(mBtn('↑ Gistへ保存',function(){
      toast('保存中…');
      upload().then(function(){toast('✅ 保存しました');}).catch(function(e){toast('❌ '+e.message);});
    }));
    m.appendChild(mBtn('↓ Gistから読込',function(){
      if(!confirm('Gistのデータで現在のデータを上書きします。よろしいですか？')) return;
      toast('読込中…');
      download().then(function(){
        // restoredLS後のlocalStorageから再読込して即反映
        if(window.__szpSync) window.__szpSync();
        toast('✅ 読込完了。再読み込みします…');
        setTimeout(function(){location.reload();},1200);
      }).catch(function(e){toast('❌ '+e.message);});
    }));
    m.appendChild(mBtn('🔑 トークン変更',function(){showPATModal();}));
    m.appendChild(mBtn('🔄 消去してGistから再読込',function(){
      if(!confirm('ローカルデータを全消去してGistのデータで上書きします。よろしいですか？')) return;
      // GistIDも含め全クリア → findGist()で再検索してダウンロード
      var toDel=[];
      for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k!==PAT_KEY)toDel.push(k);}
      toDel.forEach(function(k){localStorage.removeItem(k);});
      if(window.__szpClearPen) window.__szpClearPen(); // ↑消去直後は視覚的にも消す
      toast('Gistを検索中…');
      download().then(function(){
        if(window.__szpSync) window.__szpSync(); // ↓復元後はGistの内容で再描画
        toast('✅ 読込完了。再読み込みします…');
        setTimeout(function(){location.reload();},1200);
      }).catch(function(e){toast('❌ '+e.message);});
    }));
    m.appendChild(mBtn('🗑 ローカルデータ全消去',function(){
      if(!confirm('このデバイスの注釈・描画・付箋などを全て削除します。よろしいですか？')) return;
      var toDel=[];
      for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k!==PAT_KEY&&k!==GID_KEY)toDel.push(k);}
      toDel.forEach(function(k){localStorage.removeItem(k);});
      if(window.__szpClearPen) window.__szpClearPen();
      toast('🗑 削除しました。再読み込みします…');
      setTimeout(function(){location.reload();},1000);
    }));
    document.body.appendChild(m);
    setTimeout(function(){
      document.addEventListener('click',function cl(e){
        if(!m.contains(e.target)&&e.target!==btn){m.remove();document.removeEventListener('click',cl);}
      });
    },0);
  }
  function init(){
    // ⋮の直左に常時表示（tools折りたたみ時も表示）
    var sty=document.createElement('style');
    sty.textContent='body.sz-tools-hidden #sz-gist-btn{display:flex!important}';
    document.head.appendChild(sty);
    var btn=document.createElement('button');
    btn.id='sz-gist-btn'; btn.type='button'; btn.textContent='☁️';
    btn.title='Gist同期（↑保存／↓読込）';

<!-- ===== ↕ セクション並べ替え（drag-to-reorder） ===== -->
<style>

<script>
(function(){
  'use strict';
  function fileKey(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}var h=5381;for(var i=0;i<p.length;i++){h=((h*33)^p.charCodeAt(i))>>>0;}return h.toString(36);}
  var DKEY='szDR_'+fileKey();
  var panels=[].slice.call(document.querySelectorAll('.tab-panel'));
  if(!panels.length) panels=[].slice.call(document.querySelectorAll('.tab-content'));
  var TITLE_SEL='.section-title,.fill-section-title,.fill-card,.card-header';

    function secId(block){
    var st=block.querySelector(TITLE_SEL);
    var raw;
    if(st&&st.closest('.sz-drag-block')===block){
      if(st.classList.contains('fill-card')){var fh=st.querySelector('.fill-head');raw=(fh?fh.textContent:st.textContent)||'';}
      else raw=st.textContent||'';
    } else { raw=block.textContent||''; }
    return raw.replace(/[⠿⠃\s]/g,'').slice(0,48);
  }

  function wrapPanel(panel){
    if(panel.dataset.szDrDone) return;
    panel.dataset.szDrDone='1';
    // .hide-block（qz-hide製）があればそれをそのまま使用
    var hb=[].slice.call(panel.querySelectorAll(':scope>.hide-block'));
    if(hb.length){hb.forEach(function(b){b.classList.add('sz-drag-block');});return;}
    // qz-hide が .sec-hide-wrap でラップ済みなら、それをドラッグ単位にする
    var shw=[].slice.call(panel.querySelectorAll(':scope>.sec-hide-wrap'));
    if(shw.length){shw.forEach(function(b){b.classList.add('sz-drag-block');});return;}
    // .card 直子要素があればそのまま使用（qz-hide 未適用時のフォールバック）
    var cards=[].slice.call(panel.querySelectorAll(':scope>.card'));
    if(cards.length){cards.forEach(function(b){b.classList.add('sz-drag-block');});return;}
    // div.section-title を起点にグループ化してラップ
    var kids=Array.from(panel.children).filter(function(c){
      return !c.classList.contains('sz-drag-block')&&!c.classList.contains('sz-drag-ph');
    });
    var groups=[],s=-1;
    for(var i=0;i<kids.length;i++){
      if(kids[i].matches&&kids[i].matches(TITLE_SEL)){if(s!==-1)groups.push([s,i-1]);s=i;}
    }
    if(s!==-1) groups.push([s,kids.length-1]);
    groups.forEach(function(g){
      var first=kids[g[0]]; if(!first||first.parentNode!==panel) return;
      var w=document.createElement('div'); w.className='sz-drag-block';
      first.parentNode.insertBefore(w,first);
      for(var j=g[0];j<=g[1];j++){if(kids[j]&&kids[j].parentNode===panel)w.appendChild(kids[j]);}
    });
  }

    function mkHandle(extra){var h=document.createElement('span');h.className='sz-drag-handle'+(extra?' '+extra:'');h.textContent='⠿ 移動';h.title='ドラッグで移動';return h;}
  function addHandles(scope){
    (scope||document).querySelectorAll('.sz-drag-block').forEach(function(block){
      if(block.__szH) return;
      // qz-hide の ○（隠す）ボタン行が上部にある場合は、その行の右端に並べて重なりを防ぐ
      var btnRow=block.querySelector(':scope>.sec-hide-btn-row');
      if(btnRow){btnRow.appendChild(mkHandle('sz-drag-handle-inline'));block.__szH=1;return;}
      // それ以外は常に「ブロック全体の右上」に固定表示（掴みやすい見えるボタン）
      if(getComputedStyle(block).position==='static') block.style.position='relative';
      block.appendChild(mkHandle('sz-drag-handle-corner'));
      block.__szH=1;
    });
  }

    function dragContainers(){
    var cs=[];
    document.querySelectorAll('.sz-drag-block').forEach(function(b){
      var p=b.parentNode; if(p&&cs.indexOf(p)<0) cs.push(p);
    });
    return cs;
  }
  function baseKey(cont){
    var pi=panels.indexOf(cont); if(pi>=0) return 'P'+pi;
    var blk=cont.closest?cont.closest('.sz-drag-block'):null;
    if(blk&&blk!==cont) return 'B:'+secId(blk);
    var pn=cont.closest?cont.closest('.tab-panel,.tab-content'):null;
    return 'X'+(pn?panels.indexOf(pn):-1)+':'+((cont.className||'')+'').replace(/\s+/g,'').slice(0,16);
  }
  /* 同一 baseKey の容器（例：複数の div.fig／クラス無しdiv）が衝突するとスナップショットで
     上書きされ1つ分しか保存されず、復元時に取り違えて並びが戻ってしまう。容器自体は並べ替えで
     動かない（中の子ブロックだけが動く）ので、文書順の出現番号(#0,#1…)を付けて一意化する。 */
  function keyMap(){
    var seen={},m=[];
    dragContainers().forEach(function(cont){
      var b=baseKey(cont),i=(b in seen?seen[b]+1:0); seen[b]=i;
      m.push([cont,b+'#'+i]);
    });
    return m;
  }
  function directBlocks(cont){
    return [].slice.call(cont.children).filter(function(c){return c.classList&&c.classList.contains('sz-drag-block');});
  }
  function snapshot(){
    var o={};
    keyMap().forEach(function(p){o[p[1]]=directBlocks(p[0]).map(secId);});
    return o;
  }
  function saveOrder(){try{localStorage.setItem(DKEY,JSON.stringify(snapshot()));}catch(e){}}
  function loadOrder(){try{return JSON.parse(localStorage.getItem(DKEY)||'null');}catch(e){return null;}}
    function applyOrderAll(saved){
    if(!saved) return;
    keyMap().forEach(function(p){
      var cont=p[0],want=saved[p[1]]; if(!want) return;
      var byId={};directBlocks(cont).forEach(function(b){var id=secId(b);if(id&&!(id in byId))byId[id]=b;});
      want.forEach(function(id){var b=byId[id];if(b)cont.appendChild(b);});
    });
  }

  var dragging=null,dragPanel=null,ph=null,initRect=null,initY=0,lastClientY=0,scrollRAF=null;
  var SCROLL_ZONE=80,MAX_SCROLL=20;
  var undoStack=[],pendingUndo=null,MAX_UNDO=20;

    function currentOrder(){return snapshot();}
  function getInsert(panel,cy){
    var bs=[].slice.call(panel.querySelectorAll(':scope>.sz-drag-block')).filter(function(b){return b!==dragging;});
    for(var i=0;i<bs.length;i++){var r=bs[i].getBoundingClientRect();if(cy<r.top+r.height*.5)return bs[i];}
    return null;
  }

  document.addEventListener('pointerdown',function(e){
    if(!e.target.classList.contains('sz-drag-handle')) return;
    var block=e.target.closest('.sz-drag-block'); if(!block) return;
    e.preventDefault();

    initRect=block.getBoundingClientRect();initY=e.clientY;
    ph=document.createElement('div');ph.className='sz-drag-line';
    block.parentNode.insertBefore(ph,block);
    block.classList.add('sz-is-dragging');

    lastClientY=e.clientY;
    pendingUndo=currentOrder();
    try{e.target.setPointerCapture(e.pointerId);}catch(ex){}
    document.addEventListener('pointermove',onMove,{passive:false});
    document.addEventListener('pointerup',onUp);
    document.addEventListener('pointercancel',onUp);
    scrollRAF=requestAnimationFrame(autoScroll);
  });

  function onMove(e){
    if(!dragging) return; e.preventDefault();
    lastClientY=e.clientY;
    dragging.style.top=(initRect.top+(e.clientY-initY))+'px';
    var ins=getInsert(dragPanel,e.clientY);
    if(ins) dragPanel.insertBefore(ph,ins); else dragPanel.appendChild(ph);
  }
  function autoScroll(){
    if(!dragging){scrollRAF=null;return;}
    var wh=window.innerHeight,speed=0;
    if(lastClientY<SCROLL_ZONE){
      speed=-Math.round(MAX_SCROLL*Math.pow(1-lastClientY/SCROLL_ZONE,1.5));
    } else if(lastClientY>wh-SCROLL_ZONE){
      speed=Math.round(MAX_SCROLL*Math.pow((lastClientY-(wh-SCROLL_ZONE))/SCROLL_ZONE,1.5));
    }
    if(speed!==0){
      window.scrollBy(0,speed);
      var ins=getInsert(dragPanel,lastClientY);
      if(ins) dragPanel.insertBefore(ph,ins); else dragPanel.appendChild(ph);
    }
    scrollRAF=requestAnimationFrame(autoScroll);
  }
  function onUp(){
    if(!dragging) return;
    if(scrollRAF){cancelAnimationFrame(scrollRAF);scrollRAF=null;}
    document.removeEventListener('pointermove',onMove);
    document.removeEventListener('pointerup',onUp);
    document.removeEventListener('pointercancel',onUp);
    dragging.style.cssText='';dragging.classList.remove('sz-is-dragging');
    dragPanel.insertBefore(dragging,ph);ph.remove();
    ph=null;dragging=null;dragPanel=null;initRect=null;
    if(pendingUndo){undoStack.push(pendingUndo);if(undoStack.length>MAX_UNDO)undoStack.shift();pendingUndo=null;}
    saveOrder();
  }

    function init(){
    panels.forEach(function(panel){wrapPanel(panel);});
    // 中ブロック粒度：qz-hide が作った全 .sec-hide-wrap もドラッグ単位にする
    document.querySelectorAll('.sec-hide-wrap').forEach(function(b){b.classList.add('sz-drag-block');});
    addHandles(document);
    applyOrderAll(loadOrder());
    document.addEventListener('keydown',function(e){
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!dragging){
        if(!undoStack.length) return;
        e.preventDefault();
        var prev=undoStack.pop();
        applyOrderAll(prev);
        saveOrder();
        var t=document.createElement('div');
        t.style.cssText='position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:5px 14px;border-radius:16px;font-size:.78rem;z-index:9999;pointer-events:none;';
        t.textContent='↩ 並べ替えを元に戻しました（残り'+undoStack.length+'回）';
        document.body.appendChild(t);setTimeout(function(){t.remove();},1800);
      }
    });
  }
  // hide-buttons.html の同期処理が終わった後に動かす
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){setTimeout(init,300);});
  else setTimeout(init,300);
})();
</script>

(function(){

      first.parentNode.insertBefore(w,first);

  // STEP B: ○ボタン付与対象を収集
  var FINE_SEL=['.hide-subblock','.flow-box','.table-wrap','.chart-wrap','.chart-set','.icon-deck','.flash-deck','.factor-grid','.factor-card','.vs-card','.fill-section','.cross-ref','.chart-set-banner','.quiz-q','.flash-card','.chk30','.chk30-q'].join(',');
  var MEDIUM_SEL=['.hide-block','.card','.diagram','.alert-tip','.alert-exam','.alert-danger',
    '.support','.keepit','.goro-row','.bubble-wrap','.mnemonic','.vs-box','.quiz-item','.fill-card','.fill-card-quiet',
    '.hide-subblock','.flow-box','.table-wrap','.chart-wrap','.chart-set','.icon-deck','.flash-deck','.factor-grid','.factor-card','.vs-card','.fill-section','.cross-ref','.chart-set-banner','.quiz-q','.flash-card',

  var targets=[];

  function addTarget(el){if(!seen.has(el)){seen.add(el);targets.push(el);}}

    panel.querySelectorAll(MEDIUM_SEL).forEach(function(el){

  document.querySelectorAll('.hide-block').forEach(function(block){
    Array.from(block.children).forEach(function(child){

// === 最細粒度プラス v3：クラスレスのインライン視覚ボックス & <br>区切り箇条書きも非表示対象に ===
(function(){
  var KEY='mz_fine3_'+location.pathname;
  var st={}; try{st=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}
  function save(){ try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){} }
  function inAnim(el){ return !!el.closest('.sa,.hosho-anim,.goro-scene'); }
  function inPh(el){ return !!el.closest('.row-hidden-ph,.sec-hidden-ph,.tr-hidden-ph'); }
  function hasBtn(el){ return !!el.querySelector(':scope > .row-hide-btn'); }
  function wrappedBySec(el){ var p=el.parentNode; return !!(p&&p.classList&&p.classList.contains('sec-hide-wrap')); }
  function mkPh(el,key,tag){
    var ph=document.createElement(tag||'div'); ph.className='row-hidden-ph';
    ph.innerHTML='— <button>表示</button>';
    ph.querySelector('button').addEventListener('click',function(){ el.style.display=''; ph.remove(); st[key]=0; save(); });
    return ph;
  }
  function addBtn(el,key,phTag,style){
    var cs=window.getComputedStyle(el);
    if(cs.position==='static') el.style.position='relative';
    var pr=parseInt(cs.paddingRight,10)||0; if(pr<20) el.style.paddingRight=(pr+20)+'px';
    var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='この項目を非表示'; btn.textContent='○';
    btn.style.cssText=style||'position:absolute;top:4px;right:4px;float:none;margin:0;z-index:3;';
    el.appendChild(btn);
    btn.addEventListener('click',function(e){ e.stopPropagation(); el.style.display='none'; st[key]=1; save(); el.parentNode.insertBefore(mkPh(el,key,phTag),el.nextSibling); });
    if(st[key]){ el.style.display='none'; el.parentNode.insertBefore(mkPh(el,key,phTag),el.nextSibling); }
  }
  // (A) <br>区切りの箇条書きを行ごとに分割し、各行へ非表示ボタンを付与
  //     対象：.hl ハイライト or 「・」箇条書きを含む視覚ボックス
  function splitBrLines(box,baseKey){
    if(box.getAttribute('data-brsplit')) return false;
    var nodes=Array.from(box.childNodes);
    if(!nodes.some(function(n){return n.nodeName==='BR';})) return false;
    var lines=[],cur=[];
    nodes.forEach(function(n){ if(n.nodeName==='BR'){ lines.push(cur); cur=[]; } else cur.push(n); });
    lines.push(cur);
    var meaningful=lines.filter(function(l){ return l.some(function(n){return (n.textContent||'').trim().length>0;}); });
    if(meaningful.length<2) return false;
    box.setAttribute('data-brsplit','1');
    box.textContent='';
    lines.forEach(function(l,idx){
      var hasText=l.some(function(n){return (n.textContent||'').trim().length>0;});
      var line=document.createElement('div'); line.className='hb-line'; line.style.cssText='position:relative;padding-right:22px;';
      l.forEach(function(n){ line.appendChild(n); });
      box.appendChild(line);
      if(!hasText) return;
      var key='brl:'+baseKey+':'+idx+'|'+(line.textContent||'').replace(/\s+/g,'').slice(0,22);
      var btn=document.createElement('button'); btn.className='row-hide-btn'; btn.title='この行を非表示'; btn.textContent='○';
      btn.style.cssText='position:absolute;top:1px;right:0;float:none;margin:0;';
      line.appendChild(btn);
      btn.addEventListener('click',function(e){ e.stopPropagation(); line.style.display='none'; st[key]=1; save(); line.parentNode.insertBefore(mkPh(line,key,'div'),line.nextSibling); });
      if(st[key]){ line.style.display='none'; line.parentNode.insertBefore(mkPh(line,key,'div'),line.nextSibling); }
    });
    return true;
  }
  // (B) tab-panel 内の div / .hl を走査。視覚ボックス（inline border/background）or .hl を対象化
  var idx=0;
  document.querySelectorAll(_qzPS+' div, '+_qzPS+' .hl').forEach(function(el){
    if(inAnim(el)||inPh(el)||hasBtn(el)||wrappedBySec(el)) return;
    if(el.classList.contains('hb-line')||el.classList.contains('row-hide-btn')||el.classList.contains('sec-hide-btn-row')) return;
    var isHl=el.classList.contains('hl');
    var sty=el.getAttribute('style')||'';
    var isBox=/border|background/.test(sty);
    if(!isHl&&!isBox) return;
    var txt=(el.textContent||'').trim();
    if(txt.length<6) return;
    var key=(isHl?'hlb:':'box:')+(idx++)+'|'+txt.replace(/\s+/g,'').slice(0,26);
    // 箇条書き（・ を含む or .hl）は行分割を試みる
    if((isHl||txt.indexOf('・')>=0)&&splitBrLines(el,key)) return; // 行ごとに付与したので箱全体ボタンは省略
    addBtn(el,key,'div');
  });
})();

// === h4 サブセクション単位の非表示（細粒度：カード内をさらに細分化） ===

.szins-block{position:relative;border-left:3px solid #f59e0b;border-radius:6px;padding:.45rem 1.8rem .45rem .7rem;margin:.45rem 0;box-sizing:border-box;display:flex;flex-direction:column}
.szins-ed{outline:none;min-height:1.5em;line-height:1.7;font-family:inherit;font-size:inherit;color:inherit;cursor:text;-webkit-user-modify:read-write;-webkit-user-select:text;user-select:text;white-space:pre-wrap;word-break:break-word;flex:1 1 auto;overflow:auto}
/* 枠の自由リサイズ用つまみ（幅＝右端 / 高さ＝下端 / 両方＝右下角）。
   タッチ端末は hover が無いので常時表示。掴みやすいよう枠の少し外側・大きめの当たり判定にする。 */
.szins-rz{position:absolute;z-index:6;-webkit-tap-highlight-color:transparent;touch-action:none}
.szins-rz.e{top:50%;transform:translateY(-50%);height:40px;right:-5px;width:16px;cursor:ew-resize}
.szins-rz.w{top:50%;transform:translateY(-50%);height:40px;left:-5px;width:16px;cursor:ew-resize}
.szins-rz.s{left:50%;transform:translateX(-50%);width:40px;bottom:-5px;height:16px;cursor:ns-resize}
.szins-rz.n{left:50%;transform:translateX(-50%);width:40px;top:-5px;height:16px;cursor:ns-resize}
.szins-rz.se{right:-5px;bottom:-5px;width:24px;height:24px;cursor:nwse-resize}
/* グリップ線は表示しない（当たり判定だけ・カーソル形状でドラッグ可能を示す） */
body.sz-annot-off .szins-rz{display:none}
.szins-ed:empty:before{content:'ここに入力…';color:#cbd5e1;pointer-events:none}
.szins-del{position:absolute;top:4px;right:4px;width:20px;height:20px;border:none;background:#f1f5f9;color:#ef4444;border-radius:50%;font-size:12px;font-weight:800;line-height:20px;cursor:pointer;padding:0;opacity:0;transition:opacity .15s;font-family:inherit}
/* 横↔下 切替ボタン */
.szins-side{position:absolute;top:4px;right:52px;width:24px;height:20px;border:none;background:#f1f5f9;color:#0369a1;border-radius:6px;font-size:12px;line-height:20px;cursor:pointer;padding:0;opacity:0;transition:opacity .15s;font-family:inherit}
.szins-side:hover{background:#e0f2fe}
.szins-block:hover .szins-side{opacity:1}
/* 「横」モードの行ラッパー（宿主=左で縮む / 枠=右） */
.szins-row{display:flex;align-items:flex-start;gap:8px;width:100%;box-sizing:border-box}
.szins-img{position:absolute;top:4px;right:28px;width:22px;height:20px;border:none;background:#f1f5f9;border-radius:6px;font-size:12px;line-height:20px;cursor:pointer;padding:0;opacity:0;transition:opacity .15s;font-family:inherit}
.szins-img:hover{background:#e0f2fe}
.szins-block:hover .szins-del,.szins-block:hover .szins-img{opacity:1}
.szins-ed img.szins-pic-sel{outline:2px solid #38bdf8;outline-offset:1px}
.szins-block.szins-drop{box-shadow:0 0 0 2px #38bdf8;background:#f0f9ff !important}
.szins-block.szins-drop:after{content:'📥 画像をドロップ';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#0ea5e9;font-weight:800;font-size:.85rem;background:rgba(240,249,255,.7);border-radius:6px;pointer-events:none}
body.sz-annot-off .szins-add{display:none}
</style>
<script>
(function(){
  if(window.__SZ_INLINE_INS__) return; window.__SZ_INLINE_INS__=1;
  /* 動的ページ用：window.__SZ_QKEY__() があれば保存キーに問題ごとの接尾辞（静的ページでは無害） */
  function insQSuffix(){try{return (typeof window.__SZ_QKEY__==='function')?('_'+window.__SZ_QKEY__()):'';}catch(e){return '';}}
  function curLS(){return 'szins_'+location.pathname+insQSuffix();}
  /* 挿入先候補＝行レベル要素（その文の直下に入れるため、カテゴリ全体の.fill-cardは対象にしない） */
  var SEL='p, li, h2, h3, h4, .ronten-q, td, dd, dt';
  function hosts(){return Array.prototype.slice.call(document.querySelectorAll(SEL))
    .filter(function(el){return !el.classList.contains('szins-block') && !el.closest('.szins-block');});}
  /* 子要素のうち szins-block を除いた論理インデックス（挿入ブロックが兄弟にあっても安定） */
  function childIdx(par,el){var i=0;for(var k=0;k<par.children.length;k++){var c=par.children[k];if(c.classList&&c.classList.contains('szins-block'))continue;if(c===el)return i;i++;}return -1;}
  function nthChild(par,idx){var i=0;for(var k=0;k<par.children.length;k++){var c=par.children[k];if(c.classList&&c.classList.contains('szins-block'))continue;if(i===idx)return c;i++;}return null;}
  function sig(el){
    var list=hosts(), idx=list.indexOf(el);
    var t=(el.textContent||'').replace(/\s+/g,' ').trim().slice(0,40);
    /* id無しの div 等（解説内のサブ要素）も復元できるよう、最寄りの id 付き祖先からの
       子インデックス経路を保存（makeKaisetsuHtml は同じDOMを再生成するので経路は安定）。 */
    var parts=[], n=el, root='';
    while(n && n.nodeType===1 && n!==document.body){
      if(n.id){ root=n.id; break; }
      var par=n.parentElement; if(!par) break;
      var ci=childIdx(par,n); if(ci<0){ root=''; parts=null; break; }
      parts.unshift(ci); n=par;
    }
    return {id:el.id||'', root:root, path:parts, i:idx, t:t};
  }
  function findHost(s){
    if(s.id){ var byId=document.getElementById(s.id); if(byId) return byId; }
    /* 経路で解決（id無しサブ要素用） */
    if(s.path){
      var base=s.root?document.getElementById(s.root):document.body;
      if(base){ var n=base,ok=true;
        for(var i=0;i<s.path.length;i++){ n=n?nthChild(n,s.path[i]):null; if(!n){ok=false;break;} }
        if(ok&&n&&!(n.classList&&n.classList.contains('szins-block'))) return n;
      }
    }
    var list=hosts();
    /* テキスト先頭一致 → index（静的ノート用フォールバック） */
    if(s.t){for(var k=0;k<list.length;k++){var tt=(list[k].textContent||'').replace(/\s+/g,' ').trim().slice(0,40);if(tt===s.t) return list[k];}}
    return (s.i!=null&&s.i>=0)?(list[s.i]||null):null;
  }
  function load(){try{return JSON.parse(localStorage.getItem(curLS()))||[];}catch(e){return[];}}
  function save(arr){try{localStorage.setItem(curLS(),JSON.stringify(arr));}catch(e){}}

  /* 画像を縮小・再圧縮してdataURLに（qz-memo踏襲：最大幅1000px・JPEG0.7） */
  function compressImg(file, cb){
    var fr=new FileReader();
    fr.onload=function(){
      var img=new Image();
      img.onload=function(){
        var mw=1000, w=img.width, h=img.height;
        if(w>mw){h=Math.round(h*mw/w);w=mw;}
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;
        var ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        try{cb(cv.toDataURL('image/jpeg',0.7));}catch(e){cb(fr.result);}
      };
      img.onerror=function(){cb(fr.result);};
      img.src=fr.result;
    };
    fr.readAsDataURL(file);
  }
  function insertImgAtCursor(ed, dataUrl){
    var im=document.createElement('img');
    im.src=dataUrl; im.className='szins-pic'; im.style.maxWidth='100%'; im.style.borderRadius='4px'; im.style.display='block'; im.style.margin='.3rem 0'; im.style.cursor='pointer';
    var sel=window.getSelection();
    if(sel && sel.rangeCount && ed.contains(sel.anchorNode)){
      var r=sel.getRangeAt(0); r.deleteContents(); r.insertNode(im);
      r.setStartAfter(im); r.collapse(true); sel.removeAllRanges(); sel.addRange(r);
    } else { ed.appendChild(im); }
  }

  /* 画像コピー用の内部クリップボード（Ctrl+C/Ctrl+V）＋ 選択中画像の管理 */
  var szImgClip=null, szSelImg=null, szPasteHandled=false;
  function selectImg(im){
    if(szSelImg) szSelImg.classList.remove('szins-pic-sel');
    szSelImg=im; if(im) im.classList.add('szins-pic-sel');
  }
  function dataUrlToBlob(u){
    try{var p=u.split(','),mime=p[0].match(/:(.*?);/)[1],bin=atob(p[1]),n=bin.length,arr=new Uint8Array(n);
      while(n--) arr[n]=bin.charCodeAt(n); return new Blob([arr],{type:mime});}catch(e){return null;}
  }
  document.addEventListener('click',function(e){
    var im=e.target.closest&&e.target.closest('.szins-ed img');
    if(im){selectImg(im);} else if(szSelImg && !(e.target.closest&&e.target.closest('.szins-ed'))){selectImg(null);}
  });
  document.addEventListener('keydown',function(e){
    if(!(e.ctrlKey||e.metaKey)) return;
    var k=(e.key||'').toLowerCase();
    if(k==='c' && szSelImg){
      szImgClip=szSelImg.src;
      /* システムクリップボードにも（対応環境のみ） */
      try{var bl=dataUrlToBlob(szImgClip);
        if(bl&&navigator.clipboard&&window.ClipboardItem){var it={};it[bl.type]=bl;navigator.clipboard.write([new ClipboardItem(it)]).catch(function(){});}
      }catch(_){}
    } else if(k==='v' && szImgClip){
      var ae=document.activeElement;
      var ed=ae&&ae.closest?ae.closest('.szins-ed'):null;
      if(ed){ /* システム画像で貼れた場合は二重挿入しない。pasteイベントが処理したらskip */
        szPasteHandled=false;
        setTimeout(function(){if(!szPasteHandled){insertImgAtCursor(ed,szImgClip);persist();}},140);
      }
    }
  },false);

  function mkBlock(html, bg, onChange, onDelete, w, h, ml, mt){
    var b=document.createElement('div');
    b.className='szins-block';
    if(bg) b.style.background=bg;
    if(w) b.style.width=w;
    if(h) b.style.height=h;
    if(ml) b.style.marginLeft=ml;
    if(mt) b.style.marginTop=mt;
    var ed=document.createElement('div');
    ed.className='szins-ed'; ed.setAttribute('contenteditable','true');
    ed.innerHTML=html||'';
    b.__ed=ed;
    /* 削除ボタン */
    var del=document.createElement('button');
    del.className='szins-del'; del.textContent='×'; del.title='この挿入を削除';
    del.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();onDelete(b);});
    /* 横↔下 切替ボタン */
    var sideBtn=document.createElement('button');
    sideBtn.className='szins-side'; sideBtn.textContent='⬌'; sideBtn.title='横に並べる';
    function syncSideBtn(){ sideBtn.textContent=b.__side?'⬍':'⬌'; sideBtn.title=b.__side?'下にフル幅へ戻す':'宿主の横に並べる'; }
    sideBtn.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();b.__side=!b.__side;applyLayout(b);syncSideBtn();onChange(b);});
    b.__syncSideBtn=syncSideBtn;
    /* 画像ボタン */
    var imgBtn=document.createElement('button');
    imgBtn.className='szins-img'; imgBtn.textContent='🖼'; imgBtn.title='画像を挿入';
    var fileIn=document.createElement('input'); fileIn.type='file'; fileIn.accept='image/*'; fileIn.style.display='none';
    imgBtn.addEventListener('mousedown',function(e){e.preventDefault();e.stopPropagation();fileIn.click();});
    fileIn.addEventListener('change',function(){
      if(fileIn.files&&fileIn.files[0]){ed.focus();compressImg(fileIn.files[0],function(u){insertImgAtCursor(ed,u);onChange(b);});}
      fileIn.value='';
    });
    b.appendChild(ed); b.appendChild(sideBtn); b.appendChild(imgBtn); b.appendChild(del); b.appendChild(fileIn);
    var t=null;
    ed.addEventListener('input',function(){clearTimeout(t);t=setTimeout(function(){onChange(b);},300);});
    /* 画像のペースト対応 */
    ed.addEventListener('paste',function(e){
      var items=(e.clipboardData||{}).items||[];
      for(var i=0;i<items.length;i++){
        if(items[i].type&&items[i].type.indexOf('image')===0){
          e.preventDefault();szPasteHandled=true;
          var f=items[i].getAsFile();
          if(f) compressImg(f,function(u){insertImgAtCursor(ed,u);onChange(b);});
          return;
        }
      }
    });
    /* 画像のドラッグ&ドロップ対応 */
    ed.addEventListener('dragover',function(e){
      if(e.dataTransfer&&Array.prototype.slice.call(e.dataTransfer.items||[]).some(function(it){return it.type&&it.type.indexOf('image')===0;})){
        e.preventDefault();e.stopPropagation();b.classList.add('szins-drop');
      }
    });
    ed.addEventListener('dragleave',function(e){b.classList.remove('szins-drop');});
    ed.addEventListener('drop',function(e){
      var files=e.dataTransfer&&e.dataTransfer.files;
      if(files&&files.length){
        var imgs=Array.prototype.slice.call(files).filter(function(f){return f.type&&f.type.indexOf('image')===0;});
        if(imgs.length){
          e.preventDefault();e.stopPropagation();b.classList.remove('szins-drop');ed.focus();
          imgs.forEach(function(f){compressImg(f,function(u){insertImgAtCursor(ed,u);onChange(b);});});
        }
      }
    });
    /* qz-memoのツールバーは選択時に出したいので mouseup/keyup は止めない。
       ただし文書のクリック系トグル誤爆を防ぐためクリックの伝播のみ抑える。
       例外：ブロック内に付けた注釈（穴埋め/消去/コメントアイコン等）はクリックで
       表示トグルさせたいので、injectの文書ハンドラまで伝播させる。 */
    ed.addEventListener('click',function(e){
      if(e.target.closest&&e.target.closest('mark.sz-blank,mark.sz-erase,mark[data-aid],.sz-cm-icon,.fill-blank,.blank')) return;
      e.stopPropagation();
    },false);
    /* 枠の自由リサイズ。e=右/w=左/s=下/n=上/se=右下角。
       左(w)は右端を、上(n)は下端を固定したまま幅/高さを変える（margin で位置補正）。離した時に保存。 */
    function addHandle(cls,mode){
      var hd=document.createElement('div'); hd.className='szins-rz '+cls; b.appendChild(hd);
      hd.addEventListener('pointerdown',function(e){
        e.preventDefault(); e.stopPropagation();
        try{hd.setPointerCapture(e.pointerId);}catch(_){}
        var sx=e.clientX, sy=e.clientY, rc=b.getBoundingClientRect(), sw=rc.width, sh=rc.height;
        var cs=getComputedStyle(b);
        var sml=parseFloat(b.style.marginLeft||cs.marginLeft)||0;
        var smt=parseFloat(b.style.marginTop||cs.marginTop)||0;
        var maxW=b.parentElement?b.parentElement.clientWidth:99999;
        function applyGeom(ev){
          var dx=ev.clientX-sx, dy=ev.clientY-sy;
          if(b.__side){
            /* 横モード：margin は使わず幅・高さを直接変える（宿主は flex で連動して縮む・折り返す） */
            if(mode.indexOf('e')>=0) b.style.width=Math.max(80, sw+dx)+'px';
            if(mode.indexOf('w')>=0) b.style.width=Math.max(80, sw-dx)+'px';
            if(mode.indexOf('s')>=0) b.style.height=Math.max(32, sh+dy)+'px';
            if(mode.indexOf('n')>=0) b.style.height=Math.max(32, sh-dy)+'px';
            return;
          }
          /* 下モード。いずれの辺もセル（親）の内側・フロー内に収める＝既存の文字に被らない。
             右=幅拡大（左端固定・親幅まで）/ 下=高さ拡大（上端固定・下を押し下げる） */
          if(mode.indexOf('e')>=0){ b.style.width=Math.max(80,Math.min(maxW-sml,sw+dx))+'px'; }
          if(mode.indexOf('s')>=0){ b.style.height=Math.max(32,sh+dy)+'px'; }
          /* 左=左端をポインタに追従（右端固定）。marginは0以上＝セル左端より外へ出さない */
          if(mode.indexOf('w')>=0){ var rightEdge=sml+sw; var nl=Math.min(rightEdge-80, Math.max(0, sml+dx)); b.style.marginLeft=nl+'px'; b.style.width=(rightEdge-nl)+'px'; }
          /* 上=上端をポインタに追従（下端固定）。marginは0以上＝上の文字に被せない */
          if(mode.indexOf('n')>=0){ var botEdge=smt+sh; var nt=Math.min(botEdge-32, Math.max(0, smt+dy)); b.style.marginTop=nt+'px'; b.style.height=(botEdge-nt)+'px'; }
          /* 幅を変えたら宿主セルも同じ幅・左位置に連動＝元の文字も折り返し直す */
          if(mode.indexOf('e')>=0||mode.indexOf('w')>=0) syncHostW(b);
        }
        /* スピード対策：pointermove ごとに reflow させず requestAnimationFrame で1フレーム1回に間引く */
        var lastEv=null, raf=0;
        function frame(){ raf=0; if(lastEv) applyGeom(lastEv); }
        function move(ev){ lastEv=ev; if(!raf) raf=requestAnimationFrame(frame); }
        function up(){ if(raf){cancelAnimationFrame(raf);raf=0;} if(lastEv) applyGeom(lastEv); hd.removeEventListener('pointermove',move); hd.removeEventListener('pointerup',up); onChange(b); }
        hd.addEventListener('pointermove',move); hd.addEventListener('pointerup',up);
      });
    }
    addHandle('e','e'); addHandle('w','w'); addHandle('s','s'); addHandle('n','n'); addHandle('se','es');
    return b;
  }
  /* 宿主セルをブロックと同じ幅・左位置に連動させる（元の文字も折り返し直る）。
     宿主は再生成され得る/共有され得る(#qText等)ので data-szins-host で印を付け、restore でリセット・再適用する。 */
  function syncHostW(b){
    var host=b.__szhost; if(!host) return;
    var w=b.style.width, ml=b.style.marginLeft;
    if(w){ host.style.boxSizing='border-box'; host.style.width=w; } else { host.style.width=''; }
    host.style.marginLeft=ml||'';
    if(w||ml){ host.setAttribute('data-szins-host','1'); } else { host.removeAttribute('data-szins-host'); }
  }
  function clearHost(host){ if(!host) return; host.style.width=''; host.style.marginLeft=''; host.removeAttribute('data-szins-host'); }
  /* 「横」モード＝宿主と枠を flex 行ラッパーに入れて横並び（宿主は flex:1 で縮み・折り返し）。
     「下」モード＝ラッパーを解いて、宿主の直後にフル幅ブロックとして戻す。 */
  function unwrapRow(b){
    var row=b.parentElement;
    if(!row||!row.classList.contains('szins-row')) return;
    var host=b.__szhost;
    if(host&&host.parentElement===row){ host.style.flex=host.__szPrevFlex||''; host.style.minWidth=host.__szPrevMinW||''; row.parentNode.insertBefore(host,row); }
    row.parentNode.insertBefore(b,row);
    row.remove();
  }
  function applyLayout(b){
    var host=b.__szhost; if(!host) return;
    var inRow=b.parentElement&&b.parentElement.classList.contains('szins-row');
    if(b.__side){
      if(!inRow){
        /* 横モードでは宿主連動の幅指定(syncHostW)は無効化（flexで自動調整） */
        clearHost(host);
        /* flexアイテムに残った margin は隙間/宿主潰れの原因。横モードでは消す */
        b.style.marginLeft=''; b.style.marginTop='';
        var row=document.createElement('div'); row.className='szins-row';
        host.parentNode.insertBefore(row,host);
        host.__szPrevFlex=host.style.flex; host.__szPrevMinW=host.style.minWidth;
        /* 宿主は最小幅を確保して潰れない（枠を広げると宿主が連動して縮む・折り返す） */
        host.style.flex='1 1 0'; host.style.minWidth='96px';
        row.appendChild(host); row.appendChild(b);
        b.style.flex='0 1 auto';  /* 枠は自分の幅を持ちつつ、入り切らない時は縮む（宿主を潰さない） */
      }
    } else {
      if(inRow) unwrapRow(b);
      b.style.flex='';
    }
  }
  /* 挿入元の実効背景色を取得（透明なら親を辿る） */
  function effBg(el){
    var n=el;
    while(n && n!==document.body){
      var c=getComputedStyle(n).backgroundColor;
      if(c && c!=='rgba(0, 0, 0, 0)' && c!=='transparent') return c;
      n=n.parentElement;
    }
    return '#fff';
  }

  /* データ構造: [{host:{i,t}, html:"..."}] / 同一hostに複数挿入可（配列順で連続配置） */
  function persist(){
    /* いま DOM にあるブロックを集める */
    var present=[];
    document.querySelectorAll('.szins-block').forEach(function(b){
      var hostEl=b.__szhost; if(!hostEl) return;
      var html=b.__ed?b.__ed.innerHTML:'';
      present.push({host:b.__hostSig||sig(hostEl), html:html, bg:b.style.background||'', w:b.style.width||'', h:b.style.height||'', ml:b.style.marginLeft||'', mt:b.style.marginTop||'', hostW:hostEl.style.width||'', hostML:hostEl.style.marginLeft||'', side:!!b.__side});
    });
    /* 動的ページ対策：今表示していない host のレコード（＝別問題・折りたたみ中の解説など）は
       DOM に無くても保存から落とさず温存する。host が現在 DOM に見つからないものだけ残してマージ。 */
    var stored=load();
    var kept=stored.filter(function(rec){ return !findHost(rec.host); });
    save(kept.concat(present));
  }

  function insertAfterHost(hostEl, text, bg, w, h, ml, mt, side){
    /* 救済：host の親がブロックフローでない（flex/grid 等＝横並びになる）場合は、
       フロー安全な祖先まで引き上げる。古い保存（span 等の flex アイテム）も下にフル幅で入る。 */
    var safe=hostEl;
    while(safe && safe!==document.body && !parentIsBlockFlow(safe)) safe=safe.parentElement;
    var migrated=(safe && safe!==document.body && safe!==hostEl);
    if(safe && safe!==document.body) hostEl=safe;
    /* 引き上げた＝旧・横並び時代の残骸サイズ/位置は今のレイアウトでは無効。捨ててフレッシュ（下・フル幅）にする。 */
    if(migrated){ w=''; h=''; ml=''; mt=''; }
    var b=mkBlock(text, bg, persist, function(node){
      var hs=node.__szhost, row=node.parentElement;
      if(row&&row.classList.contains('szins-row')&&hs&&hs.parentElement===row){ hs.style.flex=hs.__szPrevFlex||''; hs.style.minWidth=hs.__szPrevMinW||''; row.parentNode.insertBefore(hs,row); }
      node.remove();
      if(row&&row.classList.contains('szins-row')&&!row.querySelector('.szins-block')) row.remove();
      clearHost(hs);persist();
    }, w, h, ml, mt);
    b.__szhost=hostEl;
    b.__migrated=migrated;
    /* 既存の同host挿入塊の末尾の後ろに入れる */
    var ref=hostEl, nx=hostEl.nextElementSibling;
    while(nx && nx.classList.contains('szins-block') && nx.__szhost===hostEl){ref=nx;nx=nx.nextElementSibling;}
    ref.parentNode.insertBefore(b, ref.nextSibling);
    /* host の sig は“ラップ前の自然位置”で確定して保持（横モードで行ラッパーに入れても経路が壊れない） */
    b.__hostSig=sig(hostEl);
    b.__side=!!side && !migrated;  /* 救済された枠は下に戻す */
    if(b.__syncSideBtn) b.__syncSideBtn();
    if(b.__side) applyLayout(b);
    return b;
  }

  function restore(){
    /* べき等＝既存ブロックを一旦すべて外してから現在キーの保存分を貼り直す。
       問題切替（szInsRestore 再呼び出し）でも重複せず、表示中の host を持つレコードだけ復活する。
       host が現在 DOM に無いレコードは貼られないが localStorage には残る（temp で消えない）。 */
    /* 「横」モードの行ラッパーを解いて宿主を元の位置へ戻す（block は中身ごと除去して作り直す） */
    document.querySelectorAll('.szins-row').forEach(function(row){
      Array.prototype.slice.call(row.children).forEach(function(ch){
        if(ch.classList&&ch.classList.contains('szins-block')) return;
        ch.style.flex=ch.__szPrevFlex||''; ch.style.minWidth=ch.__szPrevMinW||'';
        row.parentNode.insertBefore(ch,row);
      });
      row.remove();
    });
    /* 連動で変形させた宿主セルを一旦すべて元に戻す（共有/再生成される #qText 等のため） */
    document.querySelectorAll('[data-szins-host]').forEach(function(el){ clearHost(el); });
    document.querySelectorAll('.szins-block').forEach(function(b){ b.remove(); });
    var arr=load();
    arr.forEach(function(rec){
      var hostEl=findHost(rec.host);
      if(hostEl){
        var b=insertAfterHost(hostEl, rec.html!=null?rec.html:(rec.text||''), rec.bg, rec.w, rec.h, rec.ml, rec.mt, rec.side);
        var realHost=b.__szhost||hostEl;  /* insertAfterHost がフロー安全な親へ引き上げている場合あり */
        /* 引き上げ救済された枠・横モードは、宿主の旧サイズを適用しない（横はflexで自動・救済は残骸） */
        if(!b.__migrated && !b.__side){
          if(rec.hostW){ realHost.style.boxSizing='border-box'; realHost.style.width=rec.hostW; realHost.setAttribute('data-szins-host','1'); }
          if(rec.hostML){ realHost.style.marginLeft=rec.hostML; realHost.setAttribute('data-szins-host','1'); }
        }
      }
    });
  }

  /* ＋ボタン（テキスト選択時に選択箇所の右下へ表示） */
  var addBtn=document.createElement('button');
  addBtn.className='szins-add'; addBtn.textContent='＋';
  addBtn.title='選択した行の下に文章を挿入'; addBtn.style.display='none';
  document.body.appendChild(addBtn);
  var curHost=null;

  /* 選択範囲を含む「挿入先ブロック」を探す。
     重要：host の“親”が通常のブロックフロー（flex/grid/table 行でない）である要素を選ぶ。
     こうすると host の直後に挿入したブロックが必ず自分の行（フル幅）になり、
     選択肢チェックのような display:flex 行の中で“横並びの flex アイテム”にならない。 */
  function parentIsBlockFlow(el){
    var par=el.parentElement; if(!par) return false;
    var pd=getComputedStyle(par).display;
    return pd==='block'||pd==='list-item'||pd==='flow-root';
  }
  function hostFromSelection(){
    var sel=window.getSelection();
    if(!sel || sel.rangeCount===0 || sel.isCollapsed) return null;
    var node=sel.getRangeAt(0).commonAncestorContainer;
    if(node.nodeType===3) node=node.parentNode;
    if(!node || !node.closest) return null;
    if(node.closest('.szins-block')) return null;
    var SKIP='body,html,.card,.tab-panel,.tab-content,.pane';
    /* SEL一致を優先（ただし親がブロックフローのときだけ）。それ以外は祖先を遡る。 */
    var sl=node.closest(SEL);
    if(sl && !sl.matches(SKIP) && parentIsBlockFlow(sl)) return sl;
    var n=node;
    while(n && n!==document.body){
      if(n.nodeType===1 && !n.matches(SKIP) && parentIsBlockFlow(n)) return n;
      n=n.parentElement;
    }
    return null;
  }
  function showBtnAtSelection(){
    if(document.body.classList.contains('sz-annot-off')){addBtn.style.display='none';return;}
    var host=hostFromSelection();
    if(!host){addBtn.style.display='none';curHost=null;return;}
    var sel=window.getSelection();
    var rects=sel.getRangeAt(0).getClientRects();
    var r=rects.length?rects[rects.length-1]:host.getBoundingClientRect();
    curHost=host;
    addBtn.style.left=(window.scrollX+r.right+6)+'px';
    addBtn.style.top=(window.scrollY+r.bottom-8)+'px';
    addBtn.style.display='block';
  }
  /* 選択確定（マウス・キーボード）で表示。少し遅延してselectionを確定させる */
  document.addEventListener('mouseup',function(){setTimeout(showBtnAtSelection,10);});
  document.addEventListener('keyup',function(e){if(e.shiftKey||e.key==='Shift')setTimeout(showBtnAtSelection,10);});

  addBtn.addEventListener('mousedown',function(e){
    /* mousedownで処理：clickだと選択解除が先に走るのを防ぐ */
    e.preventDefault();
    if(!curHost) return;
    var b=insertAfterHost(curHost, '', effBg(curHost));
    addBtn.style.display='none';
    setTimeout(function(){if(b.__ed) b.__ed.focus();},0);
  });
  /* スクロール時は隠す（位置ズレ防止） */
  window.addEventListener('scroll',function(){addBtn.style.display='none';},{passive:true});

  window.szInsRestore=restore;
  window.szInsPersist=persist;  /* ブロック内に注釈(穴埋め等)を付けた時、inject から呼んでHTMLごと保存 */
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',restore);
  else restore();
})();
</script>

<script>
(function(){

  function reapply(){ if(window.szRekey)window.szRekey(); else if(window.szRestoreAll)window.szRestoreAll(); if(window.szInsRestore)window.szInsRestore(); }
  function savePos(){ try{ var q=filteredQs[currentIdx]; if(q&&q.num!=null) localStorage.setItem(POSK,q.num); }catch(e){} }
  function hookFns(){
    if(typeof render==='function'&&!render.__szHooked){ var o=render; render=function(){o.apply(this,arguments);savePos();reapply();}; render.__szHooked=true; }
    if(typeof toggleAnswer==='function'&&!toggleAnswer.__szHooked){ var t=toggleAnswer; toggleAnswer=function(){t.apply(this,arguments);setTimeout(reapply,0);}; toggleAnswer.__szHooked=true; }
  }
  function restorePos(){ try{ var s=localStorage.getItem(POSK); if(s==null)return false; s=+s;
    for(var i=0;i<filteredQs.length;i++){ if(filteredQs[i]&&filteredQs[i].num===s){ if(i!==currentIdx){currentIdx=i;render();return true;} return false; } } }catch(e){} return false; }
  function boot(){ hookFns(); if(!restorePos()) reapply(); }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){ setTimeout(boot,0); });
  } else {
    setTimeout(boot,0);
  }
})();
</script>
