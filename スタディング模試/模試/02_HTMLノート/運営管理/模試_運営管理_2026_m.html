<script>
const CAT_COLORS = { "生産管理":"#3a9bd5","資材在庫":"#16a085","IE":"#e67e22","設備品質":"#8e44ad","店舗立地":"#c0392b","商品政策":"#d4820a","物流情報":"#2e7d46" };

const QUESTIONS = [
  { num:1, cat:"生産管理",
    text:"管理指標に関する記述の正誤の組み合わせとして、最も適切なものを下記の解答群から選べ。\n\na 直行率は、手直しや手戻りがなく、すべての検査を1回で通過した品物の生産数量を、工程に投入した品物の数量で除したものである。\nb 稼働率は、人または機械における就業時間もしくは拘束時間を、有効稼働時間で除したものである。\nc 歩留まりは、投入した主原料の量を産出された品物の量で除したものである。\nd 可用率は、必要とされるときに設備が使用中でなく、運転可能な状態である確率をいう。\ne 段取時間は、動作可能な状態にある設備が、切替・準備作業のために所与の機能を停止している時間をいう。",
    choices:["a:正 b:正 c:誤 d:正 e:誤","a:正 b:誤 c:正 d:誤 e:正","a:正 b:誤 c:誤 d:誤 e:誤","a:誤 b:正 c:誤 d:誤 e:正","a:誤 b:誤 c:正 d:正 e:誤"],
    answer:"ウ",
    kaisetsu:{
      cr:[
        {ok:true, r:"a〇：直行率＝1回で合格した品物÷投入総数。定義どおり正しい"},
        {ok:false,r:"b✗：稼働率は有効稼働時間÷拘束（利用可能）時間。本肢は分子分母が逆"},
        {ok:false,r:"c✗：歩留り＝産出量÷投入主原料量。本肢は分子分母が逆"},
        {ok:false,r:"d✗：可用率は設備が使用中『または』運転可能な確率。使用中も含む"},
        {ok:false,r:"e✗：段取時間は準備・後始末の時間。機能を停止している必要はない"}
      ],
      detail:"正しいのはaのみ。a正・b誤・c誤・d誤・e誤 → 選択肢ウ。比率系は『分子÷分母』の向きを正確に。",
      point:"稼働率＝有効稼働時間÷拘束時間、歩留り＝産出量÷投入量。分子分母の取り違えが定番のひっかけ",
      trap:"稼働率と歩留りはどちらも『○○率』で、分子分母を逆に書いた肢が誤り。可用率は『使用中も含めて運転可能』である点に注意。",
      talk:{s:"稼働率って『拘束時間÷有効稼働時間』でいいんですよね？",t:"逆だよ！有効に動いた時間が分子。有効稼働÷拘束時間。歩留りも同じく産出÷投入。比率は必ず分子から確認しよう。"},
      nextStep:"設備総合効率（時間稼働率×性能稼働率×良品率）／可動率と可用率の違い"
    }
  },
  { num:2, cat:"生産管理",
    text:"製品開発・製品設計に関する記述の正誤の組み合わせとして、最も適切なものを下記の解答群から選べ。\n\na 製品の設計情報や部品表、開発プロセス、これらの変更履歴などを一元管理する手法を、PDM（Product Data Management）という。\nb 製品設計と製造・販売などの統合化、同時進行化によって品質向上やコストダウンを図る手法を、コンカレントエンジニアリングという。\nc 合理化・簡素化を目的としてあらかじめユニットを設計しておき、その組み合わせによって製品を設計する手法を、フロントローディングという。\nd 製品の企画・設計の際に研究開発・製造・外注購買部門と協議し、開発期間の短縮や原価低減を図る活動を、デザインインという。",
    choices:["a:正 b:正 c:誤 d:正","a:正 b:誤 c:正 d:誤","a:正 b:正 c:正 d:誤","a:誤 b:正 c:誤 d:正","a:誤 b:誤 c:正 d:正"],
    answer:"ア",
    kaisetsu:{
      cr:[
        {ok:true, r:"a〇：PDMは設計情報・部品表・変更履歴を一元管理する手法。正しい"},
        {ok:true, r:"b〇：コンカレントエンジニアリング＝設計・製造・販売を同時並行。正しい"},
        {ok:false,r:"c✗：あらかじめユニット設計し組み合わせるのはモジュール設計。フロントローディングではない"},
        {ok:true, r:"d〇：デザインイン＝企画設計段階で各部門と協議し短納期・原価低減を図る。正しい"}
      ],
      detail:"正しいのはa・b・d。cはモジュール設計の説明。フロントローディングは下流の問題を上流（設計）で先に潰す活動。a正b正c誤d正 → 選択肢ア。",
      point:"フロントローディング＝問題を上流工程で先取り解決。モジュール設計＝ユニットの組合せで設計",
      trap:"cの『あらかじめユニットを設計して組み合わせる』はモジュール設計。フロントローディングは『前倒しで問題解決』のイメージで区別。",
      talk:{s:"フロントローディングってユニットを組み合わせる話じゃないの？",t:"それはモジュール設計！フロントローディングは設計の早い段階で下流の不具合を洗い出して潰すこと。『前に荷を寄せる』イメージだよ。"},
      nextStep:"コンカレントエンジニアリングとデザインインの違い／VE（価値工学）"
    }
  },
  { num:3, cat:"生産管理",
    text:"生産される製品の種類や生産量に応じて、レイアウトの基本タイプは一般に「製品別」「工程別」「グループ別」「製品固定型」の4つに分類される。それぞれのレイアウトタイプに適した製品の種類・生産量の組み合わせとして、最も適切なものを選べ。\n\na 製品別レイアウト／b 工程別レイアウト／c グループ別レイアウト／d 製品固定型レイアウト\n① 少品種多量生産／② 少品種少量生産／③ 中品種中量生産／④ 多品種少量生産",
    choices:["a-① b-③ c-② d-④","a-① b-④ c-③ d-②","a-① b-② c-③ d-④","a-④ b-② c-① d-③","a-④ b-① c-③ d-②"],
    answer:"イ",
    kaisetsu:{
      cr:[
        {ok:false,r:"製品別＝①は合うが、工程別を③、グループ別を②としており誤り"},
        {ok:true, r:"a①・b④・c③・d② が正しい組み合わせ → 選択肢イ"},
        {ok:false,r:"工程別を②少品種少量としている点が誤り"},
        {ok:false,r:"製品別を④多品種少量としており誤り"},

16: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 標準作業（Q16直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 標準作業と作業標準の関係は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">作業標準は標準作業に基づいて作る</button><button class="chk30-opt" data-c="0">標準作業は作業標準に基づいて作る</button></div><div class="chk30-ans"><b>作業標準←標準作業</b>。標準作業＝誰でもできる現時点の最善法。4Mを有効活用し全員が納得して実施できることが重要。</div></div></div>',
17: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 標準時間（Q17直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 外掛け法の余裕率の分母は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">正味時間</button><button class="chk30-opt" data-c="0">標準時間</button></div><div class="chk30-ans"><b>正味時間</b>（外＝余裕÷正味）。内掛けは標準時間が分母（余裕÷標準）。「外＝正味、内＝標準」で覚える。</div></div></div>',
18: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ PTS法（Q18直結）</div><div class="chk30-q"><div class="chk30-qt">Q. PTS法はストップウォッチとレイティングが必要？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">不要（既定時間値を合計）</button><button class="chk30-opt" data-c="0">必要</button></div><div class="chk30-ans"><b>不要</b>がPTS法の強み。基本動作ごとの既定時間を足すだけ。短サイクル・反復作業に適する。</div></div></div>',
19: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ サーブリッグ分析（Q19直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 「保持（握っている）」は第何類？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">第3類（作業を行わない動作）</button><button class="chk30-opt" data-c="0">第1類（不可欠な動作）</button></div><div class="chk30-ans"><b>第3類</b>。第1類は伸ばす・つかむ・運ぶ・位置決め・放すなど仕事を進める動作。保持・休む・手待ちは第3類。</div></div></div>',
20: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 保全活動（Q20直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 設計段階で故障要因を排除する活動は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">保全予防</button><button class="chk30-opt" data-c="0">改良保全</button></div><div class="chk30-ans"><b>保全予防</b>＝設計段階で故障を作り込まない。改良保全＝既存設備を故障しにくく改善。予防保全＝定期＋予知。</div></div></div>',
21: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 新QC7つ道具（Q21直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 混沌とした情報を関連性でグループ化する手法は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">親和図法</button><button class="chk30-opt" data-c="0">連関図法</button></div><div class="chk30-ans"><b>親和図法</b>。連関図＝因果を矢印で結ぶ、系統図＝目的→手段の樹形、マトリックス＝行列の交点、PDPC＝不測の事態と代替案。</div></div></div>',
22: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 生産の合理化（Q22直結）</div><div class="chk30-q"><div class="chk30-qt">Q. ECRSの C と R は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">Combine（結合）・Rearrange（再配列）</button><button class="chk30-opt" data-c="0">Change（変更）・Renewal（刷新）</button></div><div class="chk30-ans"><b>Combine・Rearrange</b>。E（なくす）→C（一緒に）→R（順序変更）→S（単純化）の順で改善を考える。3Sは単純化・標準化・専門化。</div></div></div>',
23: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 商業動態統計（Q23直結）</div><div class="chk30-q"><div class="chk30-qt">Q. スーパー・コンビニ・ドラッグストア・百貨店、販売額が最大は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">スーパー</button><button class="chk30-opt" data-c="0">百貨店</button></div><div class="chk30-ans"><b>スーパー</b>が最大。順は スーパー＞コンビニ＞ドラッグストア＞百貨店。ドラッグストアが百貨店を上回る点が頻出。</div></div></div>',
24: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 大規模小売店舗立地法（Q24直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 大店立地法の目的は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">周辺地域の生活環境の保持</button><button class="chk30-opt" data-c="0">中小小売業の事業機会の確保</button></div><div class="chk30-ans"><b>生活環境の保持</b>。経済的調整（中小保護）は廃止された旧・大店法の目的。勧告に従わない場合の公表は都道府県。</div></div></div>',
25: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 都市計画法（Q25直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 「市街化を抑制すべき区域」は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">市街化調整区域</button><button class="chk30-opt" data-c="0">特定用途制限地域</button></div><div class="chk30-ans"><b>市街化調整区域</b>。特定用途制限地域は用途地域が無い区域で特定の建築用途だけ制限する地域。名前が似ていても別物。</div></div></div>',
26: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 値入（Q26直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 原価値入率の分母は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">原価（仕入原価）</button><button class="chk30-opt" data-c="0">売価</button></div><div class="chk30-ans"><b>原価</b>。売価値入率＝値入額÷売価、原価値入率＝値入額÷原価。分母が違うだけ。</div></div></div>',
27: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ GMROI（Q27直結）</div><div class="chk30-q"><div class="chk30-qt">Q. GMROIの分母は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">平均在庫高（原価）</button><button class="chk30-opt" data-c="0">仕入高</button></div><div class="chk30-ans"><b>平均在庫高（原価）</b>＝(期首+期末)÷2。GMROI＝粗利益÷平均在庫。売上原価＝期首+仕入−期末。</div></div></div>',
28: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 需要予測（Q28直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 重回帰分析で説明変数同士の相関が高いと？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">多重共線性で信頼性が低下</button><button class="chk30-opt" data-c="0">良いモデルになる</button></div><div class="chk30-ans"><b>多重共線性</b>で係数が不安定に。説明変数は互いに独立が望ましい。指数平滑法はα大で直近重視。</div></div></div>',
29: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 相乗積（Q29直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 全商品の売上が一律2倍になると相乗積は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">変わらない</button><button class="chk30-opt" data-c="0">2倍になる</button></div><div class="chk30-ans"><b>変わらない</b>。相乗積＝売上構成比×粗利益率。一律増減では構成比が不変なので相乗積も不変。</div></div></div>',
30: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 売場づくり（Q30直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 計画購買されやすい商品（目的買い）の配置は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">店奥（回遊を誘導）</button><button class="chk30-opt" data-c="0">入口付近</button></div><div class="chk30-ans"><b>店奥</b>。奥へ誘導して回遊させ、ついで買いを増やす。非計画購買品は入口・レジ前で衝動買いを誘う。売れ筋はフェイス拡大。</div></div></div>',
31: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ VMD（Q31直結）</div><div class="chk30-q"><div class="chk30-qt">Q. マネキンで店全体のイメージを訴求するのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">VP</button><button class="chk30-opt" data-c="0">IP</button></div><div class="chk30-ans"><b>VP</b>（Visual Presentation）。PP＝POPで選択を手助け、IP＝棚で色・サイズ別に分類陳列。VP→PP→IPは遠く→近く。</div></div></div>',
32: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 人時生産性（Q32直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 売上を8%増やしても労働時間も8%増えると人時生産性は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">変わらない（相殺）</button><button class="chk30-opt" data-c="0">8%向上</button></div><div class="chk30-ans"><b>変わらない</b>。人時生産性＝粗利益÷総労働時間。分子分母が同率で動けば相殺。時間を増やさず粗利益を増やす施策が効く。</div></div></div>',
33: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ インストアプロモーション（Q33直結）</div><div class="chk30-q"><div class="chk30-qt">Q. バンドル販売は何主導型？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">価格主導型（実質値下げ）</button><button class="chk30-opt" data-c="0">非価格主導型</button></div><div class="chk30-ans"><b>価格主導型</b>。セットで実質値下げ＝客単価UP・在庫消化。特売連発は内的参照価格を下げ通常価格を高く感じさせる。</div></div></div>',
34: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 価格政策（Q34直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 常に低価格で売る政策は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">EDLP</button><button class="chk30-opt" data-c="0">Hi-Lo価格政策</button></div><div class="chk30-ans"><b>EDLP</b>（Everyday Low Price）。Hi-Loは通常価格と特売を行き来させる手法。市場価格法＝売価を先に決める。</div></div></div>',
35: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 在庫管理（Q35直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 定量発注で調達期間が長いほど発注点は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">高く設定する</button><button class="chk30-opt" data-c="0">低く設定する</button></div><div class="chk30-ans"><b>高く設定</b>。調達期間が長いほど欠品しやすいため。定期発注の需要変動期間＝発注間隔+調達期間。</div></div></div>',
36: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ ユニットロード（Q36直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 一貫パレチゼーションとは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">発地〜着地までパレットを積み替えない</button><button class="chk30-opt" data-c="0">効率的に積み替えながら運ぶ</button></div><div class="chk30-ans"><b>積み替えない</b>のが核心。最初に載せたパレットのまま最後まで運ぶから荷役が減る。</div></div></div>',
37: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 輸送手段（Q37直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 納品先の待機時間削減は何を高める？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">実車率</button><button class="chk30-opt" data-c="0">積載効率</button></div><div class="chk30-ans"><b>実車率</b>（走行時間の有効活用）。積載効率は荷台の埋まり具合なので、待機削減とは別。RORO＝車ごと、LOLO＝クレーン。</div></div></div>',
38: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ トラック生産性指標（Q38直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 「走った距離のうち荷を積んで走った割合」は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">実車率</button><button class="chk30-opt" data-c="0">実働率</button></div><div class="chk30-ans"><b>実車率</b>（距離ベース）。実働率は稼働日数の割合（日数ベース）、積載効率は積載量÷能力。</div></div></div>',
39: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 物流センター機能（Q39直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 在庫を持たず通過させるセンターは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">TC（トランスファーセンター）</button><button class="chk30-opt" data-c="0">DC（ディストリビューションセンター）</button></div><div class="chk30-ans"><b>TC</b>＝通過型・在庫なし・ベンダー仕分け。DC＝在庫型・即出荷でリードタイム短。製造加工を組むのはPDC。</div></div></div>',
40: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 物流センター運営（Q40直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 商品ごとに総数をまとめ取りして後で仕分けるのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">バッチ（種まき）ピッキング</button><button class="chk30-opt" data-c="0">オーダー（摘み取り）ピッキング</button></div><div class="chk30-ans"><b>バッチピッキング</b>＝品種少・大量出荷向き。フリーロケは保管効率↑/ピッキング効率↓。AGV＝搬送、SAS＝仕分け。</div></div></div>',
41: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ GTIN（Q41直結）</div><div class="chk30-q"><div class="chk30-qt">Q. GTIN-12(UPC)とGTIN-13(JAN)の仕組みは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">基本的に同じ（GTINで統一）</button><button class="chk30-opt" data-c="0">基本的に異なる</button></div><div class="chk30-ans"><b>基本的に同じ</b>。桁数（12/13）は違うが仕組みは共通。GTIN-14＝集合包装、インジケータ9＝不定貫商品。</div></div></div>',
42: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ バスケット分析（Q42直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 信頼度(a→b)の分母は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">商品aを買った人数</button><button class="chk30-opt" data-c="0">全顧客数</button></div><div class="chk30-ans"><b>aを買った人数</b>。信頼度(a→b)＝同時購入÷a購入者。支持度＝同時÷全体。リフト＝信頼度÷相手購入率。</div></div></div>',
43: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ PI値（Q43直結）</div><div class="chk30-q"><div class="chk30-qt">Q. PI値の分母は？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">レジ通過客数</button><button class="chk30-opt" data-c="0">入店客数</button></div><div class="chk30-ans"><b>レジ通過客数</b>。PI値＝販売数量(金額)÷レジ通過客数×1,000。規模の違う店舗間の販売力比較に使える相対指標。</div></div></div>',
44: '<div class="chk30"><div class="chk30-title">⚡ チェック ─ 顧客分析（Q44直結）</div><div class="chk30-q"><div class="chk30-qt">Q. 購買金額の高い順に全顧客を10等分するのは？</div><div class="chk30-opts"><button class="chk30-opt" data-c="1">デシル分析</button><button class="chk30-opt" data-c="0">クラスター分析</button></div><div class="chk30-ans"><b>デシル分析</b>。クラスター分析は属性・行動で類似顧客をグループ化。RFM＝直近/頻度/金額、FRATのA＝Amount。</div></div></div>',
};

2: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 開発設計の用語マップ</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>PDM</b>：設計情報・部品表・変更履歴を一元管理</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>コンカレントエンジニアリング</b>：設計・製造・販売を同時並行</div><div style="background:#fef2f2;border:1px dashed #fca5a5;border-radius:6px;padding:6px"><b>フロントローディング</b>：下流の問題を上流（設計）で先取り解決 <span style="color:#b91c1c">※モジュール設計と混同注意</span></div><div style="background:#fffbeb;border-radius:6px;padding:6px"><b>デザインイン</b>：企画設計段階で各部門と協議し短納期・原価低減</div></div>',
3: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ レイアウトと品種・生産量</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>製品別</b> → 少品種多量（流れライン）</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>工程別</b> → 多品種少量（機能別配置）</div><div style="background:#fdf4ff;border-radius:6px;padding:6px"><b>グループ別</b> → 中品種中量（セル）</div><div style="background:#fffbeb;border-radius:6px;padding:6px"><b>製品固定型</b> → 少品種少量（大型据付）</div></div>',
4: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ モジュール生産 vs タクト生産</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#f0fdf4;border:2px solid #86efac;border-radius:7px;padding:7px"><b style="color:#15803d">モジュール生産</b><div style="color:#14532d;margin-top:3px">あらかじめ作ったモジュールの組合せで多品種を効率生産</div></div><div style="flex:1;background:#fef2f2;border:2px solid #fca5a5;border-radius:7px;padding:7px"><b style="color:#dc2626">タクト生産</b><div style="color:#7f1d1d;margin-top:3px">すべての品物の移動・加工を同期化</div></div></div>',
5: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ リードタイム短縮に効く / 効かない</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#f0fdf4;border-radius:6px;padding:6px;color:#14532d">○ 内段取り→外段取り<br>○ 段取り改善・1個流し<br>○ ディスパッチング最適化</div><div style="background:#fef2f2;border-radius:6px;padding:6px;color:#7f1d1d">✗ 仕掛品を増やす<br>（稼働率↑だが滞留↑でLT延びる）</div></div>',
6: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 生産統制の4機能</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>進度管理</b>：納期維持・進み具合の調整</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>現品管理</b>：モノの所在・運搬・保管</div><div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:6px"><b>余力管理</b>：能力と負荷を把握し再配分</div><div style="background:#fdf4ff;border-radius:6px;padding:6px"><b>資料管理</b>：実績収集・統計分析（事後）</div></div>',
7: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ SLP と DI 分析</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>SLP</b>：P-Q分析（種類×数量）→ 設備・面積・調整 を段階的に精査</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>DI分析</b>：距離(Distance) × 運搬強度(Intensity＝回数・物流量) をプロット</div></div>',
8: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 流動数曲線の読み方</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#eff6ff;border-radius:6px;padding:7px;text-align:center"><b style="color:#1d4ed8">横方向の間隔</b><div style="color:#1e3a8a;margin-top:3px">= 時間（在庫期間・滞留）</div></div><div style="flex:1;background:#f0fdf4;border-radius:6px;padding:7px;text-align:center"><b style="color:#15803d">縦方向の間隔</b><div style="color:#14532d;margin-top:3px">= 量（在庫量・受注残）</div></div></div>',
9: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 混合品種の編成効率</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:11px;text-align:center;color:#1e3a8a;line-height:1.7">編成効率 = <b>Σ(生産量 × 作業時間)</b> ÷ (サイクルタイム × ステーション数 × 総生産量)</div><div style="font-size:10px;color:#64748b;text-align:center;margin-top:5px">※生産量で加重するのが単一品種との違い</div>',
10: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 生産座席予約方式のイメージ</div><div style="background:#f0fdf4;border-radius:7px;padding:9px;font-size:10px;color:#14532d;line-height:1.7">新幹線の座席予約と同じ。受注時に <b>設備・資材の使用枠（座席）</b> を予約 → <b>納期を確約</b>。枠を平らに埋めれば <b>平準化生産</b> にもなる。</div>',
11: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 工程分析の基本図記号</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:10px;text-align:center"><div style="background:#eff6ff;border-radius:5px;padding:5px">○ 加工</div><div style="background:#f0fdf4;border-radius:5px;padding:5px">⇒ 運搬</div><div style="background:#fffbeb;border-radius:5px;padding:5px">▽ 貯蔵</div><div style="background:#fdf4ff;border-radius:5px;padding:5px">D 停滞</div><div style="background:#fef2f2;border-radius:5px;padding:5px">◇ 数量検査</div><div style="background:#f1f5f9;border-radius:5px;padding:5px">□ 品質検査</div></div><div style="font-size:9px;color:#64748b;text-align:center;margin-top:5px">複合記号は「主の工程」でカウント（加工主の複合は加工に算入）</div>',
12: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 製番管理方式</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:10px;color:#1e3a8a;line-height:1.7">注文ごとに <b>製造番号</b> を付け、加工・組立・部品を丸ごと一括管理。<br>→ <b>個別生産・小ロット向き</b>。製番が違えば別物扱いなので共通部品のまとめ発注には不向き。</div>',
13: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ PERT クリティカルパス</div><div style="background:#fef2f2;border-radius:7px;padding:9px;font-size:11px;text-align:center;color:#b91c1c;font-weight:bold">B(10) → C(10) → G(10) → H(10) = 40時間</div><div style="font-size:10px;color:#64748b;text-align:center;margin-top:5px">最早開始は先行作業の最遅完了に合わせる。短縮はCP上の作業でないと効果なし</div>',
14: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 部品 e の必要数</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:11px;text-align:center;color:#1e3a8a;line-height:1.8">a経由：3個 × 1 = 3<br>b経由：2個 × 3 = 6<br><b style="color:#dc2626">合計 = 9個</b></div><div style="font-size:9px;color:#64748b;text-align:center;margin-top:4px">複数の親に使う部品は全経路を合算</div>',
15: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 定量発注 vs 定期発注</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#f0fdf4;border-radius:6px;padding:7px"><b style="color:#15803d">定量発注</b><div style="color:#14532d;margin-top:3px">発注点で一定量。手間少・低単価・安定品</div></div><div style="flex:1;background:#eff6ff;border-radius:6px;padding:7px"><b style="color:#1d4ed8">定期発注</b><div style="color:#1e3a8a;margin-top:3px">定期に需要予測。高単価・変動品</div></div></div>',
16: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 標準作業 と 作業標準</div><div style="background:#f0fdf4;border-radius:7px;padding:9px;font-size:10px;color:#14532d;line-height:1.7"><b>標準作業</b>（誰でもできる現時点の最善法）<br>　↓ もとにして作る<br><b>作業標準</b><br>※関係を逆にしない。4Mを有効活用し全員が納得して実施できることが重要</div>',
17: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 余裕率：外掛け / 内掛け</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#eff6ff;border-radius:6px;padding:7px;text-align:center"><b style="color:#1d4ed8">外掛け法</b><div style="color:#1e3a8a;margin-top:3px">余裕 ÷ <b>正味時間</b></div></div><div style="flex:1;background:#f0fdf4;border-radius:6px;padding:7px;text-align:center"><b style="color:#15803d">内掛け法</b><div style="color:#14532d;margin-top:3px">余裕 ÷ <b>標準時間</b></div></div></div><div style="font-size:9px;color:#64748b;text-align:center;margin-top:4px">「外＝正味、内＝標準」で覚える</div>',
18: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ PTS法の特徴</div><div style="background:#f0fdf4;border-radius:7px;padding:9px;font-size:10px;color:#14532d;line-height:1.7">基本動作ごとの <b>既定時間値を合計</b> して作業時間を求める。<br>→ <b>ストップウォッチ・レイティング不要</b>。公平で短サイクル・反復作業に適する。</div>',
19: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ サーブリッグ3分類</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b style="color:#15803d">第1類</b>：不可欠な動作（伸ばす・つかむ・運ぶ・位置決め・放す）</div><div style="background:#fffbeb;border-radius:6px;padding:6px"><b style="color:#b45309">第2類</b>：妨げる動作（探す・選ぶ・考える）</div><div style="background:#fef2f2;border-radius:6px;padding:6px"><b style="color:#b91c1c">第3類</b>：行わない動作（保持・休む・手待ち）</div></div>',
20: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 保全活動の体系</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#eff6ff;border-radius:6px;padding:7px"><b style="color:#1d4ed8">維持活動</b><div style="color:#1e3a8a;margin-top:3px">予防保全（定期＋予知）<br>事後保全</div></div><div style="flex:1;background:#f0fdf4;border-radius:6px;padding:7px"><b style="color:#15803d">改善活動</b><div style="color:#14532d;margin-top:3px">改良保全（故障しにくく改善）<br>保全予防（設計段階で排除）</div></div></div>',
21: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 新QC7つ道具の見分け</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>親和図</b>：グループ化</div><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>連関図</b>：因果を矢印で</div><div style="background:#fdf4ff;border-radius:6px;padding:6px"><b>系統図</b>：目的→手段の樹形</div><div style="background:#fffbeb;border-radius:6px;padding:6px"><b>マトリックス</b>：行列の交点</div><div style="background:#fef2f2;border-radius:6px;padding:6px;grid-column:span 2"><b>PDPC</b>：不測の事態と代替案</div></div>',
22: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ ECRS の原則</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px;text-align:center"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>E</b> なくせないか</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>C</b> 一緒にできないか</div><div style="background:#fdf4ff;border-radius:6px;padding:6px"><b>R</b> 順序を変えられないか</div><div style="background:#fffbeb;border-radius:6px;padding:6px"><b>S</b> 単純にできないか</div></div><div style="font-size:9px;color:#64748b;text-align:center;margin-top:4px">3S＝単純化・標準化・専門化</div>',
23: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 業態別 年間販売額（2024・概数）</div><div style="display:flex;flex-direction:column;gap:4px;font-size:10px"><div style="display:flex;align-items:center;gap:6px"><span style="width:90px">スーパー</span><div style="background:#3a9bd5;height:14px;width:100%;border-radius:3px"></div><span>約16兆</span></div><div style="display:flex;align-items:center;gap:6px"><span style="width:90px">コンビニ</span><div style="background:#16a085;height:14px;width:80%;border-radius:3px"></div><span>約12.9兆</span></div><div style="display:flex;align-items:center;gap:6px"><span style="width:90px">ドラッグストア</span><div style="background:#e67e22;height:14px;width:56%;border-radius:3px"></div><span>約8.9兆</span></div><div style="display:flex;align-items:center;gap:6px"><span style="width:90px">百貨店</span><div style="background:#c0392b;height:14px;width:40%;border-radius:3px"></div><span>約6.3兆</span></div></div>',
24: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 大店立地法 vs 旧・大店法</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#f0fdf4;border:2px solid #86efac;border-radius:7px;padding:7px"><b style="color:#15803d">大店立地法（現行）</b><div style="color:#14532d;margin-top:3px">周辺の生活環境を保持（駐車場・騒音・廃棄物）</div></div><div style="flex:1;background:#fef2f2;border:1px dashed #fca5a5;border-radius:7px;padding:7px"><b style="color:#dc2626">旧・大店法（廃止）</b><div style="color:#7f1d1d;margin-top:3px">中小小売業の経済的調整</div></div></div>',
25: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 都市計画法 区域の区別</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>市街化区域</b>：市街化を進める区域</div><div style="background:#fffbeb;border-radius:6px;padding:6px"><b>市街化調整区域</b>：市街化を抑制する区域</div><div style="background:#fef2f2;border:1px dashed #fca5a5;border-radius:6px;padding:6px"><b>特定用途制限地域</b>：用途地域が無い所で特定用途を制限 <span style="color:#b91c1c">※調整区域と別物</span></div></div>',
26: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 値入率の計算</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:11px;color:#1e3a8a;line-height:1.8;text-align:center">値入額 = 売上高 − 仕入原価 = 5,250<br>売価値入率 = 5,250 ÷ 売価10,500 = <b>50%</b><br>原価値入率 = 5,250 ÷ 原価5,250 = <b>100%</b></div>',
27: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ GMROI の計算</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:11px;color:#1e3a8a;line-height:1.8;text-align:center">売上原価 = 300+800−100 = 1,000<br>粗利益 = 2,000−1,000 = 1,000<br>平均在庫 = (300+100)÷2 = 200<br>GMROI = 1,000 ÷ 200 = <b>500%</b></div>',
28: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 需要予測の手法</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>指数平滑法</b>：α大→直近重視、α小→過去重視</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>移動平均法</b>：一定期間の単純平均（季節は考慮しない）</div><div style="background:#fef2f2;border:1px dashed #fca5a5;border-radius:6px;padding:6px"><b>重回帰</b>：説明変数間の高相関＝多重共線性でNG</div></div>',
29: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 相乗積</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:11px;color:#1e3a8a;line-height:1.8;text-align:center">相乗積 = <b>売上構成比 × 粗利益率</b><br>全商品の相乗積合計 = 全体粗利益率<br><span style="color:#dc2626">売上が一律倍→構成比不変→相乗積不変</span></div>',
30: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 購買タイプ別の配置</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#eff6ff;border-radius:6px;padding:7px"><b style="color:#1d4ed8">計画購買品</b><div style="color:#1e3a8a;margin-top:3px">店奥に配置→回遊を誘導しついで買い</div></div><div style="flex:1;background:#f0fdf4;border-radius:6px;padding:7px"><b style="color:#15803d">非計画購買品</b><div style="color:#14532d;margin-top:3px">入口・レジ前→衝動買いを誘発</div></div></div>',
31: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ VMD：VP→PP→IP（遠く→近く）</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>VP</b>：店頭マネキンで店全体のイメージ訴求・誘導</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>PP</b>：POPで商品の特徴を伝え選択を手助け</div><div style="background:#fdf4ff;border-radius:6px;padding:6px"><b>IP</b>：棚で色・サイズ別に分類陳列</div></div>',
32: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 人時生産性</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:11px;color:#1e3a8a;line-height:1.8;text-align:center">人時生産性 = <b>粗利益 ÷ 総労働時間</b><br><span style="color:#dc2626">分子分母が同率で動くと相殺（変化なし）</span><br>時間を増やさず粗利益を増やす施策が効く</div>',
33: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ インストアプロモーション</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>バンドル販売</b>：価格主導型→客単価UP・在庫消化</div><div style="background:#fef2f2;border:1px dashed #fca5a5;border-radius:6px;padding:6px"><b>特売の連発</b>：内的参照価格が下がり通常価格を高く感じる</div></div>',
34: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ EDLP vs Hi-Lo</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#f0fdf4;border-radius:6px;padding:7px"><b style="color:#15803d">EDLP</b><div style="color:#14532d;margin-top:3px">常時低価格・ローコスト運営</div></div><div style="flex:1;background:#eff6ff;border-radius:6px;padding:7px"><b style="color:#1d4ed8">Hi-Lo</b><div style="color:#1e3a8a;margin-top:3px">通常価格と特売を行き来</div></div></div><div style="font-size:9px;color:#64748b;text-align:center;margin-top:4px">市場価格法＝売価を先に決める</div>',
35: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 在庫管理のポイント</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>定量発注</b>：調達期間が長い→発注点を高く</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>定期発注</b>：需要変動期間＝発注間隔＋調達期間</div><div style="background:#fffbeb;border-radius:6px;padding:6px">発注量＝需要予測 − 有効在庫 ＋ 安全在庫</div></div>',
36: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 一貫パレチゼーション</div><div style="background:#f0fdf4;border-radius:7px;padding:9px;font-size:10px;color:#14532d;line-height:1.7;text-align:center">発地 ──[同じパレットのまま]──▶ 着地<br><b>積み替えない</b>のが核心。荷役が減って効率的。</div>',
37: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 輸送の論点</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>RORO船</b>：車ごと積込（クレーン不要）</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>LOLO船</b>：クレーンで吊り上げ</div><div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;padding:6px;grid-column:span 2">待機時間削減→<b>実車率↑</b>（積載効率とは別）</div></div>',
38: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ トラック3指標</div><div style="display:flex;flex-direction:column;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>積載効率</b>：実積載量 ÷ 能力（積めた度合い）</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>実働率</b>：稼働日数 ÷ 可能日数（日数）</div><div style="background:#fdf4ff;border-radius:6px;padding:6px"><b>実車率</b>：実車キロ ÷ 走行キロ（距離）</div></div>',
39: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ DC vs TC</div><div style="display:flex;gap:6px;font-size:10px"><div style="flex:1;background:#eff6ff;border-radius:6px;padding:7px"><b style="color:#1d4ed8">DC（在庫型）</b><div style="color:#1e3a8a;margin-top:3px">在庫を持つ→即出荷でLT短。センターピッキング</div></div><div style="flex:1;background:#f0fdf4;border-radius:6px;padding:7px"><b style="color:#15803d">TC（通過型）</b><div style="color:#14532d;margin-top:3px">在庫なし→ベンダー仕分けで積替え</div></div></div>',
40: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ ピッキングとロケーション</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>オーダー（摘み取り）</b>：注文ごとに巡回</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>バッチ（種まき）</b>：総数取り→後で仕分け（少品種大量）</div><div style="background:#fffbeb;border-radius:6px;padding:6px;grid-column:span 2">AGV＝搬送、SAS＝仕分け／フリーロケ＝保管効率↑・ピッキング↓</div></div>',
41: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ GTIN の種類</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>GTIN-13</b>：JAN標準（消費者購入単位）</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>GTIN-12</b>：UPC（仕組みはJANと同じ）</div><div style="background:#fdf4ff;border-radius:6px;padding:6px"><b>GTIN-8</b>：短縮タイプ</div><div style="background:#fffbeb;border-radius:6px;padding:6px"><b>GTIN-14</b>：集合包装／9＝不定貫</div></div>',
42: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ バスケット分析（a:200 b:400 両方:100 全:500）</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:10px;color:#1e3a8a;line-height:1.8;text-align:center">支持度 = 100÷500 = 20%<br>信頼度(a→b) = 100÷200 = 50%<br>信頼度(b→a) = 100÷400 = 25%<br>リフト = 0.5 ÷ 0.8 = <b>0.625</b></div>',
43: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ PI値</div><div style="background:#eff6ff;border-radius:7px;padding:9px;font-size:11px;color:#1e3a8a;line-height:1.8;text-align:center">PI値 = 販売数量(金額) ÷ <b>レジ通過客数</b> × 1,000<br><span style="color:#dc2626">分母は入店客数ではない</span><br>規模の違う店舗間の販売力比較に使える相対指標</div>',
44: '<div style="font-size:10px;font-weight:bold;color:#64748b;text-align:center;margin-bottom:7px">▌ 顧客分析の手法</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:10px"><div style="background:#eff6ff;border-radius:6px;padding:6px"><b>RFM</b>：直近・頻度・金額</div><div style="background:#f0fdf4;border-radius:6px;padding:6px"><b>デシル</b>：金額順に10等分</div><div style="background:#fdf4ff;border-radius:6px;padding:6px"><b>クラスター</b>：属性で類似グループ化</div><div style="background:#fffbeb;border-radius:6px;padding:6px"><b>FRAT</b>：A＝Amount（金額）</div></div>',
};

function makeKaisetsuHtml(q) {
  const labels = ["ア","イ","ウ","エ","オ"];
  const catColor = CAT_COLORS[q.cat] || "#1a3a5c";
  const k = q.kaisetsu;

  const titleHtml = `<div style="background:${catColor};padding:11px 16px;display:flex;align-items:center;gap:10px;border-radius:10px 10px 0 0;">
    <div style="background:#fff;color:${catColor};font-size:14px;font-weight:bold;padding:4px 18px;border-radius:20px;">✓ 正解：${q.answer}</div>
    <div style="color:rgba(255,255,255,.9);font-size:11px;font-weight:bold;">│ ${q.cat}  第${q.num}問</div>
  </div>`;

  const viz = (typeof VIZ_DATA!=='undefined' && VIZ_DATA[q.num]) || '';
  const vizHtml = viz ? `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:10px;">${viz}</div>` : '';

  const choiceRows = k.cr.map((ch,i)=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:6px 10px;border-bottom:1px solid #f0f0f0;background:${ch.ok?'#f0fdf4':'#fff'};"><span style="font-size:14px;font-weight:bold;min-width:20px;color:${ch.ok?'#16a34a':'#e74c3c'};">${ch.ok?'○':'✗'}</span><span style="font-weight:bold;min-width:20px;font-size:11px;color:#555;">${labels[i]}</span><span style="font-size:11px;line-height:1.6;color:${ch.ok?'#14532d':'#666'};${ch.ok?'font-weight:600;':''}">${ch.r}</span></div>`).join('');

  let calcHtml='';
  if(k.calc){
    const rows=k.calc.map(line=>line==='─'?`<div style="border-top:1px dashed #93c5fd;margin:5px 0;"></div>`:`<div style="padding:2px 0;color:${line.startsWith('【')?'#92400e':line.includes('→')?'#1e40af':'#334155'};font-weight:${line.startsWith('【')||line.includes('→')?'bold':'normal'};font-size:${line.startsWith('【')?'10px':'12px'};">${line}</div>`).join('');
    calcHtml=`<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:11px 14px;margin:8px 0;font-family:'Courier New',monospace;font-size:12px;line-height:1.85;"><div style="font-family:'Hiragino Sans',sans-serif;font-weight:bold;font-size:10px;color:#1e40af;margin-bottom:5px;">🧮 計算過程</div>${rows}</div>`;
  }

  const sec4=k.trap?`<div style="background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 6px 6px 0;padding:7px 11px;margin:8px 0;font-size:11px;line-height:1.65;color:#78350f;"><b style="color:#92400e;">🚧 つまずき：</b>${k.trap}</div>`:'';
  const sec7=`<div style="background:#f5f3ff;border:2px solid #a78bfa;border-radius:8px;padding:10px 14px;font-size:12px;color:#4c1d95;font-weight:700;line-height:1.7;margin-top:8px;">🔑 ${k.point}</div>`;
  const sec8=k.nextStep?`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:7px 11px;margin-top:6px;font-size:10px;color:#64748b;"><b style="color:#475569;font-size:10px;">⑧ 次の論点：</b>${k.nextStep}</div>`:'';

    const chkHtml = (typeof CHK_DATA!=='undefined' && CHK_DATA[q.num]) ? '<div style="margin-top:14px;padding-top:12px;border-top:1px solid #e2e8f0;">'+CHK_DATA[q.num]+'</div>' : '';
  const _links = (typeof LINK_DATA!=='undefined' && LINK_DATA[q.num]) || [];
  const linkHtml = _links.length ? `<div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:8px 12px;margin-top:10px;"><span style="font-size:10px;font-weight:bold;color:#0369a1;">📚 参考ノート：</span>${_links.map(l=>`<a href="${l.href}" target="_blank" style="display:inline-block;background:#0ea5e9;color:#fff;font-size:10px;font-weight:bold;padding:3px 9px;border-radius:12px;text-decoration:none;margin:2px 4px 2px 0;">${l.label}</a>`).join('')}</div>` : '';
  return `<div style="border-radius:10px;overflow:hidden;border:1px solid #e2e8f0;margin-top:4px;box-shadow:0 2px 8px rgba(0,0,0,.07);">${titleHtml}<div style="padding:12px 14px 16px;background:#fff;">${vizHtml}<div style="background:#f8fafb;border-radius:6px;overflow:hidden;margin-bottom:8px;"><div style="font-size:10px;font-weight:bold;color:#888;padding:5px 10px 2px;">📋 選択肢チェック</div>${choiceRows}</div>${calcHtml}${sec4}${sec7}${sec8}${linkHtml}${chkHtml}</div></div>`;
}

let currentCat = "all";
let filteredQs = [...QUESTIONS];
let currentIdx = 0;


/* ===== 進捗管理 ===== */
const STATUS_KEY = 'exam_status_運営2026_';

function getStatus(num) {
  try { return JSON.parse(localStorage.getItem(STATUS_KEY + num)) || {}; } catch(e) { return {}; }
}
function saveStatus(num, st) {
  localStorage.setItem(STATUS_KEY + num, JSON.stringify(st));
}

function toggleStatus(field) {
  const q = filteredQs[currentIdx];
  if (!q) return;
  const st = getStatus(q.num);
  st[field] = !st[field];
  saveStatus(q.num, st);
  updateStatusUI(q.num);
  updateBtnDots(q.num);
  refreshDashboard();
}

function setEval(level) {
  const q = filteredQs[currentIdx];
  if (!q) return;
  const st = getStatus(q.num);
  st.eval = (st.eval === level) ? null : level;
  saveStatus(q.num, st);
  updateStatusUI(q.num);
  updateBtnDots(q.num);
  refreshDashboard();
}

function updateStatusUI(num) {
  const st = getStatus(num);
  const kk = document.getElementById('kkBtn');
  const dn = document.getElementById('doneBtn');
  if (!kk || !dn) return;
  if (st.kk) {
    kk.textContent = '☑ 確認済';
    kk.style.cssText = 'border:none;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#3b82f6;color:#fff';
  } else {
    kk.textContent = '☐ 確認';
    kk.style.cssText = 'border:1px solid #cbd5e1;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#f8fafc;color:#64748b';
  }
  if (st.done) {
    dn.textContent = '☑ 完了';
    dn.style.cssText = 'border:none;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#22c55e;color:#fff';
  } else {
    dn.textContent = '☐ 完了';
    dn.style.cssText = 'border:1px solid #cbd5e1;border-radius:16px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:bold;transition:all .2s;background:#f8fafc;color:#64748b';
  }
  const BASE_EVAL = 'border-radius:14px;padding:3px 9px;font-size:10px;cursor:pointer;font-weight:bold;transition:all .2s;';
  const EVAL_CFG = {
    must:  { id:'evalMust',  on:'background:#ef4444;color:#fff;border:none',          off:'background:#fef2f2;color:#94a3b8;border:1px solid #fecaca' },
    check: { id:'evalCheck', on:'background:#3b82f6;color:#fff;border:none',          off:'background:#f8fafc;color:#94a3b8;border:1px solid #dbeafe' },
    easy:  { id:'evalEasy',  on:'background:#22c55e;color:#fff;border:none',          off:'background:#f0fdf4;color:#94a3b8;border:1px solid #bbf7d0' }
  };
  Object.entries(EVAL_CFG).forEach(([level, cfg]) => {
    const btn = document.getElementById(cfg.id);
    if (btn) btn.style.cssText = BASE_EVAL + (st.eval === level ? cfg.on : cfg.off);
  });
}

function updateBtnDots(num) {
  const dots = document.getElementById('dots_' + num);
  if (!dots) return;
  const st = getStatus(num);
  const EVAL_COLORS = { must:'#ef4444', check:'#3b82f6', easy:'#22c55e' };
  dots.innerHTML = '';
  const d1 = document.createElement('div');
  d1.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.kk ? '#3b82f6' : '#e2e8f0');
  const d2 = document.createElement('div');
  d2.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.done ? '#22c55e' : '#e2e8f0');
  const d3 = document.createElement('div');
  d3.style.cssText = 'width:5px;height:5px;border-radius:50%;background:' + (st.eval ? EVAL_COLORS[st.eval] : '#e2e8f0');
  dots.appendChild(d1);
  dots.appendChild(d2);
  dots.appendChild(d3);
}

function refreshDashboard() {
  // カテゴリが選択中なら対象はfilteredQs、全表示ならQUESTIONS全体
  const targetQs = (typeof currentCat !== 'undefined' && currentCat !== 'all') ? filteredQs : QUESTIONS;
  const isFiltered = targetQs.length < QUESTIONS.length;

  let kkCount = 0, doneCount = 0, mustCount = 0, chkCount = 0, easyCount = 0;
  const cells = document.getElementById('dashCells');
  if (cells) cells.innerHTML = '';

  const EVAL_BORDER = { must:'#ef4444', check:'#3b82f6', easy:'#22c55e' };
  // グリッド：カテゴリ内は対象問のみ表示、全体は25問全部（カテゴリ外はフェード）
  const gridQs = isFiltered ? targetQs : QUESTIONS;
  gridQs.forEach(q => {
    const st = getStatus(q.num);
    const inScope = !isFiltered || targetQs.indexOf(q) >= 0;
    if (inScope && st.kk) kkCount++;
    if (inScope && st.done) doneCount++;
    if (inScope && st.eval === 'must') mustCount++;
    if (inScope && st.eval === 'check') chkCount++;
    if (inScope && st.eval === 'easy') easyCount++;
    if (cells) {
      const cell = document.createElement('div');
      const color = st.done ? '#4ade80' : st.kk ? '#93c5fd' : '#e2e8f0';
      const textColor = st.done ? '#14532d' : st.kk ? '#1e40af' : '#64748b';
      const evalBorder = st.eval ? '3px solid ' + EVAL_BORDER[st.eval] : '3px solid transparent';
      cell.style.cssText = 'background:' + color + ';color:' + textColor + ';border-radius:6px;padding:4px 2px;text-align:center;font-size:11px;font-weight:bold;cursor:pointer;transition:all .2s;border-bottom:' + evalBorder;
      cell.textContent = q.num;
      const evalLabel = st.eval === 'must' ? ' [必ず確認]' : st.eval === 'check' ? ' [確認]' : st.eval === 'easy' ? ' [できれば]' : '';
      cell.title = 'Q' + q.num + ' ' + q.cat + (st.kk ? ' 確認済' : '') + (st.done ? ' 完了' : '') + evalLabel;
      cell.onclick = () => {
        const fi = filteredQs.indexOf(q);
        if (fi >= 0) { currentIdx = fi; render(); }
        else {
          currentCat = 'all';
          document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === 'all'));
          filteredQs = [...QUESTIONS];
          buildQList();
          currentIdx = QUESTIONS.indexOf(q);
          render();
        }
        document.getElementById('dashGrid').classList.remove('dash-open');
        window.scrollTo({top:0,behavior:'smooth'});
      };
      cells.appendChild(cell);
    }
  });

  const total = targetQs.length;
  const kkPct = total ? Math.round(kkCount/total*100) : 0;
  const donePct = total ? Math.round(doneCount/total*100) : 0;
  const el = id => document.getElementById(id);

  // ラベル：カテゴリ選択中は「カテゴリ名内」を表示
  const scopeLabel = isFiltered ? (currentCat + ' ') : '';
  if (el('dashKk')) el('dashKk').textContent = scopeLabel + '確認済 ' + kkCount + '/' + total;
  if (el('dashDone')) el('dashDone').textContent = scopeLabel + '完了 ' + doneCount + '/' + total;
  if (el('dashMust')) el('dashMust').textContent = '🔴 必ず確認 ' + mustCount + '/' + total;
  if (el('dashCheck2')) el('dashCheck2').textContent = '🔵 確認 ' + chkCount + '/' + total;
  if (el('dashEasy')) el('dashEasy').textContent = '🟢 できれば ' + easyCount + '/' + total;
  if (el('kkBar')) el('kkBar').style.width = kkPct + '%';
  if (el('doneBar')) el('doneBar').style.width = donePct + '%';
  if (el('kkPct')) el('kkPct').textContent = kkPct + '%';
  if (el('donePct')) el('donePct').textContent = donePct + '%';

  // ダッシュボードタイトルにスコープを反映
  const titleEl = document.querySelector('#progressDash [style*="font-size:13px"]');
  if (titleEl) titleEl.textContent = isFiltered ? ('📋 ' + currentCat + ' の進捗') : '📋 進捗管理';
}
/* ===== /進捗管理 ===== */

function buildQList() {
  const el = document.getElementById("qList");
  el.innerHTML = "";
  QUESTIONS.forEach((q, i) => {
    const btn = document.createElement("button");
    btn.className = "q-btn";
    btn.id = "qbtn_" + q.num;
    btn.textContent = q.num;
    btn.dataset.cat = q.cat;
    btn.dataset.idx = i;
    if (currentCat !== "all" && q.cat !== currentCat) btn.classList.add("hidden");
    btn.onclick = () => {
      const fi = filteredQs.indexOf(q);
      if (fi < 0) return;
      currentIdx = fi;
      render();
    };
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:2px";
    const dots = document.createElement("div");
    dots.id = "dots_" + q.num;
    dots.style.cssText = "display:flex;gap:2px;height:5px";
    wrap.appendChild(btn);
    wrap.appendChild(dots);
    el.appendChild(wrap);
    updateBtnDots(q.num);
  });
  refreshDashboard();
}

function render() {
  const q = filteredQs[currentIdx];
  if (!q) return;
  document.getElementById("qNum").textContent = "第" + q.num + "問";
  const badge = document.getElementById("catBadge");
  badge.textContent = q.cat;
  badge.className = "cat-badge " + q.cat;
  document.getElementById("qText").innerHTML = q.text.replace(/\n/g, "<br>");
  const se = document.getElementById("qShiryou");
  if (q.shiryou) { se.style.display=""; se.innerHTML=q.shiryou; } else { se.style.display="none"; }
  const ul = document.getElementById("qChoices");
  const labs = ["ア","イ","ウ","エ","オ"];
  ul.innerHTML = q.choices.map((c,i) => `<li><span class="cho-label">${labs[i]}</span>${c}</li>`).join("");
  document.getElementById("answerBox").style.display = "none";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("btnPrev").disabled = currentIdx === 0;
  document.getElementById("btnNext").disabled = currentIdx === filteredQs.length - 1;
  document.getElementById("qCount").textContent = (currentIdx+1) + " / " + filteredQs.length + "問";
  document.getElementById("progressBar").style.width = ((currentIdx+1)/filteredQs.length*100) + "%";
  document.querySelectorAll(".q-btn").forEach(btn => {
    btn.classList.toggle("current", parseInt(btn.dataset.idx) === QUESTIONS.indexOf(q));
  });
  updateStatusUI(q.num);
  refreshDashboard();
  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleAnswer() {
  const box = document.getElementById("answerBox");
  if (box.style.display === "none") {
    box.innerHTML = makeKaisetsuHtml(filteredQs[currentIdx]);
    box.style.display = "block";
    if (typeof __szChk30Init === 'function') __szChk30Init();
    // 各チェック問題の解答にも参考ノートリンクを注入
    if (typeof LINK_DATA !== 'undefined') {
      const _qn = filteredQs[currentIdx].num;
      const _ls = LINK_DATA[_qn] || [];
      if (_ls.length) {
        const _lc = _ls.map(l=>`<a href="${l.href}" target="_blank" style="display:inline-block;background:#0ea5e9;color:#fff;font-size:10px;font-weight:bold;padding:3px 9px;border-radius:12px;text-decoration:none;margin:2px 4px 2px 0;">${l.label}</a>`).join('');
        box.querySelectorAll('.chk30-q').forEach(chkQ => {
          const ld = document.createElement('div');
          ld.style.cssText = 'background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;padding:6px 10px;margin-top:8px;';
          ld.innerHTML = '<span style="font-size:10px;font-weight:bold;color:#0369a1;">📚 参考ノート：</span>' + _lc;
          chkQ.appendChild(ld);
        });
      }
    }
  } else {
    box.style.display = "none";
  }
}

function move(dir) {
  currentIdx = Math.max(0, Math.min(filteredQs.length-1, currentIdx+dir));
  render();
}

document.querySelectorAll(".cat-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    currentCat = tab.dataset.cat;
    document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    filteredQs = currentCat==="all" ? [...QUESTIONS] : QUESTIONS.filter(q => q.cat===currentCat);
    currentIdx = 0;
    buildQList();
    render();
  });
});

buildQList();
render();
refreshDashboard();
</script>

<script>
(function(){
  'use strict';
  // 二重注入ガード：qz-memo が同一ファイルに2回挿入されても注釈システムは1回だけ初期化する。
  // 無いと mouseup リスナーが二重に付いてクリックでトグルが2回発火し「押しても表示されない」、
  // restoreAll も2回走って同一注釈を再ラップして入れ子になる。
  if(window.__SZ_MEMO_INIT__) return;
  window.__SZ_MEMO_INIT__=1;
  function szFileKey(){var p=location.pathname;try{p=decodeURIComponent(p);}catch(e){}var h=5381;for(var i=0;i<p.length;i++){h=((h*33)^p.charCodeAt(i))>>>0;}return h.toString(36);}
  /* 動的ページ用：window.__SZ_QKEY__() があれば保存キーに問題ごとの接尾辞を付ける（静的ページでは無害＝接尾辞なし） */
  function szQSuffix(){try{return (typeof window.__SZ_QKEY__==='function')?('_'+window.__SZ_QKEY__()):'';}catch(e){return '';}}
  function szCurKEY(){return 'szA_'+szFileKey()+szQSuffix();}
  var db=[];
  try{db=JSON.parse(localStorage.getItem(szCurKEY())||'[]');}catch(e){}
  function save(){try{localStorage.setItem(szCurKEY(),JSON.stringify(db));}catch(e){}}

  var bar=document.getElementById('sz-bar');
  var cmtPop=document.getElementById('sz-cmt-pop');
  var cmtTxt=document.getElementById('sz-cmt-txt');
  var cmtHead=document.getElementById('sz-cmt-head');
  var delPop=document.getElementById('sz-del-pop');
  var delEditBtn=document.getElementById('sz-del-edit-btn');
  var tip=document.getElementById('sz-cmt-tip');
  var tipBody=document.getElementById('sz-tip-body');
  var tipEditBtn=document.getElementById('sz-tip-edit-btn');
  var hlPicker=document.getElementById('sz-hl-picker');
  var savedRange=null, cmtCtx=null, tipTimer=null, tipTargetAid=null, delTarget=null, fbBarTarget=null, szShapeBarTarget=null;
  var fbBtn=document.getElementById('sz-bar-fb-btn');
  var alignBtn=document.getElementById('sz-bar-align-btn');
  /* モバイル：バーのボタンタップで選択が消えないよう mousedown をキャンセル */
  bar.addEventListener('mousedown',function(e){e.preventDefault();});

  /* ---- 既存の.fill-blank「空欄解除」状態の保存・復元 ---- */
  var FBKEY='szFB_'+szFileKey();
  var fbUn={}; try{fbUn=JSON.parse(localStorage.getItem(FBKEY)||'{}');}catch(e){}
  function fbSave(){try{localStorage.setItem(FBKEY,JSON.stringify(fbUn));}catch(e){}}
  function fbInit(){
    [].slice.call(document.querySelectorAll('.fill-blank,.blank')).filter(function(el){return !(el.closest&&el.closest('[id^="pre_"]'));}).forEach(function(el,i){
      el.setAttribute('data-fbidx',i);
      if(fbUn[i]) el.classList.add('sz-unblanked');
    });
  }
  // 既存の.fill-blankのクリック（答え表示トグル）を、長押し直後／空欄解除中は抑止する（元ノートのリスナーを編集せずキャプチャ段で割り込む）
  document.addEventListener('click',function(e){
    var fb=e.target.closest?e.target.closest('.fill-blank,.blank'):null;
    if(!fb) return;
    if(window.szSuppressFbClick){window.szSuppressFbClick=false;e.stopImmediatePropagation();e.preventDefault();return;}
    if(fb.classList.contains('sz-unblanked')){e.stopImmediatePropagation();e.preventDefault();}
  },true);
  // 長押し時のブラウザ標準コンテキストメニューを抑制（del-popを前面に出すため）
  document.addEventListener('contextmenu',function(e){
    if(e.target.closest&&e.target.closest('.fill-blank,.blank,mark.sz-blank,mark.sz-erase,mark.sz-ul,mark.sz-hl,mark.sz-cm')) e.preventDefault();
  });

  function uid(){return 'a'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

  function panelOf(el){
    /* 動的ページ用：window.__SZ_PANELS__（セレクタ）があれば、その要素もパネル扱いにして
       注釈をコンテナ単位にスコープする（例: 模試の #qText,#answerBox）。静的ページでは無害。 */
    var sel='.tab-panel,.tab-content';
    try{ if(window.__SZ_PANELS__) sel+=','+window.__SZ_PANELS__; }catch(e){}
    var p=el.closest?el.closest(sel):null;
    return p&&p.id?p.id:'body';
  }

  /* ---- 出現位置（occurrence index）で復元先を一意化 ----
     同一フレーズが複数あると「文脈付き検索」でも別の箇所に復元され得る。
     root配下のテキストを文書順に連結（marks内の文字も含め、sz-cm-icon と pre_ 配下は除外）
     し「root内で何番目の出現か」を保存・復元する。marks の有無で連結文字列は変わらないため
     復元順に依存せず安定する。 */
  function szTextStream(root){
    var nodes=[],full='';
    var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode:function(n){
        if(n.parentElement&&n.parentElement.closest('.sz-cm-icon')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('[id^="pre_"]')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('.row-hide-btn,.sec-hide-btn-row,.row-hidden-ph,.sec-hidden-ph,.tr-hidden-ph,.card-hide-all-btn,.sz-drag-handle,.sz-drag-line,.fz-h,.fz-ph,.fzm-ctrl,.fzm-ind')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var n; while((n=w.nextNode())){ nodes.push({node:n,start:full.length}); full+=n.nodeValue; }
    return {nodes:nodes,full:full};
  }
  function szLocate(stream,gpos,bias){
    /* 境界（gpos がノード末尾＝次ノード先頭に一致）で寄せ方を変える：
       start＝後ろのノードの offset0／end＝前のノードの offset len。
       これを誤ると <b>語</b> 等“語＝1テキストノード”の選択で a.node≠b.node になり復元が別の同一語へ流れる。 */
    var i,s,len;
    for(i=0;i<stream.nodes.length;i++){
      s=stream.nodes[i];len=s.node.nodeValue.length;
      if(bias==='end'){ if(gpos>s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
      else if(bias==='start'){ if(gpos>=s.start&&gpos<s.start+len) return {node:s.node,offset:gpos-s.start}; }
      else { if(gpos>=s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
    }
    for(i=0;i<stream.nodes.length;i++){ s=stream.nodes[i];len=s.node.nodeValue.length; if(gpos>=s.start&&gpos<=s.start+len) return {node:s.node,offset:gpos-s.start}; }
    return null;
  }
  function szOccOf(root,node,offset,selText){
    if(!selText) return 0;
    var stream=szTextStream(root),gstart=-1;
    for(var i=0;i<stream.nodes.length;i++){ if(stream.nodes[i].node===node){ gstart=stream.nodes[i].start+offset; break; } }
    if(gstart<0) return 0;
    var occ=0,from=0,idx;
    while((idx=stream.full.indexOf(selText,from))!==-1){
      if(idx===gstart) break;
      if(idx<gstart) occ++;
      from=idx+selText.length;
    }
    return occ;
  }
  /* ---- 文脈を cross-node の stream.full から採取 ----
     旧実装は ctxBefore/ctxAfter を選択の開始/終了テキストノード“1個の中だけ”で 30字 slice していた。
     そのため <b>需要</b> のように語＝1ノードだと、開始は offset0／終了はノード末尾になり
     ctxBefore も ctxAfter も“空文字”になりやすい。空文脈だと szRankLocs が weak 判定で
     occ 近接だけに頼り、ページ内容が増減して occ がズレた次セッションで「同じ語の別の箇所」に
     誤着地する（＝コメント等が別の場所に飛ぶ）。復元側 szRankLocs は stream.full 上で前後を
     見るので、保存もノードをまたいだ stream.full から採れば対称になり、occ がズレても文脈で救える。 */
  function szCtxOf(root,range,selText){
    var s=szTextStream(root),gs=-1,ge=-1,i;
    for(i=0;i<s.nodes.length;i++){ if(s.nodes[i].node===range.startContainer){ gs=s.nodes[i].start+range.startOffset; break; } }
    for(i=0;i<s.nodes.length;i++){ if(s.nodes[i].node===range.endContainer){ ge=s.nodes[i].start+range.endOffset; break; } }
    if(gs<0||ge<0){ // stream に乗らない（SVG等）→ 旧来の単一ノード採取にフォールバック
      var cb=range.startContainer.nodeType===3?range.startContainer.nodeValue.slice(Math.max(0,range.startOffset-30),range.startOffset):'';
      var ca=range.endContainer.nodeType===3?range.endContainer.nodeValue.slice(range.endOffset,range.endOffset+30):'';
      return {cb:cb,ca:ca};
    }
    return {cb:s.full.slice(Math.max(0,gs-30),gs), ca:s.full.slice(ge,ge+30)};
  }
  function szFindByOcc(root,selText,occ){
    if(!selText) return null;
    var stream=szTextStream(root),seen=0,from=0,idx;
    while((idx=stream.full.indexOf(selText,from))!==-1){
      if(seen===occ){
        var a=szLocate(stream,idx,'start'),b=szLocate(stream,idx+selText.length,'end');
        if(a&&b&&a.node===b.node) return {node:a.node,offset:a.offset,end:b.offset};
        return null;
      }
      seen++; from=idx+selText.length;
    }
    return null;
  }
  function szFindByContext(root,ann,scoped){
    var walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode:function(n){
        if(n.parentElement&&n.parentElement.closest('.sz-cm-icon')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('[id^="pre_"]')) return NodeFilter.FILTER_REJECT;
        if(n.parentElement&&n.parentElement.closest('.row-hide-btn,.sec-hide-btn-row,.row-hidden-ph,.sec-hidden-ph,.tr-hidden-ph,.card-hide-all-btn,.sz-drag-handle,.sz-drag-line,.fz-h,.fz-ph,.fzm-ctrl,.fzm-ind')) return NodeFilter.FILTER_REJECT;
        if(!scoped&&n.parentElement&&n.parentElement.closest('mark[data-aid]')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    var node;
    while((node=walker.nextNode())){
      var txt=node.nodeValue,idx=-1;
      if(ann.ctxBefore||ann.ctxAfter){ var fi=txt.indexOf(ann.ctxBefore+ann.selText+ann.ctxAfter); if(fi!==-1) idx=fi+ann.ctxBefore.length; }
      if(idx===-1) idx=txt.indexOf(ann.selText);
      if(idx===-1) continue;
      return {node:node,offset:idx,end:idx+ann.selText.length};
    }
    return null;
  }
  /* ---- 文脈優先＋occ着地の統合解決 ----
     occ は「上に同じ語があると間違った同一語にヒットしても必ず何かを返す」ため、
     occ 単独だと誤った箇所へ復元され得る。そこで stream.full（root内テキストを文書順連結）上で
     selText の全出現を列挙し、各出現の前後を保存済み ctxBefore/ctxAfter と突き合わせて
     「文脈が最も合う出現」を選ぶ。stream.full はノードをまたいで連結されているので、
     <b> や境界をまたぐ文脈もそのまま照合できる。
     ・文脈が弱い（前後合計4字未満／旧データで空）→ 検証せず保存 occ をそのまま信用。
     ・文脈が全く合う場所が無い（本文が作り直された等）→ 注釈を消さず保存 occ で着地。
     ・同点 → 保存 occ 番号に近い出現を採用。
     occ の意味は従来どおり「stream内の全出現中の何番目か」のまま（番号の付け替えはしない）。
     さらに候補を順位付けして返し、restore 側で「既に別注釈の mark 内に入る候補」を飛ばす
     ＝同一語の別エントリが同じ出現へ衝突して入れ子（二重穴埋め・押しても表示されない）に
     なるのを防ぐ。文脈で一意に決まる場合は最良候補が必ず選ばれるので挙動は変わらない。 */
  function szCtxSuffix(stored,actual){ var i=0; while(i<stored.length&&i<actual.length&&stored.charAt(stored.length-1-i)===actual.charAt(actual.length-1-i)) i++; return i; }
  function szCtxPrefix(stored,actual){ var i=0; while(i<stored.length&&i<actual.length&&stored.charAt(i)===actual.charAt(i)) i++; return i; }
  /* root内の selText 全出現を「文脈スコア降順→保存occに近い順」でランクした候補配列を返す */
  function szRankLocs(root,ann){
    var sel=ann.selText; if(!sel) return [];
    var stream=szTextStream(root),full=stream.full,L=sel.length;
    var cb=ann.ctxBefore||'',ca=ann.ctxAfter||'',weak=(cb.length+ca.length<4);
    var occs=[],from=0,idx;
    while((idx=full.indexOf(sel,from))!==-1){ occs.push(idx); from=idx+L; }
    if(!occs.length) return [];
    var storedOcc=(typeof ann.occ==='number')?ann.occ:0;
    var scored=occs.map(function(gi,k){
      var score=weak?0:szCtxSuffix(cb,full.slice(Math.max(0,gi-cb.length),gi))+szCtxPrefix(ca,full.slice(gi+L,gi+L+ca.length));
      return {gi:gi,k:k,score:score};
    });
    scored.sort(function(a,b){ return (b.score-a.score)||(Math.abs(a.k-storedOcc)-Math.abs(b.k-storedOcc))||(a.k-b.k); });
    var out=[];
    scored.forEach(function(c){
      var a=szLocate(stream,c.gi,'start'),b=szLocate(stream,c.gi+L,'end');
      if(a&&b&&a.node===b.node) out.push({node:a.node,offset:a.offset,end:b.offset});
    });
    return out;
  }
  /* 既存の別注釈 mark 内に入る候補をスキップして、空いている最良位置を返す */
  function szResolveLoc(root,ann,scoped){
    var cands=szRankLocs(root,ann);
    for(var i=0;i<cands.length;i++){
      var c=cands[i];
      if(!scoped){
        var cover=c.node.parentElement&&c.node.parentElement.closest?c.node.parentElement.closest('mark[data-aid]'):null;
        if(cover&&cover.dataset&&cover.dataset.aid!==ann.uid) continue; // 別注釈に占有済み→次候補へ
      }
      return c;
    }
    return null;
  }

  /* ---- ツールバー位置 ---- */
  var _isMobile=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  function clampBarToViewport(){
    var r=bar.getBoundingClientRect(), W=window.innerWidth, H=window.innerHeight, MARGIN=4;
    // 横クランプ（transform:translateX(-50%)なのでstyle.leftはバー中心のpx値）
    var sl=parseFloat(bar.style.left)||0;
    if(r.right>W-MARGIN) sl-=(r.right-(W-MARGIN));
    if(r.left+(sl-(parseFloat(bar.style.left)||0))<MARGIN) sl=MARGIN+r.width/2;
    bar.style.left=sl+'px';
    // 縦クランプ（bottom固定の場合はスキップ）
    if(!bar.style.bottom){
      var st=parseFloat(bar.style.top)||0;
      if(r.bottom>H-MARGIN) st-=(r.bottom-(H-MARGIN));
      if(st<MARGIN) st=MARGIN;
      bar.style.top=st+'px';
    }
  }

  document.addEventListener('mouseup',function(e){
    if(document.body.classList.contains('sz-annot-off')) return; // メモOFF：選択してもツールバーを出さない（読むだけモード）
    if(e.target.closest('#sz-bar,#sz-cmt-pop,#sz-del-pop,#sz-toggle,#sz-cmt-tip,#sz-hl-picker,#sz-toolbar,#sz-hide-tools')) return;
    szHideHlPicker();
    var sel=window.getSelection();
    if(!sel||sel.isCollapsed||!sel.toString().trim()){
      if(szLPfired){szLPfired=false;return;} // 長押し直後：メニューを閉じない・トグルしない
      var ann=e.target.closest?e.target.closest('mark[data-aid]'):null;
      if(ann&&(ann.classList.contains('sz-blank')||ann.classList.contains('sz-erase'))){
        // 穴埋め／消去：クリックで表示⇔非表示をトグル（長押しで「元に戻す」メニュー）
        szHideBar();szHideCmt();hideTipNow();szHideDel();
        if(ann.classList.contains('sz-erase')&&ann.dataset&&ann.dataset.aid){
          // クロスバウンダリ分割された全 mark を一括トグル
          var _eid=ann.dataset.aid,_eshow=!ann.classList.contains('show');
          Array.from(document.querySelectorAll('mark.sz-erase[data-aid="'+_eid+'"]')).forEach(function(m){m.classList.toggle('show',_eshow);});
        } else {
          ann.classList.toggle('show');
        }
        if(ann.closest&&ann.closest('.sz-note,.sz-shape')&&window.szSaveNoteOf) window.szSaveNoteOf(ann);
      } else if(ann){
        szHideBar();szHideCmt();hideTipNow();
        showDelPop(ann,e);
      } else if(!e.target.closest('#sz-del-pop')){
        szHideBar();szHideCmt();szHideDel();
      }
      return;
    }
    szHideDel();szHideCmt();
    savedRange=sel.getRangeAt(0).cloneRange();
    showBar(savedRange.getBoundingClientRect());
  });

  /* ---- touchend: モバイル選択検知（mouseup はタッチデバイスで発火しないため） ---- */
  document.addEventListener('touchend',function(e){
    if(document.body.classList.contains('sz-annot-off')) return;
    if(e.target.closest('#sz-bar,#sz-cmt-pop,#sz-del-pop,#sz-toggle,#sz-cmt-tip,#sz-hl-picker,#sz-toolbar,#sz-hide-tools')) return;
    setTimeout(function(){
      var sel=window.getSelection();
      if(!sel||sel.isCollapsed||!sel.toString().trim()){
        if(!szLPfired){
          if(!fbBarTarget) szHideBar(); // fill-blank bar表示中は隠さない
          szHideCmt();szHideDel();
        }
        szLPfired=false;
        return;
      }
      szHideDel();szHideCmt();
      savedRange=sel.getRangeAt(0).cloneRange();
      showBar(savedRange.getBoundingClientRect());
    },80);
  });

  /* ---- 編集ボタン（削除ポップから） ---- */
  delEditBtn.addEventListener('click',function(){
    var aid=delPop.dataset.aid;
    var mark=document.querySelector('mark[data-aid="'+aid+'"]');

    if(!mark) return;
    cmtHead.textContent='💬 コメントを編集';

  /* ---- 注釈ボタン実行 ---- */
  window.szAnnot=function(type){
    if(!savedRange) return;
    szHideBar();
    if(type==='cm'){
      cmtHead.textContent='💬 コメントを追加';
      cmtTxt.value='';
      cmtCtx={action:'new',range:savedRange,type:type};
      showCmtPop(savedRange.getBoundingClientRect());
    } else if(type==='size'){
      applyAnnot(savedRange,'size','',uid(),'','sm');

  /* ---- 選択箇所に図形（テキスト枠）を置く ---- */
  window.szShapeFromSel=function(){
    if(!savedRange){ return; }
    var rect=savedRange.getBoundingClientRect();
    szHideBar();
    var sx=window.pageXOffset||document.documentElement.scrollLeft||0;
    var sy=window.pageYOffset||document.documentElement.scrollTop||0;
    var px=rect.left+sx, py=rect.top+sy, w=rect.width;
    window.getSelection().removeAllRanges();
    if(window.szAddShape) window.szAddShape(px,py,w);
    else showToast('図形機能の初期化待ちです。もう一度お試しください');
  };
  /* ---- 選択範囲を四角で囲む（複数行は外接矩形＝全体を覆う最小の枠） ---- */
  window.szFrameFromSel=function(){
    if(!savedRange) return;
    var rect=savedRange.getBoundingClientRect();
    szHideBar();
    var sx=window.pageXOffset||document.documentElement.scrollLeft||0;
    var sy=window.pageYOffset||document.documentElement.scrollTop||0;
    var pad=3;
    var px=rect.left+sx-pad, py=rect.top+sy-pad, w=rect.width+pad*2, h=rect.height+pad*2;
    window.getSelection().removeAllRanges();
    if(window.szAddFrame) window.szAddFrame(px,py,w,h);
    else showToast('枠機能の初期化待ちです。もう一度お試しください');
  };
  /* ---- 図形バー：太字／文字サイズ変更／枠削除 ---- */
  window.szShapeBold=function(){
    if(!szShapeBarTarget) return;
    try{ document.execCommand('bold'); }catch(e){}
    var b=szShapeBarTarget.querySelector('.sz-sh-body');

  };
  window.szShapeFontFromBar=function(d){ if(szShapeBarTarget&&window.szShapeFontDelta) window.szShapeFontDelta(szShapeBarTarget,d); };
  /* ---- コメント枠：文字の揃え（左→中央→右 をサイクル） ---- */
  var SZ_ALIGN_ORDER=['left','center','right'];
  var SZ_ALIGN_LABEL={left:'⬅ 左',center:'⬌ 中',right:'➡ 右'};
  function szSyncAlignBtn(target){

    if(target&&target.dataset.nid&&window.szShapeAlignGet) cur=window.szShapeAlignGet(target)||'left';
    alignBtn.textContent=SZ_ALIGN_LABEL[cur]||SZ_ALIGN_LABEL.left;
  }
  window.szShapeAlignFromBar=function(){
    if(!szShapeBarTarget||!window.szShapeAlignSet) return;

    var next=SZ_ALIGN_ORDER[(SZ_ALIGN_ORDER.indexOf(cur)+1)%SZ_ALIGN_ORDER.length];
