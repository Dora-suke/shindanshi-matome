<script>
const CAT_COLORS = { "会計理論":"#3a9bd5","原価計算":"#27ae60","財務分析":"#e67e22","管理会計":"#8e44ad","企業財務":"#c0392b" };

const QUESTIONS = [
  { num:1, cat:"会計理論",
    text:"税効果会計に関する記述として、最も適切なものはどれか。",
    choices:["受取配当金のうち益金に算入されない金額は、繰延税金負債を増加させる。","税法の損金算入限度額を超える貸倒引当金繰入額は、繰延税金資産を増加させる。","寄付金のうち損金に算入されない金額は、繰延税金資産を増加させる。","税法の損金算入限度額を超える減価償却費は、繰延税金資産を減少させる。"],
    answer:"イ",
    kaisetsu:{
      cr:[
        {ok:false,r:"益金不算入は永久差異→将来も差異が解消しない→繰延税金負債は生じない"},
        {ok:true, r:"損金算入超過の繰入額は将来減算一時差異→将来損金算入が見込まれる→繰延税金資産が増加"},
        {ok:false,r:"損金不算入の寄付金は永久差異（永遠に解消しない）→繰延税金資産は生じない"},
        {ok:false,r:"損金算入超過の減価償却費も将来減算一時差異→繰延税金資産が増加（減少ではない）"}
      ],
      detail:"税効果会計は「一時差異」（将来解消する差異）にのみ繰延税金を計上する。貸倒引当金の損金算入限度超過額は将来に損金として認められる将来減算一時差異。一方、受取配当の益金不算入・寄付金の損金不算入は「永久差異」で将来も解消しないため繰延税金は計上しない。",
      point:"一時差異（将来解消）→繰延税金あり ／ 永久差異（永遠解消しない）→繰延税金なし"
    }
  },
  { num:2, cat:"会計理論",
    text:"収益認識基準に関する記述として、最も適切なものはどれか。",
    choices:["引渡基準とは、商品が取引先に到着した時点で収益として認識する考え方である。","引渡基準よりも収益認識のタイミングが遅いのは、出荷基準である。","検収基準は、契約の解消や返品リスクがない場合に採用される。","出荷基準とは、取引先が納品された商品の内容を確認し、問題ないことを書面などで通知した時点で収益として認識する考え方である。"],
    answer:"ア",
    kaisetsu:{
      cr:[
        {ok:true, r:"引渡基準=商品が取引先に到着した時点で収益認識→正しい定義"},
        {ok:false,r:"引渡基準より遅いのは検収基準（出荷→引渡→検収の順）。出荷基準は最も早い"},
        {ok:false,r:"検収基準は返品・解消リスクがある場合に採用される（リスクがない場合は不要）"},
        {ok:false,r:"これは検収基準の説明。出荷基準は「出荷した時点」で認識"}
      ],
      detail:"収益認識のタイミング早い順：①出荷基準（出荷した瞬間）→②引渡基準（商品が到着した時点）→③検収基準（取引先が書面等で確認した時点）。選択肢イ・エが混同しやすい典型的ひっかけ。",
      point:"出荷→引渡（到着）→検収 の順に収益認識が遅くなる"
    }
  },
  { num:3, cat:"原価計算",
    text:"以下の資料は、工場の直接費と間接費のデータである。\nこのとき、製造指図書#1 の製造原価として、最も適切なものを下記の解答群から選べ。",
    shiryou:`<h4>（1）直接費</h4><table><tr><th>製造指図書</th><th>材料消費量</th><th>材料単価</th><th>直接作業時間</th><th>賃率</th></tr><tr><td>#1</td><td>50kg</td><td>@4,000円/kg</td><td>200時間</td><td>1,200円/時</td></tr><tr><td>#2</td><td>60kg</td><td>@5,000円/kg</td><td>220時間</td><td>1,200円/時</td></tr><tr><td>#3</td><td>60kg</td><td>@3,000円/kg</td><td>180時間</td><td>1,200円/時</td></tr></table><br><h4>（2）間接費</h4><p>製造間接費実際発生額：300,000円</p><p>製造間接費は直接作業時間を配賦基準として各製品に配賦する。</p>`,
    choices:["400,000円","440,000円","540,000円","600,000円"],
    answer:"ウ",
    kaisetsu:{
      cr:[
        {ok:false,r:"直接材料費のみの計算（間接費配賦を忘れている）"},
        {ok:false,r:"直接費合計は440,000円だが間接費配賦100,000円を加算していない"},
        {ok:true, r:"直接費440,000円＋間接費配賦100,000円＝540,000円"},
        {ok:false,r:"間接費全額300,000円を#1に配賦した誤り"}
      ],
      detail:"製造原価＝直接費（材料費＋労務費）＋間接費配賦額。間接費は作業時間比で按分する。",
      calc:["直接材料費：50kg × @4,000円 ＝ 200,000円","直接労務費：200時間 × 1,200円 ＝ 240,000円","直接費合計：440,000円","─","総作業時間：200＋220＋180 ＝ 600時間","#1への間接費配賦：300,000 × (200÷600) ＝ 100,000円","─","製造原価：440,000 ＋ 100,000 ＝ 540,000円 →ウ"],
      point:"間接費配賦額＝間接費総額×(#1の作業時間÷全体の作業時間)"
    }
  },
  { num:4, cat:"会計理論",
    text:"貸借対照表の資産・負債の表示に関する記述として、最も適切なものはどれか。",
    choices:["不動産販売業者が販売目的で保有している土地は、その企業の主たる営業活動における商品であるため、有形固定資産として表示する。","長期借入金は、決算日の翌日から１年以内に返済期限が到来する部分があっても、当初の契約に基づき全額を固定負債として表示する。","貸倒引当金が複数の金銭債権（例：売掛金、受取手形）に対して設定されている場合、対象となる債権が流動資産に属するものであれば、流動資産の区分に一括して控除形式で表示することができる。","資産除去債務は、将来の支出額の割引現在価値で負債計上され、関連する有形固定資産の控除項目として表示する。"],
    answer:"ウ",
    kaisetsu:{
      cr:[
        {ok:false,r:"販売業者の販売目的土地は「商品」（棚卸資産・流動資産）→有形固定資産ではない"},
        {ok:false,r:"ワンイヤールール：1年以内返済部分は流動負債へ振り替えが必要"},
        {ok:true, r:"流動資産に属する複数債権への引当金→流動資産の区分で一括控除表示が可能"},
        {ok:false,r:"資産除去債務の対応資産は有形固定資産に「加算」（控除ではない）"}
      ],
      detail:"ウ：複数の売掛金・受取手形等に設定された貸倒引当金は、一括して流動資産区分から控除表示できる。エの誤りポイント：資産除去債務は有形固定資産の取得原価に加算計上（コストの一部として上乗せ）される。",
      point:"ワンイヤールール：1年以内返済→流動負債へ。資産除去債務→固定資産に加算（控除ではない）"
    }
  },
  { num:5, cat:"会計理論",
    text:"無形固定資産の会計処理に関する記述として、最も適切なものはどれか。",
    choices:["自社利用のソフトウェアの制作費は、その利用により将来の収益獲得が見込まれる場合でも、全額を研究開発費として費用処理する。","M&Aにより発生したのれんは、20年以内のその効果が及ぶ期間にわたって、定額法または定率法により償却する。","長年の事業活動で築き上げたブランド価値は、自己創設のれんとして公正な時価で評価し、無形固定資産に計上することができる。","自社利用のソフトウェアは、無形固定資産として計上された後、その利用可能期間にわたって定額法などの合理的な方法で償却される。"],
    answer:"エ",
    kaisetsu:{
      cr:[
        {ok:false,r:"将来収益獲得が見込まれる場合→資産計上（研究開発費として費用処理は誤り）"},
        {ok:false,r:"M&Aのれんの償却→定額法のみ（定率法は認められていない）"},
        {ok:false,r:"自己創設のれん（内部創出のれん）は計上禁止→外部取得のれんのみ計上可"},
        {ok:true, r:"自社利用ソフトウェアは無形固定資産として計上後、利用可能期間にわたり定額法等で償却"}
      ],
      detail:"のれんは「定額法のみ・20年以内」がルール。自己創設のれんは主観的・恣意的になるため計上禁止。自社利用ソフトウェアは、将来の収益獲得が見込まれる場合は無形固定資産として計上し、利用可能期間で償却する。",
      point:"のれん＝定額法のみ・20年以内。自己創設のれん＝計上禁止。ソフトウェア＝利用可能期間で償却"
    }
  },
  { num:6, cat:"会計理論",
    text:"連結会計に関する記述として、最も適切なものはどれか。",
    choices:["連結貸借対照表は、親会社、子会社の個別貸借対照表を合算し、必要な調整を加えて作成される。","非支配株主持分は、連結貸借対照表の総資産の部に表示される。","A社によるB社の議決権の所有割合が40%未満であっても、B社の財務および営業または事業の方針決定に対して影響を与えることができる場合には、B社は子会社と判定される。","持分法による投資利益（または損失）は、連結損益計算書の特別利益（または特別損失）の区分に表示される。"],
    answer:"ア",
    kaisetsu:{
      cr:[
        {ok:true, r:"連結B/S＝親会社・子会社の個別B/Sを合算＋連結調整（内部取引消去等）→正しい"},
        {ok:false,r:"非支配株主持分→純資産の部に表示（総資産の部ではない）"},
        {ok:false,r:"影響を与えられるが支配できない→関連会社（子会社ではない）"},
        {ok:false,r:"持分法による投資損益→営業外損益（特別損益ではない）"}
      ],
      detail:"子会社の判定基準は「支配」（財務・営業方針を実質的に決定できるか）。単に影響を与えられるだけなら「関連会社」として持分法を適用。非支配株主持分は純資産の部・持分法投資損益は営業外区分。",
      point:"子会社＝支配。関連会社＝重要な影響。非支配株主持分→純資産の部。持分法損益→営業外"
    }
  },
  { num:7, cat:"会計理論",
    text:"会社法における計算書類及び会計帳簿に関する記述として、最も適切なものはどれか。",
    choices:["株式会社は、作成した計算書類を、その作成の時から５年間保存しなければならない。","会計帳簿には、会社のすべての取引を損益計算書と同様の形式で記録しなければならない。","会計帳簿は、書面又は電磁的記録をもって作成することができる。","株主は、理由を問わず、いつでも株式会社の会計帳簿を閲覧するよう請求できる。"],
    answer:"ウ",
    kaisetsu:{
      cr:[
        {ok:false,r:"会計帳簿の保存は10年。計算書類は備置5年だが「作成の時から」という表現は正確でない"},
        {ok:false,r:"会計帳簿は複式簿記で記録（損益計算書形式ではない）"},
        {ok:true, r:"会社法第432条第2項：会計帳簿は書面または電磁的記録で作成可→正しい"},
        {ok:false,r:"株主の会計帳簿閲覧には理由の記載と議決権・持株比率（総株主の議決権3%以上等）の要件あり"}

function makeKaisetsuHtml(q) {
  const labels = ["ア","イ","ウ","エ"];
  const catColor = CAT_COLORS[q.cat] || "#1a3a5c";

  let choiceHtml = q.kaisetsu.cr.map((c,i) => `
    <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 14px;border-bottom:1px solid #f0f0f0;background:${c.ok ? '#eafaf1' : '#fff'};">
      <span style="font-size:17px;font-weight:bold;min-width:22px;color:${c.ok ? '#22c55e' : '#e74c3c'};">${c.ok ? '○' : '✗'}</span>
      <span style="font-weight:bold;min-width:22px;color:#333;">${labels[i]}</span>
      <span style="font-size:13px;line-height:1.65;color:${c.ok ? '#15803d' : '#666'};${c.ok ? 'font-weight:600;' : ''}">${c.r}</span>
    </div>
  `).join('');

  let calcHtml = '';
  if (q.kaisetsu.calc) {
    const rows = q.kaisetsu.calc.map(line =>
      line === '─' ? `<div style="border-top:1px dashed #b0c4e8;margin:4px 0;"></div>`
                   : `<div style="padding:1px 0;color:${line.includes('→') ? '#1a3a7c' : '#333'};font-weight:${line.includes('→') ? 'bold' : 'normal'}">${line}</div>`
    ).join('');
    calcHtml = `
      <div style="background:#f0f5ff;border:1px solid #c7d5f0;border-radius:8px;padding:12px 16px;margin:12px 0;font-family:'Courier New',monospace;font-size:13px;line-height:1.85;">
        <div style="font-family:'Hiragino Sans',sans-serif;font-weight:bold;font-size:12px;color:#3a5ca8;margin-bottom:8px;">🧮 計算過程</div>
        ${rows}
      </div>`;
  }

  return `
    <div style="border-radius:10px;overflow:hidden;border:1px solid #dde1e8;margin-top:4px;">
      <div style="background:${catColor};padding:10px 16px;display:flex;align-items:center;gap:12px;">
        <div style="background:#fff;color:${catColor};font-size:16px;font-weight:bold;padding:4px 18px;border-radius:20px;">✓ 正解：${q.answer}</div>
        <span style="color:rgba(255,255,255,.85);font-size:13px;font-weight:bold;">｜ ${q.cat}</span>
      </div>
      <div style="background:#f8fafb;">
        <div style="font-size:11px;font-weight:bold;color:#888;padding:10px 14px 2px;">📋 選択肢チェック</div>
        ${choiceHtml}
      </div>
      <div style="padding:14px 18px;background:#fff;">
        <div style="background:#f0f5ff;border-left:4px solid ${catColor};border-radius:0 8px 8px 0;padding:12px 16px;font-size:13px;line-height:1.8;color:#333;margin-bottom:10px;">
          <div style="font-weight:bold;color:#1a3a5c;margin-bottom:6px;">📝 解説</div>
          ${q.kaisetsu.detail}
        </div>
        ${calcHtml}
        <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 16px;font-size:13px;color:#78350f;font-weight:600;line-height:1.7;">
          🔑 ${q.kaisetsu.point}
        </div>
      </div>
    </div>`;
}

let currentCat = "all";
let filteredQs = [...QUESTIONS];
let currentIdx = 0;

function buildQList() {
  const el = document.getElementById("qList");
  el.innerHTML = "";
  QUESTIONS.forEach((q, i) => {
    const btn = document.createElement("button");
    btn.className = "q-btn";
    btn.textContent = q.num;
    btn.dataset.cat = q.cat;
    btn.dataset.idx = i;
    if (currentCat !== "all" && q.cat !== currentCat) btn.classList.add("hidden");
    btn.onclick = () => {
      const fi = filteredQs.indexOf(q);
      if (fi < 0) return;
      currentIdx = fi;
      render();
    };
    el.appendChild(btn);
  });
}

function render() {
  const q = filteredQs[currentIdx];
  if (!q) return;
  document.getElementById("qNum").textContent = "第" + q.num + "問";
  const badge = document.getElementById("catBadge");
  badge.textContent = q.cat;
  badge.className = "cat-badge " + q.cat;
  document.getElementById("qText").innerHTML = q.text.replace(/\n/g, "<br>");
  const se = document.getElementById("qShiryou");
  if (q.shiryou) { se.style.display=""; se.innerHTML=q.shiryou; } else { se.style.display="none"; }
  const ul = document.getElementById("qChoices");
  const labs = ["ア","イ","ウ","エ"];
  ul.innerHTML = q.choices.map((c,i) => `<li><span class="cho-label">${labs[i]}</span>${c}</li>`).join("");
  document.getElementById("answerBox").style.display = "none";
  document.getElementById("answerBox").innerHTML = "";
  document.getElementById("btnPrev").disabled = currentIdx === 0;
  document.getElementById("btnNext").disabled = currentIdx === filteredQs.length - 1;
  document.getElementById("qCount").textContent = (currentIdx+1) + " / " + filteredQs.length + "問";
  document.getElementById("progressBar").style.width = ((currentIdx+1)/filteredQs.length*100) + "%";
  document.querySelectorAll(".q-btn").forEach(btn => {
    btn.classList.toggle("current", parseInt(btn.dataset.idx) === QUESTIONS.indexOf(q));
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleAnswer() {
  const box = document.getElementById("answerBox");
  if (box.style.display === "none") {
    box.innerHTML = makeKaisetsuHtml(filteredQs[currentIdx]);
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}

function move(dir) {
  currentIdx = Math.max(0, Math.min(filteredQs.length-1, currentIdx+dir));
  render();
}

document.querySelectorAll(".cat-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    currentCat = tab.dataset.cat;
    document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    filteredQs = currentCat==="all" ? [...QUESTIONS] : QUESTIONS.filter(q => q.cat===currentCat);
    currentIdx = 0;
    buildQList();
    render();
  });
});

buildQList();
render();
</script>
