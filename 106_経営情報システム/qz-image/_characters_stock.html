<h1 style="font-size:1.1rem;">キャラ＆アイコン・ストック（手描きSVG）— 106 経営情報システム</h1>
<p style="font-size:.8rem;color:#7a6149;">このファイルからSVGを丸ごとコピーしてノートに貼る。暖色トーン（stroke #7a6149系・パステル塗り・小さめドット目・ωの口・ほっぺピンク）で統一。<b>各キャラに「生徒（素のまま）」と「先生（小物で区別）」の2バージョン</b>を用意。役割の既定＝<b>生徒=くま／先生=うさぎ</b>。先生の目印は うさぎ=リボン／いぬ=ネクタイ／くま=ちょうネクタイ／ねこ=メガネ。合うものが無ければ同トーンで新規作成し、ここへ追記する。</p>
